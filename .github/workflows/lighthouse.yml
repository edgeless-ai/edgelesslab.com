name: Lighthouse CI

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/lighthouse.yml'
      - 'scripts/lighthouse-tracker.js'

permissions:
  contents: write
  pages: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://edgelesslab.com/
            https://edgelesslab.com/blog/
            https://edgelesslab.com/products/
            https://edgelesslab.com/about/
          uploadArtifacts: true
          temporaryPublicStorage: false
          configPath: ./lighthouserc.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Aggregate results
        run: node scripts/lighthouse-tracker.js

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lighthouse-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(lighthouse): weekly scores $(date -u +%Y-%m-%d)"
            git push
          fi
