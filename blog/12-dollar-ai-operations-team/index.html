ve AI agents 24/7 for $12 per week. They handle code review, research synthesis, content triage, knowledge base maintenance, and production monitoring. The architecture isn't a demo. It's been running for three months, survived a corrupted session recovery, and processed 8,000+ tasks without a manual restart.\u003c/p\u003e\n\u003cp\u003eThis is the complete cost breakdown and the specific technical decisions that make cheap infrastructure reliable.\u003c/p\u003e\n\u003ch2 id=\"the-weekly-cost-stack\"\u003eThe Weekly Cost Stack\u003c/h2\u003e\n\u003cdiv class=\"blog-viz blog-metrics\"\u003e\u003cdiv class=\"blog-metric\"\u003e\u003cdiv class=\"blog-metric-value\"\u003e$12\u003c/div\u003e\u003cdiv class=\"blog-metric-label\"\u003eWeekly total\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"blog-metric\"\u003e\u003cdiv class=\"blog-metric-value\"\u003e5\u003c/div\u003e\u003cdiv class=\"blog-metric-label\"\u003eActive agents\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"blog-metric\"\u003e\u003cdiv class=\"blog-metric-value\"\u003e8,000+\u003c/div\u003e\u003cdiv class=\"blog-metric-label\"\u003eTasks processed\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"blog-metric\"\u003e\u003cdiv class=\"blog-metric-value\"\u003e$0\u003c/div\u003e\u003cdiv class=\"blog-metric-label\"\u003eOrchestration cost\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cdiv class=\"blog-viz blog-bar-chart\"\u003e\u003cdiv class=\"blog-viz-title\"\u003eWeekly Cost Breakdown\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eAgent inference\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:100%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$4.20\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eChromaDB storage\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:66.66666666666666%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$2.80\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eKB synthesis\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:83.33333333333333%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$3.50\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eDev/test cycles\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:35.714285714285715%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$1.50\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eOrchestration\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:0%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$0.00\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eFile sync\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:0%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$0.00\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eTelegram\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:0%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$0.00\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cp\u003eThe $50K enterprise equivalent runs managed vector DB (Pinecone Pro: $2,400/mo), orchestration platform (LangSmith Teams: $1,500/mo), API costs at volume (OpenAI Enterprise: ~$3,000/mo), and the engineering time to wire it together (0.5 FTE: $8,000/mo).\u003c/p\u003e\n\u003cp\u003eThe difference isn't just provider choice. It's architecture decisions that eliminate managed-service dependencies.\u003c/p\u003e\n\u003ch2 id=\"the-agent-topology\"\u003eThe Agent Topology\u003c/h2\u003e\n\u003cp\u003eFive agents run in a dispatch/worker topology. This isn't decorative. It's the simplest structure that solves the actual production problems.\u003c/p\u003e\n\u003cdiv class=\"blog-viz blog-flow\"\u003e\u003cdiv class=\"blog-viz-title\"\u003eAgent Topology\u003c/div\u003e\u003cdiv class=\"blog-flow-row\"\u003e\u003cspan class=\"blog-flow-box\"\u003eHuman\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eHermes (CoS)\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eDispatch (COO)\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eBuilder\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-flow-row\"\u003e\u003cspan class=\"blog-flow-box\"\u003eDispatch (COO)\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eResearcher\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-flow-row\"\u003e\u003cspan class=\"blog-flow-box\"\u003eDispatch (COO)\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eVerifier\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cp\u003e\u003cstrong\u003eHermes (Chief of Staff)\u003c/strong\u003e — My primary session agent. Receives all human requests, decides whether to execute directly or delegate. Runs on Kimi K2.5 via Fireworks. Context window management is the constraint: it sees the full project state and delegates to specialists when the task requires specific tools or extended processing.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDispatch (COO)\u003c/strong\u003e — A Paperclip-managed agent that never executes tasks directly. Its only job is routing: receive task requests from Hermes, assign to appropriate workers, track state machine transitions, escalate stuck tasks. It runs on a lighter model (DeepSeek V3.2) because its cognitive load is lower—it's matching patterns, not reasoning about code.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBuilder\u003c/strong\u003e — Claude Code agent on a VPS. Handles all code changes: feature implementation, bug fixes, refactoring. Runs on Anthropic Claude via standard API. The VPS isolates it from my local machine state, which means it can run overnight without my laptop being open.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eResearcher\u003c/strong\u003e — Deep research agent. Consumes RSS feeds, YouTube transcripts, arXiv papers, synthesizes findings into structured reports. Runs Kimi K2.5 with extended context. Its output feeds directly into the knowledge base.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVerifier\u003c/strong\u003e — Quality control agent. Reviews Builder's output, runs tests, checks for security issues, validates against acceptance criteria. Acts as a gate before deployment.\u003c/p\u003e\n\u003cp\u003eThe topology solves three specific failure modes I've hit with single-agent approaches:\u003c/p\u003e\n\u003col\u003e\u003cli\u003e\u003cstrong\u003eContext pollution\u003c/strong\u003e: When a single agent switches between coding and research, it drops relevant context from the earlier task. Specialists keep their context focused.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eTool confusion\u003c/strong\u003e: Agents with 20+ tools start calling the wrong ones. Specialists have 4-6 tools each. The tool selection accuracy is visibly higher.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eState loss on crash\u003c/strong\u003e: A single long-running session that crashes loses everything. Distributed state means any single agent can restart without losing the system's progress.\u003c/li\u003e\u003c/ol\u003e\n\u003ch2 id=\"model-routing-four-different-brains\"\u003eModel Routing: Four Different Brains\u003c/h2\u003e\n\u003cp\u003eThe routing isn't random. Each model has a specific operational profile:\u003c/p\u003e\n\u003cdiv class=\"blog-viz blog-bar-chart\"\u003e\u003cdiv class=\"blog-viz-title\"\u003eWeekly Task Volume by Model\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eDeepSeek V3.2\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:100%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e340 tasks\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eKimi K2.5\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:52.94117647058824%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e180 tasks\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eCodex (GPT-5.4)\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:11.76470588235294%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e40 tasks\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eClaude Opus 4\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:7.352941176470589%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e25 tasks\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cdiv class=\"blog-viz blog-bar-chart\"\u003e\u003cdiv class=\"blog-viz-title\"\u003eCost per Million Tokens (Output)\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eClaude Opus 4\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:100%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$75.00\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eCodex (GPT-5.4)\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:16%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$12.00\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eKimi K2.5\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:2.666666666666667%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$2.00\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"blog-bar-row\"\u003e\u003cspan class=\"blog-bar-label\"\u003eDeepSeek V3.2\u003c/span\u003e\u003cdiv class=\"blog-bar-track\"\u003e\u003cdiv class=\"blog-bar-fill\" style=\"width:1.4666666666666668%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cspan class=\"blog-bar-value\"\u003e$1.10\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cp\u003eKimi K2.5 handles 70% of tasks because it's the cheapest generalist that doesn't hallucinate tools. DeepSeek takes the high-volume, low-cognitive-load work (formatting, simple transformations, status checks). Claude Opus is reserved for security-sensitive reviews—it's expensive but catches issues the cheaper models miss. Codex handles bulk code generation where context length matters more than nuance.\u003c/p\u003e\n\u003cp\u003eThe routing decision happens at the dispatch layer. Tasks include a complexity tag (low/medium/high) and a security flag. Low complexity + no security flag → DeepSeek. High complexity or security flag → Kimi or Opus depending on domain.\u003c/p\u003e\n\u003cp\u003eThis routing alone cuts costs 10x versus using a single model for everything.\u003c/p\u003e\n\u003ch2 id=\"the-knowledge-base-loop\"\u003eThe Knowledge Base Loop\u003c/h2\u003e\n\u003cp\u003eEvery agent operation feeds a knowledge base. Not as an afterthought—as a core system function.\u003c/p\u003e\n\u003cdiv class=\"blog-viz blog-flow\"\u003e\u003cdiv class=\"blog-viz-title\"\u003eKnowledge Base Loop\u003c/div\u003e\u003cdiv class=\"blog-flow-row\"\u003e\u003cspan class=\"blog-flow-box\"\u003eCapture\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eSynthesize\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eVerify\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eInject\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eAgents\u003c/span\u003e\u003cspan class=\"blog-flow-arrow\"\u003e→\u003c/span\u003e\u003cspan class=\"blog-flow-box\"\u003eCapture\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cp\u003eThe loop works like this:\u003c/p\u003e\n\u003col\u003e\u003cli\u003e\u003cstrong\u003eCapture\u003c/strong\u003e: All agent outputs, research findings, error logs, and human corrections write to ChromaDB with embeddings.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSynthesize\u003c/strong\u003e: A nightly batch job (separate agent) queries for related documents, detects themes, and writes synthesized summaries.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eVerify\u003c/strong\u003e: Another agent samples the synthesized notes, checks for factual drift or contradictions, flags issues.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eInject\u003c/strong\u003e: The verified synthesis becomes retrievable context for all agents.\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eThe loop means agents don't just have tools—they have memory of what the system has learned. When Builder encounters an error, it can query: \"how did we solve similar errors before?\" The answer comes from actual previous sessions, not generic training data.\u003c/p\u003e\n\u003cp\u003eThe KB infrastructure costs $2.80/week (self-hosted ChromaDB on a €6.50 Hetzner instance). The managed equivalent (Pinecone, Weaviate Cloud) runs $200-400/month.\u003c/p\u003e\n\u003ch2 id=\"file-based-agent-communication\"\u003eFile-Based Agent Communication\u003c/h2\u003e\n\u003cp\u003eThe agents communicate through two channels:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAgent Bus\u003c/strong\u003e: Real-time MCP connection on port 9800. Handles urgent coordination: task assignment, status updates, human escalation. Messages route through a local daemon that queues for offline agents.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAsync Inboxes\u003c/strong\u003e: File-based system synced via rsync every 60 seconds. Each agent has an inbox directory. Dispatch writes task files, workers read and write results. The filesystem is the message queue.\u003c/p\u003e\n\u003cp\u003eWhy files instead of a proper message queue (RabbitMQ, Redis)?\u003c/p\u003e\n\u003col\u003e\u003cli\u003e\u003cstrong\u003eObservability\u003c/strong\u003e: I can \u003ccode\u003ecat /inbox/builder/task-4821.json\u003c/code\u003e and see exactly what was sent.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRecovery\u003c/strong\u003e: If a task fails, the file is right there with full context. No log archaeology.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eZero ops\u003c/strong\u003e: No database to manage, no connection pools, no retry logic. The filesystem has been reliable for 50 years.\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eThe latency is higher (60s sync cycle) but the reliability is perfect. For tasks that need real-time, the Agent Bus handles it. Most tasks are fine with 60s latency.\u003c/p\u003e\n\u003ch2 id=\"the-failure-modes\"\u003eThe Failure Modes\u003c/h2\u003e\n\u003cp\u003eCheap infrastructure has specific failure modes. I've hit them.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSession poisoning\u003c/strong\u003e: An agent corrupted its own skill definitions through repeated partial updates. The corruption spread to other agents that read the shared skill file. Detection took 6 hours. Recovery required restoring from backup and adding versioned skill files.\u003c/p\u003e\n\u003cp\u003eThe fix: skill files now include a checksum. Agents verify before loading. Corrupted skills fail closed (agent stops) rather than open (agent runs with bad definitions).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eModel degradation\u003c/strong\u003e: Kimi K2.5 had a quality regression on one Fireworks deployment. The routing layer detected elevated error rates and automatically shifted load to the backup deployment. Total impact: 4 minutes of degraded service.\u003c/p\u003e\n\u003cp\u003eThe fix: health checks on model endpoints, automatic failover, circuit breaker pattern for failing providers.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eResource exhaustion\u003c/strong\u003e: ChromaDB hit its memory limit during a large embedding batch. The indexer kept retrying, filling logs, failing silently. The KB synthesizer agent detected the backlog growth and alerted before the disk filled.\u003c/p\u003e\n\u003cp\u003eThe fix: resource-aware batch sizing, explicit memory limits, monitoring on queue depth not just error rates.\u003c/p\u003e\n\u003ch2 id=\"what-this-architecture-can-t-do\"\u003eWhat This Architecture Can't Do\u003c/h2\u003e\n\u003cp\u003eHonest limitations:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eNo high-availability guarantee\u003c/strong\u003e: Single VPS, single Mac. If Hetzner has an outage, the remote agents stop. Recovery is manual.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eNo multi-region redundancy\u003c/strong\u003e: 60s rsync is fine for async tasks, but real-time coordination can't survive a network partition.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eNo formal verification\u003c/strong\u003e: The state machine is tested, not proven. Edge cases exist.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eNo enterprise compliance\u003c/strong\u003e: No SOC 2, no audit logs for regulators. This is a solo operation.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eThe architecture optimizes for \"good enough for one person\" not \"good enough for 1,000 customers.\"\u003c/p\u003e\n\u003ch2 id=\"getting-started\"\u003eGetting Started\u003c/h2\u003e\n\u003cp\u003eYou don't need five agents on day one. Start with two: one primary, one specialist for your most common task type. Add the dispatch layer when you're tired of manually routing tasks. Add workers when you hit the cognitive limits of your existing agents.\u003c/p\u003e\n\u003cp\u003eThe infrastructure I described—the model routing, the KB loop, the file-based communication—ships as the Paperclip OS. It's the blueprint, the config files, the monitoring setup, and the failure patterns I documented so you don't have to discover them.\u003c/p\u003e\n\u003cp\u003eThe \u003ca href=\"/products\"\u003ePaperclip OS\u003c/a\u003e is $49. That pays for itself the first time it prevents a corrupted session or routes a task to the cheapest model that can handle it.\u003c/p\u003e\n\u003cp\u003eThe $12/week isn't the point. The point is that cheap infrastructure can be reliable if you design for the actual failure modes instead of the theoretical ones.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"I Run a $12/Week AI Operations Team. Here's the Cost Breakdown.
