ndefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:T10d0,"])</script><script>self.__next_f.push([1,"\u003cp\u003eAt 3:17 a.m. last Thursday I pulled the latest digest from our agent pipeline. It contained fourteen RSS items, three YouTube transcript summaries, and two market-signal alerts. Every bullet began with \"The model shows\" or \"OpenAI released.\" The facts were correct. The output was still a database dump.\u003c/p\u003e\n\u003cp\u003eOur open rate sat at 18 percent. Replies were zero. I had built an automated system that produced accurate summaries but gave readers nothing to act on.\u003c/p\u003e\n\u003ch2 id=\"five-rules-stolen-from-newsletters-people-actually-read\"\u003eFive Rules Stolen from Newsletters People Actually Read\u003c/h2\u003e\n\u003cp\u003eI studied the three newsletters that actually get opened: Morning Brew opens with a single implication before any data, TLDR never exceeds seventy-five words per item and uses bullets for the numbers, and Ben's Bites ends every entry with one sentence on what changes next. I extracted five structural rules and forced them into our pipeline.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. Lead with the implication, not the fact.\u003c/strong\u003e Readers scan for relevance first. Start with a one-sentence \"why this matters\" hook before any details.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. Cap every summary at 75 words.\u003c/strong\u003e Break it into two short paragraphs plus three bullets. Dense blocks kill engagement.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. End each item with a forward-looking sentence.\u003c/strong\u003e This creates momentum and makes the newsletter feel like a curator, not a feed.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. Use consistent visual hierarchy.\u003c/strong\u003e Bold section headers, bolded key phrases inside items, and one italicized \"editor's take\" line per item for voice.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e5. Limit the total issue to 5-7 items maximum.\u003c/strong\u003e Prioritize ruthlessly and group weaker items into a \"Quick Hits\" section of 20-30 words each.\u003c/p\u003e\n\u003cp\u003eThose five rules alone cut average read time from nine minutes to under four.\u003c/p\u003e\n\u003ch2 id=\"the-second-pass-prompt-that-changed-everything\"\u003eThe Second-Pass Prompt That Changed Everything\u003c/h2\u003e\n\u003cp\u003eThe largest single improvement came from a second-pass prompt that runs after the raw agent output. The raw summaries are accurate but robotic. This prompt humanizes them:\u003c/p\u003e\n\u003cblockquote\u003e\"Rewrite the following summary. Start with one sentence stating the implication for builders. Use contractions. Never start with the company name. Sound like a knowledgeable colleague, not a press release.\"\u003c/blockquote\u003e\n\u003ch2 id=\"before-and-after\"\u003eBefore and After\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eBefore (raw AI summary):\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\"OpenAI released GPT-5 with improved reasoning capabilities. The model shows 40% improvement on MATH benchmarks and introduces native tool use. Pricing starts at $15/1M input tokens. Key implications: competitive pressure on Anthropic and Google, potential disruption to existing agent frameworks, new multimodal capabilities may obsolete current vision pipelines.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAfter (second-pass rewrite):\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGPT-5 just made reliable multi-step agents practical.\u003c/strong\u003e The model scores 40 percent higher on MATH benchmarks and now calls tools natively out of the box. Pricing begins at $15 per million input tokens.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eAgent scaffolding that once required brittle external loops now runs inside the model.\u003c/li\u003e\u003cli\u003eMultimodal features are strong enough to replace several current vision pipelines.\u003c/li\u003e\u003cli\u003eExpect Anthropic and Google to ship matching tool-use updates within ninety days.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e*Editor's take: This is the first release that feels like it could actually compress the gap between today's agents and something production-ready.*\u003c/p\u003e\n\u003cp\u003eThe second version is still factual, but a reader can decide in eight seconds whether to keep reading.\u003c/p\u003e\n\u003ch2 id=\"the-template\"\u003eThe Template\u003c/h2\u003e\n\u003cp\u003eWe now ship every digest with this fixed template. A sixty-word intro paragraph sets the week's theme. The main section contains three to five items, each under seventy-five words and formatted with bold claim, bullets, and one italic line. Quick Hits follows with three items at twenty-five words each. The closer is a single forty-word reflection that ends with a question.\u003c/p\u003e\n\u003cp\u003eAfter the first week under this structure our open rate rose to thirty-four percent and we received twelve direct replies. The pipeline still runs automatically, but the output no longer reads like a database dump.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"Your AI Newsletter Reads Like a Database Dump (Here's the Fix)\\\",\\\"description\\\":\\\"Our AI-generated digests had an 18% open rate. Five structural rules from Morning Brew, TLDR, and Ben's Bites doubled it. The template, the prompt trick, and the before/after.\\\",\\\"datePublished\\\":\\\"2026-05-05\\\",\\\"dateModified\\\":\\\"2026-05-05\\\",\\\"wordCount\\\":1250,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/ai-newsletter-reads-like-database-dump\\\",\\\"keywords\\\":[\\\"AI Agents\\\",\\\"Newsletters\\\",\\\"Content\\\",\\\"Automation\\\"],\\\"mainEntityOfPage\\\":{\\\"@type\\\
