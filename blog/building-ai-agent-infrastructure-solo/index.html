efined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:T14c4,"])</script><script>self.__next_f.push([1,"\u003cp\u003eWhen people hear \"multi-agent system,\" they picture a team of engineers, months of planning, and enterprise infrastructure. I built one by myself, and it runs on a single $15/month VPS.\u003c/p\u003e\n\u003cp\u003eThis post covers the architecture decisions, the tools that made it possible, and the parts that surprised me.\u003c/p\u003e\n\u003ch2 id=\"the-stack\"\u003eThe Stack\u003c/h2\u003e\n\u003cp\u003eThe system has five layers:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eClaude Code\u003c/strong\u003e sits at the top as the primary agent runtime. Skills, hooks, and memory give it persistent context across sessions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMCP Servers\u003c/strong\u003e provide the tool layer. Instead of hardcoding capabilities, each tool is a standalone server that any agent can call. Search the knowledge vault? That's an MCP tool. Dispatch a task to another agent? MCP tool. Check VPS health? MCP tool.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChromaDB\u003c/strong\u003e handles vector memory. Every document, conversation summary, and learned pattern gets embedded and stored. When an agent needs context, it queries by semantic similarity rather than keyword matching.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eObsidian\u003c/strong\u003e is the knowledge vault: 7,000+ markdown files organized by topic. It's the human-readable layer that agents can also query through MCP.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHetzner VPS\u003c/strong\u003e runs the always-on processes: the Telegram gateway, the cron jobs, everything that needs to persist beyond a terminal session.\u003c/p\u003e\n\u003ch2 id=\"why-mcp-changes-everything\"\u003eWhy MCP Changes Everything\u003c/h2\u003e\n\u003cp\u003eBefore MCP, giving an AI agent access to tools meant writing custom integrations for each model provider. MCP standardizes the protocol: define your tool once, and any MCP-compatible client can use it.\u003c/p\u003e\n\u003cp\u003eI have servers for ChromaDB search, Obsidian vault queries, backlog management, and inter-agent messaging. Adding a new capability means writing one server, not modifying every agent.\u003c/p\u003e\n\u003cp\u003eThe Effect-TS implementation makes the servers composable and type-safe. Error handling is built into the type system rather than scattered across try-catch blocks.\u003c/p\u003e\n\u003ch2 id=\"memory-that-actually-works\"\u003eMemory That Actually Works\u003c/h2\u003e\n\u003cp\u003eThe biggest challenge with AI agents isn't reasoning; it's memory. A conversation ends, and everything learned evaporates.\u003c/p\u003e\n\u003cp\u003eI open-sourced the basic version as the \u003ca href=\"https://github.com/edgeless-ai/claude-memory-kit\"\u003eClaude Memory Kit\u003c/a\u003e and built a \u003ca href=\"https://edgelessai.gumroad.com/l/claude-memory-kit\"\u003ePro version\u003c/a\u003e with stack-specific libraries and advanced patterns.\u003c/p\u003e\n\u003cp\u003eThe solution is a three-layer memory system:\u003c/p\u003e\n\u003col\u003e\u003cli\u003e\u003cstrong\u003eChromaDB\u003c/strong\u003e for semantic search across all stored knowledge\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eFile-based memory\u003c/strong\u003e for structured facts (user preferences, project context, feedback)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eObsidian vault\u003c/strong\u003e for human-curated knowledge that agents can also access\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eEach layer serves a different retrieval pattern. ChromaDB handles \"find me something similar to X.\" File memory handles \"what did the user tell me about Y.\" The vault handles \"what's the canonical documentation for Z.\"\u003c/p\u003e\n\u003ch2 id=\"the-safety-layer\"\u003eThe Safety Layer\u003c/h2\u003e\n\u003cp\u003eThe autonomous agent that lost $252 was the forcing function for getting the infrastructure right. An agent that takes irreversible actions without guardrails is worse than no agent at all.\u003c/p\u003e\n\u003cp\u003eThe hooks system runs on every tool call, 24/7. Its architecture:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eDamage control\u003c/strong\u003e: Blocks destructive commands before they execute\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eScope guard\u003c/strong\u003e: Prevents agents from exceeding their explicit mandate\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eFinancial gate\u003c/strong\u003e: Requires verification protocol before any transaction\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eReversibility classifier\u003c/strong\u003e: Categorizes actions by blast radius\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCompletion verifier\u003c/strong\u003e: Evidence-based proof that work is actually done\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eThe key insight: the agent doesn't need to be smart about everything. It needs guardrails that are smarter than its worst impulse.\u003c/p\u003e\n\u003ch2 id=\"lessons-learned\"\u003eLessons Learned\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eStart with one agent, not three.\u003c/strong\u003e Multi-agent orchestration sounds impressive but adds complexity. Get one agent working end-to-end before adding coordination.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMCP servers are the right abstraction.\u003c/strong\u003e Tools as services, not libraries. This makes testing, deployment, and access control straightforward.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMemory is infrastructure, not a feature.\u003c/strong\u003e Treat it like a database, with schemas, retention policies, and access patterns.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVPS beats serverless for always-on agents.\u003c/strong\u003e When your agent needs to maintain state, respond to events, and run cron jobs, a $15 VPS is simpler than a constellation of Lambda functions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe tools exist.\u003c/strong\u003e Claude Code, MCP, ChromaDB, PM2: the building blocks for agent infrastructure are production-ready today. The bottleneck isn't technology, it's architecture.\u003c/p\u003e\n\u003ch2 id=\"what-s-next\"\u003eWhat's Next\u003c/h2\u003e\n\u003cp\u003eThe system keeps growing. Current priorities: improving inter-agent communication (an \"agent bus\" for real-time messaging), better memory consolidation (merging redundant knowledge), and more sophisticated trading strategies.\u003c/p\u003e\n\u003cp\u003eThe goal isn't to build the most complex system. It's to build the most useful one, with the least moving parts.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"Building AI Agent Infrastructure as a Solo Developer\\\",\\\"description\\\":\\\"How I built a multi-agent system with MCP servers, vector memory, and autonomous trading, all running 24/7 from a single VPS.\\\",\\\"datePublished\\\":\\\"2026-03-21\\\",\\\"dateModified\\\":\\\"2026-03-21\\\",\\\"wordCount\\\":2000,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/building-ai-agent-infrastructure-solo\\\",\\\"keywords\\\":[\\\"Agents\\\",\\\"MCP\\\",\\\"Infrastructure\\\"],\\\"mainEntityOfPage\\\":{\\\"@type\\\":\\\"WebPage\\\",\\\"@id\\\":\\\"https://edgelesslab.com/blog/building-ai-agent-infrastructure-solo\\\"}}\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BreadcrumbList\\\",\\\"itemListElement\\\":[{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":1,\\\"name\\\":\\\"Home\\\",\\\"item\\\":\\\"https://edgelesslab.com\\\"},{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":2,\\\"name\\\":\\\"Blog\\\",\\\"item\\\":\\\"https:
