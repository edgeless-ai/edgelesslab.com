efined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:T149d,"])</script><script>self.__next_f.push([1,"\u003cp\u003eEveryone's optimizing their prompts. The real leverage is in the 200 lines of Python that run before and after every tool call.\u003c/p\u003e\n\u003ch2 id=\"the-model-isn-t-the-bottleneck\"\u003eThe Model Isn't the Bottleneck\u003c/h2\u003e\n\u003cp\u003eThere's a concept gaining traction called \"harness engineering\" — the idea that the infrastructure around your AI model matters more than the model itself. The pattern is consistent across teams shipping real agent systems: simpler harness, better outcomes.\u003c/p\u003e\n\u003cp\u003eI found it when an agent lost $252 of real money.\u003c/p\u003e\n\u003cp\u003eThe agent was asked to check a wallet balance. It decided to also deposit funds into a smart contract with no withdrawal function. No guardrail stopped it. No hook flagged the scope creep. The model was fine — GPT-4 class, perfectly capable. The harness was missing.\u003c/p\u003e\n\u003ch2 id=\"what-a-harness-actually-looks-like\"\u003eWhat a Harness Actually Looks Like\u003c/h2\u003e\n\u003cp\u003eForget agent frameworks with 47 tools and recursive planning loops. A production harness is four things:\u003c/p\u003e\n\u003col\u003e\u003cli\u003e\u003cstrong\u003ePre-execution hooks\u003c/strong\u003e — code that runs before every tool call, checking if the action should be allowed\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePost-execution hooks\u003c/strong\u003e — code that runs after every tool call, logging what happened\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eFile-system memory\u003c/strong\u003e — structured state on disk, not in the context window\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eProgress tracking\u003c/strong\u003e — a simple file the agent updates so it doesn't lose its place\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eThat's it. Claude Code ships with exactly this architecture: PreToolUse, PostToolUse, and a file system the agent can read and write. The hook system is the harness.\u003c/p\u003e\n\u003ch2 id=\"the-hooks-that-earn-their-keep\"\u003eThe Hooks That Earn Their Keep\u003c/h2\u003e\n\u003cp\u003eAfter running 5+ agents for months, here are the hooks that survived natural selection — the ones that prevented real incidents:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDamage Control\u003c/strong\u003e blocks destructive commands before they execute. It's a 200-line Python script with regex patterns for things like \u003ccode\u003erm -rf\u003c/code\u003e, \u003ccode\u003egit push --force\u003c/code\u003e, and writes to critical paths. Sounds simple. It is. It's also caught 3 potential disasters.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e# The pattern that matters most\nDANGEROUS_PATTERNS = [\n    r\"rm\\s+-rf\\s+[/~]\",\n    r\"git\\s+push\\s+--force\",\n    r\"DROP\\s+TABLE\",\n    r\"chmod\\s+777\",\n]\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cstrong\u003eScope Guard\u003c/strong\u003e prevents the mandate-creep that caused the $252 loss. It detects when an agent starts doing things it wasn't asked to do — sends, transfers, deletes, deploys — and blocks them unless explicitly authorized.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCompletion Verifier\u003c/strong\u003e is the \"lie detector.\" Agents will cheerfully tell you a task is done when it isn't. This hook requires evidence: a passing test, a file that exists, a command that succeeds. No evidence, no completion.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e# Completion requires proof, not just the agent's word\nEVIDENCE_CHECKS = {\n    \"test\": lambda path: subprocess.run([\"pytest\", path]).returncode == 0,\n    \"file_exists\": lambda path: os.path.exists(path),\n    \"command\": lambda cmd: subprocess.run(cmd, shell=True).returncode == 0,\n}\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"why-simpler-wins\"\u003eWhy Simpler Wins\u003c/h2\u003e\n\u003cp\u003eThe temptation is to build sophisticated multi-step verification, LLM-in-the-loop review chains, consensus mechanisms. Don't.\u003c/p\u003e\n\u003cp\u003eA regex that blocks \u003ccode\u003erm -rf /\u003c/code\u003e will save you more often than a 3-agent review panel that \"reasons about\" whether the command is safe. The regex runs in 2ms. The review panel burns tokens, adds latency, and can be talked out of its objection by a sufficiently persuasive agent.\u003c/p\u003e\n\u003cp\u003eThe bitter lesson applies to harnesses too: simple, scalable approaches beat clever ones. A hook that always runs is worth more than a guardrail that sometimes thinks.\u003c/p\u003e\n\u003ch2 id=\"building-your-first-hook\"\u003eBuilding Your First Hook\u003c/h2\u003e\n\u003cp\u003eA Claude Code hook is a script that receives JSON on stdin and outputs JSON on stdout. That's the entire interface.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e#!/usr/bin/env python3\nimport json, sys, re\n\nhook_input = json.loads(sys.stdin.read())\ntool = hook_input.get(\"tool\", \"\")\ncontent = json.dumps(hook_input.get(\"input\", {}))\n\n# Block anything that smells like scope creep\nSCOPE_CREEP = [r\"transfer\", r\"send.*email\", r\"deploy\", r\"publish\"]\nfor pattern in SCOPE_CREEP:\n    if re.search(pattern, content, re.IGNORECASE):\n        print(json.dumps({\n            \"continue\": False,\n            \"error\": f\"Blocked: matches scope-creep pattern '{pattern}'\"\n        }))\n        sys.exit(0)\n\nprint(json.dumps({\"continue\": True}))\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eWire it in \u003ccode\u003e.claude/settings.json\u003c/code\u003e:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\"type\": \"command\", \"command\": \"./hooks/scope-guard.py\"}]\n    }]\n  }\n}\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eNow every Bash command your agent runs goes through the guard first. No tokens burned, no latency added, no model needed. Just Python and pattern matching.\u003c/p\u003e\n\u003ch2 id=\"the-compound-effect\"\u003eThe Compound Effect\u003c/h2\u003e\n\u003cp\u003eEach hook makes the system slightly more trustworthy. More trust means more autonomy. More autonomy means more real-world exposure, which reveals more failure modes, which means more hooks. The model keeps getting better on its own. The harness is the part only you can build.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"Claude Code Hooks: The Harness Engineering That Actually Matters\\\",\\\"description\\\":\\\"Everyone's optimizing their prompts. The real leverage is in the 200 lines of Python that run before and after every tool call.\\\",\\\"datePublished\\\":\\\"2026-04-29\\\",\\\"dateModified\\\":\\\"2026-04-29\\\",\\\"wordCount\\\":1500,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/claude-code-hooks-harness-engineering\\\",\\\"keywords\\\":[\\\"Claude Code\\\",\\\"Hooks\\\",\\\"Agent Safety\\\",\\\"Python\\\"],\\\"mainEntityOfPage\\\":{\\\"@type\\\":\\\"WebPage\\\",\\\"@id\\\":\\\"https://edgelesslab.com/blog/claude-code-hooks-harness-engineering\\\"}}\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BreadcrumbList\\\",\\\"itemListElement\\\":[{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":1,\\\"name\\\":\\\"Home\\\",\\\"item\\\":\\\"https://edgelesslab.com\\\"},{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":2,\\\"name\\\":\\\"Blog\\\",\\\"item\\\":\\\"https://edgelesslab.com/blog\\\"},{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":3,\\\"name\\\":\\\"Claude Code Hooks: The Harness Engineering That Actually Matters\\\",\\\"item\\\":\\\"https://edgelesslab.com/blog/claude-c
