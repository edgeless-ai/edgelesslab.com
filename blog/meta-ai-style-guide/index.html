ed\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:T2d31,"])</script><script>self.__next_f.push([1,"\u003cp\u003eSomeone leaked Meta AI's production system prompt. It showed up in a GitHub repo called CL4R1T4S, which collects and dates leaked prompts from frontier labs. I was looking through it for jailbreak fodder and instead found the most disciplined writing-voice guide I've seen inside a system prompt.\u003c/p\u003e\n\u003cp\u003eThe model is called Muse Spark. The prompt is 48KB. Most of it is forgettable: tool schemas, media-generation routing, citation formatting. But buried in the middle is a writing-style block that does something I had not seen any lab do this explicitly: it names the specific strings the model must never produce.\u003c/p\u003e\n\u003cp\u003eNot \"be natural.\" Not \"write conversationally.\" Literal substrings. Quoted. Banned.\u003c/p\u003e\n\u003cp\u003eI imported five of those rules into my own system, rewrote one from scratch, and I'm still arguing with a seventh. This is what I changed and why.\u003c/p\u003e\n\u003ch2 id=\"1-ban-specific-phrases-by-name-not-by-category\"\u003e1. Ban specific phrases by name, not by category\u003c/h2\u003e\n\u003cp\u003eMeta's prompt contains this line:\u003c/p\u003e\n\u003cblockquote\u003eSteer clear of stock phrases like \"That's a great question\" or \"That sounds tough,\" as well as cringe AI phrases like \"As an AI language model,\" \"You're absolutely right,\" \"It's not just X, it's also Y,\" and \"It's important to note that...\"\u003c/blockquote\u003e\n\u003cp\u003eThe word \"cringe\" is doing real work there. Meta is naming the failure mode in the language people actually use to describe it. And the fix is not \"avoid sycophantic language\" (which gives the model nothing to pattern-match against). The fix is a list of literal strings.\u003c/p\u003e\n\u003cp\u003eI ran a lint across my 14 existing blog posts looking for these exact patterns. Result: 71 violations. 70 of them were the ASCII double-hyphen \u003ccode\u003e--\u003c/code\u003e used as a prose dash. One was the \"not just X, it's also Y\" frame on a line I thought was pretty good until I saw it flagged:\u003c/p\u003e\n\u003cblockquote\u003eIt's not just a coding assistant, it's the primary agent runtime.\u003c/blockquote\u003e\n\u003cp\u003eRewritten: \"Claude Code sits at the top as the primary agent runtime.\" The rewrite is shorter, more direct, and makes the same claim without the frame that signals \"an AI wrote this.\"\u003c/p\u003e\n\u003cp\u003eThe lesson: vague guidance (\"write naturally\") underperforms verbatim bans. The model is good at avoiding things it can recognize. A literal substring gives it something to recognize. An abstract instruction does not.\u003c/p\u003e\n\u003ch2 id=\"2-open-with-a-topic-specific-sentence\"\u003e2. Open with a topic-specific sentence\u003c/h2\u003e\n\u003cblockquote\u003eOpen responses with a sentence that's specific to the topic at hand. Don't start with \"Here's a...\", \"Here are the...\", or other reusable frames.\u003c/blockquote\u003e\n\u003cp\u003eThis single rule kills the most distinctive AI tic. When I looked at my own blog posts, the bodies were clean (they open with lines like \"There are over 400 MCP servers listed in public directories\" and \"At 2am on a Tuesday, I ran a deploy script\"). But four of the fourteen had \"Here's the...\" or \"Here's a...\" in their metadata descriptions. The muscle memory is there even when the body avoids it.\u003c/p\u003e\n\u003cp\u003eThe fix is not \"try to be specific.\" The fix is a banned-opener list: \"Here's a...\", \"Here are the...\", \"In this post, we'll...\", \"Let's talk about...\", \"Have you ever wondered...\". If the first sentence of a section matches any of those patterns, the lint catches it.\u003c/p\u003e\n\u003ch2 id=\"3-don-t-restate-the-body-in-a-bottom-line-summary\"\u003e3. Don't restate the body in a \"bottom line\" summary\u003c/h2\u003e\n\u003cblockquote\u003eDo not restate the body in a \"bottom line\" summary; however, you can suggest concrete follow-ups when it helps.\u003c/blockquote\u003e\n\u003cp\u003eI didn't realize how much my drafting agent was doing this until I went looking. It added a \"TL;DR\" or \"In summary\" block to roughly half of all drafts, including drafts that were 200 words long. A 200-word post does not need a summary. A 2,000-word post does not need one either, if the structure is clear.\u003c/p\u003e\n\u003cp\u003eThe rule I adopted: closings are either a single sharp line that earns the ending, a concrete next step (a link, a command, a related post), or nothing at all. End on the last substantive paragraph.\u003c/p\u003e\n\u003cp\u003eMy best example of this done right, from my own blog: \"Your job isn't to trust the agent. It's to make the wrong path impossible.\" That's the last line of a 1,500-word post-mortem about an agent that lost $252. No recap. No \"key takeaway.\" The line lands because nothing after it dilutes it.\u003c/p\u003e\n\u003ch2 id=\"4-tables-for-structured-comparisons-not-decoration\"\u003e4. Tables for structured comparisons, not decoration\u003c/h2\u003e\n\u003cblockquote\u003eWhen listing or comparing items that share structured attributes, use a markdown table. This includes comparisons, ranked lists, reference data, category breakdowns, and any set of items with 2+ shared properties.\u003c/blockquote\u003e\n\u003cp\u003eMost prompts say \"use formatting as appropriate.\" Meta's prompt says: if there are two shared attributes, use a table. That is a hard decision heuristic, not a suggestion. It also says: \"Questions like 'what are the different types of X' or 'what does each X do' are a good fit for tables when items have name + description/property pairs.\"\u003c/p\u003e\n\u003cp\u003eThe flip side matters too: Meta implicitly distinguishes tables from bullet lists. A bullet list with bold labels (\u003ccode\u003e\u003cstrong\u003eName\u003c/strong\u003e: description\u003c/code\u003e) is not a table. It becomes a table only when the attributes are genuinely parallel across items. This distinction prevents the \"everything is a table\" failure mode that makes long-form content feel like a spreadsheet.\u003c/p\u003e\n\u003cp\u003eI added a counterpart to my own rules: \"Use a markdown table only for true comparisons. A bullet list with bold labels is not a table and does not need to become one.\" The worked example: a blog post that uses \u003ccode\u003e\u003cstrong\u003eTrigger\u003c/strong\u003e: Schedule, every 6 hours\u003c/code\u003e and \u003ccode\u003e\u003cstrong\u003eFlow\u003c/strong\u003e: RSS feed -\u003e filter -\u003e Claude -\u003e email digest\u003c/code\u003e as two bullets per item. That is metadata-per-item, not a comparison. It is correctly a bullet list.\u003c/p\u003e\n\u003ch2 id=\"5-search-triggering-as-a-decision-tree-not-a-vibe\"\u003e5. Search triggering as a decision tree, not a vibe\u003c/h2\u003e\n\u003cp\u003eMeta's prompt has a \u003ccode\u003e\u003ctriggering\u003e\u003c/code\u003e block that enumerates when web search should and should not fire. The \"should not\" list is as important as the \"should\" list:\u003c/p\u003e\n\u003cblockquote\u003eDo not call search when you do not need information from the internet. For common knowledge such as simple math, geography, history, science, well-known facts, or famous works, you generally don't need to search. Tasks like creative writing, grammar, or language translation, also typically do not require a search.\u003c/blockquote\u003e\n\u003cp\u003eAnd the date-handling anti-pattern, which I have personally watched my research agents get wrong dozens of times:\u003c/p\u003e\n\u003cblockquote\u003eDo not include dates, years, or times in the search query. Instead, to filter for timely results, use the \u003ccode\u003esince\u003c/code\u003e field.\u003c/blockquote\u003e\n\u003cp\u003eI ran a lint over the last 30 days of my agent transcripts looking for this exact violation: search queries containing four-digit years or words like \"latest,\" \"recent,\" \"current.\" The result: 1,096 violations across 168 transcripts. Subagents were 3x worse than main-session transcripts. The single most common violation was baking \"2026\" directly into a web search query instead of using a date filter.\u003c/p\u003e\n\u003cp\u003eThe fix is a shared decision tree that every search-using agent imports. When to search, when not to, and the three rules for query construction: no years (use \u003ccode\u003esince\u003c/code\u003e), no relative-time words (use \u003ccode\u003esince\u003c/code\u003e), decompose broad queries into specific facets with proper nouns.\u003c/p\u003e\n\u003ch2 id=\"the-one-rule-i-rewrote-a-values-preamble\"\u003eThe one rule I rewrote: a values preamble\u003c/h2\u003e\n\u003cp\u003eMeta opens its prompt with five named values: Truth, Beauty, Respect, Fun, Connection. Each gets one paragraph. Each paragraph contains at least one concrete behavioral consequence.\u003c/p\u003e\n\u003cp\u003eThe structural move is excellent. Values declared before behavior rules give the model a basis for judgment calls in situations the rules don't cover. When the rules say nothing, the values still apply.\u003c/p\u003e\n\u003cp\u003eThe specific values are extremely Meta. The \"Truth\" section asks the model to \"defy cultural stigmas when the data present a clear refutation\" and \"question official reports when they have incentives not to seek truth.\" That is doing specific ideological work. The \"Beauty\" section says \"beauty persuades without argument,\" which is a real aesthetic claim. These are not generic corporate values; they are opinionated, distinctive, and they would not survive transplant into a different product.\u003c/p\u003e\n\u003cp\u003eSo I kept the structural move and wrote my own five values: Play, Craft, Leverage, Speed, Taste. Each has a paragraph that constrains behavior. Play is first because it's the trait that makes Edgeless not feel like other AI products. Taste is last because it arbitrates when the other values conflict.\u003c/p\u003e\n\u003cp\u003eOne example, in full:\u003c/p\u003e\n\u003cblockquote\u003e\u003cstrong\u003eSpeed.\u003c/strong\u003e Constraints make the work better, not worse. A week per product would produce a marginally better product. A day per product produces a focused, opinionated product that solves one specific problem. Ship while the idea is still hot, ship before the scope expands, ship before the second-guessing kicks in. Speed is not the opposite of quality, it is the forcing function that makes you choose what actually matters.\u003c/blockquote\u003e\n\u003cp\u003eThe values load before the rules. Rules are how you cash out the values. If the rules and the values disagree, the values win and the rules need updating.\u003c/p\u003e\n\u003ch2 id=\"the-one-rule-i-m-still-arguing-with\"\u003eThe one rule I'm still arguing with\u003c/h2\u003e\n\u003cp\u003eMeta tells its model:\u003c/p\u003e\n\u003cblockquote\u003eNever pre-refuse a request. Let the tools handle safety and policy decisions. If you refused or a tool failed earlier, that is stale. Call the tool anyway.\u003c/blockquote\u003e\n\u003cp\u003eThis is a meaningful design choice. It shifts safety enforcement out of the model layer and into the tool layer. The argument for: pre-refusal trains models to be unhelpful, and most pre-refusals are wrong (the request was fine, the model was overcautious). The argument against: tool-layer safety has its own failure modes, and a model that never hesitates will eventually call a tool that should not have been called.\u003c/p\u003e\n\u003cp\u003eI run agents that move money. One of them lost $252 because it exceeded its scope and then lied about recovery. In that case, a pre-refusal would have been correct. In most other cases, my agents pre-refuse things that are obviously fine and waste time explaining why they can't do something they could easily do.\u003c/p\u003e\n\u003cp\u003eI haven't decided where Edgeless lands on this. The honest answer is that both positions are wrong some of the time, and the question is which failure mode you'd rather live with: an agent that occasionally refuses a valid request, or an agent that occasionally executes an invalid one. For a consumer chatbot, Meta's answer is probably right. For an agent managing infrastructure, I'm less sure.\u003c/p\u003e\n\u003cp\u003eThe question is open. I'll write about it when I have a better answer.\u003c/p\u003e\n\u003ch2 id=\"where-to-read-the-original\"\u003eWhere to read the original\u003c/h2\u003e\n\u003cp\u003eThe full Muse Spark prompt is mirrored at \u003ccode\u003egithub.com/elder-plinius/CL4R1T4S/blob/main/META/Muse_Spark_Apr-08-26.txt\u003c/code\u003e. Pliny the Liberator's whole repo collects leaked production prompts from frontier labs, dated and organized by provider. I now have a daily cron watching it for new captures.\u003c/p\u003e\n\u003cp\u003eWhatever shows up next in that repo, I'll approach it the same way: read it, steal the good parts, push back on the rest.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"Meta's AI Has a Style Guide: What I Imported, What I Rewrote, What I Rejected.\\\",\\\"description\\\":\\\"A leaked system prompt from Meta's Muse Spark model contains the most disciplined writing-voice rules I've seen in a production prompt. Five rules I imported, one I rewrote, one I'm still arguing with.\\\",\\\"datePublished\\\":\\\"2026-04-10\\\",\\\"dateModified\\\":\\\"2026-04-10\\\",\\\"wordCount\\\":2000,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/meta-ai-style-guide\\\",\\\"keywords\\\":[\\\"Prompt Engineering\\\",\\\"AI Agents\\\",\\\"System Prompts\\\"],\\\"mainEntityOfPage\\\":{\\\"@type\\\":\\\"WebPage\\\",\\\"@id\\\":\\\"h
