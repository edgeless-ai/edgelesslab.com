ndefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:T14d4,"])</script><script>self.__next_f.push([1,"\u003cp\u003eEvery session, I used to start the same way. \"We're using TypeScript, not JavaScript.\" \"Don't use default exports.\" \"The API is in \u003ccode\u003esrc/api/\u003c/code\u003e, not root.\" \"We already tried Redis here and it didn't work.\"\u003c/p\u003e\n\u003cp\u003eFive minutes of throat-clearing before any real work happened. Every. Single. Session.\u003c/p\u003e\n\u003cp\u003eThen I set up a memory file, and that problem disappeared.\u003c/p\u003e\n\u003ch2 id=\"the-pain-point\"\u003eThe Pain Point\u003c/h2\u003e\n\u003cp\u003eClaude Code is stateless by design. Every session starts fresh. There's no session history, no learned preferences, no memory of last week's architecture decision. This isn't a bug; it's a consequence of how the model works. But it creates real friction.\u003c/p\u003e\n\u003cp\u003eThe compounding effect is the worst part. Every correction you make in one session is a correction you'll make again next week. You're not building on previous sessions; you're re-establishing context every time.\u003c/p\u003e\n\u003cp\u003eThis is especially painful with project-specific knowledge: \"Don't touch the authentication middleware, it's under active refactor.\" \"The staging database is read-only.\" \"We deploy from the \u003ccode\u003erelease\u003c/code\u003e branch, not \u003ccode\u003emain\u003c/code\u003e.\"\u003c/p\u003e\n\u003ch2 id=\"the-simplest-possible-fix\"\u003eThe Simplest Possible Fix\u003c/h2\u003e\n\u003cp\u003eClaude Code reads a file called \u003ccode\u003eCLAUDE.md\u003c/code\u003e at session start. That's the hook. Put things in that file that Claude should always know, and it will always know them.\u003c/p\u003e\n\u003cp\u003eA minimal \u003ccode\u003eCLAUDE.md\u003c/code\u003e solves 80% of the problem:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e# Project: My App\n\n## Stack\n- TypeScript (strict mode), React 19, Next.js 16\n- Postgres via Drizzle ORM\n- Vitest for tests (no Jest)\n- Tailwind CSS\n\n## Conventions\n- No default exports\n- API lives in src/api/\n- Tests colocated with source files\n\n## Don't Do\n- Don't use mocks in integration tests; hit the real DB\n- Don't add inline styles; use Tailwind classes\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThat's it. Three sections. Less than 20 lines. Claude reads it at session start and you never repeat those instructions again.\u003c/p\u003e\n\u003ch2 id=\"the-before-after\"\u003eThe Before/After\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eBefore memory:\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003eMe: \"Let's add a new API endpoint.\"\u003cbr/\u003eClaude: *writes a JavaScript file with a default export and Jest tests*\u003cbr/\u003eMe: \"TypeScript, no default exports, Vitest please.\"\u003cbr/\u003eClaude: *rewrites*\u003cbr/\u003e(Repeat every session)\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eAfter memory:\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003eMe: \"Let's add a new API endpoint.\"\u003cbr/\u003eClaude: *writes TypeScript, named exports, Vitest tests, in \u003ccode\u003esrc/api/\u003c/code\u003e*\u003cbr/\u003e(Never needs to be said again)\u003c/blockquote\u003e\n\u003cp\u003eAfter a month of accumulated memory, I tracked roughly 60% fewer correction cycles per session. Not a formal benchmark, just counting how often I typed \"I already told you that.\"\u003c/p\u003e\n\u003ch2 id=\"the-memory-file-pattern\"\u003eThe Memory File Pattern\u003c/h2\u003e\n\u003cp\u003eA single \u003ccode\u003eCLAUDE.md\u003c/code\u003e works. But once you start accumulating more context, a simple structure helps.\u003c/p\u003e\n\u003cp\u003eThe pattern I use across projects on this system (documented in detail in the \u003ca href=\"/products\"\u003eClaude Memory Kit\u003c/a\u003e):\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eUser memory\u003c/strong\u003e: who you are and how you work. Goes in your home directory CLAUDE.md so it follows you across every project. Things like: \"I'm a backend engineer who's new to React. Explain frontend patterns using backend analogies.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFeedback memory\u003c/strong\u003e: corrections that stick. When Claude does something wrong and you correct it, add that correction to a memory file. It becomes permanent. \"Don't use try-catch in React components; use error boundaries.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProject memory\u003c/strong\u003e: architecture decisions, frozen APIs, deployment conventions. Project-specific.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReference memory\u003c/strong\u003e: where things live. \"Staging environment: staging.myapp.com. Admin dashboard: Linear workspace 'Platform'.\"\u003c/p\u003e\n\u003ch2 id=\"set-it-up-in-10-minutes\"\u003eSet It Up in 10 Minutes\u003c/h2\u003e\n\u003col\u003e\u003cli\u003eCreate \u003ccode\u003eCLAUDE.md\u003c/code\u003e in your project root\u003c/li\u003e\u003cli\u003eAdd your stack, 3-5 conventions, and 2-3 \"never do this\" rules\u003c/li\u003e\u003cli\u003eStart a new Claude Code session (it will read the file automatically)\u003c/li\u003e\u003cli\u003eFor the first few sessions, notice when Claude gets something wrong. Add that correction to the file\u003c/li\u003e\u003cli\u003eAfter a week, the file has become a trained reflex\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eThe free version of the \u003ca href=\"https://github.com/edgeless-ai/claude-memory-kit\"\u003eClaude Memory Kit\u003c/a\u003e includes templates for all four memory types and a starter CLAUDE.md structure. If you want stack-specific libraries and multi-project memory patterns, the \u003ca href=\"/products\"\u003ePro version\u003c/a\u003e covers those.\u003c/p\u003e\n\u003ch2 id=\"one-more-thing\"\u003eOne More Thing\u003c/h2\u003e\n\u003cp\u003eMemory files do accumulate cruft. Review monthly. Archive anything that's no longer true. Keep each file under 200 lines. Memory that's too long wastes context window on stale instructions.\u003c/p\u003e\n\u003cp\u003eThe discipline: when you update your architecture, update your memory file the same day. It takes 30 seconds, and it means next session Claude already knows.\u003c/p\u003e\n\u003cp\u003eThat 10-minute setup has probably saved me 10 hours over the past few months. It's the highest-leverage thing I've done to improve how I work with Claude Code.\u003c/p\u003e\n\u003cp\u003eRead the longer technical version in \u003ca href=\"/blog/how-claude-code-memory-works\"\u003eHow Claude Code Memory Actually Works\u003c/a\u003e if you want the full breakdown of the four memory types.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"The One-File Memory System That Changed How I Use Claude\\\",\\\"description\\\":\\\"You shouldn't have to re-explain your stack every session. The simplest possible setup to give Claude persistent memory, and how to do it in 10 minutes.\\\",\\\"datePublished\\\":\\\"2026-03-26\\\",\\\"dateModified\\\":\\\"2026-03-26\\\",\\\"wordCount\\\":1000,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/one-file-memory-system\\\",\\\"keywords\\\":[\\\"Claude Code\\\",\\\"Productivity\\\",\\\"Memory\\\"],\\\"mainEntityOfPage\\\":{\\\"@type\\\":\\\"WebPage\\\",\\\"@id\\\":\\\"https://edgelesslab.com/blog/one-file-memory-system\\\"}}\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BreadcrumbList\\\",\\\"itemListElement\\\":[{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":1,\\\"name\\\":\\\"Home\\\",\\\"item\\\":\\\"https://edgelesslab.com\\\"},{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":2,\\\"name\\\":\\\"Blog\\\",\\\"item\\\
