orScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:T15db,"])</script><script>self.__next_f.push([1,"\u003cp\u003eCSS gives you two options for text layout: a block that fills its container, or \u003ccode\u003efit-content\u003c/code\u003e that shrinks to the longest line. Neither lets you answer \"how tall will this paragraph be at 320px wide?\" without rendering it first.\u003c/p\u003e\n\u003cp\u003ePreText answers that question in 0.002ms, before a single DOM node exists. That changes what's possible.\u003c/p\u003e\n\u003ch2 id=\"the-measurement-gap\"\u003eThe Measurement Gap\u003c/h2\u003e\n\u003cp\u003eEvery masonry layout, every accordion animation, every balanced text block on the web has the same problem: you need to know the height of something before you render it.\u003c/p\u003e\n\u003cp\u003eThe standard approach is render-measure-rerender. Mount the DOM, read \u003ccode\u003eoffsetHeight\u003c/code\u003e, reposition. This causes layout thrash: visible flicker where elements jump as the browser recalculates.\u003c/p\u003e\n\u003cp\u003ePreText skips the DOM entirely. It uses the Canvas 2D text measurement API to calculate exact line breaks, line widths, and total height for any text at any width. The results match browser rendering because they use the same font metrics.\u003c/p\u003e\n\u003ch2 id=\"what-we-built-with-it\"\u003eWhat We Built With It\u003c/h2\u003e\n\u003cp\u003eThe \u003ca href=\"/\"\u003eEdgeless Lab site\u003c/a\u003e uses PreText in six places, each solving a different layout problem:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMasonry product grid\u003c/strong\u003e: The \u003ca href=\"/products\"\u003eproducts page\u003c/a\u003e lays out product cards in a masonry grid. Each card's height is different because descriptions vary in length. PreText measures every description, calculates the exact card height, and places cards using a shortest-column algorithm. Zero DOM measurement. Zero layout shift.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eShrink-wrap balanced text\u003c/strong\u003e: The about section on the homepage wraps text to the tightest possible width that preserves line count. CSS \u003ccode\u003efit-content\u003c/code\u003e leaves dead space on the last line. PreText's \u003ccode\u003ewalkLineRanges\u003c/code\u003e finds the actual maximum line width, giving text a balanced, typeset appearance.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHero cursor reflow\u003c/strong\u003e: The homepage subtitle text flows around your cursor in real time. As you move the mouse, PreText recalculates line breaks around a circular obstacle at 60fps using \u003ccode\u003elayoutNextLine\u003c/code\u003e with remaining-width budgets. Pure DOM manipulation, no React re-renders.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStagger reveal\u003c/strong\u003e: The stack section reveals text line-by-line on scroll. PreText's \u003ccode\u003elayoutWithLines\u003c/code\u003e returns exact line widths, so wider lines slide further during the entrance animation, creating geometry-driven stagger.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRich inline flow\u003c/strong\u003e: The stack pipeline displays tool names in monospace and descriptions in sans-serif, reflowing as a single mixed-font paragraph. Each segment is measured separately; \u003ccode\u003elayoutNextLine\u003c/code\u003e coordinates the width budget across font changes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGenerative ASCII art\u003c/strong\u003e: The \u003ca href=\"/lab/generative-ascii\"\u003egenerative ASCII experiment\u003c/a\u003e uses PreText to measure character widths for proportional-to-monospace mapping, ensuring spatial accuracy in typographic art.\u003c/p\u003e\n\u003ch2 id=\"the-api-in-30-seconds\"\u003eThe API in 30 Seconds\u003c/h2\u003e\n\u003cp\u003ePreText exposes six functions. You only need two for most work:\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003eprepare(text, font)\u003c/code\u003e: tokenizes text and measures segment widths. Returns a prepared object. Runs once per text/font pair.\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003elayout(prepared, width, lineHeight)\u003c/code\u003e: calculates total height and line count at a given container width. Returns \u003ccode\u003e{ height, lineCount }\u003c/code\u003e. Runs in microseconds.\u003c/p\u003e\n\u003cp\u003eFor advanced layouts:\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003elayoutWithLines(prepared, width, lineHeight)\u003c/code\u003e: returns every line with its exact pixel width. Use for stagger animations or justified text.\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003ewalkLineRanges(prepared, font, lineHeight, callback)\u003c/code\u003e: iterates line ranges for binary search over widths (shrink-wrap).\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003elayoutNextLine(prepared, cursor, maxWidth, lineHeight)\u003c/code\u003e: advances one line at a time. Use for multi-column, obstacle avoidance, or mixed-font layouts.\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003eprepareWithSegments(text, font)\u003c/code\u003e: like prepare, but returns individual segment widths for character-level operations.\u003c/p\u003e\n\u003ch2 id=\"why-this-matters-for-product-pages\"\u003eWhy This Matters for Product Pages\u003c/h2\u003e\n\u003cp\u003eWhen you're selling developer tools, the site itself is a portfolio piece. A masonry layout that loads without flicker. Accordion animations that hit their target height on the first frame. Text that reflows around your cursor without a single layout recalculation.\u003c/p\u003e\n\u003cp\u003eThese aren't features for their own sake. They demonstrate the kind of engineering precision that the products represent. If the site can't get typography right, why would you trust the templates?\u003c/p\u003e\n\u003ch2 id=\"getting-started\"\u003eGetting Started\u003c/h2\u003e\n\u003cp\u003ePreText is an npm package: \u003ccode\u003e@chenglou/pretext\u003c/code\u003e. It's 4KB gzipped, zero dependencies, works in any framework. The \u003ca href=\"https://chenglou.me/pretext/\"\u003ePreText demos\u003c/a\u003e show every technique in isolation.\u003c/p\u003e\n\u003cp\u003eThe integration pattern: load PreText in a \u003ccode\u003euseEffect\u003c/code\u003e, wait for fonts, then measure. Server-side, fall back to CSS estimates. The switch from fallback to measured layout is imperceptible because the content is identical; only the positioning changes.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003econst { ready, prepare, layout } = usePreText(\"Geist\");\n\nif (ready) {\n  const prepared = prepare(text, '14px \"Geist\"');\n  const { height } = layout(prepared, containerWidth, 22.4);\n  // height is exact, before any DOM exists\n}\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eEvery technique on this site is built from those six functions. The \u003ca href=\"https://github.com/edgeless-ai\"\u003esource is on GitHub\u003c/a\u003e.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"PreText: Typography That Thinks\\\",\\\"description\\\":\\\"Most web text is a dumb rectangle. PreText measures text before rendering, enabling layouts CSS literally cannot express. Six ways we use it.\\\",\\\"datePublished\\\":\\\"2026-04-02\\\",\\\"dateModified\\\":\\\"2026-04-02\\\",\\\"wordCount\\\":1500,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/pretext-typography-that-thinks\\\",\\\"keywords\\\":[\\\"PreText\\\",\\\"Typography\\\",\\\"Web Development\\\"],\\\"mainEntityOfPage\\\":{\\\"@type\\\":\\\"WebPage\\\",\\\"@id\\\":\\\"https://edgelesslab.com/blog/pretext-typography-that-thinks\\\"}}\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BreadcrumbList\\\",\\\"itemListElement\\\":[{\\\
