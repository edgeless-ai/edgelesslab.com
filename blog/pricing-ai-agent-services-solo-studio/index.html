efined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:T11a7,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI spent two weeks researching what people charge for AI agent services. Custom chatbot builds. Voice AI deployments. Workflow automation. The range I found was $500 to $150,000 for what clients describe as \"the same thing.\"\u003c/p\u003e\n\u003cp\u003eThe market has no pricing consensus because the market barely exists. Most buyers have never purchased AI services before. Most sellers are making up prices based on vibes and perceived complexity.\u003c/p\u003e\n\u003cp\u003eHere's the framework I built for Edgeless Lab after surveying twenty agencies and freelancers.\u003c/p\u003e\n\u003ch2 id=\"the-three-pricing-models-that-exist\"\u003eThe Three Pricing Models That Exist\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eHourly consulting: $150-$300/hour.\u003c/strong\u003e This is how traditional dev shops price AI work. The problem is scope creep in both directions. Clients don't know what they need, so hours balloon. Or the work is simpler than expected, so you finish in ten hours and invoice $1,500 for something that delivers $50,000 in value.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProject-based: $2,500-$25,000.\u003c/strong\u003e Fixed scope, fixed price. This is where most solo operators land. A voice AI phone agent is $3,000-$5,000. A multi-agent workflow build is $8,000-$15,000. A full AI operations overhaul is $15,000-$25,000. The risk is underscoping. You quote $5,000 and spend 80 hours on integration edge cases.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProductized packages: $500-$2,500 setup + monthly.\u003c/strong\u003e Fixed deliverable, repeatable process. \"Voice AI for missed calls: $500 setup, $99/month.\" This is the model that scales because the delivery process is identical across clients. The tenth deployment takes a quarter of the time of the first.\u003c/p\u003e\n\u003ch2 id=\"what-i-charge-and-why\"\u003eWhat I Charge and Why\u003c/h2\u003e\n\u003cp\u003eEdgeless Lab runs a hybrid model. Three tiers:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStarter ($500-$2,500).\u003c/strong\u003e Productized. Voice AI setup, single workflow automation, or AI-assisted content pipeline. Fixed scope, delivered in 1-2 weeks. This tier exists to get clients in the door and build trust.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGrowth ($5,000-$15,000).\u003c/strong\u003e Project-based. Multi-agent systems, custom integrations, operational AI that touches multiple business processes. Scoped with a paid discovery session ($500, credited toward the project). Delivered in 4-8 weeks.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEnterprise ($15,000+).\u003c/strong\u003e Retainer or project. Full AI operations consulting. Infrastructure design, agent orchestration, monitoring, and ongoing optimization. These clients need architecture, not just implementation.\u003c/p\u003e\n\u003ch2 id=\"the-discovery-session-trick\"\u003eThe Discovery Session Trick\u003c/h2\u003e\n\u003cp\u003eThe single best pricing decision I made was charging $500 for discovery sessions. Two hours, structured interview, written scope document delivered within 48 hours. Three things this does:\u003c/p\u003e\n\u003col\u003e\u003cli\u003e\u003cstrong\u003eFilters serious buyers.\u003c/strong\u003e Anyone willing to pay $500 to scope work is ready to buy. The free-consultation crowd wastes weeks of back-and-forth.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePrevents underscoping.\u003c/strong\u003e I know exactly what the project entails before I quote. No surprises at hour 40 of a 20-hour estimate.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCredits toward the project.\u003c/strong\u003e The $500 applies to the final invoice, so there's no friction if they proceed. And they almost always proceed. The close rate on paid discovery sessions is above 80 percent.\u003c/li\u003e\u003c/ol\u003e\n\u003ch2 id=\"the-mistake-most-solo-studios-make\"\u003eThe Mistake Most Solo Studios Make\u003c/h2\u003e\n\u003cp\u003ePricing too low out of impostor syndrome. A custom AI agent that saves a business 20 hours per week is worth $2,000-$4,000 per month to them. Charging $3,000 once for something that delivers $48,000 per year in value is not a good deal for you.\u003c/p\u003e\n\u003cp\u003eThe fix: price on value delivered, not hours spent. If your voice AI agent prevents a dental office from losing two patients per week at $500 average lifetime value, that's $52,000 per year in retained revenue. A $5,000 project fee is a 10x return for the client.\u003c/p\u003e\n\u003ch2 id=\"the-pacific-northwest-factor\"\u003eThe Pacific Northwest Factor\u003c/h2\u003e\n\u003cp\u003ePortland and Vancouver, WA have lower rates than SF or NYC, but the gap is closing for AI services. Remote delivery means you're competing nationally. My recommendation: price at national rates for project work, offer a local discount only for in-person workshops or on-site implementations. The code doesn't know where you live.\u003c/p\u003e\n\u003cp\u003eThe market will standardize eventually. Right now, the advantage goes to whoever can articulate the value clearly enough to justify the price. That's not a pricing problem. It's a positioning problem.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"How to Price AI Agent Services When Nobody Knows What They Cost\\\",\\\"description\\\":\\\"I surveyed 20 agencies and freelancers offering AI agent builds. The range was $500 to $150,000. Here's the framework I use to price Edgeless Lab's services.\\\",\\\"datePublished\\\":\\\"2026-05-05\\\",\\\"dateModified\\\":\\\"2026-05-05\\\",\\\"wordCount\\\":1500,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/pricing-ai-agent-services-so
