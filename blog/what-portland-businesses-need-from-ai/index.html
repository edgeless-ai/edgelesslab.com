efined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\nd:[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\ne:[\"$\",\"$1\",\"c\",{\"children\":[\"$L14\",[[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/056ppwy12ei-l.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"$L15\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@17\"}]}]]}]\n18:[]\nf:\"$W18\"\n10:[\"$\",\"$1\",\"h\",{\"children\":[null,[\"$\",\"$L19\",null,{\"children\":\"$L1a\"}],[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$L1b\",null,{\"children\":[\"$\",\"$16\",null,{\"name\":\"Next.Metadata\",\"children\":\"$L1c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}]\n12:[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/0kgr5a-t~v0u..css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"1d:I[18800,[\"/_next/static/chunks/0a1a7.y3iv-n4.js\",\"/_next/static/chunks/01vsv3agp-wja.js\",\"/_next/static/chunks/056ppwy12ei-l.js\"],\"BlogArticle\"]\n1e:Teee,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI spent a weekend reading Google and Yelp reviews for small businesses across the Portland metro area. Not for fun. I was looking for patterns. Recurring complaints that an AI system could actually solve.\u003c/p\u003e\n\u003cp\u003eThe patterns were obvious within the first hour.\u003c/p\u003e\n\u003ch2 id=\"the-three-complaints-that-keep-appearing\"\u003eThe Three Complaints That Keep Appearing\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003e1. Nobody answers the phone.\u003c/strong\u003e This showed up in dental offices, HVAC companies, law firms, and salons. The reviews follow a template: \"I called three times, left a voicemail, never heard back.\" One dental practice in Beaverton had seventeen reviews mentioning unanswered calls. They have a 3.2-star rating. Their clinical work gets five stars.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. Quotes take too long.\u003c/strong\u003e Home services (plumbers, electricians, roofers) lose customers between the request and the response. One electrical contractor in Vancouver, WA had a review that said: \"Great work but I waited four days for a quote. I went with someone else.\" That's not a quality problem. That's a response-time problem.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. Online booking is broken or missing.\u003c/strong\u003e Salons, fitness studios, and medical offices either don't have online booking or have systems so confusing that customers give up and call. See complaint number one.\u003c/p\u003e\n\u003ch2 id=\"what-these-businesses-don-t-need\"\u003eWhat These Businesses Don't Need\u003c/h2\u003e\n\u003cp\u003eThey don't need a chatbot on their website. The traffic volume doesn't justify it. A Portland dental office gets maybe 200 website visits a month. A chatbot there is furniture.\u003c/p\u003e\n\u003cp\u003eThey don't need \"AI-powered analytics.\" They need someone to answer the phone at 6:45 p.m. when the last receptionist left at 5.\u003c/p\u003e\n\u003cp\u003eThey don't need a custom GPT. They need their intake form to not require a PDF download and a fax machine.\u003c/p\u003e\n\u003ch2 id=\"what-actually-works\"\u003eWhat Actually Works\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eVoice AI for missed calls.\u003c/strong\u003e A system that picks up when staff can't, captures the caller's name and need, books the appointment or sends a quote request to the owner's phone. The technology exists today. Setup cost is under $500. Monthly cost is under $100. The ROI is one patient who didn't leave for a competitor.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAutomated quote response.\u003c/strong\u003e For service businesses, a system that takes an inbound request (email, form, or voicemail) and sends a templated response within fifteen minutes. Not a final quote. An acknowledgment with a time window. \"We received your request for electrical panel work. A team member will have your quote within 4 business hours.\" That alone stops the bleed.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSimple scheduling integration.\u003c/strong\u003e Not building a custom booking system. Connecting the tools they already half-use (Google Calendar, Square Appointments, Calendly) to their website and phone system so a customer can book without calling.\u003c/p\u003e\n\u003ch2 id=\"the-pricing-gap\"\u003eThe Pricing Gap\u003c/h2\u003e\n\u003cp\u003eMost AI consulting firms price these solutions for enterprise. A voice AI deployment quoted at $15,000 is useless to a four-person dental office. The opportunity is in packaging these as fixed-scope, small-business-priced offerings. $500 setup, $99/month. The margins work because the tooling is commoditized. The value is in the integration and the hand-holding.\u003c/p\u003e\n\u003cp\u003ePortland has roughly 14,000 small businesses with fewer than 50 employees. If 2 percent of them need voice AI for missed calls, that's 280 potential clients in one metro area. At $99/month that's $332,640 ARR from one product in one city.\u003c/p\u003e\n\u003ch2 id=\"the-pitch\"\u003eThe Pitch\u003c/h2\u003e\n\u003cp\u003eThe pitch isn't \"AI.\" The pitch is: \"You have seventeen Google reviews about unanswered calls. I can fix that for $99 a month.\"\u003c/p\u003e\n\u003cp\u003eThat's not a technology conversation. It's a business conversation. And it starts with reading the reviews.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-full\",\"style\":{\"background\":\"var(--bg-base)\"},\"children\":[[\"$\",\"$L5\",null,{}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BlogPosting\\\",\\\"headline\\\":\\\"I Read 500 Google Reviews in Portland. Here's What Small Businesses Actually Need from AI.\\\",\\\"description\\\":\\\"Dental offices losing patients to voicemail. HVAC companies quoting three days late. The AI solutions Portland small businesses need aren't chatbots. They're answering the phone.\\\",\\\"datePublished\\\":\\\"2026-05-05\\\",\\\"dateModified\\\":\\\"2026-05-05\\\",\\\"wordCount\\\":1500,\\\"author\\\":{\\\"@type\\\":\\\"Person\\\",\\\"name\\\":\\\"David Murray\\\",\\\"url\\\":\\\"https://edgelesslab.com/about\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"Edgeless Lab\\\",\\\"url\\\":\\\"https://edgelesslab.com\\\"},\\\"url\\\":\\\"https://edgelesslab.com/blog/what-portland-businesses-need-from-ai\\\",\\\"keywords\\\":[\\\"AI Agents\\\",\\\"Local Business\\\",\\\"Voice AI\\\",\\\"Portland\\\"],\\\"mainEntityOfPage\\\":{\\\"@type\\\":\\\"WebPage\\\",\\\"@id\\\":\\\"https://edgelesslab.com/blog/what-portland-businesses-need-from-ai\\\"}}\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"BreadcrumbList\\\",\\\"itemListElement\\\":[{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":1,\\\"name\\\":\\\"Home\\\",\\\"item\\\":\\\"https://edgelesslab.com\\\"},{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":2,\\\"name\\\":\\\"Blog\\\",\\\"item\\\":\\\"https://edgelesslab.com/blog\\\"},{\\\"@type\\\":\\\"ListItem\\\",\\\"position\\\":3,\\\"name\\\":\\\"
