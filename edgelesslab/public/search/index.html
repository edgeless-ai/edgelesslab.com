</div>

<script defer>
  (function() {
    var modal = document.getElementById('search-modal');
    var trigger = document.getElementById('search-trigger');
    var overlay = document.getElementById('search-overlay');
    var pagefindLoaded = false;
    var pagefindUI = null;
    var pendingOpen = false;

    function loadPagefind(callback) {
      if (pagefindLoaded) { callback(); return; }
      var s = document.createElement('script');
      s.src = '/pagefind/pagefind-ui.js';
      s.onload = function() { pagefindLoaded = true; callback(); };
      s.onerror = function() { console.warn('[Search] Pagefind load failed'); };
      document.body.appendChild(s);
    }

    function initPagefindUI() {
      if (pagefindUI) return;
      if (!pagefindLoaded || !window.PagefindUI) return;
      pagefindUI = new PagefindUI({
        element: '#modal-search',
        showSubResults: true,
        showImages: false,
        excerptLength: 25,
        autofocus: true,
        resetStyles: false,
        processResult: function(r) {
          if (r.meta && r.meta.title) r.meta.title = r.meta.title.replace(/ \| Edgeless Lab/g, '');
          return r;
        }
      });
      setTimeout(function() {
        var inp = modal.querySelector('.pagefind-ui__search-input');
        if (inp) inp.focus();
      }, 50);
    }

    function openSearch() {
      if (!pagefindLoaded) {
        pendingOpen = true;
        loadPagefind(function() { initPagefindUI(); });
      }
      modal.hidden = false;
      document.body.style.overflow = 'hidden';
      if (pendingOpen) { initPagefindUI(); pendingOpen = false; }
      else if (pagefindUI) {
        setTimeout(function() {
          var inp = modal.querySelector('.pagefind-ui__search-input');
          if (inp) inp.focus();
        }, 50);
      }
    }

    function closeSearch() {
      modal.hidden = true;
      document.body.style.overflow = '';
    }

    trigger.addEventListener('click', openSearch);
    overlay.addEventListener('click', closeSearch);
    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        modal.hidden ? openSearch() : closeSearch();
      }
      if (e.key === 'Escape' && !modal.hidden) closeSearch();
    });
  })();
</script>
