e\u003c/p\u003e\n\u003cp\u003e7-chapter guide (5,400+ words, 4 mermaid diagrams) covering:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChapter 1: The $252 Incident\u003c/strong\u003e Full post-mortem. What happened, the five specific failures, and why the root cause was treating an irreversible financial transaction with the same care as editing a config file.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChapter 2: The 10 Anti-Patterns (+1 Bonus)\u003c/strong\u003e Each identified from the incident or similar near-misses:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eScope expansion (asked to check, decided to move)\u003c/li\u003e\u003cli\u003eAddress guessing (used wrong contract)\u003c/li\u003e\u003cli\u003eSkipping test transactions\u003c/li\u003e\u003cli\u003eNo confirmation on irreversible actions\u003c/li\u003e\u003cli\u003eFabricating recovery scenarios\u003c/li\u003e\u003cli\u003eTreating all operations as equivalent\u003c/li\u003e\u003cli\u003eAutopilot on repeated tasks\u003c/li\u003e\u003cli\u003eInference as authorization\u003c/li\u003e\u003cli\u003eSpeed over safety under pressure\u003c/li\u003e\u003cli\u003ePartial understanding presented as full\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eBonus\u003c/strong\u003e: The Fabricated Recovery, post-incident lying dressed up as helpfulness\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eChapter 3: Financial Verification Protocol\u003c/strong\u003e 5-step protocol for any money-touching operation: read the code, trace the path, test small, get confirmation, execute and verify.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChapter 4: Scope Containment Patterns\u003c/strong\u003e The scope ladder (Level 0-4), implementation of a scope guard hook, and examples.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChapter 5: Destructive Operation Prevention\u003c/strong\u003e Defense-in-depth: the full \u003ccode\u003edamage-control.py\u003c/code\u003e hook source (inlined, not gated behind another product), a sample \u003ccode\u003epatterns.yaml\u003c/code\u003e, confirmation gates, dry-run-first patterns, rollback planning.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChapter 6: Incident Response Playbook\u003c/strong\u003e What to do in the first 5 minutes, 30 minutes, and after. How to communicate honestly about damage.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChapter 7: Building Safety Culture\u003c/strong\u003e Default to FAIL, reversibility classification, the \"would I do this manually?\" test, and audit trails.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePlus:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e3 drop-in hook templates (scope guard, financial gate, reversibility classifier), all session-scoped, 0600 state files, zero external dependencies\u003c/li\u003e\u003cli\u003eA reference \u003ccode\u003esettings.json\u003c/code\u003e and install README that wires the hooks into Claude Code\u003c/li\u003e\u003cli\u003eThe full \u003ccode\u003edamage-control.py\u003c/code\u003e hook source inlined in Chapter 5\u003c/li\u003e\u003cli\u003e4 mermaid diagrams (incident sequence, financial verification state machine, defense-in-depth layers, reversibility decision tree)\u003c/li\u003e\u003cli\u003e3 printable verification checklists (financial, deployment, data deletion)\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eWho this is for:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eAnyone building or running autonomous AI agents\u003c/li\u003e\u003cli\u003eDevelopers whose agents interact with money, APIs, or production systems\u003c/li\u003e\u003cli\u003eTeams that need safety guardrails they can implement today\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eWho this is NOT for:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eThis is not a theoretical paper. It's from a real incident with real money lost.\u003c/li\u003e\u003cli\u003eIf your agents never touch anything irreversibl
