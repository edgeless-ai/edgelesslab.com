# Damage Control Patterns
# PreToolUse hook configuration for blocking dangerous operations
#
# Three sections:
#   dangerous_commands -- regex patterns matched against Bash command strings
#   paths             -- three tiers of file path protection
#   allowlist         -- substring patterns that override blocks
#
# All regex patterns are matched case-insensitively.

dangerous_commands:
  bash:
    block_patterns:
      # ---- Destructive file operations ----
      - 'rm\s+-rf\s+/'           # rm -rf /
      - 'rm\s+-rf\s+~'           # rm -rf ~
      - 'rm\s+-rf\s+\*'          # rm -rf *
      - 'rm\s+-rf\s+\.\.'        # rm -rf ..
      - 'rm\s+-f\s+/'            # rm -f /
      - 'rmdir\s+/'              # rmdir /
      - '>\s*/dev/sda'           # Write to disk device
      - 'mkfs\.'                 # Format filesystem
      - 'dd\s+if=.+of=/dev'      # dd to device

      # ---- Git destructive operations ----
      - 'git\s+reset\s+--hard'   # Hard reset
      - 'git\s+push\s+.*--force' # Force push
      - 'git\s+push\s+-f'        # Force push shorthand
      - 'git\s+clean\s+-fd'      # Clean untracked files
      - 'git\s+checkout\s+--\s+\.' # Discard all changes

      # ---- Database destructive ----
      - 'DROP\s+DATABASE'        # Drop database
      - 'DROP\s+TABLE'           # Drop table
      - 'TRUNCATE\s+TABLE'       # Truncate table
      - 'DELETE\s+FROM\s+\w+\s*;' # Delete without WHERE clause

      # ---- Cloud destructive (AWS, GCP, Firebase) ----
      - 'aws\s+.*\s+delete'
      - 'aws\s+s3\s+rm\s+.*--recursive'
      - 'gcloud\s+.*\s+delete'
      - 'firebase\s+.*\s+delete'
      - 'kubectl\s+delete\s+namespace'

      # ---- System destructive ----
      - 'chmod\s+-R\s+777\s+/'   # Recursive 777 on root
      - 'chown\s+-R\s+.*\s+/'    # Recursive chown on root
      - 'kill\s+-9\s+-1'         # Kill all processes
      - 'pkill\s+-9'             # Kill by name

      # ---- Pipe to shell (remote code execution) ----
      - 'curl.*\|\s*sh'          # Pipe curl to shell
      - 'curl.*\|\s*bash'        # Pipe curl to bash
      - 'wget.*\|\s*sh'          # Pipe wget to shell

paths:
  # ZERO ACCESS: Block all operations (read, write, edit)
  zero_access:
    - '/etc/passwd'
    - '/etc/shadow'
    - '/etc/sudoers'
    - '.ssh/id_'
    - '.ssh/authorized_keys'
    - '.aws/credentials'
    - '.gnupg/'
    - '.env.production'
    - 'credentials.json'
    - 'secrets.yaml'
    - 'service-account.json'

  # READ ONLY: Allow Read, block Write and Edit
  read_only:
    - 'node_modules/'
    - '.git/objects/'
    - 'vendor/'
    - '__pycache__/'
    - '.venv/lib/'
    - 'dist/'
    - 'build/'

  # NO DELETE: Allow Read/Write/Edit, block rm commands
  no_delete:
    - 'src/'
    - 'lib/'
    - 'app/'
    - 'package.json'
    - 'package-lock.json'
    - 'requirements.txt'
    - 'Cargo.toml'
    - 'go.mod'
    - 'pyproject.toml'
    - '.claude/'
    - 'CLAUDE.md'

# Allowlist: substring patterns that override all blocks above.
# Be conservative here. Test paths and temp directories are typical entries.
allowlist:
  - '/tmp/'
  - '/var/tmp/'
  - '.test.'
  - '_test.'
  - 'test_'
