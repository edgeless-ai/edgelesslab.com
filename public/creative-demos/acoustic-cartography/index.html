<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acoustic Cartography — Voice-Deformed Voronoi Sound Map</title>
  <style>
    /* ── Reset & Fullscreen Canvas ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0A0A0A;
    }
    canvas { display: block; }

    /* ── Sound Gate Overlay (Pacôme Pertant dual-entry pattern) ── */
    #sound-gate {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0A0A0A 80%);
      color: #e0e0e0;
      font-family: 'Courier New', 'Courier', monospace;
      text-align: center;
      transition: opacity 1.2s ease, visibility 1.2s ease;
      user-select: none;
    }
    #sound-gate.gate-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .gate-title {
      font-size: clamp(1.6rem, 5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #FFE66D;
      text-shadow: 0 0 20px rgba(255,230,109,0.3);
      margin-bottom: 0.6rem;
    }
    .gate-subtitle {
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.15em;
      color: #8a8a8a;
      margin-bottom: 2.5rem;
    }
    .gate-buttons {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .gate-buttons button {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: #ccc;
      padding: 0.9rem 1.8rem;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
    .gate-buttons button:hover {
      border-color: #FFE66D;
      color: #FFE66D;
      background: rgba(255,230,109,0.06);
      box-shadow: 0 0 18px rgba(255,230,109,0.15);
    }
    .gate-note {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: #555;
      max-width: 340px;
      line-height: 1.4;
    }
    .gate-seed {
      position: absolute;
      bottom: 20px;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <!-- ─── SOUND GATE OVERLAY ─── -->
  <div id="sound-gate">
    <h1 class="gate-title">ACOUSTIC CARTOGRAPHY</h1>
    <p class="gate-subtitle">A voice-deformed sound map</p>
    <div class="gate-buttons">
      <button id="gate-with-mic">🎤 enter with microphone</button>
      <button id="gate-silent">🔇 enter silently</button>
    </div>
    <p class="gate-note">
      Microphone access requires HTTPS or localhost.<br>
      Silent mode uses gentle simulated oscillation.
    </p>
    <div class="gate-seed">SEED ⌨ SPACE to randomize</div>
  </div>

  <!-- ─── p5.js CDN ─── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- ─── MAIN SKETCH ─── -->
  <script>
  // ============================================================
  // ACOUSTIC CARTOGRAPHY — Voice-Deformed Voronoi Sound Map
  // ============================================================
  //
  // Hybrid of three domains:
  //   1. Ink Blobs (generative art) — noise-warped Voronoi,
  //      Russian Doll nested rings, film grain, ink borders
  //   2. Pacôme Pertant (typography) — sound-gated entry,
  //      spiral-laid-out labels, gradient-filled characters,
  //      perpetual marquee
  //   3. Web Audio API (bridging) — microphone amplitude
  //      analysis deforming cell boundaries in real-time
  //
  // 3% Weirdness: your voice physically reshapes the
  // typographic map. Silent moments = ordered geometry.
  // Speaking = topological shockwaves through cell walls.
  //
  // Technique notes inline below. See README.md for full
  // attribution and palette.
  // ============================================================

  'use strict';

  // ═════════════════════════════════════════════════════════════
  //  CONFIGURATION
  // ═════════════════════════════════════════════════════════════

  const NUM_CELLS = 6;

  // Frequency band labels, arranged from spiral center outward
  const LABELS = ['SUB', 'BASS', 'MID', 'TREBLE', 'HARMONIC', 'NOISE'];

  // ── Color Palette ──
  // Extended from Pacôme Pertant's motion designer palette
  // (coral/teal/yellow) with Ink Blobs Palette 2 Dark Earth for grounding.
  //
  // Each frequency band gets a distinct, saturated color for
  // legible territorial mapping on the sound map.
  const CELL_COLORS = [
    '#EA8C55',  // [0] SUB        — burnt orange   (Ink Blobs Palette 2)
    '#FF6B6B',  // [1] BASS       — coral          (Pacôme Pertant)
    '#4ECDC4',  // [2] MID        — teal           (Pacôme Pertant)
    '#FFE66D',  // [3] TREBLE     — yellow         (Pacôme Pertant)
    '#00798C',  // [4] HARMONIC   — teal blue      (Ink Blobs Palette 2)
    '#7B9E89',  // [5] NOISE      — sage green     (Ink Blobs Palette 2)
  ];

  const BG_COLOR       = '#0A0A0A';  // Near-black canvas (Pacôme Pertant / Victor Sin)
  const BORDER_COLOR   = '#000000';  // Ink-black cell borders (Ink Blobs signature)
  const GRADIENT_TOP   = '#FFFFFF';  // White — top of character gradient

  // ── Noise-Warp Parameters (from Ink Blobs) ──
  const WARP_PASSES    = 3;          // 3-pass Perlin domain warping
  const BASE_WARP_MAG  = 38;         // Base warp magnitude (pixels) at silent state
  const AUDIO_WARP_MAX = 80;         // Additional warp magnitude at max amplitude

  // ── Voronoi Rendering ──
  const BORDER_THICKNESS = 3.2;      // Ink border detection threshold (pixels)
                                      // secondMinDist - minDist < threshold → border

  // ── Film Grain ──
  const GRAIN_STRENGTH = 8;          // ±8/255 ≈ 3% luminance noise (Ink Blobs technique)

  // ── Spiral Layout (Pacôme Pertant spiral navigation) ──
  const GOLDEN_ANGLE   = Math.PI * 0.618;  // ~111.24° — golden angle for spiral distribution

  // ── Russian Doll Rings ──
  const RING_BASE      = 3;          // Base ring multiplier (silent state)
  const RING_AUDIO     = 10;         // Additional multiplier from amplitude
                                      // Higher amplitude = tighter rings = more of them

  // ── Audio Smoothing ──
  const SMOOTH_FACTOR  = 0.12;       // Exponential moving average coefficient
                                      // Prevents jarring visual jumps from transient audio

  // ═════════════════════════════════════════════════════════════
  //  STATE
  // ═════════════════════════════════════════════════════════════

  let gatePassed    = false;
  let useMicrophone = false;
  let seed          = 42;

  // Audio state
  let audioContext  = null;
  let analyserNode  = null;
  let frequencyArray = null;
  let micStream     = null;
  let smoothedAmp   = new Array(NUM_CELLS).fill(0);

  // Voronoi control points
  let controlPoints = [];

  // Label entrance stagger timing
  let sketchStartTime = 0;
  const LABEL_STAGGER = 150;  // ms between each label's entrance

  // Perpetual marquee state
  let marqueeOffset  = 0;
  const MARQUEE_TEXT = '˙ˌ˘ˇ˜ ʎɹoƃᴉdɐɹʇɐ ɔᴉʇsnɐɔ∀';

  // Off-screen buffer for pixel-level Voronoi rendering
  let pg;

  // ═════════════════════════════════════════════════════════════
  //  p5.js SETUP
  // ═════════════════════════════════════════════════════════════

  function setup() {
    createCanvas(windowWidth, windowHeight);
    pixelDensity(1);

    // Off-screen buffer at same resolution — used for per-pixel
    // Voronoi rendering at 1× (no supersampling for performance;
    // the grain adds more than enough texture to mask aliasing)
    pg = createGraphics(width, height);
    pg.pixelDensity(1);
    pg.background(10);

    // Place Voronoi control points on a logarithmic spiral
    setupSpiral();

    // Deterministic seeding — single integer controls both.
    // Spacebar increments seed for fresh maps.
    randomSeed(seed);
    noiseSeed(seed);
    noiseDetail(4, 0.5);  // 4 octaves, 0.5 falloff for smooth noise

    sketchStartTime = millis();
  }

  // ═════════════════════════════════════════════════════════════
  //  p5.js DRAW  (called every frame)
  // ═════════════════════════════════════════════════════════════

  function draw() {
    if (!gatePassed) {
      // Before gate interaction: dark canvas behind overlay
      background(10, 10, 10);
      return;
    }

    // 1. Update audio analysis (real mic or simulated oscillation)
    updateAmplitudes();

    // 2. Compute deformed control point positions based on audio amplitudes
    const deformed = getDeformedPoints();

    // 3. Render Voronoi diagram to off-screen buffer (pixel loop)
    renderVoronoiToBuffer(deformed);

    // 4. Draw buffer to main canvas
    image(pg, 0, 0, width, height);

    // 5. Gradient-filled typography overlays at cell centroids
    drawGradientLabels(deformed);

    // 6. Perpetual marquee at bottom of canvas
    drawMarquee();
  }

  // ═════════════════════════════════════════════════════════════
  //  SPIRAL LAYOUT  (Pacôme Pertant spiral navigation)
  // ═════════════════════════════════════════════════════════════
  //
  //  Control points arranged on a logarithmic spiral using the
  //  golden angle (~111.24°). This creates a spatial hierarchy:
  //  center = SUB (deepest frequency), expanding outward →
  //  BASS → MID → TREBLE → HARMONIC → NOISE.
  //
  //  Unlike typical Voronoi stippling where points are random,
  //  the spiral arrangement gives the map a navigational,
  //  cartographic character — the viewer reads frequencies
  //  radially from center to edge.
  // ═════════════════════════════════════════════════════════════

  function setupSpiral() {
    controlPoints = [];

    const cx = width  / 2;
    const cy = height / 2;

    // Maximum radius — keep points well within the viewport
    // even at maximum deformation
    const maxR = Math.min(width, height) * 0.36;

    for (let i = 0; i < NUM_CELLS; i++) {
      const angle  = i * GOLDEN_ANGLE;
      // Expanding radius: SUB at ~8% of maxR, NOISE at 100%
      const radius = map(i, 0, NUM_CELLS - 1, maxR * 0.08, maxR);

      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;

      controlPoints.push({
        x, y,
        baseX: x, baseY: y,       // Rest position (no deformation)
        label: LABELS[i],
        color: color(CELL_COLORS[i]),
        hex:   CELL_COLORS[i],
        index: i,
      });
    }
  }

  // ═════════════════════════════════════════════════════════════
  //  AUDIO DEFORMATION
  // ═════════════════════════════════════════════════════════════
  //
  //  Each control point is displaced from its rest position by
  //  a Perlin noise vector scaled by (BASE_WARP_MAG + amp ×
  //  AUDIO_WARP_MAX). At silence (amp ≈ 0), the base Perlin
  //  noise creates gentle organic movement. At loud moments,
  //  cells bulge dramatically outward — topological shockwaves.
  // ═════════════════════════════════════════════════════════════

  function getDeformedPoints() {
    const time = frameCount * 0.008;
    const deformed = [];

    for (let i = 0; i < NUM_CELLS; i++) {
      const pt  = controlPoints[i];
      const amp = smoothedAmp[i];

      // Total warp magnitude: base (always present) + audio-driven extra
      const mag = BASE_WARP_MAG + amp * AUDIO_WARP_MAX;

      // Two independent noise samples for x and y displacement
      // The noise seed offsets (i*0.5+1, i*0.5+100) ensure each
      // cell moves in a unique direction
      const nx = noise(i * 0.5 + 1,   time) - 0.5;
      const ny = noise(i * 0.5 + 100, time) - 0.5;

      deformed.push({
        x:     pt.baseX + nx * mag * 2,
        y:     pt.baseY + ny * mag * 2,
        label: pt.label,
        hex:   pt.hex,
        index: pt.index,
        amp:   amp,
      });
    }

    return deformed;
  }

  // ═════════════════════════════════════════════════════════════
  //  VORONOI RENDERER  (Ink Blobs technique)
  // ═════════════════════════════════════════════════════════════
  //
  //  Core rendering loop — runs per frame on the off-screen
  //  buffer. For every pixel:
  //
  //    1. DOMAIN WARPING: Apply 3-pass Perlin noise displacement
  //       to the pixel coordinates. Each pass samples the noise
  //       field at the current (wx, wy) and displaces by
  //       (cos(θ), sin(θ)) × magnitude. After 3 passes, the
  //       coordinate space is organically "folded."
  //
  //    2. VORONOI DISTANCE: Find the nearest and second-nearest
  //       deformed control point using Euclidean distance.
  //
  //    3. BORDER DETECTION: If the difference between second-
  //       nearest and nearest distance is less than BORDER_THICKNESS,
  //       the pixel lies on a cell boundary → solid black ink.
  //
  //    4. CELL FILL: Otherwise, fill with the frequency band's
  //       assigned color, modulated by Russian Doll rings.
  //
  //    5. RUSSIAN DOLL RINGS: Concentric bands created by a
  //       modulo operation on the distance from the cell center.
  //       Ring spacing (and thus count) is proportional to
  //       amplitude — louder = more rings = more harmonic
  //       overtones visualized.
  //
  //    6. FILM GRAIN: ±3% luminance noise applied per-pixel
  //       for analog ink-on-paper texture.
  // ═════════════════════════════════════════════════════════════

  function renderVoronoiToBuffer(deformed) {
    pg.loadPixels();
    const d = pg.pixels;
    const w = pg.width;
    const h = pg.height;

    // Pre-extract arrays for faster inner-loop access
    const pts = deformed.map(p => ({
      x: p.x, y: p.y, idx: p.index, amp: p.amp
    }));

    const time = frameCount * 0.005;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        // ── 3-Pass Perlin Domain Warping ──
        //
        // Each pass reads the noise field at the current (wx, wy)
        // and displaces the coordinates. This creates the organic,
        // ink-blot cell shapes that make the map feel biological
        // rather than geometric.
        let wx = x;
        let wy = y;

        const scale = 0.007;  // Noise sampling scale — consistent
                               // across canvas sizes

        // Compute average amplitude across all bands for global
        // warp modulation (affects ALL cells' boundaries)
        const avgAmp = pts.reduce((sum, p) => sum + p.amp, 0) / pts.length;
        const globalMag = BASE_WARP_MAG * 0.6 + avgAmp * AUDIO_WARP_MAX * 0.5;

        for (let pass = 0; pass < WARP_PASSES; pass++) {
          const n     = noise(wx * scale, wy * scale, time + pass * 50);
          const angle = n * TWO_PI;
          wx += Math.cos(angle) * globalMag;
          wy += Math.sin(angle) * globalMag;
        }

        // ── Nearest-Center Search ──
        //
        // Simple brute-force over 6 points. Squared distance for
        // comparison (avoids sqrt), then sqrt for actual distance
        // used in border detection and ring calculation.
        let minDist    = Infinity;
        let minIdx     = 0;
        let secondDist = Infinity;

        for (let p = 0; p < pts.length; p++) {
          const dx   = wx - pts[p].x;
          const dy   = wy - pts[p].y;
          const dist = dx * dx + dy * dy;
          if (dist < minDist) {
            secondDist = minDist;
            minDist    = dist;
            minIdx     = p;
          } else if (dist < secondDist) {
            secondDist = dist;
          }
        }

        minDist    = Math.sqrt(minDist);
        secondDist = Math.sqrt(secondDist);

        const pi = (y * w + x) * 4;  // pixel index

        // ── Ink Border ──
        //
        // When the pixel is nearly equidistant from two centers,
        // it lies on a cell boundary. Rendered as solid black
        // (ink) line.
        if (secondDist - minDist < BORDER_THICKNESS) {
          d[pi]     = 0;   // R
          d[pi + 1] = 0;   // G
          d[pi + 2] = 0;   // B
          d[pi + 3] = 255; // A
          continue;
        }

        // ── Cell Interior ──
        const cp  = pts[minIdx];
        const col = color(CELL_COLORS[cp.idx]);

        let r = red(col);
        let g = green(col);
        let b = blue(col);

        // ── Russian Doll Nested Rings ──
        //
        // Concentric bands inside each cell. The ring spacing
        // (RING_BASE + amp × RING_AUDIO) varies with amplitude:
        // quiet → few wide rings; loud → many tight rings.
        // This visualizes the harmonic overtone series —
        // more acoustic energy = more visible partials.
        const ringMult = RING_BASE + cp.amp * RING_AUDIO;
        const isRing   = Math.floor(minDist * 0.06 * ringMult) % 2;

        if (isRing === 0) {
          // Darker band — the "trough" of the ring
          r *= 0.48;
          g *= 0.48;
          b *= 0.48;
        }
        // else: brighter band — full cell color

        // ── Film Grain (±3% luminance noise) ──
        //
        // Applied per-pixel during the render loop (avoids a
        // second pass). ±GRAIN_STRENGTH/255 ≈ ±3% luminance
        // variation gives an analog, ink-on-paper feel.
        const grain = (Math.random() * 2 - 1) * GRAIN_STRENGTH;

        d[pi]     = Math.min(255, Math.max(0, r + grain));
        d[pi + 1] = Math.min(255, Math.max(0, g + grain));
        d[pi + 2] = Math.min(255, Math.max(0, b + grain));
        d[pi + 3] = 255;
      }
    }

    pg.updatePixels();
  }

  // ═════════════════════════════════════════════════════════════
  //  GRADIENT TYPOGRAPHY  (Pacôme Pertant technique)
  // ═════════════════════════════════════════════════════════════
  //
  //  Each frequency label is rendered at its cell's centroid
  //  using a vertical gradient fill:
  //    - Top of character: white (#FFFFFF)
  //    - Bottom of character: cell's territory color
  //
  //  Labels stagger in at 150ms intervals (like Pacôme's
  //  hero greeting entrance animation).
  //
  //  Uses native Canvas 2D API directly (bypassing p5.js text()
  //  because p5.js overrides fillStyle internally). The
  //  drawingContext global references the main canvas context.
  // ═════════════════════════════════════════════════════════════

  function drawGradientLabels(deformed) {
    const elapsed  = millis() - sketchStartTime;
    const fontSize = Math.max(12, Math.min(26, width * 0.03));

    // Native canvas context — p5.js exposes this as a global
    const ctx = drawingContext;

    for (let i = 0; i < NUM_CELLS; i++) {
      // Staggered entrance: each label appears 150ms later
      const appearTime = i * LABEL_STAGGER;
      if (elapsed < appearTime) continue;

      const pt    = deformed[i];
      const cx    = pt.x;
      const cy    = pt.y;
      const alpha = constrain(
        map(elapsed - appearTime, 0, 400, 0, 1), 0, 1
      );

      const halfH = fontSize * 0.55;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = `bold ${fontSize}px "Courier New", monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Text shadow for readability against Voronoi noise
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 1.5;
      ctx.shadowOffsetY = 1.5;

      // Gradient fill: white (top) → cell color (bottom)
      const grad = ctx.createLinearGradient(cx, cy - halfH, cx, cy + halfH);
      grad.addColorStop(0, GRADIENT_TOP);
      grad.addColorStop(1, pt.hex);
      ctx.fillStyle = grad;

      ctx.fillText(pt.label, cx, cy);

      ctx.restore();
    }
  }

  // ═════════════════════════════════════════════════════════════
  //  PERPETUAL MARQUEE  (Pacôme Pertant perpetual motion)
  // ═════════════════════════════════════════════════════════════
  //
  //  Endless scrolling text at the bottom of the canvas reading
  //  the reversed + diacritic version of "Acoustic Cartography"
  //  (i.e., "˙ˌ˘ˇ˜ ʎɹoƃᴉdɐɹʇɐ ɔᴉʇsnɐɔ∀").
  //
  //  Speed is modulated by overall audio amplitude — the map
  //  scrolls faster when you're loud. Represents the unending
  //  acoustic spectrum.
  // ═════════════════════════════════════════════════════════════

  function drawMarquee() {
    const totalAmp = smoothedAmp.reduce((a, b) => a + b, 0) / NUM_CELLS;
    const speed    = 0.4 + totalAmp * 0.8;

    marqueeOffset = (marqueeOffset - speed);

    const fontSize = Math.max(10, Math.min(13, width * 0.015));

    const ctx = drawingContext;

    const txtW = ctx.measureText(MARQUEE_TEXT).width;
    if (marqueeOffset < -txtW) marqueeOffset += txtW;

    const yPos = height - 14;

    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.font = `${fontSize}px "Courier New", monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#666';

    ctx.fillText(MARQUEE_TEXT, width + marqueeOffset, yPos);
    ctx.fillText(MARQUEE_TEXT, width + marqueeOffset + txtW, yPos);

    ctx.restore();
  }

  // ═════════════════════════════════════════════════════════════
  //  AUDIO ENGINE  (Web Audio API)
  // ═════════════════════════════════════════════════════════════
  //
  //  Microphone input → AnalyserNode (FFT) → frequency band
  //  extraction → exponential smoothing → cell deformation.
  //
  //  Frequency bands (from the prompt):
  //    SUB       0-60 Hz       → cell[0]  (burnt orange)
  //    BASS     60-250 Hz      → cell[1]  (coral)
  //    MID     250-2000 Hz     → cell[2]  (teal)
  //    TREBLE  2000-8000 Hz    → cell[3]  (yellow)
  //    HARMONIC 8000-16000 Hz  → cell[4]  (teal blue)
  //    NOISE    all bands      → cell[5]  (sage green)
  //
  //  Each frequency band preferentially deforms its own cell,
  //  meaning the visual territory for "BASS" physically bulges
  //  when you sing bass notes.
  // ═════════════════════════════════════════════════════════════

  async function setupAudio() {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      await audioContext.resume();

      if (useMicrophone) {
        // getUserMedia requires HTTPS or localhost
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioContext.createMediaStreamSource(micStream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;  // → 128 frequency bins
        source.connect(analyserNode);
        frequencyArray = new Uint8Array(analyserNode.frequencyBinCount);
      }
    } catch (err) {
      console.warn('Audio setup failed, falling back to silent mode:', err);
      useMicrophone = false;
    }
  }

  function updateAmplitudes() {
    const raw = new Array(NUM_CELLS).fill(0);

    if (useMicrophone && analyserNode) {
      // ── Real microphone input ──
      analyserNode.getByteFrequencyData(frequencyArray);
      const binCount = frequencyArray.length; // 128
      const sampleRate = audioContext.sampleRate;
      const nyquist = sampleRate / 2;
      const binsPerHz = binCount / nyquist;

      // Extract 6 frequency bands using the prompt's exact bin ranges
      raw[0] = avgBand(frequencyArray, 0,                                    Math.floor(60 * binsPerHz));        // SUB
      raw[1] = avgBand(frequencyArray, Math.floor(60 * binsPerHz),           Math.floor(250 * binsPerHz));       // BASS
      raw[2] = avgBand(frequencyArray, Math.floor(250 * binsPerHz),          Math.floor(2000 * binsPerHz));      // MID
      raw[3] = avgBand(frequencyArray, Math.floor(2000 * binsPerHz),         Math.floor(8000 * binsPerHz));      // TREBLE
      raw[4] = avgBand(frequencyArray, Math.floor(8000 * binsPerHz),         Math.floor(16000 * binsPerHz));     // HARMONIC
      raw[5] = avgBand(frequencyArray, 0,                                    binCount - 1);                      // NOISE (all)
    } else {
      // ── Silent mode: simulated oscillation ──
      //
      // Gentle sinusoidal motion at different frequencies per
      // band. Gives a subtle ambient breathing effect even
      // without microphone input. The 0.25 amplitude keeps
      // deformation minimal — cells stay mostly ordered.
      const t = frameCount * 0.015;
      for (let i = 0; i < NUM_CELLS; i++) {
        raw[i] = (Math.sin(t * (0.5 + i * 0.3) + i * 1.7) * 0.5 + 0.5) * 65;
      }
    }

    // ── Exponential Moving Average Smoothing ──
    //
    // Prevents jarring visual jumps from transient audio
    // spikes. At 0.12, ~90% convergence in ~18 frames (~0.6s).
    for (let i = 0; i < NUM_CELLS; i++) {
      const normalized = Math.min(1, raw[i] / 255);
      smoothedAmp[i] += (normalized - smoothedAmp[i]) * SMOOTH_FACTOR;
    }
  }

  // Average frequency bin values in a range
  function avgBand(arr, start, end) {
    const lo = Math.max(0, Math.floor(start));
    const hi = Math.min(arr.length - 1, Math.floor(end));
    if (hi <= lo) return 0;
    let sum = 0;
    for (let i = lo; i <= hi; i++) sum += arr[i];
    return sum / (hi - lo + 1);
  }

  // ═════════════════════════════════════════════════════════════
  //  INTERACTION
  // ═════════════════════════════════════════════════════════════

  // Spacebar toggles the deterministic seed → regenerates the
  // noise field for a fresh map layout.
  function keyPressed() {
    if (key === ' ') {
      seed++;
      randomSeed(seed);
      noiseSeed(seed);
      setupSpiral();
      return false;  // prevent page scroll
    }
    return true;
  }

  // Window resize → recreate off-screen buffer + reposition spiral
  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    pg = createGraphics(width, height);
    pg.pixelDensity(1);
    pg.background(10);
    setupSpiral();
  }

  // ═════════════════════════════════════════════════════════════
  //  SOUND GATE  (Pacôme Pertant dual-entry pattern)
  // ═════════════════════════════════════════════════════════════
  //
  //  Two-button overlay inspired by Pacôme Pertant's portfolio
  //  dual-gate entry. The viewer must explicitly choose to
  //  enter with microphone or silently — this makes the
  //  acoustic interaction a deliberate act.
  // ═════════════════════════════════════════════════════════════

  document.addEventListener('DOMContentLoaded', () => {
    const gateEl    = document.getElementById('sound-gate');
    const micBtn    = document.getElementById('gate-with-mic');
    const silentBtn = document.getElementById('gate-silent');

    micBtn.addEventListener('click', async () => {
      useMicrophone = true;
      gateEl.classList.add('gate-hidden');
      await setupAudio();
      gatePassed = true;
      sketchStartTime = millis();
    });

    silentBtn.addEventListener('click', () => {
      useMicrophone = false;
      gateEl.classList.add('gate-hidden');
      gatePassed = true;
      sketchStartTime = millis();
    });
  });

  // ═════════════════════════════════════════════════════════════
  </script>
</body>
</html>
