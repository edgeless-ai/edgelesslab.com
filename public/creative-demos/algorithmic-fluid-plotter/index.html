<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithmic Fluid Plotter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #FFFFFF;
    }
  </style>
</head>
<body>
<script>
/* ============================================================
   Algorithmic Fluid Plotter
   ------------------------------------------------------------
   A hybrid demo fusing two techniques into a single coherent
   system:

   1. Inconvergent-style algorithmic line art: the canvas is
      populated with single-weight (1–1.5 px) stroke lines that
      follow constrained random-walk rules. Lines spawn in seed
      clusters and attempt to follow the local fluid velocity
      while retaining pen-plotter precision.

   2. Cuberto-style 2D fluid simulation: a simplified Navier-
      Stokes grid (Jos Stam's stable fluids) runs at 128×128.
      The fluid has velocity (advection) and dye (ink density)
      fields. The mouse stirs the ink; scroll velocity injects
      wind. Ghost lines repel visible ink, carving sharp
      geometric corners into otherwise organic curves.

   Color palette (exact hex values):
   • Paper background: #FFFFFF
   • Ink primary:    #000000
   • Liquid indigo:  #4B0082
   • Liquid purple:  #8A2BE2
   • Liquid magenta: #FF00FF
   • Accent cyan:    #00FFFF
   • Accent red:     #FF0000
   ============================================================ */

// --- Fluid Solver (Jos Stam's Stable Fluids) ---
// Simplified 2D Navier-Stokes on a 128×128 grid.
// Each step performs advection, diffusion, and pressure
// projection to keep the velocity field divergence-free.

const N = 128;
const SIZE = (N + 2) * (N + 2);

function Fluid(dt, diffusion, viscosity) {
  this.dt = dt;
  this.diff = diffusion;
  this.visc = viscosity;

  this.d = new Float32Array(SIZE);
  this.d_prev = new Float32Array(SIZE);
  this.u = new Float32Array(SIZE);
  this.v = new Float32Array(SIZE);
  this.u_prev = new Float32Array(SIZE);
  this.v_prev = new Float32Array(SIZE);
}

// Index into the 1D array from 2D grid coordinates (i, j)
function IX(i, j) {
  return i + (N + 2) * j;
}

Fluid.prototype.step = function () {
  // Velocity step
  diffuse(1, this.u_prev, this.u, this.visc, this.dt);
  diffuse(2, this.v_prev, this.v, this.visc, this.dt);
  project(this.u_prev, this.v_prev, this.u, this.v);
  advect(1, this.u, this.u_prev, this.u_prev, this.v_prev, this.dt);
  advect(2, this.v, this.v_prev, this.u_prev, this.v_prev, this.dt);
  project(this.u, this.v, this.u_prev, this.v_prev);

  // Density step
  diffuse(0, this.d_prev, this.d, this.diff, this.dt);
  advect(0, this.d, this.d_prev, this.u, this.v, this.dt);
};

// Add density at a canvas position (mapped to grid coordinates)
Fluid.prototype.addDensity = function (x, y, amount) {
  let i = Math.floor(map(x, 0, width, 1, N));
  let j = Math.floor(map(y, 0, height, 1, N));
  if (i >= 1 && i <= N && j >= 1 && j <= N) {
    this.d[IX(i, j)] += amount;
  }
};

// Add velocity at a canvas position
Fluid.prototype.addVelocity = function (x, y, amountX, amountY) {
  let i = Math.floor(map(x, 0, width, 1, N));
  let j = Math.floor(map(y, 0, height, 1, N));
  if (i >= 1 && i <= N && j >= 1 && j <= N) {
    this.u[IX(i, j)] += amountX;
    this.v[IX(i, j)] += amountY;
  }
};

// Add uniform wind across all grid cells
Fluid.prototype.addWind = function (vx, vy) {
  for (let i = 1; i <= N; i++) {
    for (let j = 1; j <= N; j++) {
      this.u[IX(i, j)] += vx;
      this.v[IX(i, j)] += vy;
    }
  }
};

// Sample velocity at canvas coordinates
Fluid.prototype.getVelocityX = function (x, y) {
  let i = Math.floor(map(x, 0, width, 1, N));
  let j = Math.floor(map(y, 0, height, 1, N));
  i = constrain(i, 1, N);
  j = constrain(j, 1, N);
  return this.u[IX(i, j)];
};

Fluid.prototype.getVelocityY = function (x, y) {
  let i = Math.floor(map(x, 0, width, 1, N));
  let j = Math.floor(map(y, 0, height, 1, N));
  i = constrain(i, 1, N);
  j = constrain(j, 1, N);
  return this.v[IX(i, j)];
};

// Fade density field by a uniform rate each frame
Fluid.prototype.fadeDensity = function (rate) {
  for (let i = 0; i < SIZE; i++) {
    this.d[i] *= rate;
  }
};

// --- Solver internals ---

function set_bnd(b, x) {
  for (let i = 1; i <= N; i++) {
    x[IX(0, i)]     = b === 1 ? -x[IX(1, i)]   : x[IX(1, i)];
    x[IX(N+1, i)]   = b === 1 ? -x[IX(N, i)]   : x[IX(N, i)];
    x[IX(i, 0)]     = b === 2 ? -x[IX(i, 1)]   : x[IX(i, 1)];
    x[IX(i, N+1)]   = b === 2 ? -x[IX(i, N)]   : x[IX(i, N)];
  }
  x[IX(0, 0)]       = 0.5 * (x[IX(1, 0)]     + x[IX(0, 1)]);
  x[IX(0, N+1)]     = 0.5 * (x[IX(1, N+1)]   + x[IX(0, N)]);
  x[IX(N+1, 0)]     = 0.5 * (x[IX(N, 0)]     + x[IX(N+1, 1)]);
  x[IX(N+1, N+1)]   = 0.5 * (x[IX(N, N+1)]   + x[IX(N+1, N)]);
}

function lin_solve(b, x, x0, a, c) {
  // 4 iterations of Gauss-Seidel relaxation
  for (let k = 0; k < 4; k++) {
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        x[IX(i, j)] = (
          x0[IX(i, j)] +
          a * (
            x[IX(i-1, j)] + x[IX(i+1, j)] +
            x[IX(i, j-1)] + x[IX(i, j+1)]
          )
        ) / c;
      }
    }
    set_bnd(b, x);
  }
}

function diffuse(b, x, x0, diff, dt) {
  let a = dt * diff * N * N;
  lin_solve(b, x, x0, a, 1 + 4 * a);
}

function advect(b, d, d0, u, v, dt) {
  let dt0 = dt * N;
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      let x = i - dt0 * u[IX(i, j)];
      let y = j - dt0 * v[IX(i, j)];

      if (x < 0.5) x = 0.5;
      if (x > N + 0.5) x = N + 0.5;
      let i0 = Math.floor(x);
      let i1 = i0 + 1;

      if (y < 0.5) y = 0.5;
      if (y > N + 0.5) y = N + 0.5;
      let j0 = Math.floor(y);
      let j1 = j0 + 1;

      let s1 = x - i0;
      let s0 = 1 - s1;
      let t1 = y - j0;
      let t0 = 1 - t1;

      d[IX(i, j)] =
        s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
        s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
    }
  }
  set_bnd(b, d);
}

function project(u, v, p, div) {
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      div[IX(i, j)] = -0.5 * (
        u[IX(i+1, j)] - u[IX(i-1, j)] +
        v[IX(i, j+1)] - v[IX(i, j-1)]
      ) / N;
      p[IX(i, j)] = 0;
    }
  }
  set_bnd(0, div);
  set_bnd(0, p);
  lin_solve(0, p, div, 1, 4);

  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      u[IX(i, j)] -= 0.5 * N * (p[IX(i+1, j)] - p[IX(i-1, j)]);
      v[IX(i, j)] -= 0.5 * N * (p[IX(i, j+1)] - p[IX(i, j-1)]);
    }
  }
  set_bnd(1, u);
  set_bnd(2, v);
}

// --- Demo State ---

let fluid;
let fluidFadeRate = 0.995;
let lines = [];
let ghostLines = [];
let maxLines = 200;
let scrollVelocity = 0;
let mouseMovedTimer = 0;
let mouseMovedRecently = false;
let fluidBuffer;

// Exact hex palette
const PAPER_BG      = '#FFFFFF';
const INK_PRIMARY   = '#000000';
const LIQUID_INDIGO = '#4B0082';
const LIQUID_PURPLE = '#8A2BE2';
const LIQUID_MAGENTA= '#FF00FF';
const ACCENT_CYAN   = '#00FFFF';
const ACCENT_RED    = '#FF0000';

function setup() {
  createCanvas(windowWidth, windowHeight);
  background(PAPER_BG);

  // Fluid: size 128, diffusion 0.0001, viscosity 0.0, dt 0.1
  fluid = new Fluid(0.1, 0.0001, 0.0);

  // Low-resolution off-screen buffer for the fluid texture
  fluidBuffer = createGraphics(128, 128);
  fluidBuffer.pixelDensity(1);

  // Seed initial visible lines (80) and ghost lines (3)
  for (let i = 0; i < 80; i++) {
    seedLine(random(width), random(height), false);
  }
  for (let i = 0; i < 3; i++) {
    seedLine(random(width), random(height), true);
  }
}

function draw() {
  background(PAPER_BG);

  // 1. Fade fluid dye so trails dissipate
  fluid.fadeDensity(fluidFadeRate);

  // 2. Step the fluid simulation
  fluid.step();

  // 3. Apply global wind from scroll velocity
  if (abs(scrollVelocity) > 0.5) {
    let windX = scrollVelocity * 0.1;
    let windY = random(-1, 1);
    fluid.addWind(windX, windY);
    scrollVelocity *= 0.9;
  }

  // 4. Mouse interaction: inject dye and velocity at cursor
  if (mouseIsPressed || mouseMovedRecently) {
    fluid.addDensity(mouseX, mouseY, 50);
    fluid.addVelocity(mouseX, mouseY, (mouseX - pmouseX) * 2, (mouseY - pmouseY) * 2);
  }

  // Decay mouse-move timer
  if (mouseMovedTimer > 0) {
    mouseMovedTimer--;
  } else {
    mouseMovedRecently = false;
  }

  // 5. Render the fluid density field as a faint background texture
  drawFluidTexture();

  // 6. Ghost repulsion: invisible ghost lines force visible
  //    ink to detour around them, creating sharp geometric
  //    corners in otherwise organic curves.
  for (let gl of ghostLines) {
    for (let line of lines) {
      for (let pt of line.points) {
        for (let gpt of gl.points) {
          let dx = pt.x - gpt.x;
          let dy = pt.y - gpt.y;
          let distSq = dx * dx + dy * dy;
          if (distSq < 25 * 25 && distSq > 0) {
            let dist = sqrt(distSq);
            let force = 3.0 / dist;
            pt.x += (dx / dist) * force;
            pt.y += (dy / dist) * force;
          }
        }
      }
    }
  }

  // 7. Advect visible lines with the fluid velocity field
  for (let line of lines) {
    line.age++;
    for (let pt of line.points) {
      let fx = fluid.getVelocityX(pt.x, pt.y);
      let fy = fluid.getVelocityY(pt.x, pt.y);
      pt.x += fx * 0.5;
      pt.y += fy * 0.5;
      wrapPoint(pt);
    }
  }

  // 8. Draw visible lines with single-weight black strokes
  //    that fade as they age, simulating disappearing ink.
  for (let line of lines) {
    let alpha = map(line.age, 0, line.maxAge, 255, 0);
    if (line.isGhost || alpha <= 0) continue;
    let c = color(INK_PRIMARY);
    c.setAlpha(alpha);
    stroke(c);
    strokeWeight(1.2);
    noFill();
    beginShape();
    for (let pt of line.points) {
      vertex(pt.x, pt.y);
    }
    endShape();
  }

  // 9. Draw faint cyan glow beneath ghost points — the only
  //    visual hint of the invisible obstacles repelling the ink.
  for (let gl of ghostLines) {
    for (let gpt of gl.points) {
      noStroke();
      let c = color(ACCENT_CYAN);
      c.setAlpha(5);
      fill(c);
      ellipse(gpt.x, gpt.y, 8, 8);
    }
  }

  // 10. Life-cycle: prune dead lines and respawn to maintain
  //     the visual pool.
  for (let i = lines.length - 1; i >= 0; i--) {
    if (lines[i].age >= lines[i].maxAge) {
      lines.splice(i, 1);
    }
  }
  for (let i = ghostLines.length - 1; i >= 0; i--) {
    if (ghostLines[i].age >= ghostLines[i].maxAge) {
      ghostLines.splice(i, 1);
    }
  }

  if (lines.length < 80) {
    seedLine(random(width), random(height), false);
  }
  if (ghostLines.length < 3) {
    seedLine(random(width), random(height), true);
  }

  // 11. HUD overlay
  noStroke();
  let hud = color(INK_PRIMARY);
  hud.setAlpha(120);
  fill(hud);
  textSize(12);
  text("lines: " + lines.length, 20, 30);
  text("scroll: wind", 20, 50);
  text("click: stir", 20, 70);
}

// --- Line Spawner ---
// Creates a random-walk polyline. Visible lines follow the
// local fluid; ghost lines drift very slowly and stay fixed
// in world space so they can act as repulsion obstacles.
function seedLine(startX, startY, isGhost) {
  let line = {
    points: [],
    isGhost: isGhost,
    age: 0,
    maxAge: random(300, 600)
  };
  let x = startX;
  let y = startY;

  // Ghost lines are shorter to keep the repulsion check
  // performant while maintaining the visual effect.
  let numSteps = isGhost ? random(20, 40) : random(40, 120);

  for (let step = 0; step < numSteps; step++) {
    line.points.push({ x: x, y: y });
    if (!isGhost) {
      // Follow fluid + random walk: bias the walk angle by the
      // local fluid velocity, then add a small random perturbation.
      let fx = fluid.getVelocityX(x, y);
      let fy = fluid.getVelocityY(x, y);
      let angle = atan2(fy, fx) + random(-0.3, 0.3);
      let speed = constrain(sqrt(fx * fx + fy * fy) + 0.5, 0.5, 3);
      x += cos(angle) * speed;
      y += sin(angle) * speed;
    } else {
      // Ghost lines drift imperceptibly so they remain
      // stationary geometric structures in the fluid field.
      x += cos(random(TWO_PI)) * 0.5;
      y += sin(random(TWO_PI)) * 0.5;
    }
    // Toroidal wrap
    if (x < 0) x += width;
    if (x > width) x -= width;
    if (y < 0) y += height;
    if (y > height) y -= height;
  }

  if (line.points.length > 10) {
    if (isGhost) {
      if (ghostLines.length < maxLines) ghostLines.push(line);
    } else {
      if (lines.length < maxLines) lines.push(line);
    }
  }
}

function wrapPoint(pt) {
  if (pt.x < 0) pt.x += width;
  if (pt.x > width) pt.x -= width;
  if (pt.y < 0) pt.y += height;
  if (pt.y > height) pt.y -= height;
}

// --- Fluid Texture Renderer ---
// Maps the density field into a 128×128 pixel buffer and
// stretches it to the full canvas. Colors transition from
// liquid indigo → purple → magenta as density increases.
function drawFluidTexture() {
  fluidBuffer.loadPixels();
  let indigo = color(LIQUID_INDIGO);
  let purple = color(LIQUID_PURPLE);
  let magenta = color(LIQUID_MAGENTA);

  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      let d = fluid.d[IX(i, j)];
      let idx = 4 * ((i - 1) + (j - 1) * 128);
      if (d > 0.01) {
        let amt = map(d, 0, 0.5, 0, 1);
        let c = lerpColor(lerpColor(indigo, purple, amt), magenta, amt);
        let a = map(d, 0, 0.3, 0, 80);
        fluidBuffer.pixels[idx + 0] = red(c);
        fluidBuffer.pixels[idx + 1] = green(c);
        fluidBuffer.pixels[idx + 2] = blue(c);
        fluidBuffer.pixels[idx + 3] = a;
      } else {
        fluidBuffer.pixels[idx + 3] = 0; // fully transparent
      }
    }
  }
  fluidBuffer.updatePixels();

  // Draw the buffer scaled to full canvas; the default smooth
  // interpolation gives the fluid a soft, watercolor-like edge.
  image(fluidBuffer, 0, 0, width, height);
}

// --- Interaction ---

function mouseMoved() {
  mouseMovedRecently = true;
  mouseMovedTimer = 5;
}

function mouseWheel(event) {
  // Convert scroll delta into a horizontal wind impulse
  scrollVelocity += event.deltaY;
  return false;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(PAPER_BG);
  // Rebuild the fluid grid to match the new canvas dimensions
  fluid = new Fluid(0.1, 0.0001, 0.0);
  lines = [];
  ghostLines = [];
  for (let i = 0; i < 80; i++) {
    seedLine(random(width), random(height), false);
  }
  for (let i = 0; i < 3; i++) {
    seedLine(random(width), random(height), true);
  }
}
</script>
</body>
