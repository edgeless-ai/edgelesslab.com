<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento Sound Grid</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #f8f8f8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  #app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Frosted glass nav */
  #nav {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    background: rgba(248, 248, 248, 0.80);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: backdrop-filter 0.5s ease, background 0.5s ease, border-color 0.5s ease;
  }
  #nav.golden {
    background: rgba(255, 215, 0, 0.35);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid rgba(255, 215, 0, 0.5);
  }
  #nav-pill {
    padding: 8px 20px;
    border-radius: 999px;
    background: rgba(0,0,0,0.04);
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: background 0.3s ease, color 0.3s ease;
    user-select: none;
  }
  #nav.golden #nav-pill {
    background: rgba(255, 255, 255, 0.4);
    color: #5a4500;
  }

  /* Bento grid */
  #grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(7, 1fr);
    gap: 12px;
    padding: 16px;
    overflow: hidden;
    transition: background 0.6s ease;
  }
  #grid.golden {
    background: rgba(255, 215, 0, 0.35);
  }
  @media (max-width: 900px) {
    #grid {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(13, 1fr);
    }
  }

  .cell {
    position: relative;
    border-radius: 16px;
    background: #ffffff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease,
                background 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    background: rgba(0,0,0,0.02);
  }
  .cell.active {
    box-shadow: 0 0 0 2px #3b82f6, 0 8px 24px rgba(59, 130, 246, 0.25);
  }
  .cell.golden {
    box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.8), 0 8px 24px rgba(255, 215, 0, 0.3);
  }
  .cell .letter {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 12px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 10;
    transition: color 0.3s ease;
  }
  .cell.golden .letter {
    color: #5a4500;
  }
  .cell .badge {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 10px;
    font-weight: 600;
    color: #6b7280;
    pointer-events: none;
    z-index: 10;
    transition: color 0.3s ease;
    max-width: 80%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cell.golden .badge {
    color: #5a4500;
  }
  .cell canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
    z-index: 1;
  }
  .cell .content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  /* Hint overlay */
  #hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(0,0,0,0.04);
    color: #6b7280;
    font-size: 12px;
    pointer-events: none;
    z-index: 200;
    opacity: 1;
    transition: opacity 0.5s ease;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>
<body>
<div id="app">
  <nav id="nav">
    <div id="nav-pill">Press A–Z to play</div>
  </nav>
  <div id="grid"></div>
  <div id="hint">Press keys A–Z · Hover for bounce · Click to freeze · Scroll to retune</div>
</div>

<script>
  // --- Global state ---
  let audioCtx = null;
  let globalPitchOffset = 0;
  let goldenHour = false;
  let goldenHourTimer = null;
  let polyphonyCount = 0;
  let idleTimer = null;
  let navPulse = 0;
  const cells = [];
  const keyMap = new Map();
  const pressedKeys = new Set();
  const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  // --- Palette helpers ---
  function getKeyColor(key) {
    const code = key.charCodeAt(0);
    const hue = (code * 137) % 360;
    const isPunchy = (code % 7) < 3;
    const saturation = isPunchy ? 85 : 45;
    const lightness = isPunchy ? 55 : 70;
    return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
  }
  function getKeyShape(key) {
    const code = key.charCodeAt(0);
    const shapes = ['circle', 'triangle', 'square', 'pentagon', 'hexagon'];
    return shapes[code % shapes.length];
  }
  function getKeyFrequency(key) {
    const base = 220; // A3
    const index = key.charCodeAt(0) - 65;
    const semitones = index;
    return base * Math.pow(2, (semitones + globalPitchOffset) / 12);
  }
  function noteName(freq) {
    const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const midi = Math.round(69 + 12 * Math.log2(freq / 440));
    return names[(midi % 12 + 12) % 12] + Math.floor(midi / 12 - 1);
  }

  // --- Audio ---
  function initAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  function playSound(key) {
    initAudioContext();
    const freq = getKeyFrequency(key);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const type = ['sine','triangle','square','sawtooth'][key.charCodeAt(0) % 4];
    osc.type = type;
    osc.frequency.value = goldenHour ? freq * 2 : freq;
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.45);
    polyphonyCount++;
    updateFrostedNav();
    setTimeout(() => {
      polyphonyCount = Math.max(0, polyphonyCount - 1);
      updateFrostedNav();
    }, 450);
    return freq;
  }

  // --- Golden Hour ---
  function shouldTriggerGoldenHour(key) {
    return (key.charCodeAt(0) * 7) % 100 < 3;
  }
  function triggerGoldenHour() {
    if (goldenHour) return;
    goldenHour = true;
    document.getElementById('nav').classList.add('golden');
    document.getElementById('grid').classList.add('golden');
    cells.forEach(c => c.el.classList.add('golden'));
    if (goldenHourTimer) clearTimeout(goldenHourTimer);
    goldenHourTimer = setTimeout(() => {
      goldenHour = false;
      document.getElementById('nav').classList.remove('golden');
      document.getElementById('grid').classList.remove('golden');
      cells.forEach(c => c.el.classList.remove('golden'));
    }, 2000);
  }

  // --- Frosted Nav ---
  function updateFrostedNav() {
    const nav = document.getElementById('nav');
    const blur = Math.min(12 + polyphonyCount * 3, 36);
    nav.style.backdropFilter = `blur(${blur}px)`;
    nav.style.webkitBackdropFilter = `blur(${blur}px)`;
  }
  function startIdlePulse() {
    if (idleTimer) clearInterval(idleTimer);
    let t = 0;
    idleTimer = setInterval(() => {
      if (polyphonyCount === 0 && !goldenHour) {
        t += 0.05;
        const blur = 12 + Math.sin(t) * 3;
        const nav = document.getElementById('nav');
        nav.style.backdropFilter = `blur(${blur}px)`;
        nav.style.webkitBackdropFilter = `blur(${blur}px)`;
      }
    }, 100);
  }
  function resetIdle() {
    startIdlePulse();
  }

  // --- Clipboard ---
  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  // --- Particle system (p5 instance mode per cell) ---
  function makeSketch(cellObj) {
    return function(p) {
      const shapes = [];
      let frozen = false;
      cellObj.sketch = p;
      cellObj.shapes = shapes;
      cellObj.frozen = () => frozen;
      cellObj.setFrozen = (v) => { frozen = v; };
      cellObj.spawn = (color, shapeType) => {
        const w = p.width || cellObj.el.offsetWidth;
        const h = p.height || cellObj.el.offsetHeight;
        const margin = 16;
        const x = p.random(margin, w - margin);
        const y = p.random(margin, h - margin);
        const speed = 2 + p.random(3);
        const angle = p.random(p.TWO_PI);
        shapes.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          rotation: p.random(p.TWO_PI),
          rotSpeed: p.random(-0.1, 0.1),
          opacity: 1,
          color,
          shapeType,
          size: 12 + p.random(20),
        });
      };

      p.setup = function() {
        const w = cellObj.el.offsetWidth;
        const h = cellObj.el.offsetHeight;
        const canvas = p.createCanvas(w, h);
        canvas.parent(cellObj.el.querySelector('.content'));
        p.noStroke();
      };

      p.draw = function() {
        p.clear();
        const w = p.width;
        const h = p.height;
        const margin = 8;
        for (let i = shapes.length - 1; i >= 0; i--) {
          const s = shapes[i];
          if (!frozen) {
            s.x += s.vx;
            s.y += s.vy;
            s.vx *= 0.95;
            s.vy *= 0.95;
            s.rotation += s.rotSpeed;
            if (s.x < margin) { s.x = margin; s.vx *= -0.8; }
            if (s.x > w - margin) { s.x = w - margin; s.vx *= -0.8; }
            if (s.y < margin) { s.y = margin; s.vy *= -0.8; }
            if (s.y > h - margin) { s.y = h - margin; s.vy *= -0.8; }
            s.opacity -= 0.015;
          }
          if (s.opacity <= 0) {
            shapes.splice(i, 1);
            continue;
          }
          p.push();
          p.translate(s.x, s.y);
          p.rotate(s.rotation);
          p.fill(s.color);
          p.drawingContext.globalAlpha = s.opacity;
          const sz = s.size;
          if (s.shapeType === 'circle') {
            p.ellipse(0, 0, sz, sz);
          } else if (s.shapeType === 'triangle') {
            p.triangle(0, -sz/2, -sz/2, sz/2, sz/2, sz/2);
          } else if (s.shapeType === 'square') {
            p.rectMode(p.CENTER);
            p.rect(0, 0, sz, sz, 4);
          } else if (s.shapeType === 'pentagon') {
            p.beginShape();
            for (let a = 0; a < 5; a++) {
              const ang = (p.TWO_PI / 5) * a - p.HALF_PI;
              p.vertex(Math.cos(ang) * sz/2, Math.sin(ang) * sz/2);
            }
            p.endShape(p.CLOSE);
          } else if (s.shapeType === 'hexagon') {
            p.beginShape();
            for (let a = 0; a < 6; a++) {
              const ang = (p.TWO_PI / 6) * a;
              p.vertex(Math.cos(ang) * sz/2, Math.sin(ang) * sz/2);
            }
            p.endShape(p.CLOSE);
          }
          p.pop();
        }
        p.drawingContext.globalAlpha = 1;
      };

      p.windowResized = function() {
        const w = cellObj.el.offsetWidth;
        const h = cellObj.el.offsetHeight;
        p.resizeCanvas(w, h);
      };
    };
  }

  // --- Build grid ---
  function createBentoGrid() {
    const grid = document.getElementById('grid');
    LETTERS.forEach((letter, idx) => {
      const el = document.createElement('div');
      el.className = 'cell';
      el.dataset.letter = letter;
      const letterEl = document.createElement('div');
      letterEl.className = 'letter';
      letterEl.textContent = letter;
      const badgeEl = document.createElement('div');
      badgeEl.className = 'badge';
      badgeEl.textContent = '—';
      const contentEl = document.createElement('div');
      contentEl.className = 'content';
      el.appendChild(letterEl);
      el.appendChild(badgeEl);
      el.appendChild(contentEl);
      grid.appendChild(el);
      const cellObj = { el, letter, badge: badgeEl, sketch: null, shapes: [] };
      cells.push(cellObj);
      keyMap.set(letter, {
        cell: cellObj,
        color: getKeyColor(letter),
        shapeType: getKeyShape(letter),
      });
      new p5(makeSketch(cellObj));

      // Hover
      el.addEventListener('mouseenter', () => {
        el.style.transform = 'scale(1.02)';
        el.style.boxShadow = '0 8px 24px rgba(0,0,0,0.12)';
        // Optional: play a subtle sound on hover
        initAudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const freq = getKeyFrequency(letter) * 0.5;
        osc.frequency.value = freq;
        osc.type = 'sine';
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.03, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.2);
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = '';
        el.style.boxShadow = '';
      });

      // Click to freeze + copy palette
      el.addEventListener('click', () => {
        const cellObj = keyMap.get(letter).cell;
        cellObj.setFrozen(!cellObj.frozen());
        const color = keyMap.get(letter).color;
        copyToClipboard(color);
        badgeEl.textContent = `replaces ${color}`;
        setTimeout(() => {
          if (badgeEl.textContent === `replaces ${color}`) {
            badgeEl.textContent = '—';
          }
        }, 2000);
      });
    });
  }

  // --- Key interactions ---
  document.addEventListener('keydown', (e) => {
    const key = e.key.toUpperCase();
    if (!keyMap.has(key) || pressedKeys.has(key)) return;
    pressedKeys.add(key);
    const info = keyMap.get(key);
    const cell = info.cell;
    cell.el.classList.add('active');
    const freq = playSound(key);
    const color = info.color;
    const shapeType = info.shapeType;
    cell.spawn(color, shapeType);
    const note = noteName(freq);
    cell.badge.textContent = goldenHour ? `replaces ${note}` : note;
    document.getElementById('nav-pill').textContent = `Last: ${key} · ${note} · ${Math.round(freq)} Hz`;
    document.getElementById('hint').classList.add('hidden');
    resetIdle();
    if (shouldTriggerGoldenHour(key)) {
      triggerGoldenHour();
    }
  });

  document.addEventListener('keyup', (e) => {
    const key = e.key.toUpperCase();
    if (!keyMap.has(key)) return;
    pressedKeys.delete(key);
    const info = keyMap.get(key);
    info.cell.el.classList.remove('active');
  });

  // --- Scroll to retune ---
  let scrollAccum = 0;
  let lastScrollTime = 0;
  document.addEventListener('wheel', (e) => {
    const now = Date.now();
    if (now - lastScrollTime > 50) {
      scrollAccum += e.deltaY;
      if (Math.abs(scrollAccum) > 50) {
        const delta = scrollAccum > 0 ? -2 : 2;
        globalPitchOffset += delta;
        scrollAccum = 0;
        document.getElementById('nav-pill').textContent = `Global offset: ${globalPitchOffset > 0 ? '+' : ''}${globalPitchOffset} semitones`;
      }
      lastScrollTime = now;
    }
  }, { passive: true });

  // --- Idle pulse ---
  startIdlePulse();
  document.addEventListener('mousemove', resetIdle);
  document.addEventListener('keydown', resetIdle);
  document.addEventListener('click', resetIdle);

  // --- Init ---
  createBentoGrid();

  // Resize handler
  window.addEventListener('resize', () => {
    cells.forEach(c => {
      if (c.sketch && c.sketch.windowResized) c.sketch.windowResized();
    });
  });
</script>
</body>
</html>
