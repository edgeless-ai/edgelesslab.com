<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic Subtitle Grid</title>

  <!-- Inter variable font (Google Fonts CDN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       CINEMATIC SUBTITLE GRID
       Palette:
         #0A0A0A — Deep void background
         #121212 — Elevated panel surfaces
         #E0E0E0 — Primary subtitle text
         #FFFFFF — High-emphasis hover states
       LUT produces: #00A7F9, #25CA06, #0606CA,
                     #DA3558, #FFA758, #E7A735
       ============================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0A0A0A;
      color: #E0E0E0;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* Canvas sits behind the text grid for atmospheric haze */
    #haze {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
    }

    /* The grid container holds all cell divs */
    #grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      pointer-events: none;
    }

    /* Each cell is a flex-centered div updated via CSS custom properties.
       Using inline-style CSS variables avoids reflow and keeps 60fps. */
    .cell {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: var(--cell-size, 14px);
      font-weight: var(--cell-weight, 400);
      color: var(--cell-color, #E0E0E0);
      width: var(--cell-width, 2.5vw);
      height: var(--cell-height, 5vh);
      /* Transform is animated via JS for exact interpolation control */
      transform: translate3d(var(--cell-x, 0px), var(--cell-y, 0px), 0);
      will-change: transform, color, font-weight;
      user-select: none;
      overflow: hidden;
      white-space: pre;
      line-height: 1;
    }

    /* Cinematic cells get a subtle glow at high weights */
    .cell.cinematic {
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }

    /* UI Controls */
    #toggle-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10;
      background: #121212;
      border: 1px solid #333;
      color: #E0E0E0;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 10px 18px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
      pointer-events: auto;
    }

    #toggle-btn:hover {
      background: #1a1a1a;
      border-color: #555;
      color: #FFFFFF;
    }

    #info {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 10;
      color: #666;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.03em;
      pointer-events: none;
    }

    /* Mode label overlay */
    #mode-label {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- Atmospheric haze canvas -->
  <canvas id="haze"></canvas>

  <!-- Text grid container -->
  <div id="grid"></div>

  <!-- UI overlay -->
  <div id="mode-label">Grid Mode</div>
  <button id="toggle-btn">Toggle Mode</button>
  <div id="info">Press [Space] to toggle · Move mouse for ripple</div>

  <script>
    /* ============================================
       CINEMATIC SUBTITLE GRID — JS
       ============================================ */

    // --- Configuration --------------------------------
    const CONFIG = {
      COLS: 40,
      ROWS: 20,
      PARTICLE_COUNT: 120,
      MOUSE_RADIUS: 500,
      TRANSITION_DURATION: 1500,
      CINEMATIC_FONT_SIZE: 150,
      PALETTE_SIZE: 64,
      // Inigo Quilez cosine palette parameters (exact from Letterfield)
      PALETTE_A: { r: 0.5, g: 0.5, b: 0.5 },
      PALETTE_B: { r: 0.5, g: 0.5, b: 0.5 },
      PALETTE_C: { r: 1.0, g: 1.0, b: 1.0 },
      PALETTE_D: { r: 0.3, g: 0.1, b: 0.67 },
      PALETTE_SCALE: 0.5,
      PALETTE_OFFSET: 1.2,
    };

    // --- Found text phrases (overheard dialogue) ------
    const PHRASES = [
      "He said he'd call back",
      "The train is always late",
      "Do you want fries with that",
      "I left the keys on the table",
      "Nothing ever changes here",
      "Please hold the line",
      "It was raining all morning",
      "She forgot to buy milk",
      "The coffee is too hot",
      "Meet me at the corner"
    ];

    // --- DOM refs -------------------------------------
    const gridEl = document.getElementById('grid');
    const canvas = document.getElementById('haze');
    const ctx = canvas.getContext('2d');
    const toggleBtn = document.getElementById('toggle-btn');
    const modeLabel = document.getElementById('mode-label');

    // --- State ----------------------------------------
    let mode = 'grid';                 // 'grid' | 'cinematic'
    let activePhraseIndex = 0;         // Which phrase is shown in cinematic mode
    let transitionStart = 0;           // timestamp when transition began
    let transitionFrom = null;         // mode we transitioned from
    let isTransitioning = false;       // flag during interpolation
    let lastTime = 0;
    let mouse = { x: -9999, y: -9999, active: false };
    let particles = [];
    let cells = [];                    // Array of cell objects
    let weightLUT = [];                // 64-step weight LUT
    let colorLUT = [];                 // 64-step color LUT
    let gridCellW = 0;                 // Computed grid cell width (px)
    let gridCellH = 0;                 // Computed grid cell height (px)
    let gridFontSize = 14;             // Computed font size for grid
    let cinematicCellW = 0;            // Computed cinematic cell width (px)
    let cinematicCellH = 0;            // Computed cinematic cell height (px)

    // ============================================
    // 1. LUT PRE-COMPUTATION
    // ============================================

    /**
     * Inigo Quilez cosine palette.
     * Formula: color = a + b * cos(2π * (c * t + d))
     */
    function cosinePalette(t, a, b, c, d) {
      const twopi = 2 * Math.PI;
      const r = a.r + b.r * Math.cos(twopi * (c.r * t + d.r));
      const g = a.g + b.g * Math.cos(twopi * (c.g * t + d.g));
      const bl = a.b + b.b * Math.cos(twopi * (c.b * t + d.b));
      return {
        r: Math.max(0, Math.min(255, Math.round(r * 255))),
        g: Math.max(0, Math.min(255, Math.round(g * 255))),
        b: Math.max(0, Math.min(255, Math.round(bl * 255)))
      };
    }

    function buildLUTs() {
      const n = CONFIG.PALETTE_SIZE;
      weightLUT = new Array(n);
      colorLUT = new Array(n);

      for (let i = 0; i < n; i++) {
        const t = i / (n - 1);
        // Weight: Inter wght 100 → 900
        weightLUT[i] = 100 + t * 800;

        // Color: map t through scale/offset, then cosine palette
        const tMapped = t * CONFIG.PALETTE_SCALE + CONFIG.PALETTE_OFFSET;
        colorLUT[i] = cosinePalette(
          tMapped,
          CONFIG.PALETTE_A,
          CONFIG.PALETTE_B,
          CONFIG.PALETTE_C,
          CONFIG.PALETTE_D
        );
      }
    }

    // ============================================
    // 2. CANVAS TEXT METRICS (offscreen)
    // ============================================

    /**
     * Uses an offscreen canvas with document.fonts.ready,
     * measureText(), and getImageData() to compute the exact
     * bounding box of a rendered character at a given font size.
     * Returns { width, height, ascent, descent } to size cells exactly.
     */
    async function measureCharacterBoundingBox(fontSize, char) {
      await document.fonts.ready;

      const offscreen = document.createElement('canvas');
      const offCtx = offscreen.getContext('2d');
      offCtx.font = `${fontSize}px Inter`;

      const metrics = offCtx.measureText(char);
      const textWidth = metrics.width;
      const textHeight = fontSize * 1.5;

      // Size canvas to fit the text with padding
      const pad = 4;
      offscreen.width = Math.ceil(textWidth) + pad * 2;
      offscreen.height = Math.ceil(textHeight) + pad * 2;

      // Re-set font after resize
      offCtx.font = `${fontSize}px Inter`;
      offCtx.fillStyle = 'white';
      offCtx.textBaseline = 'alphabetic';
      offCtx.fillText(char, pad, pad + fontSize);

      const imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
      const data = imageData.data;

      let minX = offscreen.width;
      let minY = offscreen.height;
      let maxX = 0;
      let maxY = 0;
      let found = false;

      for (let y = 0; y < offscreen.height; y++) {
        for (let x = 0; x < offscreen.width; x++) {
          const idx = (y * offscreen.width + x) * 4;
          if (data[idx + 3] > 0) {
            found = true;
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }
        }
      }

      if (!found) {
        // Empty character (space) — return font metrics
        return {
          width: textWidth,
          height: fontSize,
          ascent: metrics.actualBoundingBoxAscent || fontSize * 0.75,
          descent: metrics.actualBoundingBoxDescent || fontSize * 0.25
        };
      }

      return {
        width: maxX - minX + 1,
        height: maxY - minY + 1,
        ascent: metrics.actualBoundingBoxAscent || fontSize * 0.75,
        descent: metrics.actualBoundingBoxDescent || fontSize * 0.25
      };
    }

    /**
     * Compute the optimal font size for grid cells so that the
     * widest character ('M') fits within the allotted cell dimensions.
     */
    async function computeGridMetrics() {
      gridCellW = window.innerWidth / CONFIG.COLS;
      gridCellH = window.innerHeight / CONFIG.ROWS;

      // Binary search for font size that fits 'M' into the cell
      let low = 8;
      let high = 120;
      let best = 14;

      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        const bbox = await measureCharacterBoundingBox(mid, 'M');
        if (bbox.width <= gridCellW * 0.9 && bbox.height <= gridCellH * 0.9) {
          best = mid;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      }
      gridFontSize = best;
    }

    async function computeCinematicMetrics() {
      const bbox = await measureCharacterBoundingBox(CONFIG.CINEMATIC_FONT_SIZE, 'M');
      cinematicCellW = bbox.width;
      cinematicCellH = bbox.height;
    }

    // ============================================
    // 3. PARTICLE HAZE (Canvas background)
    // ============================================

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.15;
        this.vy = (Math.random() - 0.5) * 0.15;
        this.size = Math.random() * 1.2 + 0.3;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }
      draw(ctx) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = [];
      for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }
    }

    function drawHaze() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        p.update();
        p.draw(ctx);
      }
    }

    // ============================================
    // 4. DOM GRID CREATION
    // ============================================

    /**
     * Create one <div> per grid cell. The grid is 40×20.
     * Characters are populated from PHRASES row by row.
     * Unused cells are filled with spaces.
     */
    function createGrid() {
      gridEl.innerHTML = '';
      cells = [];

      const totalCells = CONFIG.COLS * CONFIG.ROWS;
      let phraseCharIndex = 0;
      let row = 0;
      let col = 0;
      let phraseIndex = 0;
      let charInPhrase = 0;

      for (let i = 0; i < totalCells; i++) {
        row = Math.floor(i / CONFIG.COLS);
        col = i % CONFIG.COLS;

        // Determine which phrase this row belongs to
        const phraseRow = row; // one phrase per row
        let char = ' ';
        let belongsToPhrase = -1;

        if (phraseRow < PHRASES.length) {
          const phrase = PHRASES[phraseRow];
          if (col < phrase.length) {
            char = phrase[col];
            belongsToPhrase = phraseRow;
          }
        }

        const el = document.createElement('div');
        el.className = 'cell';
        el.textContent = char;
        gridEl.appendChild(el);

        cells.push({
          index: i,
          row,
          col,
          char,
          belongsToPhrase,
          el,
          // Target positions (computed each frame)
          gridX: 0,
          gridY: 0,
          cinX: 0,
          cinY: 0,
          gridSize: 14,
          cinSize: CONFIG.CINEMATIC_FONT_SIZE,
          // Visibility
          visible: char !== ' '
        });
      }
    }

    // ============================================
    // 5. POSITION COMPUTATION
    // ============================================

    function updateGridPositions() {
      const cellW = window.innerWidth / CONFIG.COLS;
      const cellH = window.innerHeight / CONFIG.ROWS;
      gridCellW = cellW;
      gridCellH = cellH;

      for (const cell of cells) {
        cell.gridX = cell.col * cellW;
        cell.gridY = cell.row * cellH;
        cell.gridSize = gridFontSize;
      }
    }

    function updateCinematicPositions() {
      const phrase = PHRASES[activePhraseIndex];
      const phraseLen = phrase.length;
      const cellW = Math.max(cinematicCellW, window.innerWidth / CONFIG.COLS);
      const cellH = Math.max(cinematicCellH, window.innerHeight / CONFIG.ROWS);
      const totalWidth = phraseLen * cellW;
      const startX = (window.innerWidth - totalWidth) / 2;
      const startY = (window.innerHeight - cellH) / 2;

      for (const cell of cells) {
        if (cell.belongsToPhrase === activePhraseIndex) {
          const phraseCol = cell.col;
          cell.cinX = startX + phraseCol * cellW;
          cell.cinY = startY;
          cell.cinSize = CONFIG.CINEMATIC_FONT_SIZE;
        } else {
          // Non-active cells drift off-screen or collapse to center
          cell.cinX = window.innerWidth / 2;
          cell.cinY = window.innerHeight / 2;
          cell.cinSize = 0;
        }
      }
    }

    // ============================================
    // 6. SMOOTHSTEP & TRANSITIONS
    // ============================================

    function smoothstep(t) {
      // t²(3 − 2t), clamped to [0, 1]
      t = Math.max(0, Math.min(1, t));
      return t * t * (3 - 2 * t);
    }

    function startTransition(toMode) {
      if (isTransitioning && toMode === mode) return;
      transitionFrom = mode;
      mode = toMode;
      isTransitioning = true;
      transitionStart = performance.now();
      modeLabel.textContent = mode === 'grid' ? 'Grid Mode' : 'Cinematic Mode';

      // If entering cinematic mode, pick a random phrase
      if (mode === 'cinematic') {
        activePhraseIndex = Math.floor(Math.random() * PHRASES.length);
        updateCinematicPositions();
      }

      // Recompute grid positions in case of resize
      updateGridPositions();
    }

    function toggleMode() {
      const next = mode === 'grid' ? 'cinematic' : 'grid';
      startTransition(next);
    }

    // ============================================
    // 7. ANIMATION LOOP (60fps)
    // ============================================

    function updateCells(time) {
      // Compute transition progress
      let t = 0;
      if (isTransitioning) {
        const elapsed = performance.now() - transitionStart;
        t = smoothstep(elapsed / CONFIG.TRANSITION_DURATION);
        if (elapsed >= CONFIG.TRANSITION_DURATION) {
          isTransitioning = false;
          t = 1;
        }
      }

      // Interpolation factor: 0 = fully transitionFrom, 1 = fully mode
      // If not transitioning, t is 0 or 1 depending on mode.
      const isGrid = mode === 'grid';
      const gridFactor = isGrid ? (isTransitioning ? (transitionFrom === 'grid' ? 1 - t : t) : 1) : (isTransitioning ? (transitionFrom === 'grid' ? 1 - t : 0) : 0);
      const cinFactor = 1 - gridFactor;

      // For grid factor, when in grid mode we want gridFactor=1.
      // When transitioning from grid->cinematic: gridFactor goes 1->0.
      // When transitioning from cinematic->grid: gridFactor goes 0->1.

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      for (const cell of cells) {
        // Determine target position and size based on current mode blend
        let targetX, targetY, targetSize, targetOpacity, targetClass;

        if (gridFactor > 0) {
          // Grid influence
          targetX = cell.gridX;
          targetY = cell.gridY;
          targetSize = cell.gridSize;
          targetOpacity = cell.visible ? 1 : 0;
          targetClass = '';
        }

        if (cinFactor > 0) {
          // Cinematic influence
          const cinX = cell.cinX;
          const cinY = cell.cinY;
          const cinSize = cell.cinSize;
          const cinOp = cell.belongsToPhrase === activePhraseIndex ? 1 : 0;
          const cinClass = cell.belongsToPhrase === activePhraseIndex ? 'cinematic' : '';

          if (gridFactor > 0) {
            // Blend
            targetX = targetX * gridFactor + cinX * cinFactor;
            targetY = targetY * gridFactor + cinY * cinFactor;
            targetSize = targetSize * gridFactor + cinSize * cinFactor;
            targetOpacity = targetOpacity * gridFactor + cinOp * cinFactor;
            targetClass = cinFactor > 0.5 ? cinClass : '';
          } else {
            targetX = cinX;
            targetY = cinY;
            targetSize = cinSize;
            targetOpacity = cinOp;
            targetClass = cinClass;
          }
        }

        // Hide non-visible space cells when fully in grid
        if (gridFactor > 0.99 && !cell.visible) {
          targetOpacity = 0;
        }

        // Compute LUT index from wave
        const wave = Math.sin(time * 1.2 + cell.col * 0.25 + cell.row * 0.35);
        let lutIndex = Math.floor((wave * 0.5 + 0.5) * (CONFIG.PALETTE_SIZE - 1));
        lutIndex = Math.max(0, Math.min(CONFIG.PALETTE_SIZE - 1, lutIndex));

        // Mouse proximity ripple (Grid mode only)
        if (gridFactor > 0.5 && mouse.active) {
          // Cell screen center
          const cellCX = targetX + (cell.el.offsetWidth || gridCellW) / 2;
          const cellCY = targetY + (cell.el.offsetHeight || gridCellH) / 2;
          const dx = cellCX - mouse.x;
          const dy = cellCY - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONFIG.MOUSE_RADIUS) {
            const ripple = (1 - dist / CONFIG.MOUSE_RADIUS) * 20;
            lutIndex = Math.min(CONFIG.PALETTE_SIZE - 1, Math.floor(lutIndex + ripple));
          }
        }

        const color = colorLUT[lutIndex];
        const weight = weightLUT[lutIndex];

        // Apply styles via CSS custom properties (no reflow)
        const el = cell.el;
        el.style.setProperty('--cell-x', `${targetX}px`);
        el.style.setProperty('--cell-y', `${targetY}px`);
        el.style.setProperty('--cell-size', `${targetSize}px`);
        el.style.setProperty('--cell-width', `${gridFactor > 0.5 ? gridCellW : Math.max(gridCellW, cinematicCellW)}px`);
        el.style.setProperty('--cell-height', `${gridFactor > 0.5 ? gridCellH : Math.max(gridCellH, cinematicCellH)}px`);
        el.style.setProperty('--cell-color', `rgb(${color.r}, ${color.g}, ${color.b})`);
        el.style.setProperty('--cell-weight', weight);
        el.style.opacity = targetOpacity;

        if (targetClass) {
          el.classList.add('cinematic');
        } else {
          el.classList.remove('cinematic');
        }
      }
    }

    function animate(now) {
      const time = now * 0.001;
      drawHaze();
      updateCells(time);
      requestAnimationFrame(animate);
    }

    // ============================================
    // 8. RESIZE HANDLING
    // ============================================

    async function handleResize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      await computeGridMetrics();
      await computeCinematicMetrics();
      updateGridPositions();
      updateCinematicPositions();
    }

    // ============================================
    // 9. EVENT LISTENERS
    // ============================================

    window.addEventListener('resize', () => {
      // Debounce resize
      clearTimeout(window._resizeTimer);
      window._resizeTimer = setTimeout(handleResize, 150);
    });

    document.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });

    document.addEventListener('mouseleave', () => {
      mouse.active = false;
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleMode();
      }
    });

    toggleBtn.addEventListener('click', toggleMode);

    // ============================================
    // 10. INITIALIZATION
    // ============================================

    async function init() {
      buildLUTs();
      initParticles();
      createGrid();
      await computeGridMetrics();
      await computeCinematicMetrics();
      updateGridPositions();
      updateCinematicPositions();
      requestAnimationFrame(animate);
    }

    init();
  </script>
</body>
</html>
