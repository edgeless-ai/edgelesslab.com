<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Silk — Zine-Spread Symmetry Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #canvas-container { width: 100%; height: 100%; }
  #ui {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.6);
    pointer-events: none; text-align: center; letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui">SCROLL to change spread · DRAG to draw · CLICK to cycle brush</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const PALETTE = {
  electricBlue: '#0066FF',
  brightRed: '#FF0000',
  mustardYellow: '#FFD700',
  deepBlack: '#000000',
  warmOffWhite: '#F5F5F0',
  cleanWhite: '#FFFFFF'
};

const SPREADS = [
  { bg: PALETTE.electricBlue, headline: 'DESIGN', align: 'left', x: 0.05, y: 0.55, textColor: PALETTE.cleanWhite },
  { bg: PALETTE.brightRed, headline: 'MOTION', align: 'right', x: 0.95, y: 0.55, textColor: PALETTE.warmOffWhite },
  { bg: PALETTE.mustardYellow, headline: 'CODE', align: 'center', x: 0.5, y: 0.35, textColor: PALETTE.deepBlack }
];

const BRUSH_COLORS = [PALETTE.cleanWhite, PALETTE.deepBlack, PALETTE.warmOffWhite];

let currentSection = 0;
let sectionChanged = true;
let brushIndex = 0;
let pmx = 0, pmy = 0;
let brushLayer;
let canvasSize;

function setup() {
  let container = select('#canvas-container');
  canvasSize = { w: container.width, h: container.height };
  let c = createCanvas(canvasSize.w, canvasSize.h);
  c.parent('canvas-container');
  brushLayer = createGraphics(canvasSize.w, canvasSize.h);
  brushLayer.clear();
  textFont('Inter');
  textStyle(BOLD);
  noCursor();
  background(SPREADS[0].bg);
}

function draw() {
  // Section transition: snap background on change
  if (sectionChanged) {
    background(SPREADS[currentSection].bg);
    brushLayer.clear();
    sectionChanged = false;
  } else {
    // Ghost persistence: fade brush layer toward background color
    let c = color(SPREADS[currentSection].bg);
    c.setAlpha(10);
    brushLayer.noStroke();
    brushLayer.fill(c);
    brushLayer.rect(0, 0, width, height);
  }

  // Display brush layer
  image(brushLayer, 0, 0);

  // Draw headline
  drawHeadline();

  // Draw symmetry brush
  if (mouseIsPressed) {
    drawSymmetryBrush();
  }

  // Draw cursor indicator
  noFill();
  stroke(255, 180);
  strokeWeight(1);
  ellipse(mouseX, mouseY, 12, 12);
}

function drawHeadline() {
  let spread = SPREADS[currentSection];
  let ts = min(width, height) * 0.18;
  textSize(ts);
  fill(spread.textColor);

  if (spread.align === 'left') {
    textAlign(LEFT, CENTER);
    text(spread.headline, width * spread.x, height * spread.y);
  } else if (spread.align === 'right') {
    textAlign(RIGHT, CENTER);
    text(spread.headline, width * spread.x, height * spread.y);
  } else {
    textAlign(CENTER, CENTER);
    text(spread.headline, width * spread.x, height * spread.y);
  }
}

function drawSymmetryBrush() {
  let cx = width / 2;
  let cy = height / 2;

  let dx = mouseX - cx;
  let dy = mouseY - cy;
  let d = dist(mouseX, mouseY, cx, cy);
  let a = atan2(dy, dx);

  let pdx = pmx - cx;
  let pdy = pmy - cy;
  let pd = dist(pmx, pmy, cx, cy);
  let pa = atan2(pdy, pdx);

  let col = color(BRUSH_COLORS[brushIndex]);
  col.setAlpha(220);
  brushLayer.stroke(col);
  brushLayer.strokeWeight(2.5);
  brushLayer.strokeCap(ROUND);

  // Mirror strokes across 6 radial axes
  for (let i = 0; i < 6; i++) {
    let axis = i * PI / 6;
    let ra = 2 * axis - a;
    let rpa = 2 * axis - pa;
    let x1 = cx + cos(rpa) * pd;
    let y1 = cy + sin(rpa) * pd;
    let x2 = cx + cos(ra) * d;
    let y2 = cy + sin(ra) * d;
    brushLayer.line(x1, y1, x2, y2);
  }

  pmx = mouseX;
  pmy = mouseY;
}

function mousePressed() {
  pmx = mouseX;
  pmy = mouseY;
}

function mouseClicked() {
  brushIndex = (brushIndex + 1) % BRUSH_COLORS.length;
}

function mouseWheel(event) {
  if (event.deltaY > 0) {
    currentSection = min(currentSection + 1, SPREADS.length - 1);
  } else {
    currentSection = max(currentSection - 1, 0);
  }
  sectionChanged = true;
  return false;
}

function windowResized() {
  let container = select('#canvas-container');
  resizeCanvas(container.width, container.height);
  brushLayer = createGraphics(width, height);
  sectionChanged = true;
}

function keyPressed() {
  if (key === 'c' || key === 'C') {
    brushIndex = (brushIndex + 1) % BRUSH_COLORS.length;
  }
  if (key === ' ') {
    sectionChanged = true;
  }
}
</script>
</body>
</html>
