<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Feedback Stage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: auto; }
  body {
    margin: 0;
    background: #000000;
    overflow-x: hidden;
    font-family: 'Helvetica Neue', 'Inter', sans-serif;
  }
  /* Skip link for accessibility */
  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: #F5F5F0;
    color: #1A1A1A;
    padding: 8px 16px;
    z-index: 100;
    text-decoration: none;
    font-size: 14px;
    border-radius: 4px;
  }
  .skip-link:focus { top: 8px; left: 8px; }

  #displayCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  #scrollContainer {
    height: 600vh;
    position: relative;
    z-index: 1;
  }

  .block-wrapper {
    height: 120vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .text-block {
    position: sticky;
    top: 35vh;
    width: 420px;
    max-width: 90vw;
    padding: 32px;
    background: #F5F5F0;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    color: #1A1A1A;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    line-height: 1.5;
    opacity: 0;
    transform: translateY(40px);
    will-change: transform, opacity, border;
    border: 2px solid transparent;
    transition: opacity 0.3s ease, border 0.1s ease;
  }

  .text-block h2 {
    font-size: 0.75em;
    color: #899090;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .meta {
    position: fixed;
    bottom: 12px;
    left: 12px;
    z-index: 2;
    color: #899090;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    opacity: 0.7;
    background: rgba(0,0,0,0.5);
    padding: 4px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>
<a href="#scrollContainer" class="skip-link">Skip to content</a>
<canvas id="displayCanvas" aria-label="Elastic feedback stage"></canvas>
<div id="scrollContainer">
  <div class="block-wrapper">
    <div class="text-block" data-index="0">
      <h2>01 — The Loop</h2>
      The stage is a loop.
    </div>
  </div>
  <div class="block-wrapper">
    <div class="text-block" data-index="1">
      <h2>02 — Memory</h2>
      Every frame remembers the last.
    </div>
  </div>
  <div class="block-wrapper">
    <div class="text-block" data-index="2">
      <h2>03 — Scratch</h2>
      Scroll to scratch the memory.
    </div>
  </div>
  <div class="block-wrapper">
    <div class="text-block" data-index="3">
      <h2>04 — Spring</h2>
      The text arrives with a spring.
    </div>
  </div>
  <div class="block-wrapper">
    <div class="text-block" data-index="4">
      <h2>05 — Tension</h2>
      Brightness controls the tension.
    </div>
  </div>
</div>
<div class="meta" id="meta">tension: 0.080 | brightness: 0.00 | scratch: 0.0</div>

<script>
(function() {
  'use strict';

  // =====================
  // 1. Setup & Canvases
  // =====================
  const displayCanvas = document.getElementById('displayCanvas');
  const displayCtx = displayCanvas.getContext('2d', { alpha: false });

  // Offscreen feedback canvas (1024×1024)
  const feedbackCanvas = document.createElement('canvas');
  feedbackCanvas.width = 1024;
  feedbackCanvas.height = 1024;
  const feedbackCtx = feedbackCanvas.getContext('2d');
  feedbackCtx.fillStyle = '#000000';
  feedbackCtx.fillRect(0, 0, 1024, 1024);

  // Small canvas for brightness sampling
  const sampleCanvas = document.createElement('canvas');
  sampleCanvas.width = 16;
  sampleCanvas.height = 16;
  const sampleCtx = sampleCanvas.getContext('2d');

  // =====================
  // 2. State
  // =====================
  let scrollY = 0;
  let lastScrollY = 0;
  let scratchOffset = 0;
  let brightness = 0;
  let brightnessSampleTimer = 0;
  let mouseX = 0.5;
  let mouseY = 0.5;
  let frameCount = 0;

  // Seeded-ish random for stability
  let seed = 12345;
  function random() {
    seed = (seed * 16807 + 0) % 2147483647;
    return (seed - 1) / 2147483646;
  }
  function randomRange(min, max) {
    return min + random() * (max - min);
  }

  // =====================
  // 3. Text Blocks (Elastic Physics)
  // =====================
  const blockEls = document.querySelectorAll('.text-block');
  const blocks = Array.from(blockEls).map((el, i) => ({
    el: el,
    index: i,
    targetY: 0,
    currentY: 40,
    velocity: 0,
    tension: 0.08,
    damping: 0.85,
    visible: false,
    opacity: 0,
  }));

  // =====================
  // 4. Resize
  // =====================
  function onWindowResize() {
    displayCanvas.width = window.innerWidth;
    displayCanvas.height = window.innerHeight;
  }
  onWindowResize();
  window.addEventListener('resize', onWindowResize);

  // =====================
  // 5. Scroll & Mouse
  // =====================
  window.addEventListener('scroll', () => {
    scrollY = window.scrollY || window.pageYOffset;
  }, { passive: true });

  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
  }, { passive: true });

  // =====================
  // 6. Feedback Loop
  // =====================
  function animateFeedback() {
    const t = performance.now() / 1000;
    frameCount++;

    // --- 6a. Scroll scratch ---
    const delta = Math.abs(scrollY - lastScrollY);
    scratchOffset += delta * 0.5;
    scratchOffset *= 0.9;
    lastScrollY = scrollY;

    // --- 6b. Feedback transform ---
    const baseScale = 0.998 + Math.sin(t * 0.2) * 0.001;
    const baseRotation = 0.002 + Math.sin(t * 0.3) * 0.001;
    const scale = baseScale + randomRange(-0.001, 0.001) * scratchOffset;
    const rotation = baseRotation + randomRange(-0.01, 0.01) * scratchOffset;

    // --- 6c. Draw previous frame back onto itself ---
    feedbackCtx.save();
    feedbackCtx.globalAlpha = 0.92;
    feedbackCtx.translate(512, 512);
    feedbackCtx.rotate(rotation);
    feedbackCtx.scale(scale, scale);
    feedbackCtx.translate(-512, -512);
    feedbackCtx.drawImage(feedbackCanvas, 0, 0);
    feedbackCtx.restore();

    // --- 6d. Draw new geometric pattern ---
    feedbackCtx.save();
    const gridSize = 8;
    const cellSize = 1024 / gridSize;
    const mouseOffsetX = (mouseX - 0.5) * 200;
    const mouseOffsetY = (mouseY - 0.5) * 200;

    for (let gx = 0; gx < gridSize; gx++) {
      for (let gy = 0; gy < gridSize; gy++) {
        const cx = gx * cellSize + cellSize / 2 + mouseOffsetX;
        const cy = gy * cellSize + cellSize / 2 + mouseOffsetY;
        const offsetX = Math.sin(t + gx * 0.5) * cellSize * 0.3;
        const offsetY = Math.cos(t + gy * 0.5) * cellSize * 0.3;
        const size = Math.abs(Math.sin(t * 2 + gx + gy)) * cellSize * 0.4;

        feedbackCtx.fillStyle = (gx + gy) % 2 === 0 ? '#FF0055' : '#00FFAA';
        feedbackCtx.globalAlpha = Math.min(0.3 + scratchOffset * 0.01, 0.9);
        feedbackCtx.beginPath();
        feedbackCtx.rect(
          cx + offsetX - size / 2,
          cy + offsetY - size / 2,
          size,
          size
        );
        feedbackCtx.fill();

        // Occasional glitch flash
        if (random() < 0.005 + scratchOffset * 0.001) {
          feedbackCtx.fillStyle = '#FFDD00';
          feedbackCtx.globalAlpha = 0.6;
          feedbackCtx.beginPath();
          feedbackCtx.rect(
            cx + offsetX - size * 0.6,
            cy + offsetY - size * 0.6,
            size * 1.2,
            size * 1.2
          );
          feedbackCtx.fill();
        }
      }
    }
    feedbackCtx.restore();

    // --- 6e. Brightness sampling (every 10 frames) ---
    brightnessSampleTimer += 1;
    if (brightnessSampleTimer >= 10) {
      brightnessSampleTimer = 0;
      sampleCtx.drawImage(feedbackCanvas, 0, 0, 16, 16);
      const data = sampleCtx.getImageData(0, 0, 16, 16).data;
      let total = 0;
      for (let i = 0; i < data.length; i += 4) {
        total += (data[i] + data[i + 1] + data[i + 2]) / 3;
      }
      brightness = (total / (16 * 16)) / 255;
    }

    // --- 6f. Draw to display with chromatic split ---
    displayCtx.fillStyle = '#000000';
    displayCtx.fillRect(0, 0, displayCanvas.width, displayCanvas.height);

    // Red channel (offset left)
    displayCtx.globalCompositeOperation = 'screen';
    displayCtx.drawImage(
      feedbackCanvas,
      -2, 0,
      displayCanvas.width, displayCanvas.height
    );
    // Green channel (center)
    displayCtx.drawImage(
      feedbackCanvas,
      0, 0,
      displayCanvas.width, displayCanvas.height
    );
    // Blue channel (offset right)
    displayCtx.drawImage(
      feedbackCanvas,
      2, 0,
      displayCanvas.width, displayCanvas.height
    );
    displayCtx.globalCompositeOperation = 'source-over';

    // --- 6g. Scratch lines ---
    if (scratchOffset > 5) {
      displayCtx.strokeStyle = '#FFFFFF';
      displayCtx.lineWidth = 1;
      displayCtx.globalAlpha = Math.min(scratchOffset / 20, 0.5);
      const numLines = Math.floor(scratchOffset / 3);
      for (let i = 0; i < numLines; i++) {
        const y = random() * displayCanvas.height;
        displayCtx.beginPath();
        displayCtx.moveTo(0, y);
        displayCtx.lineTo(
          displayCanvas.width,
          y + randomRange(-20, 20)
        );
        displayCtx.stroke();
      }
      displayCtx.globalAlpha = 1;
    }

    // --- 6h. Update meta ---
    const dynamicTension = 0.05 + brightness * 0.08;
    const meta = document.getElementById('meta');
    if (meta && frameCount % 3 === 0) {
      meta.textContent =
        `tension: ${dynamicTension.toFixed(3)} | ` +
        `brightness: ${brightness.toFixed(2)} | ` +
        `scratch: ${scratchOffset.toFixed(1)}`;
    }

    requestAnimationFrame(animateFeedback);
  }

  // =====================
  // 7. Elastic Block Animation
  // =====================
  function animateBlocks() {
    const dynamicTension = 0.05 + brightness * 0.08;

    for (let i = 0; i < blocks.length; i++) {
      const block = blocks[i];
      const rect = block.el.getBoundingClientRect();
      const blockTop = rect.top;

      // Visibility threshold
      const inViewport = blockTop < window.innerHeight * 0.6 && blockTop > -rect.height;
      if (inViewport) {
        if (!block.visible) {
          block.visible = true;
          block.el.style.opacity = '1';
        }
      } else {
        if (block.visible) {
          block.visible = false;
          block.el.style.opacity = '0';
          // Reset physics when leaving so it springs back in next time
          block.currentY = 40;
          block.velocity = 0;
          block.el.style.transform = 'translateY(40px)';
          block.el.style.border = '2px solid transparent';
          continue;
        }
      }

      if (block.visible) {
        // Elastic physics
        const force = (block.targetY - block.currentY) * dynamicTension;
        block.velocity += force;
        block.velocity *= block.damping;
        block.currentY += block.velocity;

        // Overshoot flash border
        if (Math.abs(block.velocity) > 2) {
          block.el.style.border = '2px solid #cdfd50';
        } else {
          block.el.style.border = '2px solid transparent';
        }

        block.el.style.transform = `translateY(${block.currentY}px)`;
      }
    }

    requestAnimationFrame(animateBlocks);
  }

  // =====================
  // 8. Kickoff
  // =====================
  requestAnimationFrame(animateFeedback);
  requestAnimationFrame(animateBlocks);
})();
</script>
</body>
</html>
