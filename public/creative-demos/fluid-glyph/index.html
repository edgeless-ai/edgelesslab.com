<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid Glyph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@0..15,300..1000,0..1,0..1,0..1&display=swap" rel="stylesheet">

<style>
/* ===== @property registrations for smooth axis interpolation ===== */
@property --fluid-wght {
  syntax: '<number>';
  inherits: true;
  initial-value: 500;
}
@property --fluid-slnt {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}
@property --fluid-casl {
  syntax: '<number>';
  inherits: true;
  initial-value: 0.5;
}
@property --fluid-crsv {
  syntax: '<number>';
  inherits: true;
  initial-value: 0.5;
}
@property --fluid-mono {
  syntax: '<number>';
  inherits: true;
  initial-value: 0.5;
}
@property --fluid-activity {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0e1a;
  font-family: 'Recursive', monospace;
  color: #e0e8f0;
}

/* ===== Fluid Canvas ===== */
#fluid-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  image-rendering: pixelated;
  z-index: 0;
}

/* ===== Glyph Text Overlay ===== */
#glyph-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  anchor-name: --glyph;
}

#glyph {
  font-family: 'Recursive', monospace;
  font-size: clamp(4rem, 15vw, 12rem);
  font-weight: 300;
  font-variation-settings:
    'wght' var(--fluid-wght),
    'slnt' var(--fluid-slnt),
    'CASL' var(--fluid-casl),
    'CRSV' var(--fluid-crsv),
    'MONO' var(--fluid-mono);
  color: rgba(220, 235, 255, 0.85);
  text-shadow:
    0 0 40px rgba(100, 180, 255, 0.15),
    0 0 80px rgba(100, 180, 255, 0.08);
  letter-spacing: 0.05em;
  user-select: none;
  transition:
    --fluid-wght 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
    --fluid-slnt 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
    --fluid-casl 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
    --fluid-crsv 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
    --fluid-mono 0.20s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ===== Interaction Hint ===== */
#hint {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Recursive', monospace;
  font-size: 0.85rem;
  opacity: 0.4;
  color: #8899bb;
  z-index: 2;
  pointer-events: none;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-variation-settings: 'wght' 400, 'slnt' 0, 'CASL' 0, 'CRSV' 0, 'MONO' 1;
  transition: opacity 1.5s ease;
}
#hint.fade { opacity: 0; }

/* ===== Axis Labels (CSS Anchor Positioning) ===== */
#labels {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 3;
  pointer-events: none;
  font-size: 0.75rem;
  font-family: 'Recursive', monospace;
  letter-spacing: 0.02em;
}

.label {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: rgba(10, 14, 26, 0.65);
  border: 1px solid rgba(100, 180, 255, 0.15);
  border-radius: 4px;
  backdrop-filter: blur(4px);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.labels-visible .label { opacity: 1; }

.label .axis-name {
  color: #8899bb;
  font-variation-settings: 'wght' 600;
  font-size: 0.65rem;
  text-transform: uppercase;
}
.label .axis-value {
  color: #a0d0ff;
  font-variation-settings: 'wght' 700;
  font-size: 0.7rem;
  min-width: 2.2em;
  text-align: right;
}

/* Anchor positioning (modern browsers) */
@supports (anchor-name: --foo) {
  .label-wght {
    position-anchor: --glyph;
    top: calc(anchor(top) + 8px);
    left: calc(anchor(right) + 12px);
  }
  .label-slnt {
    position-anchor: --glyph;
    top: calc(anchor(top) + 8px);
    right: calc(anchor(left) + 12px);
    left: auto;
  }
  .label-casl {
    position-anchor: --glyph;
    bottom: calc(anchor(bottom) + 8px);
    left: calc(anchor(right) + 12px);
    top: auto;
  }
  .label-crsv {
    position-anchor: --glyph;
    bottom: calc(anchor(bottom) + 8px);
    right: calc(anchor(left) + 12px);
    top: auto;
    left: auto;
  }
  .label-mono {
    position-anchor: --glyph;
    top: anchor(center);
    right: calc(anchor(left) + 12px);
    left: auto;
    transform: translateY(-50%);
  }
  .label-activity {
    position-anchor: --glyph;
    top: anchor(center);
    left: calc(anchor(right) + 12px);
    transform: translateY(-50%);
  }
}

/* Fallback positioning (set by JS) */
.label-fallback {
  /* JS will set top/left/right/bottom directly */
}

/* ===== WebGPU Unavailable — CSS-only ambient animation ===== */
.fallback-mode #glyph {
  animation: fluid-breathe 4s ease-in-out infinite;
}
.fallback-mode .label { opacity: 1; }

@keyframes fluid-breathe {
  0%, 100% {
    font-variation-settings:
      'wght' 500, 'slnt' 0, 'CASL' 0.3, 'CRSV' 0.2, 'MONO' 0.5;
  }
  25% {
    font-variation-settings:
      'wght' 700, 'slnt' 8, 'CASL' 0.7, 'CRSV' 0.6, 'MONO' 0.3;
  }
  50% {
    font-variation-settings:
      'wght' 400, 'slnt' 4, 'CASL' 0.9, 'CRSV' 0.8, 'MONO' 0.7;
  }
  75% {
    font-variation-settings:
      'wght' 800, 'slnt' 12, 'CASL' 0.4, 'CRSV' 0.1, 'MONO' 0.2;
  }
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  #glyph { font-size: clamp(2.5rem, 20vw, 5rem); }
  .label { font-size: 0.6rem; padding: 2px 5px; }
  #hint { font-size: 0.65rem; }
}
</style>
</head>
<body>

<!-- Fluid simulation canvas -->
<canvas id="fluid-canvas" width="256" height="256"></canvas>

<!-- Glyph text overlay -->
<div id="glyph-container">
  <div id="glyph">FLUID</div>
</div>

<!-- Overlay labels for axis values -->
<div id="labels">
  <div class="label label-wght" id="label-wght">
    <span class="axis-name">wght</span>
    <span class="axis-value" id="val-wght">500</span>
  </div>
  <div class="label label-slnt" id="label-slnt">
    <span class="axis-name">slnt</span>
    <span class="axis-value" id="val-slnt">0</span>
  </div>
  <div class="label label-casl" id="label-casl">
    <span class="axis-name">CASL</span>
    <span class="axis-value" id="val-casl">0.50</span>
  </div>
  <div class="label label-crsv" id="label-crsv">
    <span class="axis-name">CRSV</span>
    <span class="axis-value" id="val-crsv">0.50</span>
  </div>
  <div class="label label-mono" id="label-mono">
    <span class="axis-name">MONO</span>
    <span class="axis-value" id="val-mono">0.50</span>
  </div>
  <div class="label label-activity" id="label-activity">
    <span class="axis-name">ACT</span>
    <span class="axis-value" id="val-activity">0.00</span>
  </div>
</div>

<!-- Interaction hint -->
<div id="hint">move · click · drag</div>

<script>
'use strict';

/* ===================================================================
   Fluid Glyph — Full Viewport Interactive Variable Font Fluid Demo
   =================================================================== */

// ─── Constants ───────────────────────────────────────────────────────
const GRID = 256;
const WORKGROUP = 8;
const PRESSURE_ITERS = 12;
const STATS_INTERVAL = 4;  // read GPU stats every N frames

// ─── State ──────────────────────────────────────────────────────────
const state = {
  webgpu: false,
  fallback: false,
  mouse: { x: 0.5, y: 0.5, down: false, vx: 0, vy: 0, px: 0.5, py: 0.5 },
  axes: {
    wght: { current: 500, target: 500 },
    slnt: { current: 0, target: 0 },
    casl: { current: 0.5, target: 0.5 },
    crsv: { current: 0.5, target: 0.5 },
    mono: { current: 0.5, target: 0.5 },
    activity: { current: 0, target: 0 },
  },
  stats: {
    dyeAvg: 0,
    velMag: 0,
    dyeMax: 0,
    velMax: 0,
    smoothDye: 0,
    smoothVel: 0,
  },
  time: 0,
  frame: 0,
};

// ─── DOM refs ────────────────────────────────────────────────────────
const canvas = document.getElementById('fluid-canvas');
const glyphEl = document.getElementById('glyph');
const labelsEl = document.getElementById('labels');
const hintEl = document.getElementById('hint');
const valEls = {
  wght: document.getElementById('val-wght'),
  slnt: document.getElementById('val-slnt'),
  casl: document.getElementById('val-casl'),
  crsv: document.getElementById('val-crsv'),
  mono: document.getElementById('val-mono'),
  activity: document.getElementById('val-activity'),
};

// ─── CSS @property registration (JS fallback for older browsers) ────
(function registerProperties() {
  if (!('CSS' in globalThis) || !CSS.registerProperty) return;
  const props = [
    { name: '--fluid-wght', syntax: '<number>', inherits: true, initialValue: '500' },
    { name: '--fluid-slnt', syntax: '<number>', inherits: true, initialValue: '0' },
    { name: '--fluid-casl', syntax: '<number>', inherits: true, initialValue: '0.5' },
    { name: '--fluid-crsv', syntax: '<number>', inherits: true, initialValue: '0.5' },
    { name: '--fluid-mono', syntax: '<number>', inherits: true, initialValue: '0.5' },
    { name: '--fluid-activity', syntax: '<number>', inherits: true, initialValue: '0' },
  ];
  for (const p of props) {
    if (!CSS.registerProperty) break;
    try { CSS.registerProperty(p); } catch (_) { /* already registered */ }
  }
})();

// ─── CSS variable update helper ─────────────────────────────────────
function setCSSVar(name, value) {
  glyphEl.style.setProperty(name, String(value));
}

function updateDisplayValues() {
  const a = state.axes;
  valEls.wght.textContent = Math.round(a.wght.current);
  valEls.slnt.textContent = Math.round(a.slnt.current);
  valEls.casl.textContent = a.casl.current.toFixed(2);
  valEls.crsv.textContent = a.crsv.current.toFixed(2);
  valEls.mono.textContent = a.mono.current.toFixed(2);
  valEls.activity.textContent = a.activity.current.toFixed(2);
}

function applyAxes() {
  const a = state.axes;
  setCSSVar('--fluid-wght', a.wght.current);
  setCSSVar('--fluid-slnt', a.slnt.current);
  setCSSVar('--fluid-casl', a.casl.current);
  setCSSVar('--fluid-crsv', a.crsv.current);
  setCSSVar('--fluid-mono', a.mono.current);
  setCSSVar('--fluid-activity', a.activity.current);
  updateDisplayValues();
}

// ─── Axis Mapping Bridge ────────────────────────────────────────────
function updateAxesFromStats(stats) {
  const s = state.stats;
  s.dyeAvg = stats[0];
  s.velMag = stats[1];
  s.dyeMax = stats[2];
  s.velMax = stats[3];

  // Smooth
  const lerp = 0.15;
  s.smoothDye += (s.dyeAvg - s.smoothDye) * lerp;
  s.smoothVel += (s.velMag - s.smoothVel) * lerp;

  const m = state.mouse;
  const dist = Math.hypot(m.x - 0.5, m.y - 0.5);
  const speed = Math.hypot(m.vx, m.vy);
  const down = m.down ? 1 : 0;

  const t = state.time;
  const a = state.axes;

  // wght: velocity magnitude + mouse speed + click pressure
  a.wght.target = 300 + 700 * Math.min(1,
    0.3 * s.smoothVel * 8 +
    0.4 * speed * 3 +
    0.3 * down +
    0.1 * Math.sin(t * 0.5) * s.smoothDye
  );

  // slnt: vorticity proxy + mouse speed direction
  a.slnt.target = Math.min(15, Math.max(0,
    5 * s.smoothVel * 4 +
    3 * speed * 2 +
    2 * down +
    1 * Math.sin(t * 0.7 + m.x * 2)
  ));

  // CASL: dye concentration + mouse distance from center
  a.casl.target = Math.min(1, Math.max(0,
    0.2 + 0.6 * s.smoothDye * 3 +
    0.2 * (1 - dist * 1.5) +
    0.1 * down
  ));

  // CRSV: mouse down + activity
  a.crsv.target = Math.min(1, Math.max(0,
    0.1 +
    0.5 * down +
    0.2 * s.smoothDye * 2 +
    0.2 * speed * 2
  ));

  // MONO: flow regularity proxy (activity → less mono/more proportional)
  a.mono.target = Math.min(1, Math.max(0,
    0.7 - 0.5 * s.smoothDye * 2 -
    0.2 * speed * 2 +
    0.1 * Math.sin(t * 0.3)
  ));

  // Activity: overall
  a.activity.target = Math.min(1, Math.max(0,
    0.2 * s.smoothDye * 3 +
    0.3 * s.smoothVel * 5 +
    0.3 * speed * 2 +
    0.2 * down
  ));
}

function updateAxesFromMouse() {
  const m = state.mouse;
  const speed = Math.hypot(m.vx, m.vy);
  const down = m.down ? 1 : 0;
  const t = state.time;
  const a = state.axes;

  // Fallback / complementary mapping from mouse alone
  a.wght.target = 300 + 700 * Math.min(1,
    0.3 * speed * 3 +
    0.5 * down +
    0.2 * (0.5 + 0.5 * Math.sin(t * 0.4))
  );
  a.slnt.target = Math.min(15, Math.max(0,
    5 * speed * 2 +
    3 * down +
    2 * Math.sin(t * 0.6 + 1)
  ));
  a.casl.target = Math.min(1, Math.max(0,
    0.3 + 0.4 * (0.5 + 0.5 * Math.sin(t * 0.5)) +
    0.3 * down
  ));
  a.crsv.target = Math.min(1, Math.max(0,
    0.2 + 0.5 * down + 0.3 * (0.5 + 0.5 * Math.sin(t * 0.7))
  ));
  a.mono.target = Math.min(1, Math.max(0,
    0.6 - 0.3 * down - 0.2 * (0.5 + 0.5 * Math.sin(t * 0.3))
  ));
  a.activity.target = Math.min(1, Math.max(0,
    0.2 + 0.4 * speed * 2 + 0.4 * down
  ));
}

function lerpAxes(dt) {
  const rate = 1 - Math.pow(0.001, dt);
  const a = state.axes;
  for (const key of ['wght', 'slnt', 'casl', 'crsv', 'mono', 'activity']) {
    a[key].current += (a[key].target - a[key].current) * rate * 8 * dt;
  }
  // Clamp
  a.wght.current = Math.max(300, Math.min(1000, a.wght.current));
  a.slnt.current = Math.max(0, Math.min(15, a.slnt.current));
  a.casl.current = Math.max(0, Math.min(1, a.casl.current));
  a.crsv.current = Math.max(0, Math.min(1, a.crsv.current));
  a.mono.current = Math.max(0, Math.min(1, a.mono.current));
  a.activity.current = Math.max(0, Math.min(1, a.activity.current));
}

// ─── Mouse / Pointer Events ─────────────────────────────────────────
function setupMouseEvents() {
  const handlers = {
    onpointermove: (e) => {
      const rect = canvas.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width;
      const ny = (e.clientY - rect.top) / rect.height;
      const m = state.mouse;
      m.vx = (nx - m.x) * 2;
      m.vy = (ny - m.y) * 2;
      m.x = Math.max(0, Math.min(1, nx));
      m.y = Math.max(0, Math.min(1, ny));
      m.px = m.x;
      m.py = m.y;
      // Fade hint
      hintEl.classList.add('fade');
    },
    onpointerdown: (e) => {
      state.mouse.down = true;
      // Inject a burst of dye
      state.mouse._dyeBurst = 1.0;
      hintEl.classList.add('fade');
    },
    onpointerup: () => {
      state.mouse.down = false;
    },
    onpointerleave: () => {
      state.mouse.vx = 0;
      state.mouse.vy = 0;
    },
  };

  // Bind to both canvas and window for full coverage
  const targets = [canvas, document.body];
  for (const t of targets) {
    t.addEventListener('pointermove', handlers.onpointermove);
    t.addEventListener('pointerdown', handlers.onpointerdown);
    t.addEventListener('pointerup', handlers.onpointerup);
    t.addEventListener('pointerleave', handlers.onpointerleave);
  }

  // Touch devices need touch events too
  document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    if (!touch) return;
    const rect = canvas.getBoundingClientRect();
    const nx = (touch.clientX - rect.left) / rect.width;
    const ny = (touch.clientY - rect.top) / rect.height;
    const m = state.mouse;
    m.vx = (nx - m.x) * 2;
    m.vy = (ny - m.y) * 2;
    m.x = Math.max(0, Math.min(1, nx));
    m.y = Math.max(0, Math.min(1, ny));
    m.down = true;
    hintEl.classList.add('fade');
  }, { passive: true });

  document.addEventListener('touchstart', (e) => {
    state.mouse.down = true;
    state.mouse._dyeBurst = 1.0;
    hintEl.classList.add('fade');
  }, { passive: true });

  document.addEventListener('touchend', () => {
    state.mouse.down = false;
    state.mouse.vx = 0;
    state.mouse.vy = 0;
  }, { passive: true });
}

// ─── CSS Anchor Positioning Fallback ────────────────────────────────
function setupAnchorFallback() {
  const hasAnchor = CSS.supports && CSS.supports('anchor-name', '--foo');
  if (hasAnchor) return;

  labelsEl.classList.add('label-fallback');

  function positionLabels() {
    const glyph = document.getElementById('glyph-container');
    const rect = glyph.getBoundingClientRect();
    const labels = document.querySelectorAll('.label');
    const positions = {
      'label-wght': { top: rect.top + 8, left: rect.right + 12 },
      'label-slnt': { top: rect.top + 8, right: window.innerWidth - rect.left + 12 },
      'label-casl': { bottom: window.innerHeight - rect.bottom + 8, left: rect.right + 12 },
      'label-crsv': { bottom: window.innerHeight - rect.bottom + 8, right: window.innerWidth - rect.left + 12 },
      'label-mono': { top: rect.top + rect.height / 2 - 8, right: window.innerWidth - rect.left + 12 },
      'label-activity': { top: rect.top + rect.height / 2 - 8, left: rect.right + 12 },
    };
    for (const label of labels) {
      const pos = positions[label.id];
      if (!pos) continue;
      for (const [key, val] of Object.entries(pos)) {
        label.style[key] = val + 'px';
      }
      label.style.transform = '';
      if (label.id === 'label-mono' || label.id === 'label-activity') {
        // Already adjusted in position calculation
      }
    }
  }

  positionLabels();
  window.addEventListener('resize', positionLabels);
  // Also reposition on font changes
  const observer = new ResizeObserver(positionLabels);
  observer.observe(document.getElementById('glyph-container'));
}

// ─── Hint auto-fade ──────────────────────────────────────────────────
setTimeout(() => hintEl.classList.add('fade'), 6000);

// ═══════════════════════════════════════════════════════════════════
//  WEBGPU FLUID SIMULATION
// ═══════════════════════════════════════════════════════════════════

// ─── WGSL Shader Sources ────────────────────────────────────────────

// Helper to make a shader with common struct
function shaderHeader() {
  return `
struct SimParams {
  gridSize: f32,
  dt: f32,
  mouseX: f32,
  mouseY: f32,
  mouseVx: f32,
  mouseVy: f32,
  mouseDown: f32,
  time: f32,
};

@group(0) @binding(8) var<uniform> params: SimParams;

fn idx(x: u32, y: u32) -> u32 {
  return y * u32(params.gridSize) + x;
}

fn clampIdx(x: i32, y: i32) -> u32 {
  let gs = i32(params.gridSize);
  let cx = min(max(x, 0), gs - 1);
  let cy = min(max(y, 0), gs - 1);
  return u32(cy) * u32(params.gridSize) + u32(cx);
}
`;
}

// 1. Apply Forces — inject dye and perturb velocity at mouse position
const SHADER_APPLY_FORCES = shaderHeader() + `
@group(0) @binding(0) var<storage, read_write> vel: array<vec2<f32>>;
@group(0) @binding(2) var<storage, read_write> dye: array<f32>;

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  let gs = u32(params.gridSize);
  if (x >= gs || y >= gs) { return; }
  let i = idx(x, y);

  let mx = params.mouseX * params.gridSize;
  let my = params.mouseY * params.gridSize;
  let dx = f32(x) - mx;
  let dy = f32(y) - my;
  let dist = sqrt(dx * dx + dy * dy);
  let radius = 4.0;

  // Velocity perturbation
  if (dist < radius) {
    let force = (1.0 - dist / radius) * 12.0;
    vel[i] += vec2(params.mouseVx, params.mouseVy) * force * params.dt;

    // Dye injection
    if (params.mouseDown > 0.5) {
      dye[i] += force * params.dt * 3.0;
    }
  }

  // Dye burst on click (from accumulated burst)
  // (Burst is handled as a uniform — we read from a separate mechanism)

  // Decay
  dye[i] *= (1.0 - 0.3 * params.dt);
  vel[i] *= (1.0 - 0.1 * params.dt);
}
`;

// 2. Dye burst (separate pass for the initial click burst)
const SHADER_DYE_BURST = shaderHeader() + `
@group(0) @binding(2) var<storage, read_write> dye: array<f32>;

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  let gs = u32(params.gridSize);
  if (x >= gs || y >= gs) { return; }
  let i = idx(x, y);

  let mx = params.mouseX * params.gridSize;
  let my = params.mouseY * params.gridSize;
  let dx = f32(x) - mx;
  let dy = f32(y) - my;
  let dist = sqrt(dx * dx + dy * dy);
  let radius = 8.0;

  if (dist < radius) {
    let force = (1.0 - dist / radius) * 2.0;
    dye[i] += force;
  }
}
`;

// 3. Advection (Semi-Lagrangian)
const SHADER_ADVECT_VEL = shaderHeader() + `
@group(0) @binding(0) var<storage, read> vel: array<vec2<f32>>;
@group(0) @binding(1) var<storage, read_write> velNext: array<vec2<f32>>;

fn sampleVel(x: f32, y: f32) -> vec2<f32> {
  let gs = f32(params.gridSize);
  let sx = clamp(x, 0.0, gs - 1.0);
  let sy = clamp(y, 0.0, gs - 1.0);
  let ix0 = u32(floor(sx));
  let iy0 = u32(floor(sy));
  let ix1 = min(ix0 + 1, u32(gs - 1.0));
  let iy1 = min(iy0 + 1, u32(gs - 1.0));
  let fx = sx - floor(sx);
  let fy = sy - floor(sy);
  let v00 = vel[idx(ix0, iy0)];
  let v10 = vel[idx(ix1, iy0)];
  let v01 = vel[idx(ix0, iy1)];
  let v11 = vel[idx(ix1, iy1)];
  let v0 = mix(v00, v10, fx);
  let v1 = mix(v01, v11, fx);
  return mix(v0, v1, fy);
}

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  let gs = u32(params.gridSize);
  if (x >= gs || y >= gs) { return; }
  let i = idx(x, y);

  let v = vel[i];
  let gsf = f32(gs);
  let sx = f32(x) - v.x * params.dt * gsf;
  let sy = f32(y) - v.y * params.dt * gsf;

  velNext[i] = sampleVel(sx, sy);
}
`;

const SHADER_ADVECT_DYE = shaderHeader() + `
@group(0) @binding(2) var<storage, read> dye: array<f32>;
@group(0) @binding(3) var<storage, read_write> dyeNext: array<f32>;
@group(0) @binding(0) var<storage, read> vel: array<vec2<f32>>;

fn sampleDye(x: f32, y: f32) -> f32 {
  let gs = f32(params.gridSize);
  let sx = clamp(x, 0.0, gs - 1.0);
  let sy = clamp(y, 0.0, gs - 1.0);
  let ix0 = u32(floor(sx));
  let iy0 = u32(floor(sy));
  let ix1 = min(ix0 + 1, u32(gs - 1.0));
  let iy1 = min(iy0 + 1, u32(gs - 1.0));
  let fx = sx - floor(sx);
  let fy = sy - floor(sy);
  let v00 = dye[idx(ix0, iy0)];
  let v10 = dye[idx(ix1, iy0)];
  let v01 = dye[idx(ix0, iy1)];
  let v11 = dye[idx(ix1, iy1)];
  let v0 = mix(v00, v10, fx);
  let v1 = mix(v01, v11, fx);
  return mix(v0, v1, fy);
}

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  let gs = u32(params.gridSize);
  if (x >= gs || y >= gs) { return; }
  let i = idx(x, y);

  let v = vel[i];
  let gsf = f32(gs);
  let sx = f32(x) - v.x * params.dt * gsf;
  let sy = f32(y) - v.y * params.dt * gsf;

  dyeNext[i] = sampleDye(sx, sy);
}
`;

// 4. Compute divergence
const SHADER_DIVERGENCE = shaderHeader() + `
@group(0) @binding(0) var<storage, read> vel: array<vec2<f32>>;
@group(0) @binding(6) var<storage, read_write> divergence: array<f32>;

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  let gs = u32(params.gridSize);
  if (x >= gs || y >= gs) { return; }
  let i = idx(x, y);

  let ix = i32(x);
  let iy = i32(y);
  let vL = vel[clampIdx(ix - 1, iy)].x;
  let vR = vel[clampIdx(ix + 1, iy)].x;
  let vT = vel[clampIdx(ix, iy - 1)].y;
  let vB = vel[clampIdx(ix, iy + 1)].y;

  let gsf = params.gridSize;
  divergence[i] = -0.5 * (vR - vL + vB - vT) * gsf;
}
`;

// 5. Pressure solve (Gauss-Seidel — in-place iteration)
const SHADER_PRESSURE = shaderHeader() + `
@group(0) @binding(4) var<storage, read_write> pressure: array<f32>;
@group(0) @binding(6) var<storage, read> divergence: array<f32>;

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  let gs = u32(params.gridSize);
  if (x >= gs || y >= gs) { return; }
  let i = idx(x, y);

  let ix = i32(x);
  let iy = i32(y);
  let pL = pressure[clampIdx(ix - 1, iy)];
  let pR = pressure[clampIdx(ix + 1, iy)];
  let pT = pressure[clampIdx(ix, iy - 1)];
  let pB = pressure[clampIdx(ix, iy + 1)];
  let d = divergence[i];

  pressure[i] = (pL + pR + pT + pB - d) * 0.25;
}
`;

// 6. Subtract pressure gradient
const SHADER_PROJECT = shaderHeader() + `
@group(0) @binding(0) var<storage, read_write> vel: array<vec2<f32>>;
@group(0) @binding(4) var<storage, read> pressure: array<f32>;

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  let gs = u32(params.gridSize);
  if (x >= gs || y >= gs) { return; }
  let i = idx(x, y);

  let ix = i32(x);
  let iy = i32(y);
  let pL = pressure[clampIdx(ix - 1, iy)];
  let pR = pressure[clampIdx(ix + 1, iy)];
  let pT = pressure[clampIdx(ix, iy - 1)];
  let pB = pressure[clampIdx(ix, iy + 1)];

  let scale = 0.5 * params.gridSize;
  vel[i] -= vec2(pR - pL, pB - pT) * scale;
}
`;

// Simplified stats shader — just sample center region
const SHADER_SAMPLE_STATS = shaderHeader() + `
@group(0) @binding(0) var<storage, read> vel: array<vec2<f32>>;
@group(0) @binding(2) var<storage, read> dye: array<f32>;
@group(0) @binding(7) var<storage, read_write> stats: array<vec4<f32>>;

@compute @workgroup_size(1, 1)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  // Sample a grid of points around the center
  let gs = u32(params.gridSize);
  let half = gs / 2;
  let sampleSize: u32 = 8u;
  var sumDye: f32 = 0.0;
  var sumVel: f32 = 0.0;
  var maxDye: f32 = 0.0;
  var maxVel: f32 = 0.0;
  var count: f32 = 0.0;

  // Sample in a region around center
  for (var sy: u32 = 0u; sy < sampleSize; sy++) {
    for (var sx: u32 = 0u; sx < sampleSize; sx++) {
      let gx = half - sampleSize / 2 + sx;
      let gy = half - sampleSize / 2 + sy;
      if (gx < gs && gy < gs) {
        let i = gy * gs + gx;
        let d = dye[i];
        let v = length(vel[i]);
        sumDye += d;
        sumVel += v;
        maxDye = max(maxDye, d);
        maxVel = max(maxVel, v);
        count += 1.0;
      }
    }
  }

  if (count > 0.0) {
    stats[0] = vec4(sumDye / count, sumVel / count, maxDye, maxVel);
  } else {
    stats[0] = vec4(0.0, 0.0, 0.0, 0.0);
  }
}
`;

// 8. Render to output texture
const SHADER_RENDER = shaderHeader() + `
@group(0) @binding(2) var<storage, read> dye: array<f32>;
@group(0) @binding(0) var<storage, read> vel: array<vec2<f32>>;
@group(0) @binding(9) var outputTex: texture_storage_2d<rgba8unorm, write>;

fn turbo(t: f32) -> vec3<f32> {
  // Simplified turbo colormap (blue→cyan→green→yellow→red)
  let r = clamp(3.0 * t, 0.0, 1.0) - clamp(3.0 * t - 2.0, 0.0, 1.0) - 2.0 * clamp(3.0 * t - 3.0, 0.0, 1.0);
  let g = clamp(3.0 * t - 1.0, 0.0, 1.0) - clamp(3.0 * t - 3.0, 0.0, 1.0);
  let b = clamp(3.0 * t - 2.0, 0.0, 1.0) - clamp(3.0 * t - 4.0, 0.0, 1.0);
  return vec3(r, g, b);
}

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let gs = u32(params.gridSize);
  if (id.x >= gs || id.y >= gs) { return; }
  let i = idx(id.x, id.y);

  let d = dye[i];
  let v = vel[i];
  let speed = length(v);

  // Deep background
  let bg = vec3(0.03, 0.05, 0.10);

  // Dye → color with turbo-like mapping
  let dyeColor = turbo(clamp(d * 1.5, 0.0, 1.0));

  // Velocity → subtle direction coloring
  let angle = atan2(v.y, v.x);
  let velColor = vec3(
    0.5 + 0.5 * sin(angle),
    0.5 + 0.5 * sin(angle + 2.094),
    0.5 + 0.5 * sin(angle + 4.189)
  ) * clamp(speed * 5.0, 0.0, 0.3);

  let color = bg + dyeColor * clamp(d * 2.0, 0.0, 1.0) + velColor;

  // Dye glow
  let glow = clamp(d * 3.0, 0.0, 1.0);
  let finalColor = mix(color, vec3(0.4, 0.7, 1.0), glow * 0.3);

  textureStore(outputTex, vec2<i32>(id.xy), vec4(finalColor, 1.0));
}
`;

// ─── WebGPU Initialization ──────────────────────────────────────────
let device = null;
let context = null;
let pipelines = {};
let bindGroup = null;
let buffers = {};
let readbackBuffers = [];
let readbackIndex = 0;
let statsReadFence = null;

const BUFFER_SIZE = {
  vel: GRID * GRID * 8,          // vec2<f32> = 8 bytes
  dye: GRID * GRID * 4,          // f32 = 4 bytes
  pressure: GRID * GRID * 4,
  divergence: GRID * GRID * 4,
  stats: 16,                      // vec4<f32>
  params: 64,                     // SimParams (aligned to 64 for safety)
};

async function initWebGPU() {
  if (!navigator.gpu) throw new Error('WebGPU not available');

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) throw new Error('No WebGPU adapter found');

  device = await adapter.requestDevice({
    requiredLimits: {
      maxStorageBufferBindingSize: Math.max(
        BUFFER_SIZE.vel,
        BUFFER_SIZE.dye,
        65536  // minimum required
      ),
    },
  });
  device.addEventListener('uncapturederror', (e) => {
    console.warn('WebGPU error:', e.error.message);
  });

  // Configure canvas
  context = canvas.getContext('webgpu');
  if (!context) throw new Error('WebGPU canvas context not available');

  const format = 'rgba8unorm';
  context.configure({
    device,
    format,
    usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT,
    alphaMode: 'premultiplied',
  });

  // Create buffers
  buffers.vel1 = createBuffer('vel1', BUFFER_SIZE.vel, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC);
  buffers.vel2 = createBuffer('vel2', BUFFER_SIZE.vel, GPUBufferUsage.STORAGE);
  buffers.dye1 = createBuffer('dye1', BUFFER_SIZE.dye, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC);
  buffers.dye2 = createBuffer('dye2', BUFFER_SIZE.dye, GPUBufferUsage.STORAGE);
  buffers.pressure = createBuffer('pressure', BUFFER_SIZE.pressure, GPUBufferUsage.STORAGE);
  buffers.divergence = createBuffer('divergence', BUFFER_SIZE.divergence, GPUBufferUsage.STORAGE);
  buffers.stats = createBuffer('stats', BUFFER_SIZE.stats, GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC);
  buffers.params = createBuffer('params', BUFFER_SIZE.params, GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST);

  // Initialize buffers with zeros
  const velZeros = new Float32Array(GRID * GRID * 2); // vel: vec2
  device.queue.writeBuffer(buffers.vel1, 0, velZeros);
  device.queue.writeBuffer(buffers.vel2, 0, velZeros);
  const scalarZeros = new Float32Array(GRID * GRID);
  device.queue.writeBuffer(buffers.dye1, 0, scalarZeros);
  device.queue.writeBuffer(buffers.dye2, 0, scalarZeros);
  device.queue.writeBuffer(buffers.pressure, 0, scalarZeros);
  device.queue.writeBuffer(buffers.divergence, 0, scalarZeros);

  // Stats init: [dyeAvg, velAvg, dyeMax, velMax]
  const initStats = new Float32Array([0, 0, 0, 0]);
  device.queue.writeBuffer(buffers.stats, 0, initStats);

  // Readback buffers (triple buffer)
  for (let i = 0; i < 3; i++) {
    readbackBuffers.push(createBuffer(
      `readback${i}`,
      BUFFER_SIZE.stats,
      GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST
    ));
  }

  // Create bind group layout
  const bindGroupLayout = device.createBindGroupLayout({
    entries: [
      { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
      { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
      { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
      { binding: 3, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
      { binding: 4, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
      { binding: 6, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
      { binding: 7, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
      { binding: 8, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
      { binding: 9, visibility: GPUShaderStage.COMPUTE, storageTexture: { format: 'rgba8unorm', access: 'write-only' } },
    ],
  });

  const pipelineLayout = device.createPipelineLayout({
    bindGroupLayouts: [bindGroupLayout],
  });

  // Create compute pipelines
  const shaderModules = {
    applyForces: device.createShaderModule({ code: SHADER_APPLY_FORCES, label: 'applyForces' }),
    dyeBurst: device.createShaderModule({ code: SHADER_DYE_BURST, label: 'dyeBurst' }),
    advectVel: device.createShaderModule({ code: SHADER_ADVECT_VEL, label: 'advectVel' }),
    advectDye: device.createShaderModule({ code: SHADER_ADVECT_DYE, label: 'advectDye' }),
    divergence: device.createShaderModule({ code: SHADER_DIVERGENCE, label: 'divergence' }),
    pressure: device.createShaderModule({ code: SHADER_PRESSURE, label: 'pressure' }),
    project: device.createShaderModule({ code: SHADER_PROJECT, label: 'project' }),
    sampleStats: device.createShaderModule({ code: SHADER_SAMPLE_STATS, label: 'sampleStats' }),
    render: device.createShaderModule({ code: SHADER_RENDER, label: 'render' }),
  };

  for (const [name, module] of Object.entries(shaderModules)) {
    pipelines[name] = device.createComputePipeline({
      layout: pipelineLayout,
      compute: { module, entryPoint: 'main' },
      label: name,
    });
  }

  // Verify compilation
  for (const [name, module] of Object.entries(shaderModules)) {
    const info = await module.getCompilationInfo();
    if (info.messages && info.messages.length > 0) {
      for (const msg of info.messages) {
        if (msg.type === 'error') {
          console.error(`Shader "${name}" compilation error:`, msg.message, `at line ${msg.lineNum}`);
          throw new Error(`Shader "${name}" compilation failed: ${msg.message}`);
        }
        if (msg.type === 'warning') {
          console.warn(`Shader "${name}" warning:`, msg.message);
        }
      }
    }
  }

  // Create bind group (lazily updated with canvas texture each frame)
  // We'll create it each frame to get the current canvas texture
  state.webgpu = true;
  console.log('WebGPU initialized successfully');
}

function createBuffer(label, size, usage) {
  const buf = device.createBuffer({
    label,
    size,
    usage,
    mappedAtCreation: false,
  });
  return buf;
}

// ─── Simulation Loop ────────────────────────────────────────────────
let _frameParity = 0;

function _makeBindGroup(textureView, curVel, nxtVel, curDye, nxtDye) {
  return device.createBindGroup({
    layout: pipelines.applyForces.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: curVel } },
      { binding: 1, resource: { buffer: nxtVel } },
      { binding: 2, resource: { buffer: curDye } },
      { binding: 3, resource: { buffer: nxtDye } },
      { binding: 4, resource: { buffer: buffers.pressure } },
      { binding: 6, resource: { buffer: buffers.divergence } },
      { binding: 7, resource: { buffer: buffers.stats } },
      { binding: 8, resource: { buffer: buffers.params } },
      { binding: 9, resource: textureView },
    ],
  });
}

async function simulationStep(timestamp) {
  if (!device || !state.webgpu) return;

  const dt = Math.min(0.033, (timestamp - (state._lastTime || timestamp)) / 1000);
  state._lastTime = timestamp;
  state.time += dt;
  state.frame++;

  // Update mouse velocity damping
  const m = state.mouse;
  m.vx *= 0.85;
  m.vy *= 0.85;

  // Update params uniform
  const paramsArray = new Float32Array([
    GRID,
    dt,
    m.x,
    m.y,
    m.vx * 0.5,
    m.vy * 0.5,
    m.down ? 1.0 : 0.0,
    state.time,
  ]);
  device.queue.writeBuffer(buffers.params, 0, paramsArray);

  const textureView = context.getCurrentTexture().createView();

  // Determine which buffers are "current" vs "next" for this frame's parity
  // We alternate each frame so both halves get used as the simulation field
  const curVel = _frameParity === 0 ? buffers.vel1 : buffers.vel2;
  const nxtVel = _frameParity === 0 ? buffers.vel2 : buffers.vel1;
  const curDye = _frameParity === 0 ? buffers.dye1 : buffers.dye2;
  const nxtDye = _frameParity === 0 ? buffers.dye2 : buffers.dye1;

  // Pre-advection bind group: apply forces, advection
  const bgPre = _makeBindGroup(textureView, curVel, nxtVel, curDye, nxtDye);
  // Post-advection bind group: divergence, pressure, project, render (new state is in nxt*)
  const bgPost = _makeBindGroup(textureView, nxtVel, curVel, nxtDye, curDye);

  const encoder = device.createCommandEncoder();
  const wgX = Math.ceil(GRID / WORKGROUP);
  const wgY = Math.ceil(GRID / WORKGROUP);

  // 1. Dye burst on initial click
  if (m._dyeBurst && m._dyeBurst > 0) {
    const passBurst = encoder.beginComputePass();
    passBurst.setPipeline(pipelines.dyeBurst);
    passBurst.setBindGroup(0, bgPre);
    passBurst.dispatchWorkgroups(wgX, wgY);
    passBurst.end();
    m._dyeBurst = Math.max(0, m._dyeBurst - dt * 2);
  }

  // 2. Apply forces (reads/writes current buffers)
  {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.applyForces);
    pass.setBindGroup(0, bgPre);
    pass.dispatchWorkgroups(wgX, wgY);
    pass.end();
  }

  // 3. Advect velocity (curVel → nxtVel)
  {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.advectVel);
    pass.setBindGroup(0, bgPre);
    pass.dispatchWorkgroups(wgX, wgY);
    pass.end();
  }

  // 4. Advect dye (curDye → nxtDye)
  {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.advectDye);
    pass.setBindGroup(0, bgPre);
    pass.dispatchWorkgroups(wgX, wgY);
    pass.end();
  }

  // --- Now the new state is in nxtVel / nxtDye ---
  // Use bgPost which has nxtVel/nxtDye as "current" buffers

  // 5. Compute divergence of velocity (reads nxtVel via binding 0)
  {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.divergence);
    pass.setBindGroup(0, bgPost);
    pass.dispatchWorkgroups(wgX, wgY);
    pass.end();
  }

  // 6. Pressure solve (Gauss-Seidel in-place on pressure)
  for (let iter = 0; iter < PRESSURE_ITERS; iter++) {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.pressure);
    pass.setBindGroup(0, bgPost);
    pass.dispatchWorkgroups(wgX, wgY);
    pass.end();
  }

  // 7. Subtract gradient (reads/writes nxtVel via binding 0)
  {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.project);
    pass.setBindGroup(0, bgPost);
    pass.dispatchWorkgroups(wgX, wgY);
    pass.end();
  }

  // 8. Sample stats (periodically, reads nxtDye/nxtVel via bindings 2/0)
  if (state.frame % STATS_INTERVAL === 0) {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.sampleStats);
    pass.setBindGroup(0, bgPost);
    pass.dispatchWorkgroups(1, 1);
    pass.end();

    // Copy stats to readback buffer
    const readBuf = readbackBuffers[readbackIndex % 3];
    encoder.copyBufferToBuffer(buffers.stats, 0, readBuf, 0, BUFFER_SIZE.stats);
  }

  // 9. Render to canvas (reads nxtDye/nxtVel via bindings 2/0)
  {
    const pass = encoder.beginComputePass();
    pass.setPipeline(pipelines.render);
    pass.setBindGroup(0, bgPost);
    pass.dispatchWorkgroups(wgX, wgY);
    pass.end();
  }

  // 10. Submit
  device.queue.submit([encoder.finish()]);

  // Flip parity for next frame
  _frameParity ^= 1;

  // Read back stats (async, read from 2 frames ago to avoid stalls)
  const readIdx = (readbackIndex - 2 + 3) % 3;
  if (state.frame > STATS_INTERVAL * 3) {
    const readBuf = readbackBuffers[readIdx];
    try {
      await readBuf.mapAsync(GPUMapMode.READ);
      const data = new Float32Array(readBuf.getMappedRange());
      if (data.length >= 4) {
        updateAxesFromStats(data);
      }
      readBuf.unmap();
    } catch (_) {
      // Readback not ready yet, skip
    }
  }

  if (state.frame % STATS_INTERVAL === 0) {
    readbackIndex++;
  }

  // Update axes with lerp
  lerpAxes(dt);
  applyAxes();

  requestAnimationFrame(simulationStep);
}

// ═══════════════════════════════════════════════════════════════════
//  CSS-ONLY FALLBACK
// ═══════════════════════════════════════════════════════════════════

function initFallback() {
  state.fallback = true;
  document.body.classList.add('fallback-mode');
  console.log('WebGPU unavailable — using CSS-only fallback');

  function fallbackLoop(timestamp) {
    const dt = Math.min(0.033, (timestamp - (state._lastTime || timestamp)) / 1000);
    state._lastTime = timestamp;
    state.time += dt;

    // Update mouse for responsiveness even in fallback
    const m = state.mouse;
    m.vx *= 0.9;
    m.vy *= 0.9;

    updateAxesFromMouse();
    lerpAxes(dt);
    applyAxes();

    requestAnimationFrame(fallbackLoop);
  }
  requestAnimationFrame(fallbackLoop);
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════

async function init() {
  setupMouseEvents();
  setupAnchorFallback();

  // Try WebGPU
  try {
    await initWebGPU();
    // Start simulation loop
    requestAnimationFrame(simulationStep);
  } catch (e) {
    console.warn('WebGPU init failed:', e.message);
    initFallback();
  }
}

init();
</script>
