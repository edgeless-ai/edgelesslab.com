<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Demos — Edgeless</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh;color:#e0e0e0;
}
.header{
  background:rgba(15,12,41,.72);backdrop-filter:blur(16px);
  padding:18px 0;position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.container{max-width:1440px;margin:0 auto;padding:0 24px;}
.header-top{
  display:flex;justify-content:space-between;align-items:center;
  gap:16px;flex-wrap:wrap;
}
h1{font-size:26px;font-weight:700;letter-spacing:-.3px;}
h1 span{background:linear-gradient(135deg,#a78bfa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{font-size:13px;opacity:.65;margin-top:2px;}
.search-box{flex:1;max-width:420px;min-width:200px;}
.search-input{
  width:100%;padding:10px 18px;border:1.5px solid rgba(255,255,255,.15);
  border-radius:24px;background:rgba(255,255,255,.06);color:#fff;font-size:14px;
  transition:all .25s;
}
.search-input::placeholder{color:rgba(255,255,255,.45)}
.search-input:focus{outline:none;background:rgba(255,255,255,.1);border-color:rgba(167,139,250,.5)}

.stats{text-align:center;padding:28px 0 8px;opacity:.8;}
.stats-row{display:flex;justify-content:center;gap:44px;flex-wrap:wrap;}
.stat{font-size:13px;text-align:center;}
.stat-num{font-size:26px;font-weight:700;display:block;}
.stat-num.deployed{color:#86efac;}
.stat-num.undeployed{color:#fde68a;}

.filters-wrap{
  display:flex;gap:8px;flex-wrap:wrap;padding:20px 0 8px;
  align-items:center;justify-content:center;
}
.filter-btn{
  padding:7px 15px;border:1.5px solid rgba(255,255,255,.18);
  border-radius:20px;background:rgba(255,255,255,.06);color:#ccc;
  font-size:12px;cursor:pointer;transition:all .2s;font-weight:500;
  white-space:nowrap;
}
.filter-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
.filter-btn.active{background:rgba(167,139,250,.25);color:#c4b5fd;border-color:#a78bfa;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;padding:20px 0 60px;
}

.card{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;overflow:hidden;transition:all .25s;
  display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-3px);border-color:rgba(167,139,250,.35);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card.deployed{border-left:3px solid rgba(134,239,172,.5)}
.card.undeployed{border-left:3px solid rgba(253,230,138,.4);opacity:.85}

.card-body{padding:16px 18px 12px;flex:1;display:flex;flex-direction:column;}
.card-title{font-size:15px;font-weight:600;margin-bottom:6px;color:#f0f0f0;}
.card-desc{font-size:12.5px;line-height:1.55;color:#aaa;flex:1;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.tag{
  font-size:10px;padding:3px 8px;border-radius:10px;
  background:rgba(167,139,250,.15);color:#c4b5fd;
  font-weight:500;text-transform:uppercase;letter-spacing:.3px;
}
.card-footer{
  padding:10px 18px 14px;display:flex;justify-content:space-between;
  align-items:center;border-top:1px solid rgba(255,255,255,.06);
}
.status-badge{
  font-size:11px;padding:4px 10px;border-radius:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.4px;
}
.status-badge.live{background:rgba(134,239,172,.15);color:#86efac;}
.status-badge.draft{background:rgba(253,230,138,.15);color:#fde68a;}

.visit-btn{
  text-decoration:none;font-size:12px;padding:6px 14px;border-radius:16px;
  border:1px solid rgba(167,139,250,.3);color:#c4b5fd;
  background:rgba(167,139,250,.08);font-weight:600;transition:all .2s;
}
.visit-btn:hover{background:rgba(167,139,250,.18);border-color:rgba(167,139,250,.5)}
.visit-btn.disabled{
  opacity:.35;cursor:not-allowed;pointer-events:none;
  border-color:rgba(255,255,255,.08);color:#666;
}

.buy-btn{
  text-decoration:none;font-size:12px;padding:6px 14px;border-radius:16px;
  border:1px solid rgba(251,191,36,.4);color:#fbbf24;
  background:rgba(251,191,36,.08);font-weight:600;transition:all .2s;
}
.buy-btn:hover{background:rgba(251,191,36,.18);border-color:rgba(251,191,36,.6)}
.buy-btn.disabled{
  opacity:.35;cursor:not-allowed;pointer-events:none;
  border-color:rgba(255,255,255,.08);color:#666;
}

.commission-btn{
  text-decoration:none;font-size:12px;padding:6px 14px;border-radius:16px;
  border:1px solid rgba(192,132,252,.4);color:#c084fc;
  background:rgba(192,132,252,.08);font-weight:600;transition:all .2s;
}
.commission-btn:hover{background:rgba(192,132,252,.18);border-color:rgba(192,132,252,.6)}
.commission-btn.disabled{
  opacity:.35;cursor:not-allowed;pointer-events:none;
  border-color:rgba(255,255,255,.08);color:#666;
}

.empty-state{text-align:center;padding:80px 20px;opacity:.65;}
.empty-icon{font-size:56px;margin-bottom:16px;}
.empty-text{font-size:16px;}

.tag-toggle{cursor:pointer;border:none;background:none;padding:0;font:inherit;color:inherit;}
.tag-toggle::before{content:'+ ';opacity:.5;font-size:10px;}
.tag-toggle.open::before{content:'− ';}

@media(max-width:768px){
  .header-top{flex-direction:column;align-items:stretch;}
  .search-box{max-width:none;}
  .grid{grid-template-columns:1fr;}
  .stats-row{gap:24px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-top">
      <div>
        <h1>Creative <span>Demos</span></h1>
        <div class="subtitle">Interactive generative art, typography, and creative coding experiments</div>
      </div>
      <div class="search-box">
        <input type="text" class="search-input" id="search" placeholder="Search demos…" autocomplete="off">
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="stats">
      <div class="stats-row">

    <div class="filters-wrap" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>

      <button class="filter-btn" data-filter="undeployed">⊗ In Progress</button>

      <button class="filter-btn" data-filter="tag:canvas">#canvas</button>

      <button class="filter-btn" data-filter="tag:css">#css</button>
      <button class="filter-btn" data-filter="tag:dalang">#dalang</button>
      <button class="filter-btn" data-filter="tag:data-viz">#data-viz</button>
      <button class="filter-btn" data-filter="tag:demo">#demo</button>
      <button class="filter-btn" data-filter="tag:driving">#driving</button>
      <button class="filter-btn" data-filter="tag:editorial">#editorial</button>
      <button class="filter-btn" data-filter="tag:floral">#floral</button>
      <button class="filter-btn" data-filter="tag:flowfield">#flowfield</button>
      <button class="filter-btn" data-filter="tag:generative">#generative</button>
      <button class="filter-btn" data-filter="tag:inkblot">#inkblot</button>
      <button class="filter-btn" data-filter="tag:kinetic">#kinetic</button>
      <button class="filter-btn" data-filter="tag:living">#living</button>
      <button class="filter-btn" data-filter="tag:luxury">#luxury</button>
      <button class="filter-btn" data-filter="tag:manifest">#manifest</button>
      <button class="filter-btn" data-filter="tag:mondrian">#mondrian</button>
      <button class="filter-btn" data-filter="tag:particles">#particles</button>
      <button class="filter-btn" data-filter="tag:phantom">#phantom</button>
      <button class="filter-btn" data-filter="tag:phase">#phase</button>
      <button class="filter-btn" data-filter="tag:punctuation">#punctuation</button>
      <button class="filter-btn" data-filter="tag:rejection">#rejection</button>
      <button class="filter-btn" data-filter="tag:scroll">#scroll</button>
      <button class="filter-btn" data-filter="tag:shader">#shader</button>
      <button class="filter-btn" data-filter="tag:soft">#soft</button>
      <button class="filter-btn" data-filter="tag:stroke">#stroke</button>
      <button class="filter-btn" data-filter="tag:svg">#svg</button>
      <button class="filter-btn" data-filter="tag:synesthetic">#synesthetic</button>
      <button class="filter-btn" data-filter="tag:telemetry">#telemetry</button>
      <button class="filter-btn" data-filter="tag:trail">#trail</button>
      <button class="filter-btn" data-filter="tag:turing">#turing</button>
      <button class="filter-btn" data-filter="tag:typographic">#typographic</button>
      <button class="filter-btn" data-filter="tag:typography">#typography</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="empty-state" id="empty" style="display:none">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">No demos match your filters</div>
    </div>
  </div>
</main>

const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const searchInput = document.getElementById('search');
const statShowing = document.getElementById('stat-showing');

let currentFilter = 'all';
let searchTerm = '';

function normalize(s) { return (s || '').toLowerCase().replace(/[^\w\s]/g,''); }

function matchesFilter(demo) {
  if (currentFilter === 'all') return true;
  if (currentFilter === 'deployed') return demo.deployed;
  if (currentFilter === 'undeployed') return !demo.deployed;
  if (currentFilter.startsWith('tag:')) {
    const tag = currentFilter.slice(4);
    return demo.tags.includes(tag);
  }
  return true;
}

function matchesSearch(demo) {
  if (!searchTerm) return true;
  const haystack = normalize(demo.title + ' ' + demo.description + ' ' + demo.tags.join(' '));
  return haystack.includes(normalize(searchTerm));
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Config ──
const STORE_URL = 'https://edgelesslab.com/product-factory/';
const COMMISSION_EMAIL = 'hello@edgelesslab.com';

// Build a context-aware store link that maps a demo to its product page
function buyLink(demo) {
  return STORE_URL + '?sku=' + encodeURIComponent(demo.id);
}

// Build a pre-filled commission inquiry mailto link
function commissionLink(demo) {
  const subject = 'Commission Inquiry: ' + demo.title;
  const body = [
    'Hi Edgeless team,',
    '',
    'I\'m interested in commissioning a piece in the style of:',
    '  "' + demo.title + '"',
    '  Demo ID: ' + demo.id,
    '',
    'Style parameters: ' + (demo.tags.length ? demo.tags.join(', ') : 'custom'),
    '',
    'Please let me know about availability, pricing, and timeline.',
    '',
    'Thanks!'
  ].join('\n');
  return 'mailto:' + encodeURIComponent(COMMISSION_EMAIL)
    + '?subject=' + encodeURIComponent(subject)
    + '&body=' + encodeURIComponent(body);
}
function renderCard(demo) {
  const tagsHtml = demo.tags.slice(0, 5).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  const statusClass = demo.deployed ? 'live' : 'draft';
  const statusText = demo.deployed ? 'LIVE' : 'DRAFT';
  const cardClass = demo.deployed ? 'deployed' : 'undeployed';
  const desc = demo.description || 'A creative coding demo.';
  
  let linkHtml;
  if (demo.deployed && demo.url) {
    linkHtml = `<a href="${escapeHtml(demo.url)}" class="visit-btn" target="_blank" rel="noopener">Visit →</a>`;
  } else {
    linkHtml = `<span class="visit-btn disabled">Coming soon</span>`;
  }

  // Buy Print link — maps demo ID to store SKU, opens in new tab
  const buyHtml = demo.deployed
    ? `<a href="${escapeHtml(buyLink(demo))}" class="buy-btn" target="_blank" rel="noopener">Buy Print 🖼</a>`
    : `<span class="buy-btn disabled">Buy Print 🖼</span>`;

  // Commission This Style link — opens pre-filled mailto
  const commissionHtml = demo.deployed
    ? `<a href="${escapeHtml(commissionLink(demo))}" class="commission-btn">Commission This Style ✦</a>`
    : `<span class="commission-btn disabled">Commission This Style ✦</span>`;

  return `<div class="card ${cardClass}">
    <div class="card-body">
      <div class="card-title">${escapeHtml(demo.title)}</div>
      <div class="card-desc">${escapeHtml(desc)}</div>
      <div class="card-tags">${tagsHtml}</div>
    </div>
    <div class="card-footer">
      <span class="status-badge ${statusClass}">${statusText}</span>
      <div style="display:flex;gap:6px;">
        ${commissionHtml}
        ${buyHtml}
        ${linkHtml}
      </div>
    </div>
  </div>`;
}

function render() {
  const visible = DATA.demos.filter(d => matchesFilter(d) && matchesSearch(d));
  
  if (visible.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = visible.map(renderCard).join('');
  }
  
  statShowing.textContent = visible.length;
}

// Search
searchInput.addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

// Filter buttons
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Initial render
render();
</script>
