<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parametric Type Wave — Bauhaus Monochrome Specimen</title>

  <!-- Inter font from Google Fonts — the geometric sans-serif chosen for the specimen -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

  <!-- p5.js from CDN — handles canvas, animation loop, and interactivity -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

  <style>
    /* === Bauhaus monochrome constraint: black on white, no chromatic variation === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FFFFFF;
      color: #000000;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* === Canvas container: keeps the drawing centered with breathing room === */
    #canvas-container {
      margin-top: 24px;
      border: 1px solid #000000;
    }

    /* === Control panel: minimal, aligned, monochrome === */
    #controls {
      margin: 16px 0;
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: 14px;
      font-weight: 500;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* === Native HTML slider — reactive, no reload required === */
    input[type="range"] {
      width: 200px;
      accent-color: #000000;
    }

    /* === Download SVG button: stroke-only aesthetic, plotter-ready output === */
    button {
      background: #FFFFFF;
      color: #000000;
      border: 1px solid #000000;
      padding: 6px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: #000000;
      color: #FFFFFF;
    }

    /* === Hidden SVG export layer — mirrored data array for vector artifact === */
    #svg-export {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 800px;
      height: 600px;
    }
  </style>
</head>
<body>

  <!-- === Controls === -->
  <div id="controls">
    <label>
      Instances (N)
      <input type="range" id="nSlider" min="4" max="400" value="100" step="1">
      <span id="nValue">100</span>
    </label>
    <button id="downloadBtn">Download SVG</button>
  </div>

  <!-- === Live canvas preview === -->
  <div id="canvas-container"></div>

  <!-- === Hidden SVG DOM — kept in sync with data array for vector export === -->
  <svg id="svg-export" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
    <rect width="800" height="600" fill="#FFFFFF"/>
    <g id="svg-glyphs"></g>
  </svg>

  <script>
    // ============================================
    // PARAMETRIC TYPE WAVE
    // Bauhaus trigonometric data-join + glyph-level harmonic motion
    // ============================================

    // --- Global state ---
    let N = 100;           // Number of glyph instances (controlled by slider)
    let time = 0;          // Global animation phase, increments each frame
    let waveCount = 3;     // Number of wave cycles around the circle
    let amplitude = 180;   // Radial displacement from center
    let char = 'A';        // The single glyph treated as a dataset

    // --- DOM references ---
    const nSlider = document.getElementById('nSlider');
    const nValue = document.getElementById('nValue');
    const downloadBtn = document.getElementById('downloadBtn');
    const svgExport = document.getElementById('svg-export');
    const svgGlyphs = document.getElementById('svg-glyphs');

    // --- Reactive slider wiring ---
    nSlider.addEventListener('input', () => {
      N = parseInt(nSlider.value, 10);
      nValue.textContent = N;
    });

    // --- SVG Download handler ---
    // Serializes the hidden SVG DOM to a Blob and triggers a download.
    // Bridges digital exploration → physical artifact (plotter, laser, print).
    downloadBtn.addEventListener('click', () => {
      const serializer = new XMLSerializer();
      const svgString = serializer.serializeToString(svgExport);
      const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const link = document.createElement('a');
      link.href = url;
      link.download = 'parametric-type-wave.svg';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    });

    // --- p5.js setup ---
    function setup() {
      // Canvas matches the SVG viewBox for 1:1 pixel-to-vector correspondence
      const c = createCanvas(800, 600);
      c.parent('canvas-container');
      textFont('Inter');
      textAlign(CENTER, CENTER);
      frameRate(60);
    }

    // --- p5.js draw loop ---
    // Loop-first design: time wraps via modulo so first and last frames are identical,
    // creating a continuous, breathing specimen with no visible jump.
    function draw() {
      background(255); // #FFFFFF — rigid Bauhaus paper canvas

      // Center of the composition
      const centerX = width / 2;
      const centerY = height / 2;

      // --- Data-Join as Generative Engine ---
      // Each index i is a data point bound to a glyph instance.
      // We compute angle, position, and weight for every point in the array.
      for (let i = 0; i < N; i++) {
        // 1. Angle maps the index around the full circle (0 to TWO_PI)
        const angle = map(i, 0, N, 0, TWO_PI);

        // 2. Trigonometric Wave Placement (Lissajous-like)
        //    cx = centerX + sin(angle * waveCount + time) * amplitude
        //    cy = centerY + cos(angle * waveCount + time) * amplitude * 0.6
        const cx = centerX + sin(angle * waveCount + time) * amplitude;
        const cy = centerY + cos(angle * waveCount + time) * amplitude * 0.6;

        // 3. Harmonic Oscillation (Motion Fonts SURROUND-style)
        //    Normalized 0–1 weight oscillates per index with a phase offset.
        const weight = sin(time * 2 + i * 0.1) * 0.5 + 0.5;

        // 4. Render glyph: stroke-only, no fill, monochrome
        //    The negative space between glyphs is as important as the glyphs.
        const fontSize = 12 + weight * 48; // Range: 12px – 60px
        const strokeW = 1 + weight * 2.5;    // Range: 1 – 3.5

        noFill();
        stroke(0);           // #000000
        strokeWeight(strokeW);
        textSize(fontSize);
        text(char, cx, cy);
      }

      // --- Sync hidden SVG layer ---
      // Rebuilds the SVG <g> to mirror the current data array for vector export.
      // We use innerHTML reconstruction for simplicity; N is bounded to 400.
      let svgMarkup = '';
      for (let i = 0; i < N; i++) {
        const angle = map(i, 0, N, 0, TWO_PI);
        const cx = centerX + sin(angle * waveCount + time) * amplitude;
        const cy = centerY + cos(angle * waveCount + time) * amplitude * 0.6;
        const weight = sin(time * 2 + i * 0.1) * 0.5 + 0.5;
        const fontSize = 12 + weight * 48;
        const strokeW = 1 + weight * 2.5;

        // SVG transform: translate to position, rotate optional for character
        svgMarkup += `<text x="${cx.toFixed(2)}" y="${cy.toFixed(2)}" font-family="Inter, sans-serif" font-size="${fontSize.toFixed(2)}" fill="none" stroke="#000000" stroke-width="${strokeW.toFixed(2)}" text-anchor="middle" dominant-baseline="central">${char}</text>`;
      }
      svgGlyphs.innerHTML = svgMarkup;

      // --- Advance time ---
      // Increment by 0.01 and wrap modulo TWO_PI for seamless looping.
      time += 0.01;
      if (time > TWO_PI) {
        time -= TWO_PI;
      }
    }
  </script>
</body>
</html>
