<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postcard Matrix — A Hand-Drawn Tixy.land</title>
<style>
  /* Page layout: dark charcoal background so the warm postcard pops */
  body {
    margin: 0;
    padding: 24px;
    background: #2C2C2C;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #F0EAD6;
  }
  /* Postcard container with a warm ochre border */
  #canvas-container {
    border: 4px solid #D4A373;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  }
  /* Formula input: monospace for the code-golf feel */
  input#formula {
    margin-top: 16px;
    font-family: monospace;
    font-size: 14px;
    padding: 10px 14px;
    width: 480px;
    background: #F0EAD6;
    color: #2C2C2C;
    border: 2px solid #D4A373;
    border-radius: 4px;
    box-sizing: border-box;
  }
  /* Send Postcard button */
  button#sendBtn {
    margin-top: 10px;
    font-family: sans-serif;
    font-size: 14px;
    padding: 10px 18px;
    background: #D4A373;
    color: #2C2C2C;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
  }
  button#sendBtn:hover {
    background: #F15BB5;
    color: #F0EAD6;
  }
  /* Small legend text */
  #legend {
    margin-top: 10px;
    font-size: 12px;
    color: #F0EAD6;
    opacity: 0.85;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Canvas injected here by p5.js -->
<div id="canvas-container"></div>

<!-- Formula input: default is the classic Tixy wave -->
<input type="text" id="formula" value="sin(t + x/4 + y/4) * 2" placeholder="Enter formula (t, i, x, y)...">

<!-- Button to trigger the postcard reveal -->
<button id="sendBtn">Send Postcard</button>

<!-- Legend explaining the human encoding -->
<div id="legend">Ochre = positive. Pink = negative. Size = magnitude. Press Space to send postcard.</div>

<!-- p5.js from CDN (no other dependencies) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>
// ============================================================
// POSTCARD MATRIX — A Hand-Drawn Tixy.land
// ============================================================
// Rebuilds the iconic Tixy.land 16×16 dot-matrix engine as a
// hand-drawn data postcard. Each cell is a wobbly mark whose
// size, color, and presence are driven by a live-evaluated
// JS expression receiving t, i, x, y.
// ============================================================

// --- Grid layout constants ---
const COLS = 16;          // Tixy.land standard 16 columns
const ROWS = 16;          // Tixy.land standard 16 rows
const CELL = 26;          // cell size in pixels (fits 480 canvas with gaps)
const GAP = 4;            // 4px spacing between cells (per prompt)
const CANVAS_SIZE = 480;  // postcard canvas is exactly 480×480
const OFFSET = (CANVAS_SIZE - (COLS * CELL + (COLS - 1) * GAP)) / 2;

// --- Dear Data palette ---
const PAPER = '#F5E6D3';   // warm paper background
const OCHRE = '#D4A373';   // ochre pencil — positive values
const CHARCOAL = '#2C2C2C'; // charcoal text
const PINK = '#F15BB5';    // warm pink ink — negative values
const COBALT = '#4361EE';  // cobalt blue (watercolor wash accent)
const IVORY = '#F0EAD6';   // ivory text

// --- State ---
let formulaInput;         // DOM <input> reference
let currentFormula = "sin(t + x/4 + y/4) * 2";
let userFunc = null;      // compiled formula function
let paperTexture = null;  // off-screen graphics buffer for paper texture
let gridValues = [];      // 2D snapshot of values for postcard mode
let postcardMode = false; // true when sending the postcard
let postcardStart = 0;    // millis() when postcard mode began
const POSTCARD_DURATION = 5000; // 5-second hand-drawn reveal

/**
 * p5.js setup: runs once at startup.
 * Builds the procedural paper texture, wires up DOM events,
 * and compiles the default formula.
 */
function setup() {
  // Create the canvas and attach it to the container div
  let c = createCanvas(CANVAS_SIZE, CANVAS_SIZE);
  c.parent('canvas-container');

  // Build the warm paper texture once onto an off-screen graphics buffer
  buildPaperTexture();

  // Wire up the formula input so the grid reacts live on every keystroke
  formulaInput = document.getElementById('formula');
  formulaInput.addEventListener('input', () => {
    currentFormula = formulaInput.value;
    compileFormula();
  });

  // Wire up the Send Postcard button
  document.getElementById('sendBtn').addEventListener('click', triggerPostcard);

  // Compile the default formula
  compileFormula();
}

/**
 * Compiles the user's formula string into a callable function.
 * The formula receives (t, i, x, y) and runs inside a with(Math) scope
 * so sin, cos, PI, etc. are available without prefixes.
 */
function compileFormula() {
  try {
    userFunc = new Function('t', 'i', 'x', 'y',
      'with(Math) { return (' + currentFormula + '); }');
  } catch (e) {
    // If the formula has a syntax error, silently fall back to zero
    userFunc = null;
  }
}

/**
 * Keyboard handler: Spacebar triggers the postcard reveal.
 */
function keyPressed() {
  if (key === ' ') {
    triggerPostcard();
    // Prevent page scroll from the spacebar
    return false;
  }
}

/**
 * Trigger the 5-second "Send Postcard" animation.
 * Snapshots the current grid values so they stay frozen,
 * then reveals them one-by-one left-to-right, top-to-bottom.
 */
function triggerPostcard() {
  if (postcardMode) return;
  // Freeze the current grid into a 2D array
  snapshotGrid();
  postcardMode = true;
  postcardStart = millis();
}

/**
 * Snapshot the live grid values at the moment postcard is triggered.
 * This freezes the mathematical signal so it can be redrawn slowly.
 */
function snapshotGrid() {
  gridValues = [];
  let t = millis() / 1000;
  for (let y = 0; y < ROWS; y++) {
    let row = [];
    for (let x = 0; x < COLS; x++) {
      let i = y * COLS + x;
      let val = evaluateFormula(t, i, x, y);
      row.push(val);
    }
    gridValues.push(row);
  }
}

/**
 * Safely evaluate the compiled formula for a single cell.
 */
function evaluateFormula(t, i, x, y) {
  if (!userFunc) return 0;
  try {
    return userFunc(t, i, x, y);
  } catch (e) {
    return 0;
  }
}

/**
 * Build the procedural paper texture using random point placement
 * and low-opacity ellipses (no external images).
 */
function buildPaperTexture() {
  paperTexture = createGraphics(CANVAS_SIZE, CANVAS_SIZE);

  // Warm paper base color
  paperTexture.background(PAPER);

  // Paper grain: thousands of tiny gray dots simulating paper fiber
  paperTexture.noStroke();
  for (let n = 0; n < 2500; n++) {
    let gx = random(CANVAS_SIZE);
    let gy = random(CANVAS_SIZE);
    let gs = random(0.5, 1.5);
    paperTexture.fill(180, 170, 160, 50);
    paperTexture.ellipse(gx, gy, gs, gs);
  }

  // Watercolor wash: low-opacity random ellipses for a stained-paper feel
  for (let n = 0; n < 50; n++) {
    let wx = random(CANVAS_SIZE);
    let wy = random(CANVAS_SIZE);
    let wr = random(30, 90);
    // Mix ochre and cobalt washes with very low alpha
    let wash = random() > 0.5
      ? color(212, 163, 115, 12)  // ochre wash
      : color(67, 97, 238, 8);   // cobalt wash
    paperTexture.fill(wash);
    paperTexture.ellipse(wx, wy, wr, wr * 0.7);
  }
}

/**
 * p5.js draw loop: called every frame.
 * Draws the paper texture, then either the live grid or the postcard reveal.
 */
function draw() {
  // Blit the pre-baked paper texture as background
  image(paperTexture, 0, 0);

  if (postcardMode) {
    drawPostcardMode();
  } else {
    drawLiveMode();
  }

  // Overlay the small legend in the bottom-left corner
  drawLegend();
}

/**
 * Live mode: evaluate the formula every frame and draw all 256 marks.
 * The wobbly marks jitter each frame, giving them an organic, breathing feel.
 */
function drawLiveMode() {
  let t = millis() / 1000;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      let i = y * COLS + x;
      let val = evaluateFormula(t, i, x, y);
      drawMark(x, y, val);
    }
  }
}

/**
 * Postcard mode: slowly reveal the frozen snapshot one cell at a time
 * over exactly 5 seconds, left-to-right, top-to-bottom.
 */
function drawPostcardMode() {
  let elapsed = millis() - postcardStart;
  let totalCells = COLS * ROWS;
  // How many cells should be revealed by now?
  let revealed = floor((elapsed / POSTCARD_DURATION) * totalCells);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      let idx = y * COLS + x;
      if (idx < revealed) {
        drawMark(x, y, gridValues[y][x]);
      }
    }
  }

  // Once all 256 cells are revealed, exit postcard mode and resume live
  if (elapsed >= POSTCARD_DURATION) {
    postcardMode = false;
  }
}

/**
 * Draw a single hand-drawn wobbly mark at grid column/row.
 * Positive values → ochre dot. Negative values → pink dot.
 * Zero → no mark. Radius is mapped from magnitude.
 *
 * Technique: sample points around a circle with random(-1.5, 1.5) jitter,
 * then connect them with curveVertex() to create an irregular, hand-drawn
 * circle. No ellipse() or circle() is used for the marks.
 */
function drawMark(col, row, val) {
  if (val === 0) return;

  // Center of this cell in canvas coordinates
  let cx = OFFSET + col * (CELL + GAP) + CELL / 2;
  let cy = OFFSET + row * (CELL + GAP) + CELL / 2;

  // Map magnitude to radius (clamped so marks stay inside their cell)
  let r = map(abs(val), 0, 3, 2, CELL / 2 - 2, true);

  // Color based on sign
  let c = val > 0 ? color(OCHRE) : color(PINK);
  fill(c);
  noStroke();

  // Sample wobbly points around the circle
  let numPoints = 10;
  let pts = [];
  for (let i = 0; i < numPoints; i++) {
    let angle = map(i, 0, numPoints, 0, TWO_PI);
    // Jitter the radius to simulate hand-drawn irregularity
    let jitteredR = r + random(-1.5, 1.5);
    pts.push({
      x: cx + cos(angle) * jitteredR,
      y: cy + sin(angle) * jitteredR
    });
  }

  // Draw a closed curve through the wobbly points.
  // curveVertex() requires control points; for a closed loop we wrap
  // the first few points around to the end so the spline closes smoothly.
  beginShape();
  for (let i = 0; i < pts.length + 3; i++) {
    let idx = i % pts.length;
    curveVertex(pts[idx].x, pts[idx].y);
  }
  endShape();
}

/**
 * Draw a small legend in the bottom-left corner of the postcard.
 * Uses the system sans-serif font. Ochre and pink dots are drawn
 * with ellipse() for the legend (allowed; only the grid marks must
 * use curveVertex).
 */
function drawLegend() {
  textSize(10);
  textFont('sans-serif');
  textAlign(LEFT, CENTER);
  noStroke();

  let lx = 12;
  let ly = CANVAS_SIZE - 36;

  // Ochre legend dot
  fill(OCHRE);
  ellipse(lx, ly, 6, 6);
  fill(CHARCOAL);
  text("= positive", lx + 10, ly);

  // Pink legend dot
  fill(PINK);
  ellipse(lx, ly + 14, 6, 6);
  fill(CHARCOAL);
  text("= negative", lx + 10, ly + 14);

  // Size note
  text("Size = magnitude", lx, ly + 28);
}
</script>
</body>
</html>
