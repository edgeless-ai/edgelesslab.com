<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Reactor — Technical Schematic as Cloth Membrane</title>
<style>
  body { margin: 0; overflow: hidden; background: #1B1B1B; }
  #info {
    position: absolute;
    top: 14px;
    left: 14px;
    color: #D3E7FF;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 10;
  }
  canvas { display: block; }
</style>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<div id="info">REACTOR CORE STATUS: MEMBRANE BREATHING<br>MATERIAL: TEXTILE-STEEL HYBRID</div>
<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color('#1B1B1B');

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Auto-rotate camera instead of OrbitControls (for file:// compatibility)
let camAngle = 0;

// Reactor vessel: a cylindrical cloth-like membrane
const rows = 40;
const cols = 50;
const geo = new THREE.PlaneGeometry(3, 5, cols, rows);
const pos = geo.attributes.position;
const origPos = [];
for (let i = 0; i < pos.count; i++) {
  let v = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
  // Wrap plane into a cylinder
  let angle = (v.x / 3) * Math.PI * 2;
  let radius = 1.5;
  v.x = Math.cos(angle) * radius;
  v.z = Math.sin(angle) * radius;
  v.y = v.y; // keep height
  origPos.push(v);
}

const velocity = new Float32Array(pos.count * 3);

const material = new THREE.MeshStandardMaterial({
  color: '#D3E7FF',
  emissive: '#1B1B1B',
  roughness: 0.5,
  metalness: 0.2,
  side: THREE.DoubleSide,
  wireframe: true,
  transparent: true,
  opacity: 0.85
});

const vessel = new THREE.Mesh(geo, material);
scene.add(vessel);

// Inner core glow
const coreGeo = new THREE.SphereGeometry(0.6, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: '#D3E7FF', wireframe: true });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Lights
scene.add(new THREE.AmbientLight('#1B1B1B', 0.6));
const pointLight = new THREE.PointLight('#D3E7FF', 2.5, 25);
pointLight.position.set(3, 4, 5);
scene.add(pointLight);

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  for (let i = 0; i < pos.count; i++) {
    let x = pos.getX(i);
    let y = pos.getY(i);
    let z = pos.getZ(i);

    // Breathing target: original radius + cloth wave
    let angle = (origPos[i].y + 2.5) * 0.5; // normalize height
    let breathe = Math.sin(t * 1.8 + angle * 2) * 0.25;
    let wave = Math.sin(t * 2.5 + origPos[i].y * 3) * 0.15;

    // Target = original position with breathing offset along normal
    let tx = origPos[i].x + origPos[i].x * (breathe + wave);
    let ty = origPos[i].y;
    let tz = origPos[i].z + origPos[i].z * (breathe + wave);

    // Spring force toward target
    velocity[i * 3] += (tx - x) * 0.04;
    velocity[i * 3 + 1] += (ty - y) * 0.04;
    velocity[i * 3 + 2] += (tz - z) * 0.04;

    // Damping
    velocity[i * 3] *= 0.92;
    velocity[i * 3 + 1] *= 0.92;
    velocity[i * 3 + 2] *= 0.92;

    // Cap
    let maxV = 0.08;
    velocity[i * 3] = Math.max(-maxV, Math.min(maxV, velocity[i * 3]));
    velocity[i * 3 + 1] = Math.max(-maxV, Math.min(maxV, velocity[i * 3 + 1]));
    velocity[i * 3 + 2] = Math.max(-maxV, Math.min(maxV, velocity[i * 3 + 2]));

    pos.setXYZ(i, x + velocity[i * 3], y + velocity[i * 3 + 1], z + velocity[i * 3 + 2]);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();

  core.rotation.y = t * 0.4;
  core.rotation.x = t * 0.2;
  core.scale.setScalar(1 + Math.sin(t * 3) * 0.05);

  camAngle += 0.003;
camera.position.x = Math.sin(camAngle) * 7;
camera.position.z = Math.cos(camAngle) * 7;
camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
