<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sticky Magnetic Blueprint</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      height: 6000px;
      overflow-x: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="canvas-container"></div>
  <script>
    // ============================================================
    // THE STICKY MAGNETIC BLUEPRINT
    // A three.js demo of floating magnetic letters with honey viscosity
    // ============================================================

    // --- SCENE SETUP ---
    // Pitch-black void with a perspective camera looking down the tunnel.
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 600);
    // Add camera to the scene so its children (the trail plane) are rendered.
    scene.add(camera);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // --- LETTER PLANES ---
    // Five 300x300 planes floating along the Z axis, each with a CanvasTexture
    // showing a single vowel in a neon palette color.
    const letters = ['A', 'E', 'I', 'O', 'U'];
    const colors = ['#00FFFF', '#FF00FF', '#FFFF00', '#FFFFFF', '#00FFFF'];
    const planes = [];

    const planeGeometry = new THREE.PlaneGeometry(300, 300);

    letters.forEach((letter, i) => {
      const canvas = document.createElement('canvas');
      canvas.width = 300;
      canvas.height = 300;
      const ctx = canvas.getContext('2d');

      // Draw letter in palette color on a transparent background.
      ctx.fillStyle = colors[i];
      ctx.font = 'bold 120px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(letter, 150, 150);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        side: THREE.DoubleSide
      });

      const plane = new THREE.Mesh(planeGeometry, material);
      // Position at z = 0, -200, -400, -600, -800
      plane.position.z = -i * 200;
      scene.add(plane);
      planes.push(plane);
    });

    // --- HONEY VISCOSITY GRID ---
    // A 20x20 grid covering the viewport. Each cell tracks how much the cursor
    // has passed through it, decaying each frame like cooling honey.
    const GRID_SIZE = 20;
    const grid = new Float32Array(GRID_SIZE * GRID_SIZE);

    // --- TRAIL VISUALIZATION ---
    // We render the viscosity grid as a faint amber ghost behind the letters.
    // Instead of per-vertex colors (complex), we use a tiny 20x20 canvas as a
    // texture stretched over a full-screen plane that is a child of the camera.
    const trailCanvas = document.createElement('canvas');
    trailCanvas.width = GRID_SIZE;
    trailCanvas.height = GRID_SIZE;
    const trailCtx = trailCanvas.getContext('2d');

    const trailTexture = new THREE.CanvasTexture(trailCanvas);
    trailTexture.magFilter = THREE.LinearFilter;
    trailTexture.minFilter = THREE.LinearFilter;

    // The trail plane lives behind the camera so it always fills the viewport.
    const trailDistance = 2000;
    function getTrailSize() {
      const visibleHeight = 2 * trailDistance * Math.tan((camera.fov * Math.PI / 180) / 2);
      return { width: visibleHeight * camera.aspect, height: visibleHeight };
    }

    const trailSize = getTrailSize();
    const trailGeometry = new THREE.PlaneGeometry(trailSize.width, trailSize.height);
    const trailMaterial = new THREE.MeshBasicMaterial({
      map: trailTexture,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const trailMesh = new THREE.Mesh(trailGeometry, trailMaterial);
    trailMesh.position.z = -trailDistance;
    camera.add(trailMesh);

    // --- SCROLL PHYSICS ---
    // The smooth scroll lerp is divided by (1 + average_viscosity * 0.15).
    // The more the mouse explores the screen, the stickier the scroll feels.
    let targetScrollY = 0;
    let currentScrollY = 0;
    const baseLerp = 0.1;

    // --- MOUSE TRACKING ---
    // NDC coordinates are in [-1, 1], used for both distance checks and
    // mapping the cursor to the viscosity grid.
    const mouseNDC = { x: 0, y: 0 };

    window.addEventListener('mousemove', (e) => {
      // Convert mouse to Normalized Device Coordinates [-1, 1]
      mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;

      // Add viscosity to the grid cell under the cursor
      const gx = Math.floor((e.clientX / window.innerWidth) * GRID_SIZE);
      const gy = Math.floor((e.clientY / window.innerHeight) * GRID_SIZE);
      if (gx >= 0 && gx < GRID_SIZE && gy >= 0 && gy < GRID_SIZE) {
        const idx = gy * GRID_SIZE + gx;
        grid[idx] = Math.min(grid[idx] + 2.0, 50);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);

      // Resize the trail plane so it always fills the viewport.
      const size = getTrailSize();
      trailMesh.geometry.dispose();
      trailMesh.geometry = new THREE.PlaneGeometry(size.width, size.height);
    });

    // --- ANIMATION LOOP ---
    const vector = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);

      // 1. Read the browser's actual scroll position as our target.
      targetScrollY = window.scrollY;

      // 2. Compute average viscosity across the 400 grid cells.
      let sum = 0;
      for (let i = 0; i < grid.length; i++) {
        sum += grid[i];
      }
      const averageViscosity = sum / grid.length;

      // 3. Derive the effective lerp factor: clamped between 0.01 and 0.1.
      //    High viscosity slows the scroll lerp, making the page feel heavy.
      const effectiveLerp = Math.max(0.01, Math.min(0.1, baseLerp / (1 + averageViscosity * 0.15)));

      // 4. Smoothly interpolate currentScrollY toward the target.
      currentScrollY += (targetScrollY - currentScrollY) * effectiveLerp;

      // 5. Camera parallax: move backward through the letter tunnel.
      //    As the user scrolls down, the camera glides deeper into the scene.
      camera.position.z = 600 - currentScrollY * 0.3;
      camera.position.y = -currentScrollY * 0.05;
      camera.lookAt(0, 0, -400);

      // 6. Magnetic cursor effect: project each plane to screen space and,
      //    if within 0.35 NDC units of the mouse, pull it toward the cursor.
      for (const plane of planes) {
        // Project plane center to screen space (NDC)
        vector.set(plane.position.x, plane.position.y, plane.position.z);
        vector.project(camera);

        const dx = vector.x - mouseNDC.x;
        const dy = vector.y - mouseNDC.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 0.35) {
          // Magnetic pull in world space
          plane.position.x += (mouseNDC.x * 300 - plane.position.x) * 0.05;
          plane.position.y += (mouseNDC.y * 300 - plane.position.y) * 0.05;
          // Tilt plane based on mouse NDC
          plane.rotation.x = mouseNDC.y * 0.5;
          plane.rotation.y = mouseNDC.x * 0.5;
        }
      }

      // 7. Decay the viscosity grid by 5% each frame.
      for (let i = 0; i < grid.length; i++) {
        grid[i] *= 0.95;
      }

      // 8. Render the faint honey trail onto the 20x20 canvas texture.
      trailCtx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const v = grid[y * GRID_SIZE + x];
          if (v > 0.1) {
            // Map viscosity to a very faint amber alpha (max 0.1)
            const alpha = Math.min(v / 50, 1) * 0.1;
            trailCtx.fillStyle = `rgba(255, 200, 50, ${alpha})`;
            trailCtx.fillRect(x, y, 1, 1);
          }
        }
      }
      trailTexture.needsUpdate = true;

      // 9. Render the scene.
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
