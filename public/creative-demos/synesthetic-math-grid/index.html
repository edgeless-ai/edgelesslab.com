<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synesthetic Math Grid</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: monospace; }
  canvas { display: block; }
  #overlay { position: absolute; bottom: 10px; left: 10px; color: #0f0; font-size: 12px; pointer-events: none; }
</style>
</head>
<body>
<script>
// ---------- Audio ----------
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.4);
}

// ---------- Formula State ----------
let formulaParts = [];
let formulaString = 'sin(t)';
let keystrokeCount = 0;
let flashActive = false;
let flashTimer = 0;
const FLASH_DURATION = 300; // ms
const GHOST_FRAMES = 12;

const termMap = {
  'a': '+sin(t+x)', 'b': '+cos(t+y)', 'c': '+sin(x*y/8)',
  'd': '+cos(t+x*y)', 'e': '+sin(t*2+x)', 'f': '+cos(t*2+y)',
  'g': '+sin(t/2+x)', 'h': '+cos(t/2+y)', 'i': '+sin(t-x)',
  'j': '+cos(t-y)', 'k': '+sin(x/4)', 'l': '+cos(y/4)',
  'm': '+sin(t+x+y)', 'n': '+cos(t-x-y)', 'o': '+sin(t*x/10)',
  'p': '+cos(t*y/10)', 'q': '+sin(t+x/2)', 'r': '+cos(t+y/2)',
  's': '+sin(t-x/2)', 't': '+cos(t-y/2)', 'u': '+sin(t*x*y/50)',
  'v': '+cos(t+x*y/50)', 'w': '+sin(t+x*y)', 'x': '+cos(t-x*y)',
  'y': '+sin(t/3)', 'z': '+cos(t/3)'
};

// ---------- Particle System ----------
let particles = [];
let ghostTrails = []; // {x, y, color, life} arrays attached to particles

function spawnParticle(centerX, centerY, cellColor) {
  const angle = Math.random() * Math.PI * 2;
  const speed = Math.random() * 3 + 1;
  const p = {
    x: centerX,
    y: centerY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.2,
    opacity: 1.0,
    color: cellColor,
    shapeType: Math.floor(Math.random() * 3), // 0 circle, 1 triangle, 2 polygon
    size: Math.random() * 12 + 8,
    trail: [],
    isFlashSpawn: flashActive
  };
  particles.push(p);
}

// ---------- p5.js ----------
let gridSize = 16;
let cellW, cellH;
let canvasSize;
let fontSize = 14;

function setup() {
  canvasSize = Math.min(windowWidth, windowHeight - 40);
  createCanvas(canvasSize, canvasSize + 40);
  cellW = canvasSize / gridSize;
  cellH = canvasSize / gridSize;
  textFont('monospace');
  textSize(fontSize);
  colorMode(HSL, 360, 100, 100, 1);
  noStroke();
}

function windowResized() {
  canvasSize = Math.min(windowWidth, windowHeight - 40);
  resizeCanvas(canvasSize, canvasSize + 40);
  cellW = canvasSize / gridSize;
  cellH = canvasSize / gridSize;
}

function keyPressed() {
  const k = key.toLowerCase();
  if (termMap[k]) {
    formulaParts.push(termMap[k]);
    formulaString = 'sin(t)' + formulaParts.join('');
    keystrokeCount++;

    // Audio
    const avg = computeGridAverage(millis() / 1000.0);
    const freq = 220 + avg * 440;
    playTone(Math.max(50, Math.min(800, freq)));

    // Flash trigger every 5th keystroke
    if (keystrokeCount % 5 === 0) {
      flashActive = true;
      flashTimer = millis();
    }

    // Spawn particle at center
    const centerX = canvasSize / 2;
    const centerY = canvasSize / 2;
    const col = Math.floor(gridSize / 2);
    const row = Math.floor(gridSize / 2);
    const t = millis() / 1000.0;
    const val = safeEval(t, col, row);
    const hue = map(constrain(val, -1, 1), -1, 1, 0, 360);
    const cellColor = color(hue, 80, 70);
    spawnParticle(centerX, centerY, cellColor);

    return false;
  }
  if (key === 'Backspace') {
    if (formulaParts.length > 0) formulaParts.pop();
    formulaString = 'sin(t)' + formulaParts.join('');
    return false;
  }
  if (key === 'Enter' || key === 'Return') {
    formulaParts = [];
    formulaString = 'sin(t)';
    keystrokeCount = 0;
    return false;
  }
}

function safeEval(t, x, y) {
  try {
    const f = new Function('t', 'x', 'y', 'return (' + formulaString + ');');
    const v = f(t, x, y);
    if (!isFinite(v)) return 0;
    return constrain(v, -1, 1);
  } catch (e) {
    return 0;
  }
}

function computeGridAverage(t) {
  let sum = 0;
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      sum += safeEval(t, x, y);
    }
  }
  return sum / (gridSize * gridSize);
}

function draw() {
  const t = millis() / 1000.0;

  // Check flash expiration
  if (flashActive && millis() - flashTimer > FLASH_DURATION) {
    flashActive = false;
  }

  // Background
  if (flashActive) {
    background(0, 0, 100); // white in HSL
  } else {
    background(0, 0, 0);   // black in HSL
  }

  // Draw grid
  let gridSum = 0;
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const val = safeEval(t, x, y);
      gridSum += val;
      const cx = x * cellW + cellW / 2;
      const cy = y * cellH + cellH / 2;
      const hue = map(constrain(val, -1, 1), -1, 1, 0, 360);
      const sat = 80;
      let lig = 50;
      let rad = map(constrain(val, -1, 1), -1, 1, 2, 18);

      if (flashActive) {
        // Inverted: white background, inverted HSL
        // Hue complement = (hue + 180) % 360
        const invHue = (hue + 180) % 360;
        fill(invHue, sat, 100 - lig);
      } else {
        fill(hue, sat, lig);
      }

      ellipse(cx, cy, rad, rad);
    }
  }

  // Draw ghost trails for flash-spawned particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.isFlashSpawn && p.trail.length > 0) {
      for (let j = 0; j < p.trail.length; j++) {
        const ghost = p.trail[j];
        const alpha = 0.08;
        push();
        if (flashActive) {
          const invHue = (hue(p.color) + 180) % 360;
          fill(invHue, 80, 30, alpha);
        } else {
          fill(hue(p.color), 80, 70, alpha);
        }
        ellipse(ghost.x, ghost.y, p.size * 0.6, p.size * 0.6);
        pop();
      }
    }
  }

  // Draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.rotation += p.rotSpeed;
    p.opacity -= 0.015;

    // Record trail for flash-spawned particles
    if (p.isFlashSpawn) {
      p.trail.push({x: p.x, y: p.y});
      if (p.trail.length > GHOST_FRAMES) p.trail.shift();
    }

    if (p.opacity <= 0) {
      particles.splice(i, 1);
      continue;
    }

    push();
    translate(p.x, p.y);
    rotate(p.rotation);

    if (flashActive) {
      const invHue = (hue(p.color) + 180) % 360;
      fill(invHue, 80, 70, p.opacity);
    } else {
      fill(hue(p.color), 80, 70, p.opacity);
    }

    if (p.shapeType === 0) {
      ellipse(0, 0, p.size, p.size);
    } else if (p.shapeType === 1) {
      triangle(0, -p.size / 2, -p.size / 2, p.size / 2, p.size / 2, p.size / 2);
    } else {
      // polygon
      beginShape();
      const sides = 5;
      for (let s = 0; s < sides; s++) {
        const angle = (TWO_PI / sides) * s - HALF_PI;
        vertex(Math.cos(angle) * p.size / 2, Math.sin(angle) * p.size / 2);
      }
      endShape(CLOSE);
    }
    pop();
  }

  // Draw formula bar at bottom
  push();
  colorMode(RGB);
  fill(0);
  rect(0, canvasSize, canvasSize, 40);
  if (flashActive) {
    fill(255, 0, 0);
  } else {
    fill(0, 255, 0);
  }
  textAlign(LEFT, CENTER);
  text('f(t,x,y) = ' + formulaString, 10, canvasSize + 20);
  pop();
}
</script>
</body>
</html>
