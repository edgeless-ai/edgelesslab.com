<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }

<body>
<div id="canvas-container"></div>
<div id="ui">
  <h1>Synesthetic Weather Typewriter</h1>
  <div class="subtitle">Type to spawn letters on the sphere. Letters advect on wind derived from your text and self-sort into phonetic neighborhoods.</div>
  <label>Social Bias (Schelling threshold): <span id="bias-val">30</span>%</label>
  <input type="range" id="bias-slider" min="0" max="100" value="30">
  <div class="btn-row">
    <button id="clear-wind">Clear Wind</button>
    <button id="reseed">Reseed</button>
  </div>
  <div id="sentence-display"></div>
  <div id="stats">Letters: 0 | Settled: 0</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   PALETTE
   ============================================================ */
const PALETTE = {
  vowel: '#F4A8B4',
  plosive: '#8EC5E4',
  fricative: '#A8E6CF',
  nasal: '#FCE38A',
  liquid: '#DDA0DD',
  other: '#FBC4AB',
  globeWire: '#1A1A2E',
  globeSurface: '#0A0A14',
  star: '#FFFFFF',
  dissatisfiedGlow: '#FF6B6B',
  satisfiedBloom: '#FFFFFF',
};

/* ============================================================
   PHONETIC CLASSIFICATION
   ============================================================ */
const VOWELS = new Set('aeiouAEIOU');
const PLOSIVES = new Set('pbtdkgPBTKDG');
const FRICATIVES = new Set('fvszzhshchthFVZZHSHCHTH');
const NASALS = new Set('mnMN');
const LIQUIDS = new Set('lrwyLRWY');

function getPhoneticClass(ch) {
  if (VOWELS.has(ch)) return 'vowel';
  if (PLOSIVES.has(ch)) return 'plosive';
  if (FRICATIVES.has(ch)) return 'fricative';
  if (NASALS.has(ch)) return 'nasal';
  if (LIQUIDS.has(ch)) return 'liquid';
  return 'other';
}

/* ============================================================
   PENTATONIC SCALE
   ============================================================ */
const PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98, 1760.00, 2093.00, 2349.32, 2637.02, 3135.96, 3520.00, 4186.01, 4698.63, 5274.04, 6271.93, 7040.00, 8372.02];

function getPitch(ch) {
  const code = ch.toUpperCase().charCodeAt(0);
  const idx = (code - 65 + PENTATONIC.length) % PENTATONIC.length;
  return PENTATONIC[idx];
}

/* ============================================================
   AUDIO ENGINE
   ============================================================ */
class AudioEngine {
  constructor() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.25;
    this.master.connect(this.ctx.destination);
    this.activeTones = [];
    this.letterCount = 0;
  }

  resume() {
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }

  playTone(freq, durationMs, pan, isSeventh = false) {
    this.resume();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const panner = this.ctx.createPanner();
    panner.panningModel = 'HRTF';
    panner.distanceModel = 'inverse';
    panner.positionX.setValueAtTime(pan, now);
    panner.positionY.setValueAtTime(0, now);
    panner.positionZ.setValueAtTime(0, now);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(1, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + durationMs / 1000);

    osc.connect(gain);
    gain.connect(panner);
    panner.connect(this.master);

    osc.start(now);
    osc.stop(now + durationMs / 1000 + 0.05);

    const tone = { osc, gain, panner, startTime: now };
    this.activeTones.push(tone);

    // Minor-second dissonance every 7th letter
    if (isSeventh) {
      const osc2 = this.ctx.createOscillator();
      const gain2 = this.ctx.createGain();
      osc2.type = 'sine';
      const detune = freq * Math.pow(2, 1/12); // +1 semitone
      osc2.frequency.setValueAtTime(detune, now + 0.005);
      gain2.gain.setValueAtTime(0, now);
      gain2.gain.linearRampToValueAtTime(0.15, now + 0.005 + 0.01);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.005 + durationMs / 1000);
      osc2.connect(gain2);
      gain2.connect(panner);
      osc2.start(now + 0.005);
      osc2.stop(now + 0.005 + durationMs / 1000 + 0.05);
      tone.osc2 = osc2;
      tone.gain2 = gain2;
    }

    // Cleanup old tones
    this.activeTones = this.activeTones.filter(t => {
      if (this.ctx.currentTime - t.startTime > 2) {
        try { t.osc.disconnect(); } catch(e){}
        try { t.gain.disconnect(); } catch(e){}
        try { t.panner.disconnect(); } catch(e){}
        if (t.osc2) { try { t.osc2.disconnect(); } catch(e){} }
        if (t.gain2) { try { t.gain2.disconnect(); } catch(e){} }
        return false;
      }
      return true;
    });

    // Hard limit to 8 concurrent
    if (this.activeTones.length > 8) {
      const old = this.activeTones.shift();
      try { old.gain.gain.setValueAtTime(0, this.ctx.currentTime); } catch(e){}
      try { old.osc.stop(); } catch(e){}
      if (old.osc2) { try { old.osc2.stop(); } catch(e){} }
    }
  }

  playSettlementChime(freq, pan) {
    this.resume();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const panner = this.ctx.createPanner();
    panner.panningModel = 'HRTF';
    panner.positionX.setValueAtTime(pan, now);
    panner.positionY.setValueAtTime(0, now);
    panner.positionZ.setValueAtTime(0, now);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(1, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

    // Simple delay line for reverb-ish feel
    const delay = this.ctx.createDelay(1.0);
    delay.delayTime.value = 0.2;
    const delayGain = this.ctx.createGain();
    delayGain.gain.value = 0.3;
    const lpf = this.ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 2000;

    osc.connect(gain);
    gain.connect(panner);
    panner.connect(this.master);
    // Delay feedback
    gain.connect(delay);
    delay.connect(lpf);
    lpf.connect(delayGain);
    delayGain.connect(this.master);
    delayGain.connect(delay); // feedback loop

    osc.start(now);
    osc.stop(now + 0.5);
  }
}

/* ============================================================
   TEXT SPRITE FACTORY
   ============================================================ */
function createTextSprite(text, color, fontSize = 48) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const size = 64;
  canvas.width = size;
  canvas.height = size;
  ctx.font = `bold ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, size / 2, size / 2);
  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.95 });
  const sprite = new THREE.Sprite(material);
  sprite.scale.set(8, 8, 1);
  return sprite;
}

/* ============================================================
   MAIN SCENE
   ============================================================ */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0A0A14);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 0, 250);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 50;
controls.maxDistance = 500;

// Spherical cube (subtle faceting)
const RADIUS = 100;
const sphereGeo = new THREE.BoxGeometry(100, 100, 100, 32, 32, 32);
const posAttribute = sphereGeo.attributes.position;
for (let i = 0; i < posAttribute.count; i++) {
  const x = posAttribute.getX(i);
  const y = posAttribute.getY(i);
  const z = posAttribute.getZ(i);
  const len = Math.sqrt(x * x + y * y + z * z);
  if (len > 0) {
    posAttribute.setXYZ(i, (x / len) * RADIUS, (y / len) * RADIUS, (z / len) * RADIUS);
  }
}
sphereGeo.computeVertexNormals();

const globeMat = new THREE.MeshBasicMaterial({ color: 0x0A0A14, wireframe: false, transparent: true, opacity: 0.2 });
const globe = new THREE.Mesh(sphereGeo, globeMat);
scene.add(globe);

const globeWireMat = new THREE.MeshBasicMaterial({ color: 0x1A1A2E, wireframe: true, transparent: true, opacity: 0.15 });
const globeWire = new THREE.Mesh(sphereGeo.clone(), globeWireMat);
scene.add(globeWire);

// Starfield
const STAR_COUNT = 5000;
const starPositions = new Float32Array(STAR_COUNT * 3);
const starGeo = new THREE.BufferGeometry();
for (let i = 0; i < STAR_COUNT; i++) {
  const r = 400 + Math.random() * 600;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPositions[i * 3 + 2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0.4, sizeAttenuation: true });
const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

// Letter-stars (3% weirdness)
const LETTER_STAR_COUNT = 150;
const letterStarPositions = new Float32Array(LETTER_STAR_COUNT * 3);
const letterStarGeo = new THREE.BufferGeometry();
letterStarGeo.setAttribute('position', new THREE.BufferAttribute(letterStarPositions, 3));
const letterStarMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.0, transparent: true, opacity: 0.4, sizeAttenuation: true });
const letterStars = new THREE.Points(letterStarGeo, letterStarMat);
scene.add(letterStars);

// Letter-stars data
const letterStarData = new Array(LETTER_STAR_COUNT).fill(null).map(() => ({
  originLat: 0, originLon: 0, drift: 0, active: false
}));

/* ============================================================
   STATE
   ============================================================ */
const audio = new AudioEngine();
let sprites = [];
let currentSentence = '';
let sentenceCap = 50;
let threshold = 0.30;
let frameCount = 0;
const windField = new Array(36).fill(0).map(() => new Array(72).fill(null).map(() => ({ u: 0, v: 0 })));

/* ============================================================
   UI BINDINGS
   ============================================================ */
const biasSlider = document.getElementById('bias-slider');
const biasVal = document.getElementById('bias-val');
const sentenceDisplay = document.getElementById('sentence-display');
const statsDisplay = document.getElementById('stats');

biasSlider.addEventListener('input', (e) => {
  threshold = parseInt(e.target.value, 10) / 100;
  biasVal.textContent = e.target.value;
});

document.getElementById('clear-wind').addEventListener('click', () => {
  currentSentence = '';
  recomputeWindField();
  updateSentenceDisplay();
});

document.getElementById('reseed').addEventListener('click', () => {
  sprites.forEach(s => {
    scene.remove(s.mesh);
    if (s.trailLine) scene.remove(s.trailLine);
  });
  sprites = [];
  currentSentence = '';
  recomputeWindField();
  updateSentenceDisplay();
  updateStats();
});

function updateSentenceDisplay() {
  sentenceDisplay.textContent = currentSentence || '...';
}

function updateStats() {
  const settled = sprites.filter(s => s.settled).length;
  statsDisplay.textContent = `Letters: ${sprites.length} | Settled: ${settled}`;
}

/* ============================================================
   SPHERICAL MATH
   ============================================================ */
function latLonToVec(lat, lon, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  const x = -(radius * Math.sin(phi) * Math.cos(theta));
  const z = radius * Math.sin(phi) * Math.sin(theta);
  const y = radius * Math.cos(phi);
  return new THREE.Vector3(x, y, z);
}

function wrapLatLon(lat, lon) {
  let wlat = lat;
  let wlon = lon;
  if (wlat > 90) wlat = 90 - (wlat - 90);
  if (wlat < -90) wlat = -90 - (wlat + 90);
  wlon = ((wlon + 180) % 360 + 360) % 360 - 180;
  return { lat: wlat, lon: wlon };
}

function geodesicDist(lat1, lon1, lat2, lon2) {
  const r1 = lat1 * Math.PI / 180;
  const r2 = lat2 * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(r1) * Math.sin(r2) + Math.cos(r1) * Math.cos(r2) * Math.cos(dLon);
  return Math.acos(Math.max(-1, Math.min(1, a)));
}

/* ============================================================
   WIND FIELD
   ============================================================ */
function recomputeWindField() {
  // Reset
  for (let i = 0; i < 36; i++) {
    for (let j = 0; j < 72; j++) {
      windField[i][j] = { u: 0, v: 0 };
    }
  }
  const len = currentSentence.length;
  for (let idx = 0; idx < len && idx < sentenceCap; idx++) {
    const ch = currentSentence[idx];
    const charCode = ch.charCodeAt(0);
    const angle = (charCode * 7.3 + idx * 11.7) % 360;
    const rad = angle * Math.PI / 180;
    const magnitude = 0.2 + (idx / Math.max(len, 1)) * 0.5;
    const cellLat = Math.floor(((idx % 36) / 36) * 36);
    const cellLon = Math.floor(((charCode % 72) / 72) * 72);
    const u = Math.cos(rad) * magnitude;
    const v = Math.sin(rad) * magnitude;
    windField[cellLat][cellLon].u += u;
    windField[cellLat][cellLon].v += v;
  }
  // Smooth
  for (let i = 0; i < 36; i++) {
    for (let j = 0; j < 72; j++) {
      const neighbors = [];
      for (let di = -1; di <= 1; di++) {
        for (let dj = -1; dj <= 1; dj++) {
          const ni = (i + di + 36) % 36;
          const nj = (j + dj + 72) % 72;
          neighbors.push(windField[ni][nj]);
        }
      }
      const avgU = neighbors.reduce((s, n) => s + n.u, 0) / neighbors.length;
      const avgV = neighbors.reduce((s, n) => s + n.v, 0) / neighbors.length;
      windField[i][j] = { u: avgU, v: avgV };
    }
  }
}

function sampleWind(lat, lon) {
  const latIdx = Math.floor(((lat + 90) / 180) * 36) % 36;
  const lonIdx = Math.floor(((lon + 180) / 360) * 72) % 72;
  const cell = windField[latIdx] && windField[latIdx][lonIdx] ? windField[latIdx][lonIdx] : { u: 0, v: 0 };
  return { u: cell.u, v: cell.v };
}

/* ============================================================
   KEYBOARD HANDLER
   ============================================================ */
let letterCounter = 0;

window.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length !== 1) return;
  const ch = e.key;
  if (!/[a-zA-Z0-9\s\p{P}]/u.test(ch)) return;

  letterCounter++;
  const isSeventh = letterCounter % 7 === 0;

  const pClass = getPhoneticClass(ch);
  const color = PALETTE[pClass];
  const pitch = getPitch(ch);

  const lat = (Math.random() - 0.5) * 160;
  const lon = (Math.random() - 0.5) * 360;
  const pos = latLonToVec(lat, lon, RADIUS);

  const mesh = createTextSprite(ch, color);
  mesh.position.copy(pos);
  scene.add(mesh);

  const trailGeo = new THREE.BufferGeometry();
  const trailMat = new THREE.LineBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: 0.3 });
  const trailLine = new THREE.Line(trailGeo, trailMat);
  scene.add(trailLine);

  const sprite = {
    char: ch,
    phoneticClass: pClass,
    color,
    pitch,
    lat,
    lon,
    speed: 0.5,
    satisfied: false,
    settled: false,
    mesh,
    trail: [],
    trailGeo,
    trailLine,
    trailMat,
  };
  sprites.push(sprite);

  const pan = lon / 180;
  audio.playTone(pitch, 150, pan, isSeventh);

  currentSentence += ch;
  if (currentSentence.length > sentenceCap) {
    currentSentence = currentSentence.slice(-sentenceCap);
  }
  recomputeWindField();
  updateSentenceDisplay();
  updateStats();
});

/* ============================================================
   NEAREST NEIGHBORS
   ============================================================ */
function getNeighbors(sprite, count = 12) {
  const others = sprites.filter(s => s !== sprite);
  others.sort((a, b) => {
    const da = geodesicDist(sprite.lat, sprite.lon, a.lat, a.lon);
    const db = geodesicDist(sprite.lat, sprite.lon, b.lat, b.lon);
    return da - db;
  });
  return others.slice(0, count);
}

/* ============================================================
   UPDATE LOOP
   ============================================================ */
function updateSprites() {
  sprites.forEach(sprite => {
    const wind = sampleWind(sprite.lat, sprite.lon);
    const drift = sprite.settled ? 0.05 : 0.5;

    // Social evaluation every 30 frames
    if (frameCount % 30 === 0 && !sprite.settled) {
      const neighbors = getNeighbors(sprite, 12);
      const sameClass = neighbors.filter(n => n.phoneticClass === sprite.phoneticClass).length;
      const ratio = sameClass / 12;
      sprite.satisfied = ratio >= threshold;
      if (sprite.satisfied) {
        sprite.settled = true;
        sprite.speed *= 0.3;
        const pan = sprite.lon / 180;
        audio.playSettlementChime(sprite.pitch, pan);
        // Bloom effect
        sprite.mesh.material.color = new THREE.Color(PALETTE.satisfiedBloom);
        sprite.mesh.scale.set(6, 6, 1);
      } else if (ratio < threshold) {
        // Dissatisfied glow
        sprite.mesh.material.color = new THREE.Color(PALETTE.dissatisfiedGlow);
      } else {
        sprite.mesh.material.color = new THREE.Color(sprite.color);
      }
    }

    // If settled but threshold changes and now dissatisfied, unsettle
    if (sprite.settled && frameCount % 30 === 0) {
      const neighbors = getNeighbors(sprite, 12);
      const sameClass = neighbors.filter(n => n.phoneticClass === sprite.phoneticClass).length;
      const ratio = sameClass / 12;
      if (ratio < threshold) {
        sprite.settled = false;
        sprite.speed = 0.5;
        sprite.mesh.material.color = new THREE.Color(sprite.color);
        sprite.mesh.scale.set(8, 8, 1);
      }
    }

    // Update lat/lon
    const latDelta = (wind.v + (Math.random() - 0.5) * 0.05) * sprite.speed * drift;
    const lonDelta = (wind.u + (Math.random() - 0.5) * 0.05) * sprite.speed * drift;
    sprite.lat += latDelta;
    sprite.lon += lonDelta;
    const wrapped = wrapLatLon(sprite.lat, sprite.lon);
    sprite.lat = wrapped.lat;
    sprite.lon = wrapped.lon;

    // Update 3D position
    const pos = latLonToVec(sprite.lat, sprite.lon, RADIUS);
    sprite.mesh.position.copy(pos);

    // Trail
    sprite.trail.push(pos.clone());
    if (sprite.trail.length > 20) sprite.trail.shift();
    const positions = new Float32Array(sprite.trail.length * 3);
    for (let i = 0; i < sprite.trail.length; i++) {
      positions[i * 3] = sprite.trail[i].x;
      positions[i * 3 + 1] = sprite.trail[i].y;
      positions[i * 3 + 2] = sprite.trail[i].z;
    }
    sprite.trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    sprite.trailGeo.setDrawRange(0, sprite.trail.length);
    sprite.trailMat.opacity = sprite.settled ? 0.15 : 0.3;
  });

  // Update stats periodically
  if (frameCount % 60 === 0) updateStats();
}

/* ============================================================
   LETTER-STARS UPDATE (3% weirdness)
   ============================================================ */
function updateLetterStars() {
  const positions = letterStars.geometry.attributes.position.array;
  // Every 10 frames, reassign some letter-stars
  if (frameCount % 10 === 0 && sprites.length > 0) {
    for (let i = 0; i < LETTER_STAR_COUNT; i++) {
      if (Math.random() < 0.03) {
        const src = sprites[Math.floor(Math.random() * sprites.length)];
        const pos = latLonToVec(src.lat, src.lon, RADIUS + 50 + Math.random() * 200);
        letterStarData[i] = {
          originLat: src.lat,
          originLon: src.lon,
          drift: 0.1 + Math.random() * 0.2,
          active: true,
          x: pos.x,
          y: pos.y,
          z: pos.z,
        };
      }
    }
  }

  for (let i = 0; i < LETTER_STAR_COUNT; i++) {
    const d = letterStarData[i];
    if (!d.active) {
      // Random position far away
      const r = 400 + Math.random() * 600;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
      continue;
    }
    // Drift outward
    const vec = new THREE.Vector3(d.x, d.y, d.z);
    const len = vec.length();
    if (len > 0) {
      vec.normalize().multiplyScalar(d.drift);
      d.x += vec.x;
      d.y += vec.y;
      d.z += vec.z;
    }
    positions[i * 3] = d.x;
    positions[i * 3 + 1] = d.y;
    positions[i * 3 + 2] = d.z;
    // Deactivate if too far
    if (len > 1200) d.active = false;
  }
  letterStars.geometry.attributes.position.needsUpdate = true;
}

/* ============================================================
   ANIMATION LOOP
   ============================================================ */
function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  starField.rotation.y += 0.001;
  letterStars.rotation.y += 0.0008;

  updateSprites();
  updateLetterStars();
  controls.update();
  renderer.render(scene, camera);
}

/* ============================================================
   RESIZE
   ============================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
animate();
</script>
</body>
</html>
