<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail Puppet — 3D Particle Mascot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #F5F5F0; font-family: system-ui, sans-serif; }
  #overlay {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    pointer-events: none; user-select: none;
  }
  #overlay h1 {
    font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #1A1A1A; opacity: 0.7;
  }
  #overlay .palette {
    margin-top: 6px; display: flex; gap: 6px;
  }
  .swatch {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid rgba(26,26,26,0.12);
  }
  #canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
  <div id="overlay">
    <h1>Trail Puppet — Ordinary Folk × Silk</h1>
    <div class="palette">
      <div class="swatch" style="background:#B2F2BB"></div>
      <div class="swatch" style="background:#E0C3FC"></div>
      <div class="swatch" style="background:#FF6B6B"></div>
      <div class="swatch" style="background:#00E5FF"></div>
    </div>
  </div>
  <div id="canvas"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  const MAX = 10000;
  const COLORS = [
    new THREE.Color('#B2F2BB'),
    new THREE.Color('#E0C3FC'),
    new THREE.Color('#FF6B6B'),
    new THREE.Color('#00E5FF')
  ];

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#F5F5F0');

  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 25);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.getElementById('canvas').appendChild(renderer.domElement);

  const geom = new THREE.BufferGeometry();
  const pos = new Float32Array(MAX * 3);
  const col = new Float32Array(MAX * 3);
  const sizes = new Float32Array(MAX);
  const life = new Float32Array(MAX);
  geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
  geom.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    size: 0.35, vertexColors: true, transparent: true, opacity: 0.85,
    sizeAttenuation: true, depthWrite: false, blending: THREE.NormalBlending
  });

  const points = new THREE.Points(geom, mat);
  scene.add(points);

  const ray = new THREE.Raycaster();
  const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
  const mouse = new THREE.Vector2();
  const target = new THREE.Vector3();
  let writeHead = 0;
  let activeCount = 0;
  let colorIndex = 0;

  const mouseNDC = new THREE.Vector2();
  let normX = 0;
  let normY = 0;

  const addParticle = (v, c) => {
    const i = writeHead;
    pos[i * 3] = v.x; pos[i * 3 + 1] = v.y; pos[i * 3 + 2] = v.z;
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
    sizes[i] = 0.45 + Math.random() * 0.25;
    life[i] = 1.0;
    writeHead = (writeHead + 1) % MAX;
    activeCount = Math.min(activeCount + 1, MAX);
    geom.attributes.position.needsUpdate = true;
    geom.attributes.color.needsUpdate = true;
    geom.attributes.size.needsUpdate = true;
  };

  const mirror4 = (v, out = []) => {
    out.length = 0;
    out.push(new THREE.Vector3(v.x, v.y, v.z));
    out.push(new THREE.Vector3(-v.x, v.y, v.z));
    out.push(new THREE.Vector3(v.x, -v.y, v.z));
    out.push(new THREE.Vector3(-v.x, -v.y, v.z));
    out.push(new THREE.Vector3(v.y, v.x, v.z));
    out.push(new THREE.Vector3(-v.y, v.x, v.z));
    out.push(new THREE.Vector3(v.y, -v.x, v.z));
    out.push(new THREE.Vector3(-v.y, -v.x, v.z));
    return out;
  };

  const buf = [];
  const onMove = (e) => {
    mouseNDC.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
    ray.setFromCamera(mouseNDC, camera);
    const hit = new THREE.Vector3();
    const result = ray.ray.intersectPlane(plane, hit);
    if (!result) return;
    target.copy(hit);
    normX = mouseNDC.x; normY = mouseNDC.y;
    const c = COLORS[colorIndex];
    mirror4(hit, buf);
    for (let i = 0; i < buf.length; i++) addParticle(buf[i], c);
    colorIndex = (colorIndex + 1) % COLORS.length;
  };
  window.addEventListener('mousemove', onMove);

  let squash = { t: 0, active: false, start: 0 };
  window.addEventListener('click', () => { squash.active = true; squash.t = 0; });
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  const clock = new THREE.Clock();

  const tick = () => {
    const dt = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Cursor-driven rotation
    const targetRotY = normX * 0.8;
    points.rotation.y += (targetRotY - points.rotation.y) * 3.0 * dt;
    points.rotation.x += (normY * 0.3 - points.rotation.x) * 2.0 * dt;

    // Gentle idle rotation
    points.rotation.z += 0.05 * dt;

    // Squash-and-stretch pulse
    if (squash.active) {
      squash.t += dt;
      const p = squash.t / 0.3;
      if (p >= 1) { squash.active = false; points.scale.set(1, 1, 1); }
      else {
        const k = Math.sin(p * Math.PI * 2) * (1 - p);
        const sx = 1 + k * 0.2;
        const sy = 1 - k * 0.2;
        points.scale.set(sx, sy, 1 + k * 0.05);
      }
    }

    // Fade / breathe
    const count = Math.min(activeCount, MAX);
    for (let i = 0; i < count; i++) {
      life[i] -= dt * 0.15;
      if (life[i] < 0) life[i] = 0;
      const s = 0.3 + (life[i] * 0.4) + Math.sin(elapsed * 2 + i) * 0.05;
      sizes[i] = Math.max(0.05, s);
    }
    geom.attributes.size.needsUpdate = true;

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
  </script>
</body>
</html>
