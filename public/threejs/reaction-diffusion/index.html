<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Reaction-Diffusion — Edgeless Lab</title>
<style>
  :root { --bg:#09090B; --ink:#C6F24E; --muted:#8FA378; --line:rgba(255,255,255,.10); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); overflow:hidden; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:#FAFAFA; }
  #gl { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  .hud { position:fixed; left:0; right:0; bottom:0; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
         background:linear-gradient(to top, rgba(9,9,11,.86), rgba(9,9,11,0)); pointer-events:none;
         transition:opacity .5s, transform .5s; }
  .hud.hidden { opacity:0; transform:translateY(12px); }
  .panel { max-width:560px; margin:0 auto; pointer-events:auto; }
  .row { display:flex; align-items:center; gap:12px; margin-top:10px; }
  .row label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); width:38px; flex:none; }
  .row input[type=range]{ -webkit-appearance:none; appearance:none; flex:1; height:2px; background:var(--line); border-radius:2px; outline:none; }
  .row input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--ink); cursor:pointer; box-shadow:0 0 12px rgba(198,242,78,.6); }
  .row input[type=range]::-moz-range-thumb{ width:16px; height:16px; border:none; border-radius:50%; background:var(--ink); }
  .row .val { font-size:11px; color:var(--ink); width:52px; text-align:right; flex:none; }
  .top { position:fixed; top:0; left:0; right:0; padding:calc(12px + env(safe-area-inset-top)) 16px 12px; display:flex; align-items:center; justify-content:space-between; pointer-events:none; z-index:2; }
  .brand { font-size:13px; font-weight:600; letter-spacing:-.01em; }
  .brand .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--ink); margin-right:7px; vertical-align:middle; box-shadow:0 0 8px rgba(198,242,78,.6); }
  .brand .sub { color:rgba(255,255,255,.4); }
  .hint { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); transition:opacity .5s; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:2px; }
  .chip { pointer-events:auto; font:inherit; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
          background:rgba(198,242,78,.10); border:1px solid var(--line); border-radius:999px; padding:6px 11px; cursor:pointer; transition:.15s; }
  .chip:hover, .chip.on { color:var(--bg); background:var(--ink); border-color:var(--ink); box-shadow:0 0 14px rgba(198,242,78,.35); }
  .err { position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:24px; text-align:center; color:var(--muted); font-size:13px; line-height:1.6; }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="top">
  <div class="brand"><span class="dot"></span>edgeless<span class="sub">/lab</span></div>
  <div class="hint" id="hint">drag to seed</div>
</div>
<div class="hud" id="hud"><div class="panel">
  <div class="chips">
    <button class="chip on" data-preset="worms">worms</button>
    <button class="chip" data-preset="mitosis">mitosis</button>
    <button class="chip" data-preset="coral">coral</button>
    <button class="chip" data-preset="maze">maze</button>
    <button class="chip" data-preset="pulse">pulse</button>
    <button class="chip" data-preset="clear">clear</button>
  </div>
  <div class="row"><label>feed</label><input id="f" type="range" min="0.010" max="0.090" step="0.001" value="0.037"><span class="val" id="fv">0.037</span></div>
  <div class="row"><label>kill</label><input id="k" type="range" min="0.045" max="0.070" step="0.0005" value="0.060"><span class="val" id="kv">0.060</span></div>
</div></div>
<div class="err" id="err">WebGL2 with float buffers isn't available on this device.<br>Try a current mobile browser.</div>

<script>
"use strict";
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl2", { antialias:false, preserveDrawingBuffer:false, powerPreference:"high-performance" });
function fail(){ document.getElementById("err").style.display="flex"; }
if (!gl) { fail(); throw new Error("no webgl2"); }
if (!gl.getExtension("EXT_color_buffer_float")) { fail(); throw new Error("no float buffers"); }
gl.getExtension("OES_texture_float_linear");

const VERT = `#version 300 es
in vec2 p; out vec2 uv; void main(){ uv=p*0.5+0.5; gl_Position=vec4(p,0.,1.); }`;

// Gray-Scott update (Karl-Sims params, realtime-stable). Continuous "breathing" of F/k
// via uniforms keeps the field forever morphing — it never settles into a still frame.
const SIM = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o;
uniform sampler2D state; uniform vec2 texel; uniform float F, K;
uniform vec2 seed; uniform float seedR; uniform float seeding;
void main(){
  vec2 c = texture(state, uv).xy;
  vec2 l = texture(state, uv+vec2(-texel.x,0.)).xy + texture(state, uv+vec2(texel.x,0.)).xy
         + texture(state, uv+vec2(0.,-texel.y)).xy + texture(state, uv+vec2(0.,texel.y)).xy
         + 0.5*(texture(state, uv+vec2(-texel.x,-texel.y)).xy + texture(state, uv+vec2(texel.x,-texel.y)).xy
              + texture(state, uv+vec2(-texel.x,texel.y)).xy + texture(state, uv+vec2(texel.x,texel.y)).xy)
         - 6.0*c;
  l /= 6.0;
  float u=c.x, v=c.y, uvv=u*v*v;
  vec2 n = c + vec2(0.16*l.x - uvv + F*(1.0-u), 0.08*l.y + uvv - (F+K)*v);
  float d = distance(uv, seed);
  if (seeding>0.5 && d < seedR){ n.y=0.5; n.x=0.2; }
  o = vec4(clamp(n,0.,1.), 0., 1.);
}`;

// Colour pass: map v through the Edgeless bioluminescent ramp → full-res colour texture.
const COLOR = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o; uniform sampler2D state; uniform float time;
vec3 ramp(float t){ t=clamp(t,0.,1.);
  vec3 c0=vec3(0.020,0.027,0.039),c1=vec3(0.031,0.125,0.102),c2=vec3(0.047,0.227,0.165),
       c3=vec3(0.180,0.490,0.275),c4=vec3(0.490,0.827,0.373),c5=vec3(0.776,0.949,0.306),c6=vec3(0.957,1.0,0.902);
  if(t<0.16)return mix(c0,c1,t/0.16); if(t<0.34)return mix(c1,c2,(t-0.16)/0.18);
  if(t<0.52)return mix(c2,c3,(t-0.34)/0.18); if(t<0.72)return mix(c3,c4,(t-0.52)/0.20);
  if(t<0.88)return mix(c4,c5,(t-0.72)/0.16); return mix(c5,c6,(t-0.88)/0.12); }
void main(){
  float v = texture(state, uv).y;
  o = vec4(ramp(pow(v*3.4, 0.88)), 1.0);
}`;

// Separable blur w/ bright-pass — the glow that makes the filaments luminesce.
const BLUR = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o; uniform sampler2D src; uniform vec2 dir; uniform float bright;
float luma(vec3 c){ return dot(c, vec3(0.299,0.587,0.114)); }
vec3 tap(vec2 co){ vec3 c=texture(src,co).rgb; if(bright>0.5){ c *= smoothstep(0.28,0.75,luma(c)); } return c; }
void main(){
  vec3 s = tap(uv)*0.2270270270;
  s += tap(uv+dir*1.3846153846)*0.3162162162; s += tap(uv-dir*1.3846153846)*0.3162162162;
  s += tap(uv+dir*3.2307692308)*0.0702702703; s += tap(uv-dir*3.2307692308)*0.0702702703;
  o = vec4(s,1.0);
}`;

// Composite: base colour + bloom + a slow shimmer + vignette. This is the hypnotic layer.
const COMP = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o; uniform sampler2D base; uniform sampler2D bloom; uniform float time; uniform float amt;
void main(){
  vec3 b = texture(base, uv).rgb;
  vec3 g = texture(bloom, uv).rgb;
  vec3 col = b + g*amt;
  // slow luminous shimmer travelling up the field
  col *= 1.0 + 0.05*sin(time*0.6 + uv.y*4.0 + uv.x*1.5);
  // gentle vignette to focus the eye
  float d = distance(uv, vec2(0.5));
  col *= smoothstep(0.95, 0.35, d)*0.35 + 0.65;
  o = vec4(col, 1.0);
}`;

function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)){ console.error(gl.getShaderInfoLog(o)); fail(); throw 0; } return o; }
function prog(v,f){ const p=gl.createProgram(); gl.attachShader(p,sh(gl.VERTEX_SHADER,v)); gl.attachShader(p,sh(gl.FRAGMENT_SHADER,f));
  gl.linkProgram(p); if(!gl.getProgramParameter(p,gl.LINK_STATUS)){ console.error(gl.getProgramInfoLog(p)); fail(); throw 0; } return p; }
const simP=prog(VERT,SIM), colorP=prog(VERT,COLOR), blurP=prog(VERT,BLUR), compP=prog(VERT,COMP);

const quad=gl.createVertexArray(); gl.bindVertexArray(quad);
const vbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

function target(w,h,filter){
  const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.HALF_FLOAT,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,filter); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,filter);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f); gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  return {t,f,w,h};
}

let SW,SH,texel,sim=[],cur=0,colorT,bloomA,bloomB;
function seedField(){
  const w=SW,h=SH,data=new Float32Array(w*h*4);
  for(let i=0;i<w*h;i++){ data[i*4]=1.0; data[i*4+3]=1.0; }
  const r=Math.max(3,Math.floor(SW/28));
  for(let b=0;b<16;b++){ const cx=r+((Math.random()*(w-2*r))|0), cy=r+((Math.random()*(h-2*r))|0);
    for(let y=-r;y<r;y++)for(let x=-r;x<r;x++){ const idx=((cy+y)*w+(cx+x))*4; data[idx]=0.2; data[idx+1]=0.5; } }
  return data;
}
function alloc(){
  // higher sim resolution for crisper filaments (capped for phone GPUs)
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const maxDim=Math.min(1100, Math.floor(Math.min(window.innerWidth,window.innerHeight)*dpr*0.95));
  const a=window.innerWidth/window.innerHeight;
  SW=Math.max(96, a>=1?maxDim:Math.floor(maxDim*a));
  SH=Math.max(96, a>=1?Math.floor(maxDim/a):maxDim);
  texel=[1/SW,1/SH];
  [...sim, colorT, bloomA, bloomB].forEach(o=>{ if(o){ gl.deleteTexture(o.t); gl.deleteFramebuffer(o.f); } });
  sim=[target(SW,SH,gl.LINEAR), target(SW,SH,gl.LINEAR)]; cur=0;
  colorT=target(SW,SH,gl.LINEAR);
  const bw=Math.max(64,SW>>1), bh=Math.max(64,SH>>1);
  bloomA=target(bw,bh,gl.LINEAR); bloomB=target(bw,bh,gl.LINEAR);
  const seed=seedField();
  for(const s of sim){ gl.bindTexture(gl.TEXTURE_2D,s.t); gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,SW,SH,0,gl.RGBA,gl.FLOAT,seed); }
}
function resize(){ const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=(window.innerWidth*dpr)|0; canvas.height=(window.innerHeight*dpr)|0; alloc(); }
window.addEventListener("resize",()=>{ clearTimeout(window._rt); window._rt=setTimeout(resize,180); });

let seeding=0, seedPos=[0.5,0.5];
function pos(e){ const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
  seedPos=[(t.clientX-r.left)/r.width, 1.0-(t.clientY-r.top)/r.height]; }
canvas.addEventListener("pointerdown",e=>{ seeding=1; pos(e); revealHUD(); });
canvas.addEventListener("pointermove",e=>{ if(seeding) pos(e); });
window.addEventListener("pointerup",()=> seeding=0);

let F=0.037, K=0.060, breathe=true;
const fEl=document.getElementById("f"),kEl=document.getElementById("k"),fv=document.getElementById("fv"),kv=document.getElementById("kv");
fEl.oninput=()=>{ F=+fEl.value; fv.textContent=F.toFixed(3); breathe=false; };
kEl.oninput=()=>{ K=+kEl.value; kv.textContent=K.toFixed(3); breathe=false; };
const PRESETS={ worms:[0.037,0.060], mitosis:[0.026,0.055], coral:[0.055,0.062], maze:[0.029,0.057], pulse:[0.025,0.060] };
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on")); c.classList.add("on");
  const p=c.dataset.preset;
  if(p==="clear"){ alloc(); return; }
  breathe = (p==="pulse");
  const [f,k]=PRESETS[p]; F=f; K=k; fEl.value=f; kEl.value=k; fv.textContent=f.toFixed(3); kv.textContent=k.toFixed(3);
});

// auto-hide the HUD for full immersion; a touch brings it back
const hud=document.getElementById("hud"), hint=document.getElementById("hint");
let hideT; function revealHUD(){ hud.classList.remove("hidden"); hint.style.opacity="0"; clearTimeout(hideT); hideT=setTimeout(()=>hud.classList.add("hidden"),4200); }
setTimeout(()=>{ hud.classList.add("hidden"); }, 5000);

const uSim={state:gl.getUniformLocation(simP,"state"),texel:gl.getUniformLocation(simP,"texel"),F:gl.getUniformLocation(simP,"F"),K:gl.getUniformLocation(simP,"K"),seed:gl.getUniformLocation(simP,"seed"),seedR:gl.getUniformLocation(simP,"seedR"),seeding:gl.getUniformLocation(simP,"seeding")};
const uCol={state:gl.getUniformLocation(colorP,"state")};
const uBlur={src:gl.getUniformLocation(blurP,"src"),dir:gl.getUniformLocation(blurP,"dir"),bright:gl.getUniformLocation(blurP,"bright")};
const uComp={base:gl.getUniformLocation(compP,"base"),bloom:gl.getUniformLocation(compP,"bloom"),time:gl.getUniformLocation(compP,"time"),amt:gl.getUniformLocation(compP,"amt")};
resize();

function draw(prog,fbo){ gl.bindFramebuffer(gl.FRAMEBUFFER, fbo?fbo.f:null);
  gl.viewport(0,0, fbo?fbo.w:canvas.width, fbo?fbo.h:canvas.height); gl.useProgram(prog); gl.drawArrays(gl.TRIANGLES,0,3); }
function bind(tex,unit,loc){ gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D,tex); gl.uniform1i(loc,unit); }

let _fc=0; window._probe=()=>({frames:_fc,SW,SH});
function frame(t){
  try{
  _fc++; const time=t*0.001;
  // continuous breathing of the feed rate → the field never fully settles
  const Fb = breathe ? F + 0.0035*Math.sin(time*0.11) + 0.0018*Math.sin(time*0.037) : F;
  gl.bindVertexArray(quad);
  // 1) simulation ping-pong
  gl.useProgram(simP); gl.uniform2fv(uSim.texel,texel); gl.uniform1f(uSim.K,K);
  gl.uniform2fv(uSim.seed,seedPos); gl.uniform1f(uSim.seedR,0.032);
  const STEPS=9;
  for(let s=0;s<STEPS;s++){ const src=sim[cur],dst=sim[cur^1];
    gl.bindFramebuffer(gl.FRAMEBUFFER,dst.f); gl.viewport(0,0,SW,SH);
    bind(src.t,0,uSim.state); gl.uniform1f(uSim.F,Fb); gl.uniform1f(uSim.seeding, s===0?seeding:0.0);
    gl.drawArrays(gl.TRIANGLES,0,3); cur^=1; }
  // 2) colour
  gl.useProgram(colorP); bind(sim[cur].t,0,uCol.state); draw(colorP,colorT);
  // 3) bloom: bright-pass + separable blur at half res
  gl.useProgram(blurP);
  bind(colorT.t,0,uBlur.src); gl.uniform1f(uBlur.bright,1.0); gl.uniform2f(uBlur.dir,1.4/bloomA.w,0.0); draw(blurP,bloomA);
  bind(bloomA.t,0,uBlur.src); gl.uniform1f(uBlur.bright,0.0); gl.uniform2f(uBlur.dir,0.0,1.4/bloomB.h); draw(blurP,bloomB);
  bind(bloomB.t,0,uBlur.src); gl.uniform1f(uBlur.bright,0.0); gl.uniform2f(uBlur.dir,2.6/bloomA.w,0.0); draw(blurP,bloomA);
  bind(bloomA.t,0,uBlur.src); gl.uniform1f(uBlur.bright,0.0); gl.uniform2f(uBlur.dir,0.0,2.6/bloomB.h); draw(blurP,bloomB);
  // 4) composite to screen
  gl.useProgram(compP); bind(colorT.t,0,uComp.base); bind(bloomB.t,1,uComp.bloom);
  gl.uniform1f(uComp.time,time); gl.uniform1f(uComp.amt,1.25); draw(compP,null);
  }catch(e){ console.error("FRAME_ERR",e&&e.message,e); window._ferr=String(e); return; }
  requestAnimationFrame(frame);
}
window._step=()=>frame(performance.now());
requestAnimationFrame(frame);
</script>
</body>
</html>
