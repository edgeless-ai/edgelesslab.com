<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Serialism - Algorithm Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            min-width: 250px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .filter-btn.active {
            background: #fff;
            color: #667eea;
            border-color: #fff;
        }

        .main-content {
            padding: 40px 0;
        }

        .focus-panel {
            background: rgba(12, 18, 42, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 36px;
            backdrop-filter: blur(14px);
        }

        .focus-header {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .focus-kicker {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            opacity: 0.75;
            margin-bottom: 10px;
        }

        .focus-title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .focus-description {
            max-width: 780px;
            line-height: 1.6;
            opacity: 0.92;
        }

        .focus-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .focus-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 999px;
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            font-size: 13px;
            font-weight: 600;
        }

        .focus-btn:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .focus-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .focus-trails {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .focus-guidance-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .focus-guidance-card {
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .focus-guidance-title {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.72;
        }

        .focus-guidance-copy {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .focus-chip-row,
        .focus-workflow-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .focus-workflow-link {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 180px;
            padding: 10px 12px;
            text-decoration: none;
            color: #fff;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.08);
        }

        .focus-workflow-link:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .focus-workflow-name {
            font-size: 13px;
            font-weight: 700;
        }

        .focus-workflow-copy {
            font-size: 12px;
            line-height: 1.5;
            opacity: 0.78;
        }

        .focus-prompt-list {
            margin: 0;
            padding-left: 18px;
            display: grid;
            gap: 8px;
            font-size: 13px;
            line-height: 1.55;
            opacity: 0.92;
        }

        .focus-trail-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            font-size: 12px;
            font-weight: 600;
        }

        .focus-trail-link span {
            opacity: 0.78;
            font-weight: 500;
        }

        .focus-trail-link:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .idea-deck {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 36px;
        }

        .idea-deck[hidden] {
            display: none;
        }

        .idea-lane {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .idea-lane-title {
            font-size: 18px;
            font-weight: 700;
        }

        .idea-lane-copy {
            font-size: 13px;
            line-height: 1.55;
            opacity: 0.82;
        }

        .idea-lane-list {
            display: grid;
            gap: 10px;
        }

        .idea-lane-link {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            text-decoration: none;
            color: inherit;
            border-radius: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .idea-lane-link:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .idea-lane-name {
            font-size: 13px;
            font-weight: 600;
        }

        .idea-lane-meta {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.7;
        }

        .stats {
            text-align: center;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .stats-numbers {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 10px;
        }

        .stat-item {
            font-size: 14px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            display: block;
        }

        .category-section {
            margin-bottom: 60px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .category-icon {
            font-size: 32px;
        }

        .category-title {
            font-size: 24px;
            font-weight: 600;
        }

        .category-description {
            font-size: 14px;
            opacity: 0.8;
            margin-left: 44px;
        }

        .category-count {
            margin-left: auto;
            font-size: 14px;
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .algorithms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .algorithm-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            color: #333;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .algorithm-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .algorithm-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .algorithm-card:hover::before {
            transform: translateX(0);
        }

        .algorithm-main-link {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 20px 20px 12px;
        }

        .algorithm-swatch {
            height: 78px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.12);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 8px;
            padding: 14px 16px;
        }

        .algorithm-swatch-pill {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            color: #1f2937;
            background: rgba(255, 255, 255, 0.72);
            border-radius: 999px;
            padding: 4px 8px;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        .algorithm-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .algorithm-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .algorithm-description {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .algorithm-footer {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 20px 14px;
        }

        .algorithm-related {
            border-top: 1px solid rgba(102, 126, 234, 0.15);
            padding: 14px 20px 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .algorithm-related-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #7a7f94;
        }

        .algorithm-related-link,
        .algorithm-related-more {
            text-decoration: none;
            color: #4a5ed8;
            font-size: 13px;
            font-weight: 600;
        }

        .algorithm-related-more {
            margin-left: auto;
        }

        .algorithm-related-link:hover,
        .algorithm-related-more:hover {
            text-decoration: underline;
        }

        .algorithm-trails {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 14px;
        }

        .algorithm-trail-link {
            text-decoration: none;
            color: #475569;
            font-size: 11px;
            font-weight: 600;
            border-radius: 999px;
            padding: 6px 10px;
            border: 1px solid rgba(71, 85, 105, 0.18);
            background: rgba(248, 250, 252, 0.8);
        }

        .algorithm-trail-link:hover {
            color: #4a5ed8;
            border-color: rgba(74, 94, 216, 0.28);
        }

        .badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-complexity {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-complexity.intermediate {
            background: #fff3e0;
            color: #f57c00;
        }

        .badge-complexity.advanced {
            background: #fce4ec;
            color: #c2185b;
        }

        .badge-featured {
            background: #fff9c4;
            color: #f57f17;
        }

        .badge-category {
            background: #ede7f6;
            color: #5e35b1;
        }

        .badge-export {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-preset {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .badge-plotter {
            background: #e0f7fa;
            color: #006064;
        }

        .badge-medium {
            background: #f5f0ff;
            color: #5d3fd3;
        }

        .badge-readiness {
            background: #eef7f1;
            color: #226f54;
        }

        .badge-readiness.screen-first {
            background: #fff1eb;
            color: #c44536;
        }

        .badge-readiness.adaptable {
            background: #fff8e6;
            color: #8f5d00;
        }

        .badge-engine {
            background: #f1f5f9;
            color: #475569;
        }

        .action-link {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .favorite-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s ease;
            padding: 0;
        }

        .favorite-btn:hover {
            transform: scale(1.2);
        }

        .favorite-btn.active {
            animation: heartbeat 0.3s ease;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.8;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 18px;
        }

        .featured-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .featured-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: none;
            }

            .algorithms-grid {
                grid-template-columns: 1fr;
            }

            .stats-numbers {
                flex-direction: column;
                gap: 20px;
            }

            .idea-deck {
                grid-template-columns: 1fr;
            }

            .focus-panel {
                padding: 20px;
            }

            .focus-title {
                font-size: 24px;
            }

            .focus-guidance-grid {
                grid-template-columns: 1fr;
            }

            .algorithm-main-link {
                padding: 18px 18px 12px;
            }

            .algorithm-swatch {
                padding: 12px 14px;
            }

            .algorithm-footer,
            .algorithm-trails,
            .algorithm-related {
                padding-left: 18px;
                padding-right: 18px;
            }

            .algorithm-related-more {
                margin-left: 0;
                width: 100%;
            }
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div>
                    <h1>Total Serialism</h1>
                    <div class="subtitle">Generative Art & Pen Plotter Algorithms</div>
                </div>

                <div class="search-box">
                    <input
                        type="text"
                        class="search-input"
                        id="searchInput"
                        placeholder="Search algorithms..."
                        autocomplete="off"
                    >
                </div>

                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="plotter">Plotter</button>
                    <button class="filter-btn" data-filter="screen">Screen</button>
                    <button class="filter-btn" data-filter="systems">Systems</button>
                    <button class="filter-btn" data-filter="tools">Tools</button>
                    <button class="filter-btn" data-filter="featured">⭐ Featured</button>
                    <button class="filter-btn" data-filter="native">Plotter Native</button>
                    <button class="filter-btn" data-filter="adaptable">Adaptable</button>
                    <button class="filter-btn" data-filter="presets">Presets</button>
                    <button class="filter-btn" data-filter="favorites">❤️ Favorites</button>
                    <button class="filter-btn" data-filter="beginner">Beginner</button>
                    <button class="filter-btn" data-filter="intermediate">Intermediate</button>
                    <button class="filter-btn" data-filter="advanced">Advanced</button>
                    <button class="filter-btn" id="surpriseBtn" type="button">🎲 Surprise Me</button>
                    <a class="filter-btn action-link" href="pen-plotter/algorithms/tools/plotter-prep.html">Plotter Prep</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="stats">
                <h2>Discover Algorithmic Art</h2>
                <div class="stats-numbers" id="statsNumbers">
                    <div class="stat-item">
                        <span class="stat-number" id="totalAlgorithms">--</span>
                        <span>Algorithms</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="totalCategories">--</span>
                        <span>Categories</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="visibleAlgorithms">--</span>
                        <span>Showing</span>
                    </div>
                </div>
            </div>

            <div id="ideaDeck" class="idea-deck" hidden></div>
            <div id="relatedFocus"></div>

            <div id="content" class="loading">
                Loading algorithms...
            </div>
        </div>
    </main>

    <script src="discovery-utils.js"></script>
    <script>
        let catalog = null;
        let favorites = JSON.parse(localStorage.getItem('total-serialism-favorites') || '[]');
        let currentFilter = 'all';
        let searchTerm = '';
        let relatedFocusId = TSDiscovery.getUrlParams().get('related') || '';
        const ideaDeckEl = document.getElementById('ideaDeck');

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderBadge(label, className = '') {
            return `<span class="badge ${className}">${escapeHtml(label)}</span>`;
        }

        function getDisplayOutputs(algo) {
            const priority = ['svg', 'plotter', 'png', 'gif', 'preview', 'canvas'];
            return [...new Set(algo.outputs || [])]
                .sort((left, right) => {
                    const leftIndex = priority.indexOf(left);
                    const rightIndex = priority.indexOf(right);
                    const safeLeft = leftIndex === -1 ? priority.length : leftIndex;
                    const safeRight = rightIndex === -1 ? priority.length : rightIndex;
                    if (safeLeft !== safeRight) return safeLeft - safeRight;
                    return left.localeCompare(right);
                })
                .slice(0, 2);
        }

        function renderTrailLinks(algo, className = 'algorithm-trail-link') {
            return TSDiscovery.getTrailSuggestions(catalog, algo.id)
                .map((trail) => `
                    <a
                        href="?related=${trail.algo.id}"
                        class="${className}"
                        title="${escapeHtml(trail.description)}"
                    >${escapeHtml(trail.label)} <span>${escapeHtml(trail.algo.name)}</span></a>
                `)
                .join('');
        }

        function renderWorkflowLinks(algo) {
            return TSDiscovery.getWorkflowSteps(catalog, algo)
                .map((tool) => `
                    <a href="${tool.path}" class="focus-workflow-link">
                        <span class="focus-workflow-name">${escapeHtml(tool.name)}</span>
                        <span class="focus-workflow-copy">${escapeHtml(tool.guidance)}</span>
                    </a>
                `)
                .join('');
        }

        function renderPromptList(algo) {
            return TSDiscovery.getIdeationPrompts(algo)
                .map((prompt) => `<li>${escapeHtml(prompt)}</li>`)
                .join('');
        }

        function renderUseCaseChips(algo) {
            return TSDiscovery.getUseCaseLabels(algo)
                .map((label) => renderBadge(label, 'badge-medium'))
                .join('');
        }

        function renderIdeaDeck() {
            if (!catalog || relatedFocusId || currentFilter !== 'all' || searchTerm) {
                ideaDeckEl.hidden = true;
                ideaDeckEl.innerHTML = '';
                return;
            }

            const sections = TSDiscovery.getSpotlightSections(catalog);
            if (sections.length === 0) {
                ideaDeckEl.hidden = true;
                ideaDeckEl.innerHTML = '';
                return;
            }

            ideaDeckEl.hidden = false;
            ideaDeckEl.innerHTML = sections.map((section) => `
                <section class="idea-lane">
                    <div>
                        <div class="idea-lane-title">${escapeHtml(section.title)}</div>
                        <div class="idea-lane-copy">${escapeHtml(section.description)}</div>
                    </div>
                    <div class="idea-lane-list">
                        ${section.algorithms.map((algo) => `
                            <a href="${algo.path}" class="idea-lane-link">
                                <span class="idea-lane-name">${escapeHtml(algo.name)}</span>
                                <span class="idea-lane-meta">${escapeHtml(TSDiscovery.getMediumLabel(algo.medium))}</span>
                            </a>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        // Load catalog
        fetch('algorithm-catalog.json')
            .then(res => res.json())
            .then(data => {
                catalog = data;
                renderFocusPanel();
                renderIdeaDeck();
                renderContent();
                updateStats();
            })
            .catch(() => {
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Failed to load algorithms</div>
                    </div>
                `;
            });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = TSDiscovery.normalizeText(e.target.value);
            renderIdeaDeck();
            renderContent();
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderIdeaDeck();
                renderContent();
            });
        });

        document.getElementById('surpriseBtn').addEventListener('click', () => {
            const visible = getVisibleAlgorithms();
            if (visible.length === 0) return;
            const pick = visible[Math.floor(Math.random() * visible.length)];
            window.location.href = pick.path;
        });

        function toggleFavorite(algoId, event) {
            event.preventDefault();
            event.stopPropagation();

            const index = favorites.indexOf(algoId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(algoId);
            }

            localStorage.setItem('total-serialism-favorites', JSON.stringify(favorites));
            renderContent();
        }

        function matchesFilter(algo) {
            if (currentFilter === 'all') return true;
            if (currentFilter === 'plotter' || currentFilter === 'screen' || currentFilter === 'systems' || currentFilter === 'tools') {
                return algo.medium === currentFilter;
            }
            if (currentFilter === 'featured') return algo.featured === true;
            if (currentFilter === 'plotter-safe' || currentFilter === 'native') return algo.plotterReadiness === 'native';
            if (currentFilter === 'adaptable') return algo.plotterReadiness === 'adaptable';
            if (currentFilter === 'presets') return algo.hasPresets === true;
            if (currentFilter === 'favorites') return favorites.includes(algo.id);
            if (currentFilter === 'beginner') return algo.complexity === 'beginner';
            if (currentFilter === 'intermediate') return algo.complexity === 'intermediate';
            if (currentFilter === 'advanced') return algo.complexity === 'advanced';
            if (catalog && catalog.categories[currentFilter]) return algo.category === currentFilter;
            return true;
        }

        function matchesSearch(algo) {
            if (!searchTerm) return true;
            return TSDiscovery.buildSearchHaystack(algo, catalog).includes(searchTerm);
        }

        function getVisibleAlgorithms() {
            if (!catalog) return [];
            return catalog.algorithms.filter(algo =>
                matchesFilter(algo) && matchesSearch(algo)
            );
        }

        function renderFocusPanel() {
            if (!catalog) return;

            const relatedFocus = document.getElementById('relatedFocus');
            if (!relatedFocusId) {
                relatedFocus.innerHTML = '';
                renderIdeaDeck();
                return;
            }

            const focusAlgorithm = catalog.algorithms.find((algo) => algo.id === relatedFocusId);
            if (!focusAlgorithm) {
                relatedFocus.innerHTML = '';
                renderIdeaDeck();
                return;
            }

            const relatedAlgorithms = TSDiscovery.getRelatedAlgorithms(catalog, relatedFocusId, 6);
            const openHref = focusAlgorithm.path;
            relatedFocus.innerHTML = `
                <section class="focus-panel">
                    <div class="focus-header">
                        <div>
                            <div class="focus-kicker">More like this</div>
                            <div class="focus-title">${escapeHtml(focusAlgorithm.name)}</div>
                            <div class="focus-description">
                                ${escapeHtml(focusAlgorithm.description)} Recommendations below are scored from shared motif families, visual traits, medium, and plotter readiness.
                            </div>
                        </div>
                        <div class="focus-actions">
                            <a href="${openHref}" class="focus-btn">Open algorithm</a>
                            <a href="browse.html" class="focus-btn">Clear focus</a>
                        </div>
                    </div>
                    <div class="focus-meta">
                        ${renderBadge(TSDiscovery.getMediumLabel(focusAlgorithm.medium), 'badge-medium')}
                        ${renderBadge(TSDiscovery.getPlotterReadinessLabel(focusAlgorithm.plotterReadiness), `badge-readiness ${focusAlgorithm.plotterReadiness}`)}
                        ${renderBadge(focusAlgorithm.complexity, `badge-complexity ${focusAlgorithm.complexity}`)}
                        ${(focusAlgorithm.engine || []).slice(0, 2).map((engine) => renderBadge(engine.toUpperCase(), 'badge-engine')).join('')}
                    </div>
                    <div class="focus-guidance-grid">
                        <section class="focus-guidance-card">
                            <div class="focus-guidance-title">Plotter Path</div>
                            <div class="focus-guidance-copy">${escapeHtml(TSDiscovery.getPlotterSummary(focusAlgorithm))}</div>
                            <div class="focus-chip-row">
                                ${renderUseCaseChips(focusAlgorithm)}
                            </div>
                            <div class="focus-workflow-links">
                                ${renderWorkflowLinks(focusAlgorithm)}
                            </div>
                        </section>
                        <section class="focus-guidance-card">
                            <div class="focus-guidance-title">Try This Next</div>
                            <ul class="focus-prompt-list">
                                ${renderPromptList(focusAlgorithm)}
                            </ul>
                        </section>
                    </div>
                    <div class="focus-trails">
                        ${renderTrailLinks(focusAlgorithm, 'focus-trail-link')}
                    </div>
                    <div class="algorithms-grid">
                        ${relatedAlgorithms.map((algo) => renderAlgorithmCard(algo)).join('')}
                    </div>
                </section>
            `;
            renderIdeaDeck();
        }

        function renderContent() {
            if (!catalog) return;

            const content = document.getElementById('content');
            let html = '';
            const visibleAlgorithms = getVisibleAlgorithms();
            const featuredMode = currentFilter === 'all' && !searchTerm;
            let visibleCount = visibleAlgorithms.length;
            const featuredIds = new Set(
                featuredMode
                    ? visibleAlgorithms.filter(algo => algo.featured).map(algo => algo.id)
                    : []
            );

            // Featured section
            if (featuredMode) {
                const featuredAlgos = visibleAlgorithms.filter(algo => algo.featured);

                if (featuredAlgos.length > 0) {
                    html += `
                        <div class="featured-section">
                            <div class="featured-title">
                                <span>⭐</span>
                                <span>Featured Algorithms</span>
                            </div>
                            <div class="algorithms-grid">
                                ${featuredAlgos.map(algo => renderAlgorithmCard(algo)).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            // Category sections
            Object.entries(catalog.categories).forEach(([catKey, category]) => {
                const filteredAlgos = visibleAlgorithms.filter(algo =>
                    algo.category === catKey && (!featuredMode || !featuredIds.has(algo.id))
                );

                if (filteredAlgos.length > 0) {
                    html += `
                        <div class="category-section">
                            <div class="category-header">
                                <div class="category-icon">${category.icon}</div>
                                <div>
                                    <div class="category-title">${category.name}</div>
                                    <div class="category-description">${category.description}</div>
                                </div>
                                <div class="category-count">${filteredAlgos.length}</div>
                            </div>
                            <div class="algorithms-grid">
                                ${filteredAlgos.map(algo => renderAlgorithmCard(algo)).join('')}
                            </div>
                        </div>
                    `;
                }
            });

            if (visibleCount === 0) {
                html = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">
                            ${currentFilter === 'favorites' && favorites.length === 0
                                ? 'No favorites yet. Click the heart icon on any algorithm to save it!'
                                : 'No algorithms found matching your criteria'}
                        </div>
                    </div>
                `;
            }

            content.innerHTML = html;
            document.getElementById('visibleAlgorithms').textContent = visibleCount;
        }

        function renderAlgorithmCard(algo) {
            const isFavorite = favorites.includes(algo.id);
            const category = catalog.categories[algo.category];
            const exportBadges = getDisplayOutputs(algo).map(format =>
                renderBadge(format, 'badge-export')
            ).join('');
            const relatedLinks = TSDiscovery.getRelatedAlgorithms(catalog, algo.id, 2).map(item =>
                `<a href="${item.path}" class="algorithm-related-link">${escapeHtml(item.name)}</a>`
            ).join('');
            const accent = TSDiscovery.getPreviewAccent(algo);

            return `
                <div class="algorithm-card">
                    <div class="algorithm-swatch" style="${TSDiscovery.buildPreviewStyle(algo)}">
                        <span class="algorithm-swatch-pill">${escapeHtml((accent.primary || algo.category).replace(/-/g, ' '))}</span>
                        <span class="algorithm-swatch-pill">${escapeHtml(TSDiscovery.getMediumLabel(algo.medium))}</span>
                    </div>
                    <a href="${algo.path}" class="algorithm-main-link">
                    <div class="algorithm-header">
                        <div class="algorithm-name">${escapeHtml(algo.name)}</div>
                        <button
                            class="favorite-btn ${isFavorite ? 'active' : ''}"
                            onclick="toggleFavorite('${algo.id}', event)"
                            title="${isFavorite ? 'Remove from favorites' : 'Add to favorites'}"
                        >
                            ${isFavorite ? '❤️' : '🤍'}
                        </button>
                    </div>
                    <div class="algorithm-description">${escapeHtml(algo.description)}</div>
                    </a>
                    <div class="algorithm-footer">
                        ${renderBadge(algo.complexity, `badge-complexity ${algo.complexity}`)}
                        ${renderBadge(category.shortLabel, 'badge-category')}
                        ${renderBadge(TSDiscovery.getMediumLabel(algo.medium), 'badge-medium')}
                        ${renderBadge(TSDiscovery.getPlotterReadinessLabel(algo.plotterReadiness), `badge-readiness ${algo.plotterReadiness}`)}
                        ${algo.featured ? renderBadge('Featured', 'badge-featured') : ''}
                        ${algo.hasPresets ? renderBadge('Presets', 'badge-preset') : ''}
                        ${exportBadges}
                        ${(algo.engine || []).slice(0, 1).map(engine => renderBadge(engine.toUpperCase(), 'badge-engine')).join('')}
                    </div>
                    <div class="algorithm-trails">
                        ${renderTrailLinks(algo)}
                    </div>
                    <div class="algorithm-related">
                        <span class="algorithm-related-label">Try next</span>
                        ${relatedLinks || '<span class="algorithm-related-label">Use focus mode</span>'}
                        <a href="?related=${algo.id}" class="algorithm-related-more">More like this</a>
                    </div>
                </div>
            `;
        }

        function updateStats() {
            if (!catalog) return;
            document.getElementById('totalAlgorithms').textContent = catalog.stats.totalAlgorithms;
            document.getElementById('totalCategories').textContent = catalog.stats.totalCategories;
        }
    </script>
</body>
</html>
