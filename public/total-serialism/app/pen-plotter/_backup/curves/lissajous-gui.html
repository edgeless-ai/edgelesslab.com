<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lissajous Curves - Oscillation Pattern Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
  <script src="../../shared/export-utils.js"></script>
  <script src="../../preset-manager.js"></script>
  <script src="../../shared/panel-controller.js"></script>
  <script src="../../shared/stats-display.js"></script>
  <script src="../../shared/url-state.js"></script>
  <link rel="stylesheet" href="../../preset-manager.css">

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    .value {
      font-weight: 600;
      color: var(--ts-accent-primary);
    }

    #seed-display {
      font-family: var(--ts-font-mono);
      background: var(--ts-bg-deep);
      padding: 5px 8px;
      border-radius: var(--ts-radius-sm);
      font-size: 11px;
      color: var(--ts-accent-primary);
    }

    .control-group {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--ts-border-subtle);
    }

    .control-group:last-child {
      border-bottom: none;
    }

    .control-group h3 {
      margin: 0 0 15px 0;
      color: var(--ts-accent-primary);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .control {
      margin-bottom: 12px;
    }

    h2 {
      margin: 0 0 20px 0;
      color: var(--ts-accent-primary);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
    }

    .checkbox-container input {
      margin-right: 10px;
    }

    .preset-btn {
      background: var(--ts-accent-tertiary) !important;
      margin: 2px 0;
    }

    .preset-btn:hover {
      background: #6a5acd !important;
    }

    #gif-status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ts-text-muted);
    }

    input[type="color"] {
      width: 100%;
      height: 35px;
      padding: 2px;
      background: var(--ts-bg-deep);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
      cursor: pointer;
    }

    .formula {
      background: var(--ts-bg-deep);
      padding: 10px;
      border-radius: var(--ts-radius-md);
      font-family: var(--ts-font-mono);
      font-size: 11px;
      color: var(--ts-accent-primary);
      margin-bottom: 15px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Gallery</a>
    <h2>Lissajous Curves</h2>

    <div class="formula">
      x = A &middot; sin(a &middot; t + &delta;)<br>
      y = B &middot; sin(b &middot; t)
    </div>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="square_medium" selected>Square (800x800)</option>
          <option value="A4_landscape">A4 Landscape</option>
          <option value="A4_portrait">A4 Portrait</option>
          <option value="A3_landscape">A3 Landscape</option>
          <option value="A3_portrait">A3 Portrait</option>
          <option value="letter_landscape">Letter Landscape</option>
          <option value="letter_portrait">Letter Portrait</option>
          <option value="square_large">Square (1200x1200)</option>
        </select>
      </div>
      <div class="control">
        <label>Background:</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="control">
        <label>Stroke Color:</label>
        <input type="color" id="strokeColor" value="#000000">
      </div>
      <div class="control">
        <label>Stroke Weight: <span class="value" id="strokeWeight-val">0.5</span></label>
        <input type="range" id="strokeWeight" min="0.1" max="3" step="0.1" value="0.5">
      </div>
    </div>

    <div class="control-group">
      <h3>Frequency Ratio</h3>
      <div class="control">
        <label>a (X frequency): <span class="value" id="freqA-val">3</span></label>
        <input type="range" id="freqA" min="1" max="12" step="1" value="3">
      </div>
      <div class="control">
        <label>b (Y frequency): <span class="value" id="freqB-val">2</span></label>
        <input type="range" id="freqB" min="1" max="12" step="1" value="2">
      </div>
      <div class="control">
        <label>Ratio: <span class="value" id="ratio-val">3:2</span></label>
      </div>
    </div>

    <div class="control-group">
      <h3>Amplitudes & Phase</h3>
      <div class="control">
        <label>A (X amplitude): <span class="value" id="ampA-val">1</span></label>
        <input type="range" id="ampA" min="0" max="200" step="0.1" value="1">
      </div>
      <div class="control">
        <label>B (Y amplitude): <span class="value" id="ampB-val">1</span></label>
        <input type="range" id="ampB" min="0" max="200" step="0.1" value="1">
      </div>
      <div class="control">
        <label>&delta; (Phase shift): <span class="value" id="delta-val">1.57</span></label>
        <input type="range" id="delta" min="0" max="6.28" step="0.01" value="1.57">
      </div>
    </div>

    <div class="control-group">
      <h3>Pattern Settings</h3>
      <div class="control">
        <label>Resolution: <span class="value" id="resolution-val">1000</span></label>
        <input type="range" id="resolution" min="100" max="5000" step="100" value="1000">
      </div>
      <div class="control">
        <label>Scale: <span class="value" id="scale-val">0.8</span></label>
        <input type="range" id="scale" min="0.3" max="0.95" step="0.01" value="0.8">
      </div>
    </div>

    <div class="control-group">
      <h3>Variations</h3>
      <div class="control">
        <label>Mode:</label>
        <select id="mode">
          <option value="single" selected>Single Curve</option>
          <option value="table">Lissajous Table</option>
          <option value="animated">Phase Animation</option>
          <option value="3d">3D Knot (2.5D projection)</option>
        </select>
      </div>
      <div class="control" id="tableControl" style="display:none">
        <label>Table Size: <span class="value" id="tableSize-val">5</span></label>
        <input type="range" id="tableSize" min="2" max="8" step="1" value="5">
      </div>
      <div class="control" id="knotControl" style="display:none">
        <label>c (Z frequency): <span class="value" id="freqC-val">5</span></label>
        <input type="range" id="freqC" min="1" max="12" step="1" value="5">
      </div>
    </div>

    <div class="control-group">
      <h3>Presets</h3>
      <button class="preset-btn" onclick="applyPreset('circle')">Circle (1:1)</button>
      <button class="preset-btn" onclick="applyPreset('figure8')">Figure 8 (2:1)</button>
      <button class="preset-btn" onclick="applyPreset('bow')">Bow Tie (3:2)</button>
      <button class="preset-btn" onclick="applyPreset('star5')">5-Point Star (5:4)</button>
      <button class="preset-btn" onclick="applyPreset('complex')">Complex (7:5)</button>
      <button class="preset-btn" onclick="applyPreset('knot34')">Trefoil Knot</button>
      <button class="preset-btn" onclick="applyPreset('table5')">5x5 Table</button>
    </div>

    <div class="control-group">
      <h3>Actions</h3>
      <button id="regenerate">Regenerate</button>
      <button id="randomize">Randomize</button>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
      <div class="control">
        <label>Seed: <span id="seed-display">-</span></label>
      </div>
    </div>

    <div class="control-group">
      <h3>Export</h3>
      <button id="export-svg">Download SVG</button>
      <button id="export-png">Download PNG</button>
      <button id="export-gif">Record GIF</button>
      <div id="gif-status"></div>
    </div>

    <div id="preset-container"></div>
  </div>

  <script>
    let params = {
      paperSize: 'square_medium',
      bgColor: '#ffffff',
      strokeColor: '#000000',
      strokeWeight: 0.5,
      freqA: 3,
      freqB: 2,
      ampA: 1,
      ampB: 1,
      delta: Math.PI / 2,
      resolution: 1000,
      scale: 0.8,
      mode: 'single',
      tableSize: 5,
      freqC: 5,
      seed: Math.floor(Math.random() * 1000000)
    };

    // Initialize URL state manager
    const urlState = new TSUrlState({
      algorithmId: 'lissajous',
      schema: [
        { key: 'seed', type: 'int', bytes: 4 },
        { key: 'paperSize', type: 'enum', options: ['square_medium', 'A4_landscape', 'A4_portrait', 'A3_landscape', 'A3_portrait', 'letter_landscape', 'letter_portrait', 'square_large'] },
        { key: 'bgColor', type: 'color' },
        { key: 'strokeColor', type: 'color' },
        { key: 'strokeWeight', type: 'float', bytes: 2, min: 0.1, max: 3 },
        { key: 'freqA', type: 'int', bytes: 1, min: 1, max: 12 },
        { key: 'freqB', type: 'int', bytes: 1, min: 1, max: 12 },
        { key: 'ampA', type: 'float', bytes: 2, min: 0.1, max: 1 },
        { key: 'ampB', type: 'float', bytes: 2, min: 0.1, max: 1 },
        { key: 'delta', type: 'float', bytes: 2, min: 0, max: 6.28 },
        { key: 'resolution', type: 'int', bytes: 2, min: 100, max: 5000 },
        { key: 'scale', type: 'float', bytes: 2, min: 0.3, max: 0.95 },
        { key: 'mode', type: 'enum', options: ['single', 'table', 'animated', '3d'] },
        { key: 'tableSize', type: 'int', bytes: 1, min: 2, max: 8 },
        { key: 'freqC', type: 'int', bytes: 1, min: 1, max: 12 }
      ]
    });

    // Load from URL if present
    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
    }

    let paths = [];
    let presetManager;
    let panelController;
    let statsDisplay;
    let canvasControls;

    const presets = {
      circle: { freqA: 1, freqB: 1, delta: 1.57, mode: 'single' },
      figure8: { freqA: 2, freqB: 1, delta: 0, mode: 'single' },
      bow: { freqA: 3, freqB: 2, delta: 1.57, mode: 'single' },
      star5: { freqA: 5, freqB: 4, delta: 1.57, mode: 'single' },
      complex: { freqA: 7, freqB: 5, delta: 0.5, mode: 'single', resolution: 3000 },
      knot34: { freqA: 3, freqB: 4, freqC: 5, delta: 1.57, mode: '3d' },
      table5: { mode: 'table', tableSize: 5 }
    };

    function applyPreset(name) {
      const preset = presets[name];
      if (preset) {
        Object.assign(params, preset);
        updateUIFromParams();
        updateModeControls();
        regenerate();
      }
    }

    function setup() {
      const size = CanvasLayout.getSize(params.paperSize);
      let canvas = createCanvas(size.width, size.height);
      canvas.parent('canvas-container');

      canvasControls = new TSCanvasControls({
        bgColor: params.bgColor,
        strokeColor: params.strokeColor
      });
      canvasControls.bind(params);

      panelController = new TSPanelController({
        panelSelector: '#controls',
        onToggle: (collapsed) => {
          setTimeout(() => windowResized(), 350);
        }
      });
      panelController.attach();

      statsDisplay = new TSStatsDisplay();
      statsDisplay.attach();

      presetManager = new PresetManager({
        algorithmId: 'lissajous',
        container: '#preset-container',
        onSave: () => params,
        onLoad: (preset) => {
          Object.assign(params, preset.data);
          updateUIFromParams();
          updateModeControls();
          regenerate();
        },
        onRandomize: randomize
      });

      // Add built-in Lissajous presets
      const builtInPresets = {
        '⭕ Circle (1:1)': {
          mode: 'single', freqA: 1, freqB: 1, delta: 1.57, ampA: 200, ampB: 200, resolution: 360
        },
        '∞ Figure 8 (1:2)': {
          mode: 'single', freqA: 1, freqB: 2, delta: 0, ampA: 200, ampB: 150, resolution: 400
        },
        '🎾 Bowtie (2:3)': {
          mode: 'single', freqA: 2, freqB: 3, delta: 0.78, ampA: 200, ampB: 200, resolution: 500
        },
        '🌀 Spiral Dance (3:4)': {
          mode: 'single', freqA: 3, freqB: 4, delta: 0.5, ampA: 200, ampB: 200, resolution: 600
        },
        '⭐ Star (5:4)': {
          mode: 'single', freqA: 5, freqB: 4, delta: 1.57, ampA: 200, ampB: 200, resolution: 720
        },
        '📊 3×3 Table': {
          mode: 'table', freqA: 3, freqB: 3, delta: 1.57, ampA: 80, ampB: 80, resolution: 300, tableSize: 3
        },
        '📊 5×5 Table': {
          mode: 'table', freqA: 5, freqB: 5, delta: 1.57, ampA: 60, ampB: 60, resolution: 300, tableSize: 5
        },
        '🔗 Trefoil Knot': {
          mode: '3d', freqA: 2, freqB: 3, delta: 1.57, ampA: 180, ampB: 180, resolution: 600
        },
        '💫 Complex Knot': {
          mode: '3d', freqA: 3, freqB: 5, delta: 1.2, ampA: 170, ampB: 170, resolution: 800
        },
        '🎭 Phase Shift': {
          mode: 'single', freqA: 3, freqB: 4, delta: 2.09, ampA: 200, ampB: 200, resolution: 720
        }
      };

      Object.entries(builtInPresets).forEach(([name, presetParams]) => {
        if (!presetManager.presets[name]) {
          presetManager.savePreset(name, presetParams);
        }
      });

      setupControls();
      regenerate();
    }

    function setupControls() {
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        const size = CanvasLayout.getSize(params.paperSize);
        resizeCanvas(size.width, size.height);
        regenerate();
      });

      document.getElementById('bgColor').addEventListener('input', (e) => {
        params.bgColor = e.target.value;
        regenerate();
      });
      document.getElementById('strokeColor').addEventListener('input', (e) => {
        params.strokeColor = e.target.value;
        regenerate();
      });

      const rangeInputs = ['strokeWeight', 'freqA', 'freqB', 'ampA', 'ampB', 'delta', 'resolution', 'scale', 'tableSize', 'freqC'];
      rangeInputs.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', (e) => {
            params[id] = parseFloat(e.target.value);
            document.getElementById(id + '-val').textContent = e.target.value;
            if (id === 'freqA' || id === 'freqB') {
              updateRatioDisplay();
            }
            regenerate();
          });
        }
      });

      document.getElementById('mode').addEventListener('change', (e) => {
        params.mode = e.target.value;
        updateModeControls();
        regenerate();
      });

      document.getElementById('regenerate').addEventListener('click', regenerate);
      document.getElementById('randomize').addEventListener('click', randomize);

      document.getElementById('export-svg').addEventListener('click', exportSVG);
      document.getElementById('export-png').addEventListener('click', exportPNG);
      document.getElementById('export-gif').addEventListener('click', exportGIF);

      updateModeControls();
    }

    function updateModeControls() {
      document.getElementById('tableControl').style.display = params.mode === 'table' ? 'block' : 'none';
      document.getElementById('knotControl').style.display = params.mode === '3d' ? 'block' : 'none';
    }

    function updateRatioDisplay() {
      const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
      const g = gcd(params.freqA, params.freqB);
      document.getElementById('ratio-val').textContent = `${params.freqA/g}:${params.freqB/g}`;
    }

    function updateUIFromParams() {
      Object.keys(params).forEach(key => {
        const el = document.getElementById(key);
        if (el) {
          if (el.type === 'range' || el.type === 'color') {
            el.value = params[key];
          } else if (el.tagName === 'SELECT') {
            el.value = params[key];
          }
          const valEl = document.getElementById(key + '-val');
          if (valEl) {
            valEl.textContent = params[key];
          }
        }
      });
      updateRatioDisplay();
      document.getElementById('seed-display').textContent = params.seed;
    }

    function regenerate() {
      paths = [];
      calculateLissajous();
      drawPattern();
      updateStats();
    }

    function randomize() {
      params.seed = Math.floor(Math.random() * 1000000);
      randomSeed(params.seed);

      params.freqA = Math.floor(random(1, 12));
      params.freqB = Math.floor(random(1, 12));
      params.ampA = random(0.5, 1);
      params.ampB = random(0.5, 1);
      params.delta = random(0, TWO_PI);
      params.scale = random(0.6, 0.9);

      updateUIFromParams();
      regenerate();
    }

    function calculateLissajous() {
      if (params.mode === 'table') {
        calculateTable();
        return;
      }

      const scale = min(width, height) * params.scale / 2;
      const centerX = width / 2;
      const centerY = height / 2;

      // Calculate required t range for closed curve
      const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
      const lcm = (params.freqA * params.freqB) / gcd(params.freqA, params.freqB);
      const tMax = TWO_PI * lcm / params.freqA;

      if (params.mode === '3d') {
        // 3D Lissajous knot with depth shading
        let path = [];
        for (let i = 0; i <= params.resolution; i++) {
          const t = map(i, 0, params.resolution, 0, tMax);
          const x = params.ampA * sin(params.freqA * t + params.delta);
          const y = params.ampB * sin(params.freqB * t);
          const z = sin(params.freqC * t);

          // Simple perspective projection
          const perspective = 1 + z * 0.3;
          path.push({
            x: centerX + x * scale * perspective,
            y: centerY + y * scale * perspective,
            z: z
          });
        }
        paths.push(path);
      } else {
        // Standard 2D Lissajous
        let path = [];
        for (let i = 0; i <= params.resolution; i++) {
          const t = map(i, 0, params.resolution, 0, tMax);
          const x = params.ampA * sin(params.freqA * t + params.delta);
          const y = params.ampB * sin(params.freqB * t);
          path.push({
            x: centerX + x * scale,
            y: centerY + y * scale
          });
        }
        paths.push(path);
      }
    }

    function calculateTable() {
      const n = params.tableSize;
      const cellW = width / (n + 1);
      const cellH = height / (n + 1);
      const r = min(cellW, cellH) * 0.4;

      for (let row = 1; row <= n; row++) {
        for (let col = 1; col <= n; col++) {
          const cx = col * cellW;
          const cy = row * cellH;
          const a = col;
          const b = row;

          let path = [];
          for (let i = 0; i <= 200; i++) {
            const t = map(i, 0, 200, 0, TWO_PI);
            const x = sin(a * t + params.delta);
            const y = sin(b * t);
            path.push({
              x: cx + x * r,
              y: cy + y * r
            });
          }
          paths.push(path);
        }
      }
    }

    function drawPattern() {
      clear();
      background(params.bgColor);
      stroke(params.strokeColor);
      strokeWeight(params.strokeWeight);
      noFill();

      for (const path of paths) {
        beginShape();
        for (const pt of path) {
          vertex(pt.x, pt.y);
        }
        endShape();
      }

      // Update URL state after drawing
      urlState.replaceState(params);
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => {
        statusEl.textContent = 'Copy failed';
      });
    }

    function updateStats() {
      if (statsDisplay && paths.length > 0) {
        const totalVertices = paths.reduce((sum, p) => sum + p.length, 0);
        statsDisplay.update({
          lines: paths.length,
          vertices: totalVertices,
          ratio: `${params.freqA}:${params.freqB}`
        });
      }
      document.getElementById('seed-display').textContent = params.seed;
    }

    function exportSVG() {
      const svg = TSExport.createSVG(
        paths.map((path) => ({
          d: TSExport.pointsToPath(path),
          stroke: params.strokeColor,
          strokeWidth: params.strokeWeight,
          fill: 'none'
        })),
        width,
        height,
        {
          backgroundColor: params.bgColor,
          strokeColor: params.strokeColor,
          strokeWidth: params.strokeWeight
        }
      );
      TSExport.downloadSVG(svg, 'lissajous-' + params.seed);
    }

    function exportPNG() {
      const pngCanvas = createGraphics(width, height);
      pngCanvas.background(params.bgColor);
      pngCanvas.stroke(params.strokeColor);
      pngCanvas.strokeWeight(params.strokeWeight);
      pngCanvas.noFill();

      for (const path of paths) {
        pngCanvas.beginShape();
        for (const pt of path) {
          pngCanvas.vertex(pt.x, pt.y);
        }
        pngCanvas.endShape();
      }

      saveCanvas(pngCanvas, 'lissajous-' + params.seed, 'png');
    }

    function exportGIF() {
      const status = document.getElementById('gif-status');
      status.textContent = 'Recording GIF...';

      const gif = new GIF({
        workers: 4,
        quality: 10,
        width: width,
        height: height
      });

      // Animate through phase shifts
      const frames = 60;
      for (let f = 0; f < frames; f++) {
        const tempCanvas = createGraphics(width, height);
        tempCanvas.background(params.bgColor);
        tempCanvas.stroke(params.strokeColor);
        tempCanvas.strokeWeight(params.strokeWeight);
        tempCanvas.noFill();

        const delta = map(f, 0, frames, 0, TWO_PI);
        const scale = min(width, height) * params.scale / 2;
        const centerX = width / 2;
        const centerY = height / 2;

        const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
        const lcm = (params.freqA * params.freqB) / gcd(params.freqA, params.freqB);
        const tMax = TWO_PI * lcm / params.freqA;

        tempCanvas.beginShape();
        for (let i = 0; i <= params.resolution; i++) {
          const t = map(i, 0, params.resolution, 0, tMax);
          const x = params.ampA * sin(params.freqA * t + delta);
          const y = params.ampB * sin(params.freqB * t);
          tempCanvas.vertex(centerX + x * scale, centerY + y * scale);
        }
        tempCanvas.endShape();

        gif.addFrame(tempCanvas.canvas, { delay: 50 });
        tempCanvas.remove();
      }

      gif.on('finished', (blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'lissajous-' + params.seed + '.gif';
        a.click();
        URL.revokeObjectURL(url);
        status.textContent = 'GIF saved!';
        setTimeout(() => status.textContent = '', 3000);
      });

      gif.render();
    }

    function windowResized() {
      // Handled by CanvasLayout
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
</html>
