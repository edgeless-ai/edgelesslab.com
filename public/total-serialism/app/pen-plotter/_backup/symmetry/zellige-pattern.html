<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Zellige Pattern Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <!-- p5.js-svg removed: incompatible with p5.js 1.7.0 - using manual SVG generation -->
  <script src="../../preset-manager.js"></script>
  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
  <script src="../../shared/path-optimizer.js"></script>
  <script src="../../shared/export-utils.js"></script>
  <script src="../../shared/url-state.js"></script>
  <link rel="stylesheet" href="../../preset-manager.css">

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    body {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      background: var(--ts-bg-deep);
      color: var(--ts-text-primary);
    }
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--ts-bg-base);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    #controls {
      width: 380px;
      padding: 20px;
      background: var(--ts-bg-panel);
      height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }
    h2 {
      margin: 0 0 20px 0;
      color: var(--ts-accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
    }
    .control-group {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--ts-border-subtle);
    }
    .control-group:last-child {
      border-bottom: none;
    }
    .control-group h3 {
      margin: 0 0 12px 0;
      color: var(--ts-text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .control {
      margin-bottom: 12px;
    }
    .control label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: var(--ts-text-secondary);
    }
    .control span {
      font-weight: 500;
      color: var(--ts-accent-primary);
      font-size: 0.85rem;
    }
    input[type="range"] {
      width: 100%;
      margin-top: 4px;
    }
    select {
      width: 100%;
      padding: 8px 12px;
      background: var(--ts-bg-deep);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
      font-family: inherit;
      font-size: 0.85rem;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      margin: 4px 0;
      background: var(--ts-accent-primary);
      color: var(--ts-text-inverse);
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      border-radius: var(--ts-radius-md);
      transition: all var(--ts-transition-fast);
    }
    button:hover {
      background: #00e8bb;
      box-shadow: var(--ts-shadow-glow);
    }
    button:active {
      transform: scale(0.98);
    }
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .button-group button {
      flex: 1;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--ts-text-secondary);
    }
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      accent-color: var(--ts-accent-primary);
    }
    #processing-status {
      padding: 10px;
      margin-top: 10px;
      border-radius: var(--ts-radius-md);
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
    #processing-status.success {
      background: rgba(0, 212, 170, 0.15);
      color: var(--ts-accent-primary);
      border: 1px solid var(--ts-accent-primary);
    }
    #processing-status.error {
      background: rgba(255, 71, 87, 0.15);
      color: var(--ts-accent-danger);
      border: 1px solid var(--ts-accent-danger);
    }
    #canvas-wrapper {
      background: white;
      box-shadow: var(--ts-shadow-panel);
      border-radius: var(--ts-radius-lg);
      padding: 20px;
    }
    .pattern-info {
      background: var(--ts-bg-deep);
      padding: 12px;
      border-radius: var(--ts-radius-md);
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--ts-text-secondary);
      line-height: 1.5;
      border-left: 3px solid var(--ts-accent-primary);
    }
    .back-link {
      position: fixed;
      top: 15px;
      left: 15px;
      color: var(--ts-accent-primary);
      text-decoration: none;
      font-size: 0.85rem;
      z-index: 100;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>

<body>
  <a href="../../index.html" class="back-link">&larr; Back to Index</a>

  <div id="canvas-container">
    <div id="canvas-wrapper"></div>
  </div>

  <div id="controls">
    <h2>Zellige Pattern Generator</h2>
    <div class="pattern-info">
      <strong>Zellige</strong> is a traditional Moroccan mosaic tilework made from geometric shapes.
      This generator creates authentic 8-fold symmetric patterns using traditional tile shapes.
    </div>

    <div class="control-group">
      <h3>Pattern Type</h3>
      <div class="control">
        <label>Zellige Style:</label>
        <select id="patternType">
          <option value="classic8">Classic 8-fold Star</option>
          <option value="hexagonal">Hexagonal Tessellation</option>
          <option value="star16">16-Point Star</option>
          <option value="safavid">Safavid Complex</option>
          <option value="geometric">Geometric Interlock</option>
        </select>
      </div>
      <div class="control">
        <label>Complexity: <span id="complexity-value">3</span></label>
        <input type="range" id="complexity" min="1" max="5" step="1" value="3">
      </div>
    </div>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size</label>
        <select id="paperSize">
          <option value="square800" selected>Square (800x800)</option>
          <option value="landscape800x600">Landscape (800x600)</option>
          <option value="a4portrait">A4 Portrait</option>
          <option value="a4landscape">A4 Landscape</option>
          <option value="a3portrait">A3 Portrait</option>
          <option value="a3landscape">A3 Landscape</option>
          <option value="letterportrait">Letter Portrait</option>
          <option value="letterlandscape">Letter Landscape</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Tile Properties</h3>
      <div class="control">
        <label>Base Size: <span id="tileSize-value">40</span>px</label>
        <input type="range" id="tileSize" min="20" max="100" step="5" value="40">
      </div>
      <div class="control">
        <label>Spacing: <span id="spacing-value">2</span>px</label>
        <input type="range" id="spacing" min="0" max="10" step="0.5" value="2">
      </div>
      <div class="control">
        <label>Rotation Offset: <span id="rotationOffset-value">0</span>deg</label>
        <input type="range" id="rotationOffset" min="0" max="45" step="5" value="0">
      </div>
    </div>

    <div class="control-group">
      <h3>Visual Style</h3>
      <div class="control">
        <label>Line Weight: <span id="lineWeight-value">1</span>px</label>
        <input type="range" id="lineWeight" min="0.1" max="3" step="0.1" value="1">
      </div>
      <div class="checkbox-group">
        <label>
          <input type="checkbox" id="showConstruction"> Show Construction Lines
        </label>
        <label>
          <input type="checkbox" id="fillShapes"> Fill Shapes
        </label>
        <label>
          <input type="checkbox" id="colorCode" checked> Color Code by Type
        </label>
        <label>
          <input type="checkbox" id="showSymmetry"> Show Symmetry Lines
        </label>
      </div>
    </div>

    <div class="control-group">
      <h3>Grid Settings</h3>
      <div class="control">
        <label>Repetitions: <span id="repetitions-value">8</span></label>
        <input type="range" id="repetitions" min="4" max="16" step="2" value="8">
      </div>
      <div class="control">
        <label>Inner Radius: <span id="innerRadius-value">100</span>px</label>
        <input type="range" id="innerRadius" min="50" max="200" step="10" value="100">
      </div>
      <div class="control">
        <label>Outer Radius: <span id="outerRadius-value">250</span>px</label>
        <input type="range" id="outerRadius" min="150" max="350" step="10" value="250">
      </div>
    </div>

    <div class="control-group">
      <h3>Controls</h3>
      <button onclick="generatePattern()">Generate New Pattern</button>
      <button onclick="randomizePattern()">Randomize</button>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
      <label><input type="checkbox" id="optimizeForPlotter" checked> Optimize for Plotter</label>
      <div class="button-group">
        <button onclick="exportSVG()">Export SVG</button>
        <button onclick="exportPNG()">Export PNG</button>
      </div>
      <div id="processing-status"></div>
    </div>

    <!-- Preset Manager Container -->
    <div id="preset-container"></div>
  </div>

  <script>
    // Global variables
    let tiles = [];
    // svgCanvas removed - using manual SVG generation
    let currentSeed;
    let currentPaperSize = 'square800';

    // Initialize URL state
    const urlState = new TSUrlState({
      algorithmId: 'zellige-pattern',
      schema: [
        { key: 'patternType', type: 'enum', options: ['classic8', 'hexagonal', 'star16', 'safavid', 'geometric'] },
        { key: 'complexity', type: 'int', bytes: 1 },
        { key: 'tileSize', type: 'int', bytes: 1 },
        { key: 'spacing', type: 'float', bytes: 1, min: 0, max: 10 },
        { key: 'rotationOffset', type: 'int', bytes: 1 },
        { key: 'lineWeight', type: 'float', bytes: 1, min: 0.1, max: 3 },
        { key: 'repetitions', type: 'int', bytes: 1 },
        { key: 'innerRadius', type: 'int', bytes: 2 },
        { key: 'outerRadius', type: 'int', bytes: 2 },
        { key: 'showConstruction', type: 'bool' },
        { key: 'fillShapes', type: 'bool' },
        { key: 'colorCode', type: 'bool' },
        { key: 'showSymmetry', type: 'bool' }
      ]
    });

    // Load URL params if present
    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      if (urlParams.patternType) document.getElementById('patternType').value = urlParams.patternType;
      if (urlParams.complexity) document.getElementById('complexity').value = urlParams.complexity;
      if (urlParams.tileSize) document.getElementById('tileSize').value = urlParams.tileSize;
      if (urlParams.spacing !== undefined) document.getElementById('spacing').value = urlParams.spacing;
      if (urlParams.rotationOffset !== undefined) document.getElementById('rotationOffset').value = urlParams.rotationOffset;
      if (urlParams.lineWeight) document.getElementById('lineWeight').value = urlParams.lineWeight;
      if (urlParams.repetitions) document.getElementById('repetitions').value = urlParams.repetitions;
      if (urlParams.innerRadius) document.getElementById('innerRadius').value = urlParams.innerRadius;
      if (urlParams.outerRadius) document.getElementById('outerRadius').value = urlParams.outerRadius;
      if (urlParams.showConstruction !== undefined) document.getElementById('showConstruction').checked = urlParams.showConstruction;
      if (urlParams.fillShapes !== undefined) document.getElementById('fillShapes').checked = urlParams.fillShapes;
      if (urlParams.colorCode !== undefined) document.getElementById('colorCode').checked = urlParams.colorCode;
      if (urlParams.showSymmetry !== undefined) document.getElementById('showSymmetry').checked = urlParams.showSymmetry;
    }

    // Paper size definitions
    const PAPER_SIZES = {
      'square800': { width: 800, height: 800 },
      'landscape800x600': { width: 800, height: 600 },
      'a4portrait': { width: 595, height: 842 },
      'a4landscape': { width: 842, height: 595 },
      'a3portrait': { width: 842, height: 1191 },
      'a3landscape': { width: 1191, height: 842 },
      'letterportrait': { width: 612, height: 792 },
      'letterlandscape': { width: 792, height: 612 }
    };

    // Tile shape definitions for Zellige patterns
    const TILE_SHAPES = {
      kite: (size) => {
        const angle = TWO_PI / 8;
        return [
          { x: 0, y: 0 },
          { x: size * cos(angle/2), y: size * sin(angle/2) },
          { x: size * 1.5 * cos(angle), y: size * 1.5 * sin(angle) },
          { x: size * cos(3*angle/2), y: size * sin(3*angle/2) }
        ];
      },
      dart: (size) => {
        const angle = TWO_PI / 8;
        const phi = (1 + sqrt(5)) / 2; // Golden ratio
        return [
          { x: 0, y: 0 },
          { x: size * cos(angle/2), y: size * sin(angle/2) },
          { x: size * phi * cos(angle), y: size * phi * sin(angle) },
          { x: size * cos(3*angle/2), y: size * sin(3*angle/2) }
        ];
      },
      hexagon: (size) => {
        const points = [];
        for (let i = 0; i < 6; i++) {
          const angle = (TWO_PI / 6) * i;
          points.push({
            x: size * cos(angle),
            y: size * sin(angle)
          });
        }
        return points;
      },
      octagon: (size) => {
        const points = [];
        for (let i = 0; i < 8; i++) {
          const angle = (TWO_PI / 8) * i;
          points.push({
            x: size * cos(angle),
            y: size * sin(angle)
          });
        }
        return points;
      },
      star8: (size) => {
        const points = [];
        for (let i = 0; i < 16; i++) {
          const angle = (TWO_PI / 16) * i;
          const r = i % 2 === 0 ? size : size * 0.5;
          points.push({
            x: r * cos(angle),
            y: r * sin(angle)
          });
        }
        return points;
      }
    };

    function setup() {
      const size = PAPER_SIZES[currentPaperSize];
      const canvas = createCanvas(size.width, size.height);
      canvas.parent('canvas-wrapper');

      angleMode(RADIANS);
      setupEventListeners();
      generatePattern();
    }

    function updateCanvasSize() {
      const size = PAPER_SIZES[currentPaperSize];
      resizeCanvas(size.width, size.height);
      generatePattern();
    }

    function generatePattern() {
      currentSeed = millis();
      randomSeed(currentSeed);

      tiles = [];
      const patternType = document.getElementById('patternType').value;
      const complexity = parseInt(document.getElementById('complexity').value);
      const tileSize = parseFloat(document.getElementById('tileSize').value);
      const repetitions = parseInt(document.getElementById('repetitions').value);
      const innerRadius = parseFloat(document.getElementById('innerRadius').value);
      const outerRadius = parseFloat(document.getElementById('outerRadius').value);

      // Update URL state
      updateUrlState();

      // Generate tiles based on pattern type
      switch (patternType) {
        case 'classic8':
          generateClassic8Pattern(complexity, tileSize, repetitions, innerRadius, outerRadius);
          break;
        case 'hexagonal':
          generateHexagonalPattern(complexity, tileSize);
          break;
        case 'star16':
          generateStar16Pattern(complexity, tileSize, repetitions);
          break;
        case 'safavid':
          generateSafavidPattern(complexity, tileSize, repetitions);
          break;
        case 'geometric':
          generateGeometricPattern(complexity, tileSize);
          break;
      }

      redraw();
      showStatus('Pattern generated', 'success');
    }

    function generateClassic8Pattern(complexity, size, reps, innerR, outerR) {
      const centerX = width / 2;
      const centerY = height / 2;

      // Generate radial layers
      for (let layer = 0; layer < complexity; layer++) {
        const radius = map(layer, 0, complexity - 1, innerR, outerR);

        for (let i = 0; i < reps; i++) {
          const angle = (TWO_PI / reps) * i;
          const x = centerX + radius * cos(angle);
          const y = centerY + radius * sin(angle);

          // Alternate between kites and darts
          const shapeType = (layer + i) % 2 === 0 ? 'kite' : 'dart';
          const shape = TILE_SHAPES[shapeType](size);

          tiles.push({
            type: shapeType,
            points: shape,
            x: x,
            y: y,
            rotation: angle + HALF_PI,
            layer: layer
          });
        }
      }
    }

    function generateHexagonalPattern(complexity, size) {
      const cols = floor(width / (size * 1.5));
      const rows = floor(height / (size * sqrt(3)));

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const x = col * size * 1.5 + size;
          const y = row * size * sqrt(3) + (col % 2) * size * sqrt(3) / 2 + size;

          if (x < width && y < height) {
            tiles.push({
              type: 'hexagon',
              points: TILE_SHAPES.hexagon(size),
              x: x,
              y: y,
              rotation: 0,
              layer: (row + col) % complexity
            });
          }
        }
      }
    }

    function generateStar16Pattern(complexity, size, reps) {
      const centerX = width / 2;
      const centerY = height / 2;

      // Central star
      tiles.push({
        type: 'star8',
        points: TILE_SHAPES.star8(size * 2),
        x: centerX,
        y: centerY,
        rotation: 0,
        layer: 0
      });

      // Surrounding pattern
      for (let ring = 1; ring < complexity; ring++) {
        const radius = ring * size * 2;
        const count = reps * ring;

        for (let i = 0; i < count; i++) {
          const angle = (TWO_PI / count) * i;
          const x = centerX + radius * cos(angle);
          const y = centerY + radius * sin(angle);

          const shapeType = ring % 2 === 0 ? 'octagon' : 'kite';
          tiles.push({
            type: shapeType,
            points: TILE_SHAPES[shapeType](size),
            x: x,
            y: y,
            rotation: angle,
            layer: ring
          });
        }
      }
    }

    function generateSafavidPattern(complexity, size, reps) {
      const centerX = width / 2;
      const centerY = height / 2;

      // Complex interlocking pattern
      for (let level = 0; level < complexity; level++) {
        const baseAngle = (level * PI) / (complexity * 2);

        for (let i = 0; i < reps; i++) {
          const angle = (TWO_PI / reps) * i + baseAngle;
          const radius = size * (level + 1) * 1.5;

          // Primary shape
          const x1 = centerX + radius * cos(angle);
          const y1 = centerY + radius * sin(angle);

          tiles.push({
            type: 'dart',
            points: TILE_SHAPES.dart(size),
            x: x1,
            y: y1,
            rotation: angle,
            layer: level
          });

          // Interstitial shapes
          if (level > 0) {
            const angle2 = angle + (TWO_PI / reps) / 2;
            const x2 = centerX + radius * 0.7 * cos(angle2);
            const y2 = centerY + radius * 0.7 * sin(angle2);

            tiles.push({
              type: 'kite',
              points: TILE_SHAPES.kite(size * 0.7),
              x: x2,
              y: y2,
              rotation: angle2 + PI,
              layer: level
            });
          }
        }
      }
    }

    function generateGeometricPattern(complexity, size) {
      const gridSize = floor(sqrt(complexity * 20));
      const cellSize = min(width, height) / gridSize;

      for (let row = 0; row < gridSize; row++) {
        for (let col = 0; col < gridSize; col++) {
          const x = col * cellSize + cellSize / 2;
          const y = row * cellSize + cellSize / 2;

          const patternIndex = (row * gridSize + col) % 4;
          let shapeType, rotation;

          switch (patternIndex) {
            case 0:
              shapeType = 'octagon';
              rotation = 0;
              break;
            case 1:
              shapeType = 'kite';
              rotation = QUARTER_PI;
              break;
            case 2:
              shapeType = 'dart';
              rotation = -QUARTER_PI;
              break;
            case 3:
              shapeType = 'hexagon';
              rotation = 0;
              break;
          }

          tiles.push({
            type: shapeType,
            points: TILE_SHAPES[shapeType](size * 0.8),
            x: x,
            y: y,
            rotation: rotation,
            layer: patternIndex
          });
        }
      }
    }

    function draw() {
      background(255);

      const lineWeight = parseFloat(document.getElementById('lineWeight').value);
      const spacing = parseFloat(document.getElementById('spacing').value);
      const rotationOffset = radians(parseFloat(document.getElementById('rotationOffset').value));
      const showConstruction = document.getElementById('showConstruction').checked;
      const fillShapes = document.getElementById('fillShapes').checked;
      const colorCode = document.getElementById('colorCode').checked;
      const showSymmetry = document.getElementById('showSymmetry').checked;

      // Show symmetry lines if enabled
      if (showSymmetry) {
        push();
        translate(width / 2, height / 2);
        stroke(200);
        strokeWeight(0.5);
        const reps = parseInt(document.getElementById('repetitions').value);
        for (let i = 0; i < reps; i++) {
          const angle = (TWO_PI / reps) * i;
          line(0, 0, width * cos(angle), width * sin(angle));
        }
        pop();
      }

      // Draw construction lines if enabled
      if (showConstruction) {
        push();
        noFill();
        stroke(220);
        strokeWeight(0.5);

        const innerR = parseFloat(document.getElementById('innerRadius').value);
        const outerR = parseFloat(document.getElementById('outerRadius').value);
        circle(width / 2, height / 2, innerR * 2);
        circle(width / 2, height / 2, outerR * 2);
        pop();
      }

      // Draw tiles
      strokeWeight(lineWeight);

      tiles.forEach(tile => {
        push();
        translate(tile.x, tile.y);
        rotate(tile.rotation + rotationOffset);

        // Color coding
        if (colorCode) {
          const colors = {
            kite: color(66, 133, 244, 50),      // Blue
            dart: color(234, 67, 53, 50),       // Red
            hexagon: color(52, 168, 83, 50),    // Green
            octagon: color(251, 188, 5, 50),    // Yellow
            star8: color(154, 64, 210, 50)      // Purple
          };

          if (fillShapes) {
            fill(colors[tile.type] || color(128, 128, 128, 50));
          } else {
            noFill();
          }

          const strokeColors = {
            kite: color(66, 133, 244),
            dart: color(234, 67, 53),
            hexagon: color(52, 168, 83),
            octagon: color(251, 188, 5),
            star8: color(154, 64, 210)
          };
          stroke(strokeColors[tile.type] || 0);
        } else {
          if (fillShapes) {
            fill(255);
          } else {
            noFill();
          }
          stroke(0);
        }

        // Draw the tile with spacing
        beginShape();
        tile.points.forEach(point => {
          const scale = 1 - (spacing / 100);
          vertex(point.x * scale, point.y * scale);
        });
        endShape(CLOSE);

        pop();
      });

      noLoop();
    }

    function randomizePattern() {
      // Randomize controls
      document.getElementById('complexity').value = floor(random(1, 6));
      document.getElementById('tileSize').value = floor(random(20, 101) / 5) * 5;
      document.getElementById('spacing').value = floor(random(0, 11) / 0.5) * 0.5;
      document.getElementById('repetitions').value = floor(random(4, 17) / 2) * 2;
      document.getElementById('innerRadius').value = floor(random(50, 201) / 10) * 10;
      document.getElementById('outerRadius').value = floor(random(150, 351) / 10) * 10;

      // Update displays
      updateAllDisplays();

      // Generate new pattern
      generatePattern();
    }

    function exportSVG() {
      const size = PAPER_SIZES[currentPaperSize];
      const lineWeight = parseFloat(document.getElementById('lineWeight').value);
      const spacing = parseFloat(document.getElementById('spacing').value);
      const rotationOffsetDeg = parseFloat(document.getElementById('rotationOffset').value);
      const fillShapes = document.getElementById('fillShapes').checked;

      // Reorder tiles for plotter if optimization enabled
      let drawOrder = tiles;
      if (document.getElementById('optimizeForPlotter').checked) {
        drawOrder = TSExport.reorderElements(tiles,
          (tile) => ({ x: tile.x, y: tile.y }),
          (tile) => ({ x: tile.x, y: tile.y })
        );
      }

      let svgContent = '';
      drawOrder.forEach(tile => {
        const scale = 1 - (spacing / 100);
        const totalRotDeg = tile.rotation * (180 / Math.PI) + rotationOffsetDeg;
        const pts = tile.points.map(p => `${p.x * scale},${p.y * scale}`).join(' ');
        svgContent += `  <g transform="translate(${tile.x},${tile.y}) rotate(${totalRotDeg})">\n`;
        svgContent += `    <polygon points="${pts}" stroke="#000" stroke-width="${lineWeight}" fill="${fillShapes ? 'white' : 'none'}"/>\n`;
        svgContent += `  </g>\n`;
      });

      const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${size.width}" height="${size.height}" viewBox="0 0 ${size.width} ${size.height}">
  <rect width="100%" height="100%" fill="white"/>
${svgContent}</svg>`;

      TSExport.downloadSVG(svg, `zellige-pattern-${currentSeed}`);
      showStatus('SVG exported successfully', 'success');
    }

    function exportPNG() {
      save(`zellige-pattern-${currentSeed}.png`);
      showStatus('PNG exported successfully', 'success');
    }

    function drawToCanvas(canvas) {
      const lineWeight = parseFloat(document.getElementById('lineWeight').value);
      const spacing = parseFloat(document.getElementById('spacing').value);
      const rotationOffset = radians(parseFloat(document.getElementById('rotationOffset').value));
      const fillShapes = document.getElementById('fillShapes').checked;

      canvas.strokeWeight(lineWeight);

      tiles.forEach(tile => {
        canvas.push();
        canvas.translate(tile.x, tile.y);
        canvas.rotate(tile.rotation + rotationOffset);

        if (fillShapes) {
          canvas.fill(255);
        } else {
          canvas.noFill();
        }
        canvas.stroke(0);

        canvas.beginShape();
        tile.points.forEach(point => {
          const scale = 1 - (spacing / 100);
          canvas.vertex(point.x * scale, point.y * scale);
        });
        canvas.endShape(CLOSE);

        canvas.pop();
      });
    }

    function setupEventListeners() {
      // Update value displays
      document.querySelectorAll('input[type="range"]').forEach(input => {
        input.addEventListener('input', (e) => {
          const valueSpan = document.getElementById(e.target.id + '-value');
          if (valueSpan) {
            valueSpan.textContent = e.target.value;
          }
        });
      });

      // Regenerate on parameter change
      ['patternType', 'complexity', 'tileSize', 'spacing', 'rotationOffset',
       'repetitions', 'innerRadius', 'outerRadius'].forEach(id => {
        document.getElementById(id).addEventListener('change', generatePattern);
      });

      // Redraw on visual change
      ['lineWeight', 'showConstruction', 'fillShapes', 'colorCode', 'showSymmetry'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
          redraw();
        });
      });

      // Paper size change
      document.getElementById('paperSize').addEventListener('change', (e) => {
        currentPaperSize = e.target.value;
        updateCanvasSize();
      });
    }

    function updateAllDisplays() {
      document.querySelectorAll('input[type="range"]').forEach(input => {
        const valueSpan = document.getElementById(input.id + '-value');
        if (valueSpan) {
          valueSpan.textContent = input.value;
        }
      });
    }

    function showStatus(message, type) {
      const status = document.getElementById('processing-status');
      status.textContent = message;
      status.className = type;
      status.style.display = 'block';

      setTimeout(() => {
        status.style.display = 'none';
      }, 3000);
    }

    function updateUrlState() {
      const params = {
        patternType: document.getElementById('patternType').value,
        complexity: parseInt(document.getElementById('complexity').value),
        tileSize: parseInt(document.getElementById('tileSize').value),
        spacing: parseFloat(document.getElementById('spacing').value),
        rotationOffset: parseInt(document.getElementById('rotationOffset').value),
        lineWeight: parseFloat(document.getElementById('lineWeight').value),
        repetitions: parseInt(document.getElementById('repetitions').value),
        innerRadius: parseInt(document.getElementById('innerRadius').value),
        outerRadius: parseInt(document.getElementById('outerRadius').value),
        showConstruction: document.getElementById('showConstruction').checked,
        fillShapes: document.getElementById('fillShapes').checked,
        colorCode: document.getElementById('colorCode').checked,
        showSymmetry: document.getElementById('showSymmetry').checked
      };
      urlState.replaceState(params);
    }

    function copyShareUrl() {
      const params = {
        patternType: document.getElementById('patternType').value,
        complexity: parseInt(document.getElementById('complexity').value),
        tileSize: parseInt(document.getElementById('tileSize').value),
        spacing: parseFloat(document.getElementById('spacing').value),
        rotationOffset: parseInt(document.getElementById('rotationOffset').value),
        lineWeight: parseFloat(document.getElementById('lineWeight').value),
        repetitions: parseInt(document.getElementById('repetitions').value),
        innerRadius: parseInt(document.getElementById('innerRadius').value),
        outerRadius: parseInt(document.getElementById('outerRadius').value),
        showConstruction: document.getElementById('showConstruction').checked,
        fillShapes: document.getElementById('fillShapes').checked,
        colorCode: document.getElementById('colorCode').checked,
        showSymmetry: document.getElementById('showSymmetry').checked
      };
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => { statusEl.textContent = 'Copy failed'; });
    }
  </script>
