<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>L-System Tree Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/export-utils.js"></script>
  <script src="../../shared/url-state.js"></script>

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    .value {
      font-weight: 600;
      color: var(--ts-accent-primary);
    }

    .control-group {
      background: var(--ts-bg-control);
      padding: var(--ts-space-md);
      border-radius: var(--ts-radius-md);
      margin-bottom: var(--ts-space-md);
    }

    .control-group h3 {
      margin: 0 0 var(--ts-space-md) 0;
      color: var(--ts-accent-primary);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--ts-border-subtle);
      padding-bottom: var(--ts-space-sm);
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: var(--ts-space-md);
      margin-bottom: var(--ts-space-lg);
    }

    .buttons-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--ts-space-sm);
      margin-top: var(--ts-space-lg);
    }

    .preset {
      background: var(--ts-bg-control) !important;
      border: 1px solid var(--ts-border-default) !important;
      color: var(--ts-text-secondary) !important;
    }

    .preset:hover {
      background: var(--ts-bg-hover) !important;
      border-color: var(--ts-accent-primary) !important;
      color: var(--ts-text-primary) !important;
    }

    /* Preset container at bottom */
    .preset-container {
      margin-top: var(--ts-space-lg);
      padding-top: var(--ts-space-lg);
      border-top: 1px solid var(--ts-border-subtle);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Gallery</a>
    <h2>L-System Tree Generator</h2>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="controls-grid">
        <div class="control-group">
          <label>Paper Size:</label>
          <select id="paperSize">
            <option value="custom" selected>Custom (800x600)</option>
            <option value="a5">A5 Portrait</option>
            <option value="a4">A4 Portrait</option>
            <option value="a3">A3 Portrait</option>
            <option value="letter">US Letter</option>
            <option value="square">Square</option>
          </select>
        </div>
      </div>
    </div>

    <div class="control-group">
      <h3>Structure</h3>
      <div class="controls-grid">
        <div>
          <label>Iterations: <span class="value" id="iterations-val">5</span></label>
          <input type="range" id="iterations" min="1" max="8" value="5">
        </div>
        <div>
          <label>Branch Length: <span class="value" id="length-val">60</span></label>
          <input type="range" id="length" min="20" max="100" value="60">
        </div>
        <div>
          <label>Branch Angle: <span class="value" id="angle-val">25</span>deg</label>
          <input type="range" id="angle" min="10" max="45" value="25">
        </div>
        <div>
          <label>Length Decay: <span class="value" id="decay-val">0.7</span></label>
          <input type="range" id="decay" min="0.5" max="0.9" step="0.05" value="0.7">
        </div>
      </div>
    </div>

    <div class="buttons-row">
      <button id="regenerate">Regenerate</button>
      <button id="export">Export SVG</button>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
    </div>

    <!-- Preset container at bottom -->
    <div class="preset-container">
      <h3>Presets</h3>
      <div class="buttons-row">
        <button class="preset" id="simple">Simple Tree</button>
        <button class="preset" id="organic">Organic</button>
        <button class="preset" id="willow">Willow</button>
        <button class="preset" id="fern">Fern</button>
      </div>
    </div>
  </div>

  <script>
    let params = {
      paperSize: 'custom',
      iterations: 5,
      length: 60,
      angle: 25,
      decay: 0.7,
      axiom: 'F',
      rules: { 'F': 'FF+[+F-F-F]-[-F+F+F]' }
    };

    // URL state management
    const urlState = new TSUrlState({
      algorithmId: 'tree-lsystem',
      schema: [
        { key: 'iterations', type: 'int', bytes: 1 },
        { key: 'length', type: 'int', bytes: 1 },
        { key: 'angle', type: 'int', bytes: 1 },
        { key: 'decay', type: 'float', bytes: 2, min: 0.5, max: 0.9 }
      ]
    });

    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
    }

    const presets = {
      simple: {
        iterations: 5,
        angle: 25,
        decay: 0.7,
        axiom: 'F',
        rules: { 'F': 'FF+[+F-F-F]-[-F+F+F]' }
      },
      organic: {
        iterations: 4,
        angle: 30,
        decay: 0.75,
        axiom: 'F',
        rules: { 'F': 'F[+F]F[-F][F]' }
      },
      willow: {
        iterations: 5,
        angle: 35,
        decay: 0.8,
        axiom: 'F',
        rules: { 'F': 'FF+[+F-FF-F]-[-F+FF+F]' }
      },
      fern: {
        iterations: 6,
        angle: 22,
        decay: 0.85,
        axiom: 'X',
        rules: {
          'X': 'F+[[X]-X]-F[-FX]+X',
          'F': 'FF'
        }
      }
    };

    let canvas;
    let canvasWidth = 800;
    let canvasHeight = 600;

    function setup() {
      updateCanvasSize();
      canvas = createCanvas(canvasWidth, canvasHeight);
      canvas.parent('canvas-container');

      // Setup paper size
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        updateCanvasSize();
        resizeCanvas(canvasWidth, canvasHeight);
        drawTree();
      });

      // Setup range inputs
      document.getElementById('iterations').addEventListener('input', updateParam);
      document.getElementById('length').addEventListener('input', updateParam);
      document.getElementById('angle').addEventListener('input', updateParam);
      document.getElementById('decay').addEventListener('input', updateParam);

      // Setup buttons
      document.getElementById('regenerate').addEventListener('click', drawTree);
      document.getElementById('export').addEventListener('click', exportSVG);

      // Setup presets
      Object.keys(presets).forEach(preset => {
        document.getElementById(preset).addEventListener('click', () => loadPreset(preset));
      });

      drawTree();
    }

    function updateCanvasSize() {
      if (window.CanvasLayout) {
        const size = CanvasLayout.getSize(params.paperSize);
        canvasWidth = size.width;
        canvasHeight = size.height;
      }
    }

    function updateParam(e) {
      const id = e.target.id;
      params[id] = parseFloat(e.target.value);
      document.getElementById(id + '-val').textContent = e.target.value;
      drawTree();
    }

    function generateLSystem() {
      let current = params.axiom;
      for (let i = 0; i < params.iterations; i++) {
        let next = '';
        for (let char of current) {
          next += params.rules[char] || char;
        }
        current = next;
      }
      return current;
    }

    function drawTree() {
      background(255);
      stroke(0);
      strokeWeight(2);

      push();
      translate(width / 2, height - 50);

      const system = generateLSystem();
      drawLSystem(system);

      pop();

      // Update URL state after drawing
      urlState.replaceState(params);
    }

    function drawLSystem(system) {
      for (let char of system) {
        switch (char) {
          case 'F':
            line(0, 0, 0, -params.length);
            translate(0, -params.length);
            break;
          case '+':
            rotate(radians(params.angle));
            break;
          case '-':
            rotate(radians(-params.angle));
            break;
          case '[':
            push();
            params.length *= params.decay;
            break;
          case ']':
            params.length /= params.decay;
            pop();
            break;
        }
      }
    }

    function loadPreset(name) {
      const preset = presets[name];
      Object.assign(params, preset);

      // Update UI
      ['iterations', 'length', 'angle', 'decay'].forEach(key => {
        if (params[key] !== undefined) {
          const element = document.getElementById(key);
          if (element) {
            element.value = params[key];
            document.getElementById(key + '-val').textContent = params[key];
          }
        }
      });

      drawTree();
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => { statusEl.textContent = 'Copy failed'; });
    }

    function exportSVG() {
      // Collect line segments by traversing the L-system
      const segments = [];
      const system = generateLSystem();

      // State tracking for turtle graphics
      const state = {
        x: canvasWidth / 2,
        y: canvasHeight - 50,
        angle: -90, // pointing up
        length: params.length
      };
      const stack = [];

      for (let char of system) {
        switch (char) {
          case 'F':
            // Draw line from current position
            const x1 = state.x;
            const y1 = state.y;
            const radAngle = radians(state.angle);
            const x2 = state.x + state.length * cos(radAngle);
            const y2 = state.y + state.length * sin(radAngle);
            segments.push({ x1, y1, x2, y2 });
            state.x = x2;
            state.y = y2;
            break;
          case '+':
            state.angle += params.angle;
            break;
          case '-':
            state.angle -= params.angle;
            break;
          case '[':
            // Save state
            stack.push({
              x: state.x,
              y: state.y,
              angle: state.angle,
              length: state.length
            });
            state.length *= params.decay;
            break;
          case ']':
            // Restore state
            const saved = stack.pop();
            state.x = saved.x;
            state.y = saved.y;
            state.angle = saved.angle;
            state.length = saved.length;
            break;
        }
      }

      // Generate SVG from segments
      let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${canvasWidth}" height="${canvasHeight}" viewBox="0 0 ${canvasWidth} ${canvasHeight}">
<rect width="100%" height="100%" fill="#ffffff"/>
`;

      for (const seg of segments) {
        svg += `<line x1="${seg.x1}" y1="${seg.y1}" x2="${seg.x2}" y2="${seg.y2}" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
`;
      }

      svg += '</svg>';

      // Need to add import for TSExport if not already present in the HTML
      if (typeof TSExport !== 'undefined') {
        TSExport.downloadSVG(svg, 'lsystem-tree');
      } else {
        // Fallback download method
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'lsystem-tree.svg';
        a.click();
        URL.revokeObjectURL(url);
      }
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
</html>
