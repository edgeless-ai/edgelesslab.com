  <script>
    // ============================================
    // STRANGE ATTRACTORS - Multi-Attractor System
    // ============================================

    // Parameters
    const params = {
      attractorType: 'rossler',
      // Attractor-specific parameters
      a: 0.2, b: 0.2, c: 5.7, d: 0, e: 0, f: 0,
      // Iteration settings
      iterations: 50000,
      dt: 0.01,
      skip: 100,
      // Rendering
      drawMode: 'lines',
      strokeWeight: 0.5,
      opacity: 100,
      // Transform
      scale: 15,
      offsetX: 0,
      offsetY: 0,
      projection: 'xy',
      rotation: 45,
      tilt: 30,
      // Canvas
      paperSize: 'a3',
      bgColor: '#ffffff',
      strokeColor: '#000000',
      seed: Math.floor(Math.random() * 1000000)
    };

    // URL state management
    const urlState = new TSUrlState({
      algorithmId: 'strange-attractors',
      schema: [
        { key: 'attractorType', type: 'enum', options: ['rossler', 'henon', 'clifford', 'aizawa', 'thomas', 'chua', 'dejong'] },
        { key: 'a', type: 'float', bytes: 2, min: -5, max: 5 },
        { key: 'b', type: 'float', bytes: 2, min: -5, max: 5 },
        { key: 'c', type: 'float', bytes: 2, min: -10, max: 10 },
        { key: 'd', type: 'float', bytes: 2, min: -5, max: 5 },
        { key: 'e', type: 'float', bytes: 2, min: -5, max: 5 },
        { key: 'f', type: 'float', bytes: 2, min: -5, max: 5 },
        { key: 'iterations', type: 'int', bytes: 4 },
        { key: 'dt', type: 'float', bytes: 2, min: 0.001, max: 0.05 },
        { key: 'skip', type: 'int', bytes: 2 },
        { key: 'drawMode', type: 'enum', options: ['lines', 'points'] },
        { key: 'strokeWeight', type: 'float', bytes: 2, min: 0.1, max: 3 },
        { key: 'opacity', type: 'int', bytes: 1, min: 5, max: 100 },
        { key: 'scale', type: 'float', bytes: 2, min: 1, max: 100 },
        { key: 'offsetX', type: 'int', bytes: 2, min: -500, max: 500 },
        { key: 'offsetY', type: 'int', bytes: 2, min: -500, max: 500 },
        { key: 'projection', type: 'enum', options: ['xy', 'xz', 'yz', 'iso'] },
        { key: 'rotation', type: 'int', bytes: 2, min: 0, max: 360 },
        { key: 'tilt', type: 'int', bytes: 2, min: -90, max: 90 },
        { key: 'bgColor', type: 'color' },
        { key: 'strokeColor', type: 'color' },
        { key: 'seed', type: 'int', bytes: 4 }
      ]
    });

    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
    }

    // Attractor metadata
    const attractorInfo = {
      rossler: {
        name: 'Rossler Attractor',
        description: 'Spiral chaos with simpler dynamics than Lorenz (1976)',
        is3D: true,
        defaults: { a: 0.2, b: 0.2, c: 5.7, d: 0, e: 0, f: 0 },
        paramRanges: { a: [-1, 1], b: [-1, 1], c: [0, 20] },
        usedParams: ['a', 'b', 'c']
      },
      henon: {
        name: 'Henon Map',
        description: 'Classic discrete chaotic map (1976)',
        is3D: false,
        defaults: { a: 1.4, b: 0.3, c: 0, d: 0, e: 0, f: 0 },
        paramRanges: { a: [0.5, 1.5], b: [0.1, 0.5] },
        usedParams: ['a', 'b']
      },
      clifford: {
        name: 'Clifford Attractor',
        description: 'Trigonometric 2D attractor with beautiful patterns',
        is3D: false,
        defaults: { a: -1.4, b: 1.6, c: 1.0, d: 0.7, e: 0, f: 0 },
        paramRanges: { a: [-3, 3], b: [-3, 3], c: [-3, 3], d: [-3, 3] },
        usedParams: ['a', 'b', 'c', 'd']
      },
      aizawa: {
        name: 'Aizawa Attractor',
        description: 'Complex 3D torus-like attractor with 6 parameters',
        is3D: true,
        defaults: { a: 0.95, b: 0.7, c: 0.6, d: 3.5, e: 0.25, f: 0.1 },
        paramRanges: { a: [0.5, 1.5], b: [0.3, 1.2], c: [0.3, 1.0], d: [2, 5], e: [0.1, 0.5], f: [0.05, 0.2] },
        usedParams: ['a', 'b', 'c', 'd', 'e', 'f']
      },
      thomas: {
        name: 'Thomas Attractor',
        description: 'Cyclically symmetric chaotic flow',
        is3D: true,
        defaults: { a: 0.208186, b: 0, c: 0, d: 0, e: 0, f: 0 },
        paramRanges: { a: [0.1, 0.3] },
        usedParams: ['a']
      },
      chua: {
        name: "Chua's Circuit",
        description: 'Double scroll attractor from electronic circuit',
        is3D: true,
        defaults: { a: 15.6, b: 28, c: -1.143, d: -0.714, e: 0, f: 0 },
        paramRanges: { a: [10, 20], b: [20, 35], c: [-2, -0.5], d: [-1, -0.3] },
        usedParams: ['a', 'b', 'c', 'd']
      },
      dejong: {
        name: 'De Jong Attractor',
        description: 'Trigonometric 2D attractor (Peter de Jong)',
        is3D: false,
        defaults: { a: -2.24, b: 0.43, c: -0.65, d: -2.43, e: 0, f: 0 },
        paramRanges: { a: [-3, 3], b: [-3, 3], c: [-3, 3], d: [-3, 3] },
        usedParams: ['a', 'b', 'c', 'd']
      }
    };

    // Canvas and state
    let canvas;
    let points = [];
    let presetManager;
    const canvasControls = new TSCanvasControls();
    canvasControls.bind(params);

    // ============================================
    // ATTRACTOR COMPUTATION
    // ============================================

    function computeAttractor() {
      points = [];
      const info = attractorInfo[params.attractorType];
      const dt = params.dt;
      const { a, b, c, d, e, f } = params;

      // Initialize seed for reproducible randomness
      let _s = params.seed;
      const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

      // Initial conditions with slight random variation
      let x = 0.1 + (seededRandom() - 0.5) * 0.001, y = (seededRandom() - 0.5) * 0.001, z = (seededRandom() - 0.5) * 0.001;

      // Skip initial transient
      for (let i = 0; i < params.skip; i++) {
        const result = stepAttractor(x, y, z, a, b, c, d, e, f, dt);
        x = result.x; y = result.y; z = result.z;
      }

      // Main iteration
      for (let i = 0; i < params.iterations; i++) {
        const result = stepAttractor(x, y, z, a, b, c, d, e, f, dt);
        x = result.x; y = result.y; z = result.z;

        // Skip invalid values
        if (!isFinite(x) || !isFinite(y) || !isFinite(z)) {
          break;
        }

        points.push({ x, y, z });
      }

      return points;
    }

    function stepAttractor(x, y, z, a, b, c, d, e, f, dt) {
      let dx, dy, dz;

      switch (params.attractorType) {
        case 'rossler':
          // dx/dt = -y - z, dy/dt = x + a*y, dz/dt = b + z*(x - c)
          dx = -y - z;
          dy = x + a * y;
          dz = b + z * (x - c);
          return { x: x + dx * dt, y: y + dy * dt, z: z + dz * dt };

        case 'henon':
          // x_n+1 = 1 - a*x_n^2 + y_n, y_n+1 = b*x_n
          return { x: 1 - a * x * x + y, y: b * x, z: 0 };

        case 'clifford':
          // x_n+1 = sin(a*y_n) + c*cos(a*x_n), y_n+1 = sin(b*x_n) + d*cos(b*y_n)
          return {
            x: Math.sin(a * y) + c * Math.cos(a * x),
            y: Math.sin(b * x) + d * Math.cos(b * y),
            z: 0
          };

        case 'aizawa':
          // Complex 3D attractor
          dx = (z - b) * x - d * y;
          dy = d * x + (z - b) * y;
          dz = c + a * z - (z * z * z) / 3 - (x * x + y * y) * (1 + e * z) + f * z * x * x * x;
          return { x: x + dx * dt, y: y + dy * dt, z: z + dz * dt };

        case 'thomas':
          // dx/dt = sin(y) - b*x, dy/dt = sin(z) - b*y, dz/dt = sin(x) - b*z
          dx = Math.sin(y) - a * x;
          dy = Math.sin(z) - a * y;
          dz = Math.sin(x) - a * z;
          return { x: x + dx * dt, y: y + dy * dt, z: z + dz * dt };

        case 'chua':
          // Chua's circuit with piecewise-linear function
          const h = (c * x + 0.5 * (d - c) * (Math.abs(x + 1) - Math.abs(x - 1)));
          dx = a * (y - x - h);
          dy = x - y + z;
          dz = -b * y;
          return { x: x + dx * dt, y: y + dy * dt, z: z + dz * dt };

        case 'dejong':
          // x_n+1 = sin(a*y_n) - cos(b*x_n), y_n+1 = sin(c*x_n) - cos(d*y_n)
          return {
            x: Math.sin(a * y) - Math.cos(b * x),
            y: Math.sin(c * x) - Math.cos(d * y),
            z: 0
          };

        default:
          return { x, y, z };
      }
    }

    // ============================================
    // PROJECTION
    // ============================================

    function project3D(point) {
      const { x, y, z } = point;
      const info = attractorInfo[params.attractorType];

      // 2D attractors: direct mapping
      if (!info.is3D) {
        return {
          x: x * params.scale + width / 2 + params.offsetX,
          y: y * params.scale + height / 2 + params.offsetY
        };
      }

      // 3D projection
      let px, py;

      switch (params.projection) {
        case 'xy':
          px = x;
          py = y;
          break;
        case 'xz':
          px = x;
          py = z;
          break;
        case 'yz':
          px = y;
          py = z;
          break;
        case 'iso':
          // Isometric projection with rotation
          const radRot = params.rotation * Math.PI / 180;
          const radTilt = params.tilt * Math.PI / 180;

          // Rotate around Z axis
          const rx = x * Math.cos(radRot) - y * Math.sin(radRot);
          const ry = x * Math.sin(radRot) + y * Math.cos(radRot);

          // Tilt (rotate around X axis)
          const ry2 = ry * Math.cos(radTilt) - z * Math.sin(radTilt);

          px = rx;
          py = ry2;
          break;
        default:
          px = x;
          py = y;
      }

      return {
        x: px * params.scale + width / 2 + params.offsetX,
        y: -py * params.scale + height / 2 + params.offsetY  // Flip Y for screen coords
      };
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => { statusEl.textContent = 'Copy failed'; });
    }

    // ============================================
    // DRAWING
    // ============================================

    function drawAttractor() {
      background(params.bgColor);

      if (points.length < 2) return;

      // Update stats display
      if (window.statsDisplay) {
        const info = attractorInfo[params.attractorType];
        window.statsDisplay.update({
          'Attractor': info.name,
          'Type': info.is3D ? '3D' : '2D',
          'Points': points.length.toLocaleString(),
          'Iterations': params.iterations.toLocaleString(),
          'Time Step': params.dt,
          'Projection': params.projection.toUpperCase(),
          'Draw Mode': params.drawMode
        });
      }

      const alpha = Math.floor(params.opacity * 2.55);
      const col = hexToRgb(params.strokeColor);
      stroke(col.r, col.g, col.b, alpha);
      strokeWeight(params.strokeWeight);
      noFill();

      if (params.drawMode === 'lines') {
        beginShape();
        for (const p of points) {
          const proj = project3D(p);
          vertex(proj.x, proj.y);
        }
        endShape();
      } else {
        // Points mode
        for (const p of points) {
          const proj = project3D(p);
          point(proj.x, proj.y);
        }
      }
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 0, g: 0, b: 0 };
    }

    // ============================================
    // SVG GENERATION
    // ============================================

    function generateSVG() {
      if (points.length < 2) return '';

      const svgPaths = [];

      if (params.drawMode === 'lines') {
        const projectedPoints = points.map(p => project3D(p));
        svgPaths.push({
          d: TSExport.pointsToPath(projectedPoints, false),
          stroke: params.strokeColor,
          strokeWidth: params.strokeWeight,
          opacity: params.opacity / 100
        });
      } else {
        // Points as small circles
        for (const p of points) {
          const proj = project3D(p);
          svgPaths.push({
            d: `M ${proj.x} ${proj.y} m -${params.strokeWeight/2},0 a ${params.strokeWeight/2},${params.strokeWeight/2} 0 1,0 ${params.strokeWeight},0 a ${params.strokeWeight/2},${params.strokeWeight/2} 0 1,0 -${params.strokeWeight},0`,
            stroke: params.strokeColor,
            strokeWidth: 0.1,
            fill: params.strokeColor,
            opacity: params.opacity / 100
          });
        }
      }

      // Build SVG manually for opacity support
      let pathsMarkup = '';
      svgPaths.forEach(path => {
        const opacity = path.opacity ? ` opacity="${path.opacity}"` : '';
        const fill = path.fill || 'none';
        pathsMarkup += `  <path d="${path.d}" stroke="${path.stroke}" stroke-width="${path.strokeWidth}" fill="${fill}"${opacity} stroke-linecap="round" stroke-linejoin="round"/>\n`;
      });

      return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
  <rect width="100%" height="100%" fill="${params.bgColor}"/>
${pathsMarkup}</svg>`;
    }

    // ============================================
    // UI SETUP
    // ============================================

    function setup() {
      const size = CanvasLayout.getSize(params.paperSize);
      canvas = createCanvas(size.width, size.height);
      canvas.parent('canvas-container');

      // Initialize UX components
      window.panelController = new TSPanelController().attach();
      window.statsDisplay = new TSStatsDisplay().attach();

      setupControls();
      setupExportButtons();
      loadAttractorDefaults();
      canvasControls.setupRandomizeButton();

      // Initialize preset manager
      presetManager = new PresetManager({
        algorithmId: 'strange-attractors',
        container: '#preset-container',
        onSave: () => ({ ...params }),
        onLoad: (preset) => {
          Object.assign(params, preset.data);
          updateUIFromParams();
          computeAttractor();
          drawAttractor();
        },
        onRandomize: randomizeAll
      });

      computeAttractor();
      drawAttractor();
      urlState.replaceState(params);
    }

    function setupControls() {
      // Attractor type selector
      document.getElementById('attractorType').addEventListener('change', (e) => {
        params.attractorType = e.target.value;
        loadAttractorDefaults();
        computeAttractor();
        drawAttractor();
      });

      // Parameter sliders
      ['a', 'b', 'c', 'd', 'e', 'f'].forEach(p => {
        const el = document.getElementById(`param-${p}`);
        const display = document.getElementById(`param-${p}-val`);
        el.addEventListener('input', () => {
          params[p] = parseFloat(el.value);
          display.textContent = params[p].toFixed(2);
          computeAttractor();
          drawAttractor();
        });
      });

      // Range controls
      const rangeControls = [
        { id: 'iterations', param: 'iterations', parse: parseInt },
        { id: 'dt', param: 'dt', parse: parseFloat },
        { id: 'skip', param: 'skip', parse: parseInt },
        { id: 'strokeWeight', param: 'strokeWeight', parse: parseFloat },
        { id: 'opacity', param: 'opacity', parse: parseInt },
        { id: 'scale', param: 'scale', parse: parseFloat },
        { id: 'offsetX', param: 'offsetX', parse: parseInt },
        { id: 'offsetY', param: 'offsetY', parse: parseInt },
        { id: 'rotation', param: 'rotation', parse: parseInt },
        { id: 'tilt', param: 'tilt', parse: parseInt }
      ];

      rangeControls.forEach(({ id, param, parse }) => {
        const el = document.getElementById(id);
        const display = document.getElementById(`${id}-val`);
        if (el) {
          el.addEventListener('input', () => {
            params[param] = parse(el.value);
            if (display) display.textContent = el.value;
            if (['iterations', 'dt', 'skip'].includes(param)) {
              computeAttractor();
            }
            drawAttractor();
          });
        }
      });

      // Draw mode
      document.getElementById('drawMode').addEventListener('change', (e) => {
        params.drawMode = e.target.value;
        drawAttractor();
      });

      // Projection buttons
      ['xy', 'xz', 'yz', 'iso'].forEach(proj => {
        document.getElementById(`proj-${proj}`).addEventListener('click', () => {
          params.projection = proj;
          updateProjectionButtons();
          drawAttractor();
        });
      });

      // Paper size
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        const size = CanvasLayout.getSize(params.paperSize);
        resizeCanvas(size.width, size.height);
        drawAttractor();
      });

      // Colors
      document.getElementById('bgColor').addEventListener('input', (e) => {
        params.bgColor = e.target.value;
        drawAttractor();
      });

      document.getElementById('strokeColor').addEventListener('input', (e) => {
        params.strokeColor = e.target.value;
        drawAttractor();
      });

      // Action buttons
      document.getElementById('regenerateBtn').addEventListener('click', () => {
        params.seed = Math.floor(Math.random() * 1000000);
        document.getElementById('seed-display').textContent = params.seed;
        document.getElementById('seed').value = params.seed;
        computeAttractor();
        drawAttractor();
      });

      document.getElementById('randomizeParams').addEventListener('click', () => {
        randomizeAttractorParams();
        computeAttractor();
        drawAttractor();
      });

      // Seed control
      document.getElementById('seed-display').textContent = params.seed;
      document.getElementById('seed').value = params.seed;
      document.getElementById('seed').addEventListener('change', (e) => {
        params.seed = parseInt(e.target.value);
        document.getElementById('seed-display').textContent = params.seed;
        computeAttractor();
        drawAttractor();
      });
    }

    function setupExportButtons() {
      document.getElementById('exportSVG').addEventListener('click', () => {
        const svg = generateSVG();
        TSExport.downloadSVG(svg, `strange-attractor-${params.attractorType}`);
      });

      document.getElementById('exportPNG').addEventListener('click', () => {
        TSExport.downloadPNG(canvas.canvas, `strange-attractor-${params.attractorType}`);
      });

      document.getElementById('exportGIF').addEventListener('click', async () => {
        // Create rotation animation GIF for 3D attractors
        const info = attractorInfo[params.attractorType];
        if (!info.is3D) {
          alert('GIF export works best with 3D attractors. Try Rossler, Aizawa, Thomas, or Chua.');
          return;
        }

        const frames = [];
        const originalRotation = params.rotation;
        const frameCount = 36; // 10-degree steps

        for (let i = 0; i < frameCount; i++) {
          params.rotation = (i * 10) % 360;
          drawAttractor();

          // Capture frame
          const frameCanvas = document.createElement('canvas');
          frameCanvas.width = width;
          frameCanvas.height = height;
          const ctx = frameCanvas.getContext('2d');
          ctx.drawImage(canvas.canvas, 0, 0);
          frames.push(frameCanvas);
        }

        params.rotation = originalRotation;
        drawAttractor();

        await TSExport.downloadGIF(frames, `strange-attractor-${params.attractorType}`, { fps: 12 });
      });
    }

    function loadAttractorDefaults() {
      const info = attractorInfo[params.attractorType];

      // Update description
      document.getElementById('attractor-info').textContent = info.description;

      // Load default parameters
      Object.assign(params, info.defaults);

      // Update UI
      ['a', 'b', 'c', 'd', 'e', 'f'].forEach(p => {
        const el = document.getElementById(`param-${p}`);
        const display = document.getElementById(`param-${p}-val`);
        const group = el.parentElement;

        if (info.usedParams.includes(p)) {
          group.style.display = 'block';
          el.value = params[p];
          display.textContent = params[p].toFixed(2);

          // Update range if available
          if (info.paramRanges[p]) {
            el.min = info.paramRanges[p][0];
            el.max = info.paramRanges[p][1];
          }
        } else {
          group.style.display = 'none';
        }
      });

      // Adjust scale based on attractor type
      const scalePresets = {
        rossler: 15,
        henon: 200,
        clifford: 150,
        aizawa: 100,
        thomas: 100,
        chua: 20,
        dejong: 150
      };
      params.scale = scalePresets[params.attractorType] || 15;
      document.getElementById('scale').value = params.scale;
      document.getElementById('scale-val').textContent = params.scale;

      // Adjust dt for different attractor types
      const dtPresets = {
        rossler: 0.01,
        henon: 1,
        clifford: 1,
        aizawa: 0.01,
        thomas: 0.1,
        chua: 0.005,
        dejong: 1
      };
      params.dt = dtPresets[params.attractorType] || 0.01;
      document.getElementById('dt').value = params.dt;
      document.getElementById('dt-val').textContent = params.dt;
    }

    function updateProjectionButtons() {
      ['xy', 'xz', 'yz', 'iso'].forEach(proj => {
        const btn = document.getElementById(`proj-${proj}`);
        if (params.projection === proj) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    function randomizeAttractorParams() {
      const info = attractorInfo[params.attractorType];

      info.usedParams.forEach(p => {
        if (info.paramRanges[p]) {
          const [min, max] = info.paramRanges[p];
          params[p] = min + Math.random() * (max - min);
        }
      });

      updateUIFromParams();
    }

    function randomizeAll() {
      params.seed = Math.floor(Math.random() * 1000000);
      randomizeAttractorParams();
      canvasControls.randomizeColors();
      computeAttractor();
      drawAttractor();
    }

    function updateUIFromParams() {
      // Update attractor type
      document.getElementById('attractorType').value = params.attractorType;

      // Update parameter sliders
      ['a', 'b', 'c', 'd', 'e', 'f'].forEach(p => {
        const el = document.getElementById(`param-${p}`);
        const display = document.getElementById(`param-${p}-val`);
        el.value = params[p];
        display.textContent = params[p].toFixed(2);
      });

      // Update other controls
      const controls = ['iterations', 'dt', 'skip', 'strokeWeight', 'opacity', 'scale', 'offsetX', 'offsetY', 'rotation', 'tilt'];
      controls.forEach(id => {
        const el = document.getElementById(id);
        const display = document.getElementById(`${id}-val`);
        if (el) {
          el.value = params[id];
          if (display) display.textContent = params[id];
        }
      });

      document.getElementById('drawMode').value = params.drawMode;
      document.getElementById('paperSize').value = params.paperSize;
      document.getElementById('bgColor').value = params.bgColor;
      document.getElementById('strokeColor').value = params.strokeColor;

      // Update seed display
      document.getElementById('seed-display').textContent = params.seed;
      document.getElementById('seed').value = params.seed;

      updateProjectionButtons();
    }

    function draw() {
      // Static drawing - only redraw on demand
    }

    function windowResized() {
      // Maintain canvas size based on paper setting
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
