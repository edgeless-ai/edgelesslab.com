<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>ML5 AI Pattern Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
  <script src="../../shared/export-utils.js"></script>
  <script src="../../shared/panel-controller.js"></script>
  <script src="../../shared/stats-display.js"></script>

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    #status {
      background: var(--ts-bg-elevated);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 15px;
      color: var(--ts-accent-primary);
      border: 1px solid var(--ts-border);
    }

    .webcam-container {
      position: relative;
      margin-bottom: 10px;
    }

    #webcam, #webcam2 {
      width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid var(--ts-border);
    }

    #gif-status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ts-text-muted);
    }

    #classificationResults {
      background: var(--ts-bg-elevated);
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--ts-text-secondary);
      border: 1px solid var(--ts-border);
    }

    /* File input styling */
    input[type="file"] {
      width: 100%;
      padding: 8px;
      background: var(--ts-bg-control);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border);
      border-radius: 6px;
      font-family: var(--ts-font-mono);
      font-size: 12px;
    }

    input[type="file"]::file-selector-button {
      background: var(--ts-accent-primary);
      color: var(--ts-bg-deep);
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--ts-font-mono);
      font-size: 12px;
      margin-right: 10px;
    }

    input[type="file"]::file-selector-button:hover {
      background: var(--ts-accent-secondary);
    }

    /* Model-specific control groups */
    #sketchRNNControls,
    #poseNetControls,
    #styleTransferControls,
    #imageClassifierControls,
    #bodyPixControls {
      border: 1px solid var(--ts-accent-tertiary);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      background: rgba(123, 104, 238, 0.05);
    }

    #sketchRNNControls h3,
    #poseNetControls h3,
    #styleTransferControls h3,
    #imageClassifierControls h3,
    #bodyPixControls h3 {
      color: var(--ts-accent-tertiary);
    }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-link">&larr; Back to Index</a>

  <div id="canvas-container"></div>
  <div id="controls">
    <h2>ML5 AI Controls</h2>

    <div id="status">Model Status: Initializing...</div>

    <div class="control-group">
      <h3>AI Model</h3>
      <div class="control">
        <label>Model Type:</label>
        <select id="modelType">
          <option value="sketchRNN">SketchRNN Drawing</option>
          <option value="poseNet">PoseNet Body Tracking</option>
          <option value="styleTransfer">Style Transfer</option>
          <option value="imageClassifier">Image Classifier</option>
          <option value="featureExtractor">Feature Extractor</option>
          <option value="bodyPix">BodyPix Segmentation</option>
        </select>
      </div>
      <button onclick="loadModel()">Load Model</button>
    </div>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="square800">Square (800x800)</option>
          <option value="landscape800x600" selected>Landscape (800x600)</option>
          <option value="a4portrait">A4 Portrait</option>
          <option value="a4landscape">A4 Landscape</option>
          <option value="a3portrait">A3 Portrait</option>
          <option value="a3landscape">A3 Landscape</option>
          <option value="letterportrait">Letter Portrait</option>
          <option value="letterlandscape">Letter Landscape</option>
        </select>
      </div>
      <div class="control">
        <label>Background Color:</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="control">
        <label>Stroke Color:</label>
        <input type="color" id="strokeColor" value="#000000">
      </div>
      <div class="control">
        <button id="randomizeAll" class="ts-btn">Randomize Colors</button>
      </div>
    </div>

    <div class="control-group" id="sketchRNNControls">
      <h3>SketchRNN Settings</h3>
      <div class="control">
        <label>Drawing Model:</label>
        <select id="sketchModel">
          <option value="cat">Cat</option>
          <option value="bird">Bird</option>
          <option value="flower">Flower</option>
          <option value="rain">Rain</option>
          <option value="ocean">Ocean</option>
          <option value="butterfly">Butterfly</option>
          <option value="elephant">Elephant</option>
          <option value="spider">Spider</option>
          <option value="tree">Tree</option>
        </select>
      </div>
      <div class="control">
        <label>Temperature: <span class="value" id="temperature-val">0.5</span></label>
        <input type="range" id="temperature" min="0.1" max="2" value="0.5" step="0.1">
      </div>
      <div class="control">
        <label>Stroke Length: <span class="value" id="strokeLength-val">50</span></label>
        <input type="range" id="strokeLength" min="10" max="200" value="50" step="10">
      </div>
      <button onclick="generateSketch()">Generate New Sketch</button>
    </div>

    <div class="control-group" id="poseNetControls" style="display:none;">
      <h3>PoseNet Settings</h3>
      <div class="webcam-container">
        <video id="webcam" autoplay muted></video>
      </div>
      <div class="control">
        <label>Confidence Threshold: <span class="value" id="confidence-val">0.5</span></label>
        <input type="range" id="confidence" min="0" max="1" value="0.5" step="0.05">
      </div>
      <div class="control">
        <label>Pattern Style:</label>
        <select id="posePattern">
          <option value="skeleton">Skeleton</option>
          <option value="particles">Particle Flow</option>
          <option value="ribbons">Ribbons</option>
          <option value="mandala">Mandala</option>
        </select>
      </div>
      <button onclick="toggleWebcam()">Toggle Webcam</button>
    </div>

    <div class="control-group" id="styleTransferControls" style="display:none;">
      <h3>Style Transfer Settings</h3>
      <div class="control">
        <label>Style Effect:</label>
        <select id="styleModel">
          <option value="lines">Line Art</option>
          <option value="hatching">Cross Hatching</option>
          <option value="stipple">Stipple</option>
          <option value="contour">Contour Lines</option>
        </select>
      </div>
      <div class="control">
        <label>Input Image:</label>
        <input type="file" id="styleInput" accept="image/*">
      </div>
      <button onclick="applyStyleTransfer(styleImage)">Apply Style</button>
    </div>

    <div class="control-group" id="imageClassifierControls" style="display:none;">
      <h3>Image Classifier Settings</h3>
      <div class="control">
        <label>Upload Image:</label>
        <input type="file" id="classifierInput" accept="image/*">
      </div>
      <div id="classificationResults"></div>
    </div>

    <div class="control-group" id="bodyPixControls" style="display:none;">
      <h3>BodyPix Settings</h3>
      <div class="webcam-container">
        <video id="webcam2" autoplay muted></video>
      </div>
      <div class="control">
        <label>Segmentation Threshold: <span class="value" id="segThreshold-val">0.5</span></label>
        <input type="range" id="segThreshold" min="0" max="1" value="0.5" step="0.1">
      </div>
      <button onclick="toggleWebcam()">Toggle Webcam Preview</button>
    </div>

    <div class="control-group">
      <h3>Pattern Generation</h3>
      <div class="control">
        <label>Grid Size: <span class="value" id="gridSize-val">10</span></label>
        <input type="range" id="gridSize" min="5" max="50" value="10" step="5">
      </div>
      <div class="control">
        <label>Pattern Scale: <span class="value" id="patternScale-val">1</span></label>
        <input type="range" id="patternScale" min="0.5" max="3" value="1" step="0.1">
      </div>
      <div class="control">
        <label>Complexity: <span class="value" id="complexity-val">5</span></label>
        <input type="range" id="complexity" min="1" max="10" value="5" step="1">
      </div>
      <div class="control checkbox-container">
        <input type="checkbox" id="continuous" checked>
        <label for="continuous">Continuous Generation</label>
      </div>
      <div class="control checkbox-container">
        <input type="checkbox" id="showAI">
        <label for="showAI">Show AI Visualization</label>
      </div>
    </div>

    <div class="control-group">
      <h3>Visualization</h3>
      <div class="control">
        <label>Render Mode:</label>
        <select id="renderMode">
          <option value="lines">Lines</option>
          <option value="dots">Dots</option>
          <option value="curves">Curves</option>
          <option value="filled">Filled Shapes</option>
          <option value="hatching">Hatching</option>
        </select>
      </div>
      <div class="control">
        <label>Color Mode:</label>
        <select id="colorMode">
          <option value="monochrome">Monochrome</option>
          <option value="gradient">Gradient</option>
          <option value="rainbow">Rainbow</option>
          <option value="confidence">AI Confidence</option>
        </select>
      </div>
      <div class="control">
        <label>Line Weight: <span class="value" id="lineWeight-val">2</span></label>
        <input type="range" id="lineWeight" min="0.5" max="5" value="2" step="0.5">
      </div>
    </div>

    <div class="control-group">
      <h3>Export</h3>
      <button onclick="exportSVG()">Export SVG</button>
      <button onclick="exportPNG()">Export PNG</button>
      <button onclick="exportGIF()">Export GIF</button>
      <div id="gif-status"></div>
    </div>

    <div id="preset-container"></div>
  </div>

  <script>
    let params = {
      paperSize: 'landscape800x600',
      bgColor: '#ffffff',
      strokeColor: '#000000',
      modelType: 'sketchRNN',
      sketchModel: 'cat',
      temperature: 0.5,
      strokeLength: 50,
      confidence: 0.5,
      posePattern: 'skeleton',
      styleModel: 'udnie',
      gridSize: 10,
      patternScale: 1,
      complexity: 5,
      continuous: true,
      showAI: false,
      renderMode: 'lines',
      colorMode: 'monochrome',
      lineWeight: 2
    };

    // Canvas controls for color randomization with WCAG AA contrast
    const canvasControls = new TSCanvasControls({
      bgColor: params.bgColor || '#ffffff',
      strokeColor: params.strokeColor || '#000000'
    });
    canvasControls.bind(params);

    let model;
    let svgCanvas;
    let patterns = [];
    let video;
    let poseNet;
    let poses = [];
    let sketchRNN;
    let currentStroke;
    let styleTransfer;
    let classifier;
    let featureExtractor;
    let bodyPix;

    function setup() {
      const size = CanvasLayout.getSize(params.paperSize);

      svgCanvas = createCanvas(size.width, size.height);
      svgCanvas.parent('canvas-container');

      window.panelController = new TSPanelController().attach();
      window.statsDisplay = new TSStatsDisplay().attach();

      // Canvas settings handlers
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        resizeCanvasForPaperSize();
      });

      document.getElementById('bgColor').addEventListener('input', (e) => {
        params.bgColor = e.target.value;
      });

      document.getElementById('strokeColor').addEventListener('input', (e) => {
        params.strokeColor = e.target.value;
      });

      setupControls();
      canvasControls.setupRandomizeButton();
      activateFallbackMode('Procedural preview loaded. Click Load Model to try ml5 features.');
    }

    function resizeCanvasForPaperSize() {
      const size = CanvasLayout.getSize(params.paperSize);
      resizeCanvas(size.width, size.height);
    }

    function setupControls() {
      Object.keys(params).forEach(key => {
        const element = document.getElementById(key);
        if (element) {
          if (element.type === 'range') {
            element.addEventListener('input', (e) => {
              params[key] = parseFloat(e.target.value);
              const display = document.getElementById(key + '-val');
              if (display) display.textContent = params[key];
            });
          } else if (element.type === 'checkbox') {
            element.addEventListener('change', (e) => {
              params[key] = e.target.checked;
            });
          } else if (element.tagName === 'SELECT') {
            element.addEventListener('change', (e) => {
              params[key] = e.target.value;
              if (key === 'modelType') {
                updateControlVisibility();
              }
            });
          }
        }
      });

      // File input handlers
      document.getElementById('styleInput').addEventListener('change', handleFileSelect);

      const classifierInput = document.getElementById('classifierInput');
      if (classifierInput) {
        classifierInput.addEventListener('change', handleFileSelect);
      }
    }

    function updateControlVisibility() {
      // Hide all model-specific controls
      document.getElementById('sketchRNNControls').style.display = 'none';
      document.getElementById('poseNetControls').style.display = 'none';
      document.getElementById('styleTransferControls').style.display = 'none';
      const imageClassifierControls = document.getElementById('imageClassifierControls');
      const bodyPixControls = document.getElementById('bodyPixControls');
      if (imageClassifierControls) imageClassifierControls.style.display = 'none';
      if (bodyPixControls) bodyPixControls.style.display = 'none';

      // Show relevant controls
      switch (params.modelType) {
        case 'sketchRNN':
          document.getElementById('sketchRNNControls').style.display = 'block';
          break;
        case 'poseNet':
          document.getElementById('poseNetControls').style.display = 'block';
          break;
        case 'styleTransfer':
          document.getElementById('styleTransferControls').style.display = 'block';
          break;
        case 'imageClassifier':
          if (imageClassifierControls) imageClassifierControls.style.display = 'block';
          break;
        case 'bodyPix':
          if (bodyPixControls) bodyPixControls.style.display = 'block';
          break;
      }
    }

    async function loadModel() {
      if (params.modelType === 'sketchRNN') {
        activateFallbackMode('SketchRNN is unavailable in this build. Using procedural preview.');
        return;
      }

      updateStatus('Loading model...');

      try {
        switch (params.modelType) {
          case 'sketchRNN':
            await loadSketchRNN();
            break;
          case 'poseNet':
            await loadPoseNet();
            break;
          case 'styleTransfer':
            await loadStyleTransfer();
            break;
          case 'imageClassifier':
            await loadImageClassifier();
            break;
          case 'featureExtractor':
            await loadFeatureExtractor();
            break;
          case 'bodyPix':
            await loadBodyPix();
            break;
        }

        updateStatus('Model loaded successfully!');
      } catch (error) {
        updateStatus('Error loading model: ' + error.message);
        console.error(error);
      }
    }

    async function loadSketchRNN() {
      activateFallbackMode('SketchRNN is unavailable in this build. Using procedural preview.');
    }

    let useFallbackMode = false;

    function activateFallbackMode(message) {
      useFallbackMode = true;
      sketchRNN = null;
      currentStroke = null;
      generateFallbackSketch();
      updateStatus(message);
    }

    function generateFallbackSketch() {
      // Generate a procedural sketch when ML model fails
      updateStatus('Using procedural generation (ML model unavailable)');
      patterns = [];
      const centerX = width / 2;
      const centerY = height / 2;

      // Create organic procedural strokes
      for (let s = 0; s < 5; s++) {
        const stroke = { points: [], drawing: false };
        let x = centerX + random(-100, 100);
        let y = centerY + random(-100, 100);
        const numPoints = Math.floor(random(20, 60));

        for (let i = 0; i < numPoints; i++) {
          stroke.points.push([x, y]);
          // Organic movement
          const angle = noise(x * 0.01, y * 0.01, s) * TWO_PI * 2;
          x += cos(angle) * params.patternScale * 8;
          y += sin(angle) * params.patternScale * 8;
        }
        patterns.push(stroke);
      }
    }

    async function loadPoseNet() {
      try {
        // Setup video
        video = createCapture(VIDEO);
        video.size(320, 240);
        video.hide();

        // Load PoseNet with ml5 0.12.2 API
        poseNet = ml5.poseNet(video, modelLoaded);

        function modelLoaded() {
          updateStatus('PoseNet model loaded - move in front of camera');
          if (window.statsDisplay) {
            window.statsDisplay.update({
              model: 'PoseNet',
              status: 'Ready',
              pattern: params.posePattern,
              poses: 0
            });
          }
        }

        poseNet.on('pose', (results) => {
          poses = results;
          if (window.statsDisplay && results.length > 0) {
            const avgConfidence = results[0].pose.keypoints
              .reduce((sum, kp) => sum + kp.score, 0) / results[0].pose.keypoints.length;
            window.statsDisplay.update({
              model: 'PoseNet',
              status: 'Tracking',
              pattern: params.posePattern,
              poses: results.length,
              confidence: (avgConfidence * 100).toFixed(1) + '%'
            });
          }
        });
      } catch (error) {
        updateStatus('PoseNet error: ' + error.message + ' (webcam may be unavailable)');
        console.error('PoseNet error:', error);
      }
    }

    let styleImage = null;
    let styledResult = null;

    async function loadStyleTransfer() {
      try {
        // Style transfer requires pre-trained models - show placeholder message
        updateStatus('Style Transfer: Upload an image to apply artistic styles');
        // Note: ml5 style transfer requires local model files
        // For demo purposes, we'll use a procedural style effect
      } catch (error) {
        updateStatus('Style Transfer unavailable: ' + error.message);
      }
    }

    function applyStyleTransfer(img) {
      if (!img) {
        updateStatus('Please upload an image first');
        return;
      }

      updateStatus('Applying style effect...');
      styleImage = img;

      // Since style transfer models need to be hosted locally,
      // we'll apply a procedural artistic filter instead
      applyProceduralStyle();
    }

    function applyProceduralStyle() {
      if (!styleImage) return;

      // Create artistic line pattern from image
      patterns = [];
      const imgWidth = styleImage.width || 200;
      const imgHeight = styleImage.height || 200;
      const scaleX = width / imgWidth;
      const scaleY = height / imgHeight;

      // Sample image and create stroke patterns
      styleImage.loadPixels();

      for (let y = 0; y < imgHeight; y += params.gridSize) {
        for (let x = 0; x < imgWidth; x += params.gridSize) {
          const idx = (y * imgWidth + x) * 4;
          const brightness = (styleImage.pixels[idx] + styleImage.pixels[idx+1] + styleImage.pixels[idx+2]) / 3;

          // Create strokes based on brightness
          if (brightness < 200) {
            const stroke = { points: [], drawing: false };
            const px = x * scaleX;
            const py = y * scaleY;
            const len = map(brightness, 0, 255, params.gridSize * 2, 2);
            const angle = map(brightness, 0, 255, 0, PI);

            stroke.points.push([px, py]);
            stroke.points.push([px + cos(angle) * len, py + sin(angle) * len]);
            patterns.push(stroke);
          }
        }
      }

      updateStatus('Style applied - ' + patterns.length + ' strokes generated');
      if (window.statsDisplay) {
        window.statsDisplay.update({
          model: 'Style Transfer',
          status: 'Applied',
          effect: params.styleModel,
          strokes: patterns.length,
          resolution: `${imgWidth}x${imgHeight}`
        });
      }
    }

    let classifierImage = null;
    let classificationResults = [];

    async function loadImageClassifier() {
      try {
        classifier = ml5.imageClassifier('MobileNet', () => {
          updateStatus('Image Classifier loaded - upload an image to classify');
          if (window.statsDisplay) {
            window.statsDisplay.update({
              model: 'MobileNet',
              status: 'Ready',
              type: 'Image Classifier'
            });
          }
        });
      } catch (error) {
        updateStatus('Image Classifier error: ' + error.message);
      }
    }

    async function loadFeatureExtractor() {
      try {
        featureExtractor = ml5.featureExtractor('MobileNet', () => {
          updateStatus('Feature Extractor loaded');
        });
      } catch (error) {
        updateStatus('Feature Extractor error: ' + error.message);
      }
    }

    async function loadBodyPix() {
      try {
        // Setup video for BodyPix
        video = createCapture(VIDEO);
        video.size(320, 240);
        video.hide();

        bodyPix = ml5.bodyPix(video, () => {
          updateStatus('BodyPix model loaded');
          if (window.statsDisplay) {
            window.statsDisplay.update({
              model: 'BodyPix',
              status: 'Ready',
              threshold: params.segThreshold
            });
          }
          // Start segmentation loop
          segmentBody();
        });
      } catch (error) {
        updateStatus('BodyPix error: ' + error.message);
      }
    }

    let bodySegmentation = null;

    function segmentBody() {
      if (!bodyPix) return;

      bodyPix.segment(gotBodyPixResults);
    }

    function gotBodyPixResults(error, result) {
      if (error) {
        console.error(error);
        return;
      }

      bodySegmentation = result;

      // Continue segmentation loop
      if (params.modelType === 'bodyPix') {
        segmentBody();
      }
    }

    function generateSketch() {
      // If in fallback mode, use procedural generation
      if (useFallbackMode || !sketchRNN) {
        generateFallbackSketch();
        return;
      }

      // Start a new drawing with SketchRNN
      sketchRNN.reset();
      patterns = []; // Clear existing patterns

      const startX = width / 2;
      const startY = height / 2;

      currentStroke = {
        points: [[startX, startY]],
        drawing: true
      };

      if (window.statsDisplay) {
        window.statsDisplay.update({
          model: `SketchRNN (${params.sketchModel})`,
          status: 'Generating',
          temperature: params.temperature,
          strokes: 0
        });
      }

      // Generate strokes
      generateNextStroke();
    }

    function generateNextStroke() {
      if (!currentStroke.drawing || currentStroke.points.length > params.strokeLength) {
        patterns.push(currentStroke);
        if (window.statsDisplay) {
          window.statsDisplay.update({
            model: `SketchRNN (${params.sketchModel})`,
            status: 'Complete',
            temperature: params.temperature,
            strokes: patterns.length,
            points: patterns.reduce((sum, s) => sum + s.points.length, 0)
          });
        }
        return;
      }

      sketchRNN.generate((err, strokeData) => {
        if (err) return;

        const lastPoint = currentStroke.points[currentStroke.points.length - 1];
        const dx = strokeData.dx * params.patternScale * 5;
        const dy = strokeData.dy * params.patternScale * 5;
        const newX = lastPoint[0] + dx;
        const newY = lastPoint[1] + dy;

        currentStroke.points.push([newX, newY]);

        if (strokeData.pen === 'end') {
          currentStroke.drawing = false;
        } else if (strokeData.pen === 'up') {
          // Start new stroke
          patterns.push(currentStroke);
          currentStroke = {
            points: [[newX, newY]],
            drawing: true
          };
          if (window.statsDisplay) {
            window.statsDisplay.update({
              model: `SketchRNN (${params.sketchModel})`,
              status: 'Drawing',
              temperature: params.temperature,
              strokes: patterns.length,
              points: patterns.reduce((sum, s) => sum + s.points.length, 0)
            });
          }
        }

        // Continue generating
        if (params.continuous) {
          setTimeout(generateNextStroke, 10);
        }
      });
    }

    function draw() {
      background(params.bgColor);

      // Draw based on model type
      switch (params.modelType) {
        case 'sketchRNN':
          drawSketchRNN();
          break;
        case 'poseNet':
          drawPoseNet();
          break;
        case 'styleTransfer':
          drawStyleTransfer();
          break;
        case 'imageClassifier':
          drawImageClassifier();
          break;
        case 'featureExtractor':
          drawFeatureExtractor();
          break;
        case 'bodyPix':
          drawBodyPix();
          break;
      }
    }

    function drawSketchRNN() {
      noFill();
      strokeWeight(params.lineWeight);

      // Draw all completed strokes
      patterns.forEach((stroke, i) => {
        if (stroke.points.length > 1) {
          setStrokeColor(i / patterns.length);

          switch (params.renderMode) {
            case 'lines':
              beginShape();
              stroke.points.forEach(p => vertex(p[0], p[1]));
              endShape();
              break;

            case 'dots':
              stroke.points.forEach(p => point(p[0], p[1]));
              break;

            case 'curves':
              beginShape();
              stroke.points.forEach((p, j) => {
                if (j === 0) {
                  vertex(p[0], p[1]);
                } else {
                  const prev = stroke.points[j - 1];
                  bezierVertex(
                    prev[0], prev[1],
                    p[0], p[1],
                    p[0], p[1]
                  );
                }
              });
              endShape();
              break;

            case 'hatching':
              stroke.points.forEach((p, j) => {
                if (j % 3 === 0 && j < stroke.points.length - 1) {
                  const next = stroke.points[j + 1];
                  for (let k = 0; k < 5; k++) {
                    const offset = k * 2;
                    line(p[0] + offset, p[1], next[0] + offset, next[1]);
                  }
                }
              });
              break;
          }
        }
      });

      // Draw current stroke
      if (currentStroke && currentStroke.points.length > 1) {
        stroke(255, 0, 0);
        beginShape();
        currentStroke.points.forEach(p => vertex(p[0], p[1]));
        endShape();
      }
    }

    function drawPoseNet() {
      if (video && params.showAI) {
        // Draw video feed
        push();
        tint(255, 50);
        image(video, 0, 0, width, height);
        pop();
      }

      // Draw poses
      for (let i = 0; i < poses.length; i++) {
        const pose = poses[i].pose;

        switch (params.posePattern) {
          case 'skeleton':
            drawSkeleton(pose);
            break;
          case 'particles':
            drawPoseParticles(pose);
            break;
          case 'ribbons':
            drawPoseRibbons(pose);
            break;
          case 'mandala':
            drawPoseMandala(pose);
            break;
        }
      }
    }

    function drawSkeleton(pose) {
      // Draw keypoints
      for (let j = 0; j < pose.keypoints.length; j++) {
        const keypoint = pose.keypoints[j];
        if (keypoint.score > params.confidence) {
          fill(params.strokeColor);
          noStroke();
          ellipse(keypoint.position.x, keypoint.position.y, 10);
        }
      }

      // Draw skeleton
      const skeleton = [
        ['leftShoulder', 'rightShoulder'],
        ['leftShoulder', 'leftElbow'],
        ['leftElbow', 'leftWrist'],
        ['rightShoulder', 'rightElbow'],
        ['rightElbow', 'rightWrist'],
        ['leftHip', 'rightHip'],
        ['leftHip', 'leftKnee'],
        ['leftKnee', 'leftAnkle'],
        ['rightHip', 'rightKnee'],
        ['rightKnee', 'rightAnkle']
      ];

      stroke(params.strokeColor);
      strokeWeight(params.lineWeight);
      skeleton.forEach(connection => {
        const a = pose[connection[0]];
        const b = pose[connection[1]];
        if (a && b && a.confidence > params.confidence && b.confidence > params.confidence) {
          line(a.x, a.y, b.x, b.y);
        }
      });
    }

    function setStrokeColor(t) {
      switch (params.colorMode) {
        case 'monochrome':
          stroke(params.strokeColor);
          break;
        case 'gradient':
          stroke(lerpColor(color(0, 0, 255), color(255, 0, 0), t));
          break;
        case 'rainbow':
          colorMode(HSB);
          stroke(t * 360, 100, 100);
          colorMode(RGB);
          break;
        case 'confidence':
          stroke(255 - t * 255, 0, t * 255);
          break;
      }
    }

    function updateStatus(message) {
      document.getElementById('status').textContent = 'Model Status: ' + message;
    }

    function toggleWebcam() {
      if (video) {
        const webcamEl = document.getElementById('webcam');
        if (webcamEl.style.display === 'none') {
          webcamEl.style.display = 'block';
          webcamEl.srcObject = video.elt.srcObject;
        } else {
          webcamEl.style.display = 'none';
        }
      }
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          // Process uploaded image using loadImage for proper p5 image handling
          loadImage(event.target.result, (img) => {
            if (params.modelType === 'styleTransfer') {
              styleImage = img;
              applyStyleTransfer(img);
            } else if (params.modelType === 'imageClassifier' && classifier) {
              classifierImage = img;
              updateStatus('Classifying image...');
              classifier.classify(img, (error, results) => {
                if (error) {
                  updateStatus('Classification error: ' + error.message);
                  return;
                }
                classificationResults = results;
                updateStatus('Classification complete');
                if (window.statsDisplay && results.length > 0) {
                  window.statsDisplay.update({
                    model: 'MobileNet',
                    status: 'Classified',
                    topLabel: results[0].label,
                    confidence: (results[0].confidence * 100).toFixed(1) + '%',
                    predictions: results.length
                  });
                }
              });
            }
          }, () => {
            updateStatus('Error loading image');
          });
        };
        reader.readAsDataURL(file);
      }
    }

    function exportSVG() {
      save(svgCanvas, `ml5-pattern-${params.modelType}-${Date.now()}.svg`);
    }

    function exportPNG() {
      save(`ml5-pattern-${params.modelType}-${Date.now()}.png`);
    }

    function exportGIF() {
      const statusEl = document.getElementById('gif-status');
      statusEl.textContent = 'Preparing GIF export...';

      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: width,
        height: height,
        workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
      });

      // Create offscreen canvas for GIF frames
      const offscreenCanvas = document.createElement('canvas');
      offscreenCanvas.width = width;
      offscreenCanvas.height = height;
      const ctx = offscreenCanvas.getContext('2d');

      // Generate frames
      const totalFrames = 60;
      const frameDelay = 50;

      for (let frame = 0; frame < totalFrames; frame++) {
        // Clear and draw
        clear();

        // Animate based on model
        if (params.modelType === 'sketchRNN' && sketchRNN) {
          generateNextStroke();
        }

        draw();

        // Copy p5 canvas to offscreen canvas
        ctx.drawImage(drawingContext.canvas, 0, 0);

        // Add frame to GIF
        gif.addFrame(ctx, {copy: true, delay: frameDelay});

        // Update status
        const progress = Math.round((frame + 1) / totalFrames * 100);
        statusEl.textContent = `Generating frames: ${progress}%`;
      }

      statusEl.textContent = 'Rendering GIF...';

      gif.on('finished', function(blob) {
        statusEl.textContent = 'GIF ready!';
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ml5-pattern-${params.modelType}-${Date.now()}.gif`;
        a.click();

        setTimeout(() => {
          statusEl.textContent = '';
        }, 3000);
      });

      gif.render();
    }

    // Placeholder functions for other pattern types
    function drawPoseParticles(pose) {
      // Particle system based on pose keypoints
      noStroke();
      const c = color(params.strokeColor);
      c.setAlpha(50);
      fill(c);
      pose.keypoints.forEach(kp => {
        if (kp.score > params.confidence) {
          for (let i = 0; i < 10; i++) {
            const x = kp.position.x + random(-20, 20);
            const y = kp.position.y + random(-20, 20);
            ellipse(x, y, random(2, 8));
          }
        }
      });
    }

    function drawPoseRibbons(pose) {
      // Flowing ribbons between keypoints
      noFill();
      stroke(params.strokeColor);
      strokeWeight(params.lineWeight);

      const connections = [
        ['leftWrist', 'leftElbow', 'leftShoulder'],
        ['rightWrist', 'rightElbow', 'rightShoulder'],
        ['leftAnkle', 'leftKnee', 'leftHip'],
        ['rightAnkle', 'rightKnee', 'rightHip']
      ];

      connections.forEach(ribbon => {
        beginShape();
        ribbon.forEach(point => {
          const kp = pose[point];
          if (kp && kp.confidence > params.confidence) {
            curveVertex(kp.x, kp.y);
          }
        });
        endShape();
      });
    }

    function drawPoseMandala(pose) {
      // Mandala pattern from pose center
      const center = pose.nose || { x: width/2, y: height/2, confidence: 1 };

      if (center.confidence > params.confidence) {
        push();
        translate(center.x, center.y);

        noFill();
        stroke(params.strokeColor);
        strokeWeight(params.lineWeight);

        for (let i = 0; i < 12; i++) {
          rotate(TWO_PI / 12);
          pose.keypoints.forEach(kp => {
            if (kp.score > params.confidence) {
              const d = dist(center.x, center.y, kp.position.x, kp.position.y);
              ellipse(d, 0, d * 0.5);
            }
          });
        }

        pop();
      }
    }

    function drawStyleTransfer() {
      // Draw patterns from style transfer
      if (patterns.length > 0) {
        noFill();
        strokeWeight(params.lineWeight);

        patterns.forEach((stroke, i) => {
          if (stroke.points.length > 1) {
            setStrokeColor(i / patterns.length);
            beginShape();
            stroke.points.forEach(p => vertex(p[0], p[1]));
            endShape();
          }
        });
      } else {
        // Show placeholder
        fill(params.strokeColor);
        noStroke();
        textAlign(CENTER, CENTER);
        textSize(16);
        text('Style Transfer Mode\nUpload an image to apply artistic line style', width/2, height/2);
      }
    }

    function drawImageClassifier() {
      // Draw classification-based patterns
      if (classificationResults.length > 0 && classifierImage) {
        // Show image and classification
        image(classifierImage, 0, 0, width, height);

        // Display classification results
        fill(params.strokeColor);
        noStroke();
        textAlign(LEFT, TOP);
        textSize(14);

        classificationResults.slice(0, 5).forEach((result, i) => {
          const conf = (result.confidence * 100).toFixed(1);
          text(`${result.label}: ${conf}%`, 20, 20 + i * 25);
        });
      } else {
        fill(params.strokeColor);
        noStroke();
        textAlign(CENTER, CENTER);
        textSize(16);
        text('Image Classifier Mode\nUpload an image to classify', width/2, height/2);
      }
    }

    function drawFeatureExtractor() {
      // Feature visualization using grid
      noFill();
      stroke(params.strokeColor);
      strokeWeight(params.lineWeight);

      // Draw a procedural feature-like grid pattern
      const gridStep = params.gridSize * 5;
      for (let x = gridStep; x < width - gridStep; x += gridStep) {
        for (let y = gridStep; y < height - gridStep; y += gridStep) {
          const n = noise(x * 0.01, y * 0.01, frameCount * 0.01);
          const size = n * gridStep * 0.8;

          push();
          translate(x, y);
          rotate(n * TWO_PI);
          rect(-size/2, -size/2, size, size);
          pop();
        }
      }
    }

    function drawBodyPix() {
      // Draw body segmentation visualization
      if (bodySegmentation && video) {
        // Draw video
        if (params.showAI) {
          push();
          tint(255, 100);
          image(video, 0, 0, width, height);
          pop();
        }

        // Draw segmentation mask as lines
        if (bodySegmentation.backgroundMask) {
          noFill();
          stroke(params.strokeColor);
          strokeWeight(params.lineWeight);

          // Sample mask and draw contours
          const maskImg = bodySegmentation.backgroundMask;
          const scaleX = width / maskImg.width;
          const scaleY = height / maskImg.height;

          for (let y = 0; y < maskImg.height; y += params.gridSize) {
            beginShape();
            for (let x = 0; x < maskImg.width; x++) {
              const idx = (y * maskImg.width + x) * 4;
              if (maskImg.pixels && maskImg.pixels[idx] > 128) {
                vertex(x * scaleX, y * scaleY);
              }
            }
            endShape();
          }
        }
      } else {
        fill(params.strokeColor);
        noStroke();
        textAlign(CENTER, CENTER);
        textSize(16);
        text('BodyPix Mode\nRequires webcam access for body segmentation', width/2, height/2);
      }
    }

    // Mouse interaction
    function mousePressed() {
      if (mouseX >= 0 && mouseX < width && mouseY >= 0 && mouseY < height) {
        if (params.modelType === 'sketchRNN') {
          // Start new sketch at mouse position
          currentStroke = {
            points: [[mouseX, mouseY]],
            drawing: true
          };
          generateNextStroke();
        }
      }
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js">

    if (typeof resizeCanvas === 'function') {
      const container = document.querySelector('canvas')?.parentElement;
      if (container) {
        const w = container.clientWidth;
        resizeCanvas(w, w); // Square canvas default
      }
    }
  }

</script>
