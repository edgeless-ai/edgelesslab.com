<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Convection Cells - Chemical Engineering Art</title>

    <!-- Total Serialism Design System -->
    <link rel="stylesheet" href="../../shared/algorithm.css">
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <div id="controls">
        <a href="../../index.html" class="back-link">&larr; Back to Index</a>
        <h2 style="margin: 0 0 var(--ts-space-lg) 0; color: var(--ts-accent-primary);">Convection Cells</h2>

        <h3>Canvas Settings</h3>
        <label>Paper Size:
            <select id="paperSize">
                <option value="square800">Square (800x800)</option>
                <option value="landscape800x600">Landscape (800x600)</option>
                <option value="a4portrait">A4 Portrait</option>
                <option value="a4landscape">A4 Landscape</option>
                <option value="a3portrait">A3 Portrait</option>
                <option value="a3landscape">A3 Landscape</option>
                <option value="letterportrait">Letter Portrait</option>
                <option value="letterlandscape">Letter Landscape</option>
            </select>
        </label>
        <label>Background: <input type="color" id="bgColor" value="#ffffff"></label>
        <label>Stroke Color: <input type="color" id="strokeColor" value="#000000"></label>
        <button id="randomizeAll" class="ts-btn">Randomize Colors</button>

        <h3>Convection Type</h3>
        <select id="convectionType">
            <option value="rayleigh-benard">Rayleigh-Benard</option>
            <option value="marangoni">Marangoni</option>
            <option value="double-diffusive">Double Diffusive</option>
            <option value="hadley">Hadley Circulation</option>
        </select>

        <h3>Dimensionless Parameters</h3>
        <label>Rayleigh Number: <span id="rayleighValue">1e4</span></label>
        <input type="range" id="rayleigh" min="3" max="6" step="0.1" value="4">

        <label>Prandtl Number: <span id="prandtlValue">7.0</span></label>
        <input type="range" id="prandtl" min="0.1" max="100" step="0.1" value="7.0">

        <label>Aspect Ratio: <span id="aspectValue">2.0</span></label>
        <input type="range" id="aspectRatio" min="0.5" max="5" step="0.1" value="2.0">

        <h3>Boundary Conditions</h3>
        <select id="topBoundary">
            <option value="cold">Cold (Fixed T)</option>
            <option value="adiabatic">Adiabatic</option>
            <option value="free">Free Surface</option>
        </select>

        <select id="bottomBoundary">
            <option value="hot">Hot (Fixed T)</option>
            <option value="flux">Constant Heat Flux</option>
        </select>

        <label>Temperature Difference (K): <span id="deltaTValue">50</span></label>
        <input type="range" id="deltaT" min="10" max="200" step="10" value="50">

        <h3>Visualization</h3>
        <label>
            <input type="checkbox" id="showStreamlines" checked> Show Streamlines
        </label>
        <label>
            <input type="checkbox" id="showTemperature" checked> Show Temperature Field
        </label>
        <label>
            <input type="checkbox" id="showVelocityVectors"> Show Velocity Vectors
        </label>
        <label>
            <input type="checkbox" id="showNusselt"> Show Nusselt Number
        </label>

        <label>Grid Resolution: <span id="gridValue">50</span></label>
        <input type="range" id="gridResolution" min="20" max="100" step="10" value="50">

        <div class="control">
          <label>Seed: <span id="seed-display">-</span></label>
          <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
        </div>

        <h3>Actions</h3>
        <button id="generateBtn">Generate Pattern</button>
        <button id="animateBtn">Animate Flow</button>
        <button id="exportSVG">Export SVG</button>
        <button id="exportPNG">Export PNG</button>
        <button id="exportGIF">Export Animation GIF</button>
        <button onclick="copyShareUrl()">📋 Copy Share URL</button>
        <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
        <progress id="animationProgress" value="0" max="100" style="display: none; width: 100%; margin-top: 10px;"></progress>
        <div class="status" id="status" style="font-size: 12px; color: var(--ts-text-muted); margin-top: 10px;"></div>

        <!-- Preset Container at bottom -->
        <div id="preset-container" style="margin-top: var(--ts-space-lg);"></div>
    </div>

    <script src="../../shared/canvas-layout.js"></script>
    <script src="../../shared/canvas-controls.js"></script>
    <script src="../../shared/export-utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="../../shared/panel-controller.js"></script>
    <script src="../../shared/stats-display.js"></script>
    <script src="../../shared/url-state.js"></script>
    <script>
        const params = {
            paperSize: 'square800',
            bgColor: '#ffffff',
            strokeColor: '#000000',
            seed: Math.floor(Math.random() * 1000000)
        };

        // URL state configuration
        const urlState = new TSUrlState({
            algorithmId: 'convection-cells',
            schema: [
                { key: 'seed', type: 'int', bytes: 4 },
                { key: 'bgColor', type: 'color' },
                { key: 'strokeColor', type: 'color' },
                { key: 'convectionType', type: 'enum', options: ['rayleigh-benard', 'marangoni', 'double-diffusive', 'hadley'] },
                { key: 'rayleigh', type: 'float', bytes: 2, min: 3, max: 6 },
                { key: 'prandtl', type: 'float', bytes: 2, min: 0.1, max: 100 },
                { key: 'aspectRatio', type: 'float', bytes: 2, min: 0.5, max: 5 },
                { key: 'topBoundary', type: 'enum', options: ['cold', 'adiabatic', 'free'] },
                { key: 'bottomBoundary', type: 'enum', options: ['hot', 'flux'] },
                { key: 'deltaT', type: 'int', bytes: 1 },
                { key: 'showStreamlines', type: 'bool' },
                { key: 'showTemperature', type: 'bool' },
                { key: 'showVelocityVectors', type: 'bool' },
                { key: 'showNusselt', type: 'bool' },
                { key: 'gridResolution', type: 'int', bytes: 1 }
            ]
        });

        // Load URL params if present
        const urlParams = urlState.fromUrl();
        if (window.location.search.includes('s=')) {
            Object.assign(params, urlParams);
            // Apply URL params to UI controls
            if (urlParams.convectionType) document.getElementById('convectionType').value = urlParams.convectionType;
            if (urlParams.rayleigh) document.getElementById('rayleigh').value = urlParams.rayleigh;
            if (urlParams.prandtl) document.getElementById('prandtl').value = urlParams.prandtl;
            if (urlParams.aspectRatio) document.getElementById('aspectRatio').value = urlParams.aspectRatio;
            if (urlParams.topBoundary) document.getElementById('topBoundary').value = urlParams.topBoundary;
            if (urlParams.bottomBoundary) document.getElementById('bottomBoundary').value = urlParams.bottomBoundary;
            if (urlParams.deltaT) document.getElementById('deltaT').value = urlParams.deltaT;
            if (urlParams.showStreamlines !== undefined) document.getElementById('showStreamlines').checked = urlParams.showStreamlines;
            if (urlParams.showTemperature !== undefined) document.getElementById('showTemperature').checked = urlParams.showTemperature;
            if (urlParams.showVelocityVectors !== undefined) document.getElementById('showVelocityVectors').checked = urlParams.showVelocityVectors;
            if (urlParams.showNusselt !== undefined) document.getElementById('showNusselt').checked = urlParams.showNusselt;
            if (urlParams.gridResolution) document.getElementById('gridResolution').value = urlParams.gridResolution;
        }

        // Canvas controls for unified color handling
        const canvasControls = new TSCanvasControls();
        canvasControls.bind(params);
        canvasControls.setupRandomizeButton();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function initCanvasSize() {
            const size = CanvasLayout.getSize(params.paperSize);
            canvas.width = size.width;
            canvas.height = size.height;
            width = canvas.width;
            height = canvas.height;
        }
        initCanvasSize();

        // Initialize UX components
        window.panelController = new TSPanelController().attach();
        window.statsDisplay = new TSStatsDisplay().attach();

        let temperatureField = [];
        let velocityField = [];
        let streamFunction = [];
        let isAnimating = false;
        let animationId = null;
        let time = 0;
        let gif = null;

        // UI Elements
        const convectionType = document.getElementById('convectionType');
        const rayleigh = document.getElementById('rayleigh');
        const prandtl = document.getElementById('prandtl');
        const aspectRatio = document.getElementById('aspectRatio');
        const topBoundary = document.getElementById('topBoundary');
        const bottomBoundary = document.getElementById('bottomBoundary');
        const deltaT = document.getElementById('deltaT');
        const showStreamlines = document.getElementById('showStreamlines');
        const showTemperature = document.getElementById('showTemperature');
        const showVelocityVectors = document.getElementById('showVelocityVectors');
        const showNusselt = document.getElementById('showNusselt');
        const gridResolution = document.getElementById('gridResolution');
        const generateBtn = document.getElementById('generateBtn');
        const animateBtn = document.getElementById('animateBtn');
        const exportSVGBtn = document.getElementById('exportSVG');
        const exportPNGBtn = document.getElementById('exportPNG');
        const exportGIFBtn = document.getElementById('exportGIF');
        const status = document.getElementById('status');
        const animationProgress = document.getElementById('animationProgress');

        // Update value displays
        rayleigh.oninput = () => {
            const value = Math.pow(10, parseFloat(rayleigh.value));
            document.getElementById('rayleighValue').textContent = value.toExponential(1);
        };
        prandtl.oninput = () => document.getElementById('prandtlValue').textContent = prandtl.value;
        aspectRatio.oninput = () => document.getElementById('aspectValue').textContent = aspectRatio.value;
        deltaT.oninput = () => document.getElementById('deltaTValue').textContent = deltaT.value;
        gridResolution.oninput = () => document.getElementById('gridValue').textContent = gridResolution.value;

        // Canvas settings event handlers
        document.getElementById('paperSize').addEventListener('change', (e) => {
            params.paperSize = e.target.value;
            initCanvasSize();
            initializeFields();
            drawPattern();
        });
        document.getElementById('bgColor').addEventListener('input', (e) => {
            params.bgColor = e.target.value;
            drawPattern();
        });
        document.getElementById('strokeColor').addEventListener('input', (e) => {
            params.strokeColor = e.target.value;
            drawPattern();
        });

        document.getElementById('seed').addEventListener('change', (e) => {
            params.seed = parseInt(e.target.value);
            time = 0;
            initializeFields();
            solveConvection();
            drawPattern();
        });

        function initializeFields() {
            // Initialize PRNG at the start of initializeFields
            let _s = params.seed;
            const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

            const gridSize = parseInt(gridResolution.value);
            temperatureField = [];
            velocityField = [];
            streamFunction = [];

            for (let i = 0; i < gridSize; i++) {
                temperatureField[i] = [];
                velocityField[i] = [];
                streamFunction[i] = [];

                for (let j = 0; j < gridSize; j++) {
                    // Initialize temperature with linear profile + small perturbation
                    const y = j / (gridSize - 1);
                    const perturbation = 0.01 * Math.sin(2 * Math.PI * i / gridSize);
                    temperatureField[i][j] = 1 - y + perturbation;

                    velocityField[i][j] = {vx: 0, vy: 0};
                    streamFunction[i][j] = 0;
                }
            }
        }

        function solveConvection() {
            // Initialize PRNG at the start of solveConvection
            let _s = params.seed;
            const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

            const gridSize = parseInt(gridResolution.value);
            const Ra = Math.pow(10, parseFloat(rayleigh.value));
            const Pr = parseFloat(prandtl.value);
            const AR = parseFloat(aspectRatio.value);
            const dt = 0.0001;

            // Solve using simplified spectral method
            for (let n = 1; n <= 5; n++) {
                for (let m = 1; m <= 5; m++) {
                    const kx = n * Math.PI / AR;
                    const ky = m * Math.PI;
                    const k2 = kx * kx + ky * ky;

                    // Growth rate for linear stability
                    const sigma = (Ra * kx * kx / k2 - k2 * k2) / (Pr + 1);

                    if (sigma > 0) {
                        // Unstable mode - add to solution
                        const amplitude = Math.exp(sigma * time * 0.01) * 0.1;
                        const phase = seededRandom() * 2 * Math.PI;

                        for (let i = 0; i < gridSize; i++) {
                            for (let j = 0; j < gridSize; j++) {
                                const x = i / (gridSize - 1) * AR;
                                const y = j / (gridSize - 1);

                                // Stream function
                                const psi = amplitude * Math.sin(kx * x + phase) * Math.sin(ky * y);
                                streamFunction[i][j] += psi;

                                // Velocity from stream function
                                velocityField[i][j].vx += amplitude * ky * Math.sin(kx * x + phase) * Math.cos(ky * y);
                                velocityField[i][j].vy += -amplitude * kx * Math.cos(kx * x + phase) * Math.sin(ky * y);

                                // Temperature perturbation
                                temperatureField[i][j] += amplitude * 0.5 * Math.sin(kx * x + phase) * Math.sin(ky * y);
                            }
                        }
                    }
                }
            }

            // Apply boundary conditions
            for (let i = 0; i < gridSize; i++) {
                // Bottom boundary
                if (bottomBoundary.value === 'hot') {
                    temperatureField[i][gridSize - 1] = 1;
                }

                // Top boundary
                if (topBoundary.value === 'cold') {
                    temperatureField[i][0] = 0;
                } else if (topBoundary.value === 'adiabatic') {
                    temperatureField[i][0] = temperatureField[i][1];
                }

                // No-slip walls
                velocityField[i][0] = {vx: 0, vy: 0};
                velocityField[i][gridSize - 1] = {vx: 0, vy: 0};
                velocityField[0][i] = {vx: 0, vy: 0};
                velocityField[gridSize - 1][i] = {vx: 0, vy: 0};
            }
        }

        function calculateNusseltNumber() {
            const gridSize = parseInt(gridResolution.value);
            let heatFlux = 0;

            for (let i = 1; i < gridSize - 1; i++) {
                const dTdy = (temperatureField[i][1] - temperatureField[i][0]) * gridSize;
                heatFlux += Math.abs(dTdy);
            }

            heatFlux /= (gridSize - 2);
            const Nu = heatFlux / (parseFloat(deltaT.value) / height);
            return Nu;
        }

        function drawPattern() {
            ctx.fillStyle = params.bgColor;
            ctx.fillRect(0, 0, width, height);

            const gridSize = parseInt(gridResolution.value);
            const cellWidth = width / gridSize;
            const cellHeight = height / gridSize;

            // Draw temperature field
            if (showTemperature.checked) {
                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        const temp = temperatureField[i][j];
                        const normalizedTemp = Math.max(0, Math.min(1, temp));

                        // Use temperature colormap (blue to red)
                        const hue = 240 - normalizedTemp * 240;
                        ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                        ctx.fillRect(i * cellWidth, j * cellHeight, cellWidth, cellHeight);
                    }
                }
            }

            // Draw streamlines
            if (showStreamlines.checked) {
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.lineWidth = 1;

                // Find min and max stream function values
                let minPsi = Infinity, maxPsi = -Infinity;
                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        minPsi = Math.min(minPsi, streamFunction[i][j]);
                        maxPsi = Math.max(maxPsi, streamFunction[i][j]);
                    }
                }

                // Draw contour lines
                const numContours = 15;
                for (let n = 0; n < numContours; n++) {
                    const psiValue = minPsi + (maxPsi - minPsi) * n / (numContours - 1);

                    ctx.beginPath();
                    for (let i = 0; i < gridSize - 1; i++) {
                        for (let j = 0; j < gridSize - 1; j++) {
                            const x = i * cellWidth;
                            const y = j * cellHeight;

                            // Marching squares algorithm
                            const corners = [
                                streamFunction[i][j],
                                streamFunction[i + 1][j],
                                streamFunction[i + 1][j + 1],
                                streamFunction[i][j + 1]
                            ];

                            const config =
                                (corners[0] > psiValue ? 1 : 0) +
                                (corners[1] > psiValue ? 2 : 0) +
                                (corners[2] > psiValue ? 4 : 0) +
                                (corners[3] > psiValue ? 8 : 0);

                            // Draw contour segments based on configuration
                            switch (config) {
                                case 1:
                                case 14:
                                    ctx.moveTo(x, y + cellHeight * 0.5);
                                    ctx.lineTo(x + cellWidth * 0.5, y);
                                    break;
                                case 2:
                                case 13:
                                    ctx.moveTo(x + cellWidth * 0.5, y);
                                    ctx.lineTo(x + cellWidth, y + cellHeight * 0.5);
                                    break;
                                case 3:
                                case 12:
                                    ctx.moveTo(x, y + cellHeight * 0.5);
                                    ctx.lineTo(x + cellWidth, y + cellHeight * 0.5);
                                    break;
                                case 4:
                                case 11:
                                    ctx.moveTo(x + cellWidth, y + cellHeight * 0.5);
                                    ctx.lineTo(x + cellWidth * 0.5, y + cellHeight);
                                    break;
                                case 5:
                                    ctx.moveTo(x, y + cellHeight * 0.5);
                                    ctx.lineTo(x + cellWidth * 0.5, y);
                                    ctx.moveTo(x + cellWidth, y + cellHeight * 0.5);
                                    ctx.lineTo(x + cellWidth * 0.5, y + cellHeight);
                                    break;
                                case 6:
                                case 9:
                                    ctx.moveTo(x + cellWidth * 0.5, y);
                                    ctx.lineTo(x + cellWidth * 0.5, y + cellHeight);
                                    break;
                                case 7:
                                case 8:
                                    ctx.moveTo(x, y + cellHeight * 0.5);
                                    ctx.lineTo(x + cellWidth * 0.5, y + cellHeight);
                                    break;
                                case 10:
                                    ctx.moveTo(x + cellWidth * 0.5, y);
                                    ctx.lineTo(x + cellWidth, y + cellHeight * 0.5);
                                    ctx.moveTo(x, y + cellHeight * 0.5);
                                    ctx.lineTo(x + cellWidth * 0.5, y + cellHeight);
                                    break;
                            }
                        }
                    }
                    ctx.stroke();
                }
            }

            // Draw velocity vectors
            if (showVelocityVectors.checked) {
                ctx.strokeStyle = 'rgba(0, 0, 255, 0.6)';
                ctx.lineWidth = 1;

                const vectorSpacing = 5;
                const vectorScale = 20;

                for (let i = 0; i < gridSize; i += vectorSpacing) {
                    for (let j = 0; j < gridSize; j += vectorSpacing) {
                        const x = i * cellWidth + cellWidth / 2;
                        const y = j * cellHeight + cellHeight / 2;
                        const v = velocityField[i][j];

                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + v.vx * vectorScale, y + v.vy * vectorScale);
                        ctx.stroke();

                        // Arrowhead
                        const angle = Math.atan2(v.vy, v.vx);
                        const arrowLength = 5;
                        ctx.beginPath();
                        ctx.moveTo(x + v.vx * vectorScale, y + v.vy * vectorScale);
                        ctx.lineTo(
                            x + v.vx * vectorScale - arrowLength * Math.cos(angle - Math.PI / 6),
                            y + v.vy * vectorScale - arrowLength * Math.sin(angle - Math.PI / 6)
                        );
                        ctx.moveTo(x + v.vx * vectorScale, y + v.vy * vectorScale);
                        ctx.lineTo(
                            x + v.vx * vectorScale - arrowLength * Math.cos(angle + Math.PI / 6),
                            y + v.vy * vectorScale - arrowLength * Math.sin(angle + Math.PI / 6)
                        );
                        ctx.stroke();
                    }
                }
            }

            // Draw container outline
            ctx.strokeStyle = params.strokeColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, width, height);

            // Show Nusselt number
            if (showNusselt.checked) {
                const Nu = calculateNusseltNumber();
                ctx.fillStyle = params.strokeColor;
                ctx.font = '16px monospace';
                ctx.fillText(`Nu = ${Nu.toFixed(2)}`, 20, 30);
                ctx.fillText(`Ra = ${Math.pow(10, parseFloat(rayleigh.value)).toExponential(1)}`, 20, 50);
            }
        }

        function animate() {
            if (!isAnimating) return;

            time += 0.1;
            initializeFields();
            solveConvection();
            drawPattern();

            // Update stats during animation
            const gridSize = parseInt(gridResolution.value);
            const Ra = Math.pow(10, parseFloat(rayleigh.value));
            const Pr = parseFloat(prandtl.value);
            const AR = parseFloat(aspectRatio.value);
            const type = convectionType.options[convectionType.selectedIndex].text;

            statsDisplay.setValue('Type', type);
            statsDisplay.setValue('Grid', `${gridSize}×${gridSize}`);
            statsDisplay.setValue('Ra', Ra.toExponential(1));
            statsDisplay.setValue('Pr', Pr.toFixed(1));
            statsDisplay.setValue('AR', AR.toFixed(1));
            statsDisplay.setValue('ΔT', `${deltaT.value}K`);

            if (showNusselt.checked) {
                const Nu = calculateNusseltNumber();
                statsDisplay.setValue('Nu', Nu.toFixed(2));
            }

            animationId = requestAnimationFrame(animate);
        }

        generateBtn.addEventListener('click', () => {
            params.seed = Math.floor(Math.random() * 1000000);
            time = 0;
            initializeFields();
            solveConvection();
            drawPattern();

            // Update seed display
            document.getElementById('seed-display').textContent = params.seed;
            document.getElementById('seed').value = params.seed;

            // Update stats display
            const gridSize = parseInt(gridResolution.value);
            const Ra = Math.pow(10, parseFloat(rayleigh.value));
            const Pr = parseFloat(prandtl.value);
            const AR = parseFloat(aspectRatio.value);
            const type = convectionType.options[convectionType.selectedIndex].text;

            statsDisplay.setValue('Type', type);
            statsDisplay.setValue('Grid', `${gridSize}×${gridSize}`);
            statsDisplay.setValue('Ra', Ra.toExponential(1));
            statsDisplay.setValue('Pr', Pr.toFixed(1));
            statsDisplay.setValue('AR', AR.toFixed(1));
            statsDisplay.setValue('ΔT', `${deltaT.value}K`);

            if (showNusselt.checked) {
                const Nu = calculateNusseltNumber();
                statsDisplay.setValue('Nu', Nu.toFixed(2));
            }

            // Update URL with current state
            urlState.replaceState({
                seed: params.seed,
                bgColor: params.bgColor,
                strokeColor: params.strokeColor,
                convectionType: convectionType.value,
                rayleigh: parseFloat(rayleigh.value),
                prandtl: parseFloat(prandtl.value),
                aspectRatio: parseFloat(aspectRatio.value),
                topBoundary: topBoundary.value,
                bottomBoundary: bottomBoundary.value,
                deltaT: parseInt(deltaT.value),
                showStreamlines: showStreamlines.checked,
                showTemperature: showTemperature.checked,
                showVelocityVectors: showVelocityVectors.checked,
                showNusselt: showNusselt.checked,
                gridResolution: parseInt(gridResolution.value)
            });

            status.textContent = 'Pattern generated';
        });

        animateBtn.addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                cancelAnimationFrame(animationId);
                animateBtn.textContent = 'Animate Flow';
                status.textContent = 'Animation paused';
            } else {
                isAnimating = true;
                animateBtn.textContent = 'Pause Animation';
                status.textContent = 'Animating...';
                animate();
            }
        });

        exportSVGBtn.addEventListener('click', () => {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

            // White background
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('width', width);
            bg.setAttribute('height', height);
            bg.setAttribute('fill', 'white');
            svg.appendChild(bg);

            const gridSize = parseInt(gridResolution.value);
            const cellWidth = width / gridSize;
            const cellHeight = height / gridSize;

            // Add temperature field as rectangles
            if (showTemperature.checked) {
                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        const temp = temperatureField[i][j];
                        const normalizedTemp = Math.max(0, Math.min(1, temp));
                        const hue = 240 - normalizedTemp * 240;

                        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rect.setAttribute('x', i * cellWidth);
                        rect.setAttribute('y', j * cellHeight);
                        rect.setAttribute('width', cellWidth);
                        rect.setAttribute('height', cellHeight);
                        rect.setAttribute('fill', `hsl(${hue}, 70%, 50%)`);
                        svg.appendChild(rect);
                    }
                }
            }

            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'convection-cells.svg';
            a.click();
            URL.revokeObjectURL(url);
            status.textContent = 'SVG exported';
        });

        exportPNGBtn.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'convection-cells.png';
            a.click();
            status.textContent = 'PNG exported';
        });

        exportGIFBtn.addEventListener('click', () => {
            status.textContent = 'Creating GIF...';
            animationProgress.style.display = 'block';
            animationProgress.value = 0;

            gif = new GIF({
                workers: 2,
                quality: 10,
                width: width,
                height: height
            });

            time = 0;
            const frames = 30;

            for (let frame = 0; frame < frames; frame++) {
                time = frame * 0.5;
                initializeFields();
                solveConvection();
                drawPattern();

                gif.addFrame(ctx, {copy: true, delay: 100});
                animationProgress.value = (frame / frames) * 100;
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'convection-animation.gif';
                a.click();
                URL.revokeObjectURL(url);
                status.textContent = 'GIF exported';
                animationProgress.style.display = 'none';
            });

            gif.render();
        });

        // Handle window resize
        function windowResized() {
            const size = CanvasLayout.getSize(params.paperSize);
            canvas.width = size.width;
            canvas.height = size.height;
            width = canvas.width;
            height = canvas.height;
            initializeFields();
            solveConvection();
            drawPattern();
        }

        window.addEventListener('resize', windowResized);

        // Initialize
        initializeFields();
        solveConvection();
        drawPattern();

        // Initialize seed display
        document.getElementById('seed-display').textContent = params.seed;
        document.getElementById('seed').value = params.seed;

        // Copy share URL function
        function copyShareUrl() {
            const shareUrl = urlState.getShareUrl({
                seed: params.seed,
                bgColor: params.bgColor,
                strokeColor: params.strokeColor,
                convectionType: convectionType.value,
                rayleigh: parseFloat(rayleigh.value),
                prandtl: parseFloat(prandtl.value),
                aspectRatio: parseFloat(aspectRatio.value),
                topBoundary: topBoundary.value,
                bottomBoundary: bottomBoundary.value,
                deltaT: parseInt(deltaT.value),
                showStreamlines: showStreamlines.checked,
                showTemperature: showTemperature.checked,
                showVelocityVectors: showVelocityVectors.checked,
                showNusselt: showNusselt.checked,
                gridResolution: parseInt(gridResolution.value)
            });
            const statusEl = document.getElementById('share-status');
            navigator.clipboard.writeText(shareUrl).then(() => {
                statusEl.textContent = '✓ Copied!';
                setTimeout(() => statusEl.textContent = '', 2000);
            }).catch(() => {
                statusEl.textContent = 'Copy failed';
            });
        }
    </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
</html>
