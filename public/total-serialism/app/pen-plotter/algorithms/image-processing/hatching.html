  <style>

    }
    .preview-options {

<body>
  <div id="canvas-container"></div>

  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>

    <h2>Hatching Converter</h2>
    <div class="subtitle">Convert images to hatching patterns for pen plotting</div>

    <div class="control-group">
      <h3>Image Input</h3>
      <div id="image-upload-area" class="upload-area" tabindex="0">
        <div class="upload-icon">+</div>
        <div>Drop image here or click to browse</div>
      </div>
      <input type="file" id="imageUpload" accept="image/*">
      <div id="processing-status"></div>
    </div>

    <div class="control-group">
      <h3>Hatching Parameters</h3>
      <div class="control">
        <label>Hatching Style:</label>
        <select id="hatchStyle">
          <option value="linear">Linear Hatching</option>
          <option value="crosshatch">Cross-Hatching</option>
          <option value="contour">Contour Hatching</option>
          <option value="stipple">Stipple Hatching</option>
        </select>
      </div>
      <div class="control">
        <label>Line Spacing: <span class="value" id="spacing-value">5</span>px</label>
        <input type="range" id="spacing" min="2" max="20" step="1" value="5">
      </div>
      <div class="control">
        <label>Base Angle: <span class="value" id="angle-value">45</span>deg</label>
        <input type="range" id="angle" min="0" max="180" step="15" value="45">
      </div>
      <div class="control">
        <label>Density Levels: <span class="value" id="levels-value">5</span></label>
        <input type="range" id="levels" min="2" max="10" step="1" value="5">
      </div>
      <div class="control">
        <label>Minimum Line Length: <span class="value" id="minLength-value">10</span>px</label>
        <input type="range" id="minLength" min="2" max="50" step="2" value="10">
      </div>
      <div class="control">
        <label>Brightness Threshold: <span class="value" id="threshold-value">128</span></label>
        <input type="range" id="threshold" min="0" max="255" step="1" value="128">
      </div>
    </div>

    <div class="control-group">
      <h3>Display Options</h3>
      <div class="preview-options">
        <label>
          <input type="checkbox" id="showOriginal" checked> Show Original
        </label>
        <label>
          <input type="checkbox" id="showHatching" checked> Show Hatching
        </label>
      </div>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="square800" selected>Square (800x800)</option>
          <option value="landscape800x600">Landscape (800x600)</option>
          <option value="a5portrait">A5 Portrait</option>
          <option value="a5landscape">A5 Landscape</option>
          <option value="a4portrait">A4 Portrait</option>
          <option value="a4landscape">A4 Landscape</option>
          <option value="a3portrait">A3 Portrait</option>
          <option value="a3landscape">A3 Landscape</option>
          <option value="letterportrait">Letter Portrait</option>
          <option value="letterlandscape">Letter Landscape</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Path Optimization</h3>
      <div class="preview-options">
        <label>
          <input type="checkbox" id="optimizePaths" checked> Optimize Paths
        </label>
        <label>
          <input type="checkbox" id="joinPaths"> Join Nearby Paths
        </label>
      </div>
      <div class="control">
        <label>Join Threshold: <span class="value" id="joinThreshold-value">5</span>px</label>
        <input type="range" id="joinThreshold" min="1" max="20" step="1" value="5">
      </div>
    </div>

    <div class="control-group">
      <h3>Statistics</h3>
      <div id="stats" class="stats" style="display: none;">
        <div><span>Lines:</span> <span class="value" id="lineCountStat">0</span></div>
        <div><span>Points:</span> <span class="value" id="pointCountStat">0</span></div>
        <div><span>Path Length:</span> <span class="value" id="pathLengthStat">0</span>mm</div>
      </div>
    </div>

    <div class="control-group">
      <h3>Export</h3>
      <div class="control">
        <label>Seed: <span id="seed-display">-</span></label>
        <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
      </div>
      <button onclick="generateHatching()">Generate Hatching</button>
      <div class="button-group" style="margin-top: 10px;">
        <button onclick="exportSVG()" id="exportBtn" disabled>Export SVG</button>
        <button onclick="exportPNG()" id="exportPNGBtn" disabled>Export PNG</button>
      </div>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
    </div>

    <!-- Preset Manager -->
    <div id="preset-container"></div>
  </div>

  <script>
    // Global variables
    let img = null;
    let canvas;
    let hatchLines = [];
    let processing = false;
    let uploadHelper;
    let presetManager;

    let params = {
      paperSize: 'square800',
      hatchStyle: 'linear',
      spacing: 5,
      angle: 45,
      levels: 5,
      minLength: 10,
      threshold: 128,
      seed: Math.floor(Math.random() * 1000000)
    };

    // URL state management
    const urlState = new TSUrlState({
      algorithmId: 'hatching',
      schema: [
        { key: 'seed', type: 'int', bytes: 4 },
        { key: 'spacing', type: 'int', bytes: 1 },
        { key: 'angle', type: 'int', bytes: 1 },
        { key: 'levels', type: 'int', bytes: 1 },
        { key: 'minLength', type: 'int', bytes: 1 },
        { key: 'threshold', type: 'int', bytes: 1 },
        { key: 'hatchStyle', type: 'enum', options: ['linear', 'crosshatch', 'contour', 'stipple'] }
      ]
    });

    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
    }

    // P5.js setup
    function setup() {
      const size = CanvasLayout.getSize(params.paperSize);
      canvas = createCanvas(size.width, size.height);
      canvas.parent('canvas-container');

      // Setup upload helper
      setupUploadHelper();

      // Setup event listeners
      setupEventListeners();

      // Initialize preset manager
      presetManager = new PresetManager({
        algorithmId: 'hatching',
        container: '#preset-container',
        onSave: () => params,
        onLoad: (preset) => {
          Object.assign(params, preset.data);
          updateUIFromParams();
          if (img) generateHatching();
        },
        onRandomize: () => {
          params.hatchStyle = ['linear', 'crosshatch', 'contour', 'stipple'][Math.floor(Math.random() * 4)];
          params.spacing = Math.floor(Math.random() * 15) + 3;
          params.angle = Math.floor(Math.random() * 12) * 15;
          params.levels = Math.floor(Math.random() * 8) + 2;
          params.seed = Math.floor(Math.random() * 1000000);
          updateUIFromParams();
          if (img) generateHatching();
        }
      });

      background(255);
      strokeWeight(1);
      noFill();
    }

    function setupUploadHelper() {
      uploadHelper = new UploadHelper({
        dropArea: '#image-upload-area',
        input: '#imageUpload',
        onFile: (file) => {
          loadImageFile(file);
        }
      });
    }

    function setupEventListeners() {
      // Paper size
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        const size = CanvasLayout.getSize(params.paperSize);
        resizeCanvas(size.width, size.height);
        if (img) redraw();
      });

      // Hatching style
      document.getElementById('hatchStyle').addEventListener('change', (e) => {
        params.hatchStyle = e.target.value;
        const style = e.target.value;
        document.getElementById('angle').parentElement.style.display =
          (style === 'linear' || style === 'crosshatch') ? 'block' : 'none';
      });

      // Update value displays
      document.querySelectorAll('input[type="range"]').forEach(input => {
        input.addEventListener('input', (e) => {
          const valueSpan = document.getElementById(e.target.id + '-value');
          if (valueSpan) {
            valueSpan.textContent = e.target.value;
          }
          if (params.hasOwnProperty(e.target.id)) {
            params[e.target.id] = parseFloat(e.target.value);
          }
        });
      });

      // Checkbox handlers
      document.getElementById('showOriginal').addEventListener('change', () => redraw());
      document.getElementById('showHatching').addEventListener('change', () => redraw());

      // Seed
      document.getElementById('seed').addEventListener('change', (e) => {
        params.seed = parseInt(e.target.value);
        if (img) generateHatching();
      });
      document.getElementById('seed').value = params.seed;
      document.getElementById('seed-display').textContent = params.seed;
    }

    function draw() {
      background(255);

      if (img && document.getElementById('showOriginal').checked) {
        // Draw original image faded
        push();
        tint(255, 100);
        image(img, 0, 0, width, height);
        pop();
      }

      if (hatchLines.length > 0 && document.getElementById('showHatching').checked) {
        // Draw hatching lines
        stroke(0);
        strokeWeight(1);
        noFill();

        hatchLines.forEach(line => {
          if (line.points && line.points.length >= 2) {
            beginShape();
            line.points.forEach(point => {
              vertex(point.x, point.y);
            });
            endShape();
          } else if (line.x !== undefined && line.y !== undefined && line.r !== undefined) {
            // Stipple points
            circle(line.x, line.y, line.r * 2);
          }
        });
      }
    }

    function loadImageFile(file) {
      if (!file.type.match('image.*')) {
        showStatus('Please upload an image file', 'error');
        return;
      }

      showStatus(`Loading ${file.name}...`, 'processing');

      const reader = new FileReader();
      reader.onload = (e) => {
        loadImage(e.target.result, (loadedImg) => {
          img = loadedImg;
          hatchLines = [];
          showStatus('Image loaded successfully', 'success');
          document.getElementById('exportBtn').disabled = true;
          document.getElementById('exportPNGBtn').disabled = true;
          redraw();
        }, () => {
          showStatus('Could not read that image', 'error');
        });
      };
      reader.onerror = () => showStatus('Could not read that image', 'error');
      reader.readAsDataURL(file);
    }

    function generateHatching() {
      if (!img) {
        showStatus('Please upload an image first', 'error');
        return;
      }

      if (processing) {
        showStatus('Already processing...', 'error');
        return;
      }

      processing = true;
      showStatus('Generating hatching...', 'processing');

      // Initialize seeded RNG
      let _s = params.seed;
      const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

      // Clear previous lines
      hatchLines = [];

      // Get parameters
      const style = document.getElementById('hatchStyle').value;
      const spacing = parseInt(document.getElementById('spacing').value);
      const angle = parseInt(document.getElementById('angle').value);
      const levels = parseInt(document.getElementById('levels').value);
      const minLength = parseInt(document.getElementById('minLength').value);
      const threshold = parseInt(document.getElementById('threshold').value);

      // Process image
      img.loadPixels();

      // Generate hatching based on style
      switch (style) {
        case 'linear':
          generateLinearHatching(spacing, angle, levels, minLength, threshold);
          break;
        case 'crosshatch':
          generateCrosshatch(spacing, angle, levels, minLength, threshold);
          break;
        case 'contour':
          generateContourHatching(spacing, levels, minLength, threshold);
          break;
        case 'stipple':
          generateStippleHatching(spacing, levels, threshold);
          break;
      }

      // Apply path optimization if enabled
      if (document.getElementById('optimizePaths').checked && style !== 'stipple') {
        optimizeHatchingPaths();
      }

      // Update stats
      updateStats();

      processing = false;
      showStatus('Hatching generated successfully!', 'success');
      document.getElementById('exportBtn').disabled = false;
      document.getElementById('exportPNGBtn').disabled = false;

      // Update seed display
      document.getElementById('seed-display').textContent = params.seed;

      // Update URL state
      urlState.replaceState(params);

      redraw();
    }

    function generateLinearHatching(spacing, angle, levels, minLength, threshold) {
      const angleRad = radians(angle);
      const dx = cos(angleRad);
      const dy = sin(angleRad);

      // Calculate diagonal length
      const diagonal = sqrt(width * width + height * height);

      // Generate parallel lines
      for (let offset = -diagonal; offset <= diagonal; offset += spacing) {
        const lines = [];

        // Find intersections with image bounds
        const perpX = -dy;
        const perpY = dx;
        const baseX = width / 2 + perpX * offset;
        const baseY = height / 2 + perpY * offset;

        // Scan along the line
        const scanLength = diagonal * 2;
        let currentLine = null;

        for (let t = -scanLength / 2; t <= scanLength / 2; t += 2) {
          const x = baseX + dx * t;
          const y = baseY + dy * t;

          if (x >= 0 && x < width && y >= 0 && y < height) {
            // Sample brightness at this point
            const brightness = sampleBrightness(x, y);
            const level = Math.floor((255 - brightness) / (255 / levels));

            if (level > 0 && brightness < threshold) {
              if (!currentLine) {
                currentLine = { points: [] };
              }
              currentLine.points.push({ x, y });
            } else if (currentLine) {
              if (currentLine.points.length * 2 >= minLength) {
                lines.push(currentLine);
              }
              currentLine = null;
            }
          }
        }

        if (currentLine && currentLine.points.length * 2 >= minLength) {
          lines.push(currentLine);
        }

        hatchLines.push(...lines);
      }
    }

    function generateCrosshatch(spacing, angle, levels, minLength, threshold) {
      // Generate first set of lines
      generateLinearHatching(spacing, angle, levels, minLength, threshold);

      // Generate perpendicular lines
      const perpAngle = angle + 90;
      generateLinearHatching(spacing, perpAngle, levels, minLength, threshold);
    }

    function generateContourHatching(spacing, levels, minLength, threshold) {
      // Create brightness map
      const brightnessMap = [];
      for (let y = 0; y < height; y += 2) {
        brightnessMap[y] = [];
        for (let x = 0; x < width; x += 2) {
          brightnessMap[y][x] = sampleBrightness(x, y);
        }
      }

      // Generate contour lines at different brightness levels
      for (let level = 1; level < levels; level++) {
        const targetBrightness = (level / levels) * 255;

        // Find contour lines using marching squares
        for (let y = 0; y < height - spacing; y += spacing) {
          for (let x = 0; x < width - spacing; x += spacing) {
            const contour = marchingSquares(
              x, y, spacing, targetBrightness, brightnessMap
            );

            if (contour && contour.length >= minLength / 2) {
              hatchLines.push({
                points: contour.map(p => ({ x: p[0], y: p[1] }))
              });
            }
          }
        }
      }
    }

    function generateStippleHatching(spacing, levels, threshold) {
      // Generate stipple points based on brightness
      for (let y = spacing / 2; y < height; y += spacing) {
        for (let x = spacing / 2; x < width; x += spacing) {
          const brightness = sampleBrightness(x, y);

          if (brightness < threshold) {
            const level = Math.floor((255 - brightness) / (255 / levels));
            const radius = map(level, 0, levels, 0.5, spacing / 3);

            // Add some randomness
            const offsetX = (seededRandom() - 0.5) * (spacing / 2);
            const offsetY = (seededRandom() - 0.5) * (spacing / 2);

            hatchLines.push({
              x: x + offsetX,
              y: y + offsetY,
              r: radius
            });
          }
        }
      }
    }

    function marchingSquares(x, y, size, threshold, brightnessMap) {
      // Simple marching squares implementation
      const points = [];

      const tl = brightnessMap[y] && brightnessMap[y][x] || 255;
      const tr = brightnessMap[y] && brightnessMap[y][x + size] || 255;
      const bl = brightnessMap[y + size] && brightnessMap[y + size][x] || 255;
      const br = brightnessMap[y + size] && brightnessMap[y + size][x + size] || 255;

      // Calculate case
      let caseIndex = 0;
      if (tl < threshold) caseIndex |= 8;
      if (tr < threshold) caseIndex |= 4;
      if (br < threshold) caseIndex |= 2;
      if (bl < threshold) caseIndex |= 1;

      // Generate line segments based on case
      switch (caseIndex) {
        case 1:
        case 14:
          points.push([x, y + size / 2], [x + size / 2, y + size]);
          break;
        case 2:
        case 13:
          points.push([x + size / 2, y + size], [x + size, y + size / 2]);
          break;
        case 3:
        case 12:
          points.push([x, y + size / 2], [x + size, y + size / 2]);
          break;
        case 4:
        case 11:
          points.push([x + size / 2, y], [x + size, y + size / 2]);
          break;
        case 5:
          points.push([x, y + size / 2], [x + size / 2, y]);
          points.push([x + size / 2, y + size], [x + size, y + size / 2]);
          break;
        case 6:
        case 9:
          points.push([x + size / 2, y], [x + size / 2, y + size]);
          break;
        case 7:
        case 8:
          points.push([x, y + size / 2], [x + size / 2, y]);
          break;
        case 10:
          points.push([x + size / 2, y], [x + size, y + size / 2]);
          points.push([x, y + size / 2], [x + size / 2, y + size]);
          break;
      }

      return points;
    }

    function sampleBrightness(x, y) {
      const imgX = Math.floor(map(x, 0, width, 0, img.width));
      const imgY = Math.floor(map(y, 0, height, 0, img.height));
      const pixelIndex = (imgY * img.width + imgX) * 4;

      const r = img.pixels[pixelIndex];
      const g = img.pixels[pixelIndex + 1];
      const b = img.pixels[pixelIndex + 2];

      return (r + g + b) / 3;
    }

    function optimizeHatchingPaths() {
      // Simple nearest-neighbor optimization
      let segments = hatchLines
        .filter(line => line.points && line.points.length > 0);

      if (segments.length < 2) return;

      const optimized = [segments[0]];
      const remaining = segments.slice(1);

      while (remaining.length > 0) {
        const lastLine = optimized[optimized.length - 1];
        const lastPoint = lastLine.points[lastLine.points.length - 1];
        let nearestIdx = 0;
        let nearestDist = Infinity;

        for (let i = 0; i < remaining.length; i++) {
          if (remaining[i].points && remaining[i].points.length > 0) {
            const firstPoint = remaining[i].points[0];
            const d = dist(lastPoint.x, lastPoint.y, firstPoint.x, firstPoint.y);
            if (d < nearestDist) {
              nearestDist = d;
              nearestIdx = i;
            }
          }
        }

        optimized.push(remaining.splice(nearestIdx, 1)[0]);
      }

      hatchLines = optimized;
    }

    function exportSVG() {
      if (hatchLines.length === 0) {
        showStatus('No hatching to export', 'error');
        return;
      }

      const elements = hatchLines.map((line) => {
        if (line.points && line.points.length >= 2) {
          return `  <path d="${TSExport.pointsToPath(line.points)}" stroke="#000000" stroke-width="1" fill="none"/>`;
        }
        if (line.x !== undefined && line.y !== undefined && line.r !== undefined) {
          return `  <circle cx="${line.x}" cy="${line.y}" r="${line.r}" fill="#000000" stroke="none"/>`;
        }
        return '';
      }).filter(Boolean);

      const svg = `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">\n  <rect width="100%" height="100%" fill="#ffffff"/>\n${elements.join('\n')}\n</svg>`;
      TSExport.downloadSVG(svg, 'hatching-output');
      showStatus('SVG exported successfully!', 'success');
    }

    function exportPNG() {
      if (hatchLines.length === 0) {
        showStatus('No hatching to export', 'error');
        return;
      }

      // Save current canvas as PNG
      save(canvas, 'hatching-output.png');
      showStatus('PNG exported successfully!', 'success');
    }

    function updateStats() {
      let totalLines = 0;
      let totalPoints = 0;
      let totalLength = 0;

      hatchLines.forEach(line => {
        if (line.points && line.points.length > 0) {
          totalLines++;
          totalPoints += line.points.length;

          // Calculate path length
          for (let i = 1; i < line.points.length; i++) {
            const dx = line.points[i].x - line.points[i-1].x;
            const dy = line.points[i].y - line.points[i-1].y;
            totalLength += Math.sqrt(dx * dx + dy * dy);
          }
        } else if (line.x !== undefined) {
          // Count stipple points
          totalLines++;
          totalPoints++;
        }
      });

      // Convert pixels to mm (assuming 96 DPI)
      const lengthMM = (totalLength * 25.4 / 96).toFixed(1);

      document.getElementById('lineCountStat').textContent = totalLines;
      document.getElementById('pointCountStat').textContent = totalPoints;
      document.getElementById('pathLengthStat').textContent = lengthMM;
      document.getElementById('stats').style.display = 'block';
    }

    function updateUIFromParams() {
      document.getElementById('paperSize').value = params.paperSize;
      document.getElementById('hatchStyle').value = params.hatchStyle;
      document.getElementById('spacing').value = params.spacing;
      document.getElementById('spacing-value').textContent = params.spacing;
      document.getElementById('angle').value = params.angle;
      document.getElementById('angle-value').textContent = params.angle;
      document.getElementById('levels').value = params.levels;
      document.getElementById('levels-value').textContent = params.levels;
      document.getElementById('minLength').value = params.minLength;
      document.getElementById('minLength-value').textContent = params.minLength;
      document.getElementById('threshold').value = params.threshold;
      document.getElementById('threshold-value').textContent = params.threshold;
    }

    function showStatus(message, type) {
      const status = document.getElementById('processing-status');
      status.textContent = message;
      status.className = type;
      status.style.display = 'block';

      if (type !== 'processing') {
        setTimeout(() => {
          status.style.display = 'none';
        }, 3000);
      }
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => { statusEl.textContent = 'Copy failed'; });
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
