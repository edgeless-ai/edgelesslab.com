<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Astronomy - Pen Plotter Art</title>
    
  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    :root {
      --ts-bg-deep: #0a0a0f;
      --ts-bg-base: #12121a;
      --ts-bg-panel: #1a1a24;
      --ts-bg-elevated: #24242f;
      --ts-border-subtle: #2a2a3a;
      --ts-border-default: #3a3a4a;
      --ts-text-primary: #e8e8ed;
      --ts-text-secondary: #a0a0b0;
      --ts-text-muted: #606070;
      --ts-text-inverse: #0a0a0f;
      --ts-accent-primary: #6366f1;
      --ts-accent-hover: #818cf8;
      --ts-accent-muted: rgba(99, 102, 241, 0.15);
    }

    body {
      margin: 0;
      display: flex;
      background: var(--ts-bg-deep);
      color: var(--ts-text-primary);
      font-family: 'JetBrains Mono', monospace;
    }

    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--ts-bg-base);
    }

    #controls {
      width: 380px;
      padding: 20px;
      background: var(--ts-bg-panel);
      height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    canvas {
      background-color: #000000;
      border: 1px solid var(--ts-border-subtle);
    }

    h2 {
      margin: 0 0 20px 0;
      color: var(--ts-accent-primary);
      font-size: 1.1rem;
    }

    h3 {
      font-size: 0.85rem;
      margin: 20px 0 12px 0;
      color: var(--ts-text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--ts-text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="range"] {
      width: 100%;
      margin-bottom: 4px;
      accent-color: var(--ts-accent-primary);
    }

    input[type="number"], input[type="date"], input[type="time"], select {
      width: 100%;
      background: var(--ts-bg-elevated);
      border: 1px solid var(--ts-border-subtle);
      color: var(--ts-text-primary);
      padding: 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      box-sizing: border-box;
    }

    input[type="color"] {
      background: var(--ts-bg-elevated);
      border: 1px solid var(--ts-border-subtle);
      border-radius: 4px;
      padding: 2px;
      cursor: pointer;
    }

    input[type="checkbox"] {
      accent-color: var(--ts-accent-primary);
    }

    button {
      width: 100%;
      padding: 10px 16px;
      margin-top: 8px;
      background: var(--ts-accent-primary);
      color: var(--ts-text-inverse);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--ts-accent-hover);
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .export-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .value-display {
      font-size: 0.7rem;
      color: var(--ts-text-muted);
      text-align: right;
    }

    .info-display {
      font-size: 0.75rem;
      color: var(--ts-text-secondary);
      margin-top: 12px;
      padding: 12px;
      background: var(--ts-bg-elevated);
      border-radius: 4px;
      border: 1px solid var(--ts-border-subtle);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--ts-text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .back-link:hover {
      color: var(--ts-accent-primary);
    }

    .preset-container {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--ts-border-subtle);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas" width="800" height="800"></canvas>
  </div>

  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>
    <h2>Astronomy</h2>

    <h3>Canvas Settings</h3>
    <div class="control-group">
      <label>Paper Size</label>
      <select id="paperSize">
        <option value="square800">Square (800x800)</option>
        <option value="landscape800x600">Landscape (800x600)</option>
        <option value="a4portrait">A4 Portrait</option>
        <option value="a4landscape">A4 Landscape</option>
        <option value="a3portrait">A3 Portrait</option>
        <option value="a3landscape">A3 Landscape</option>
        <option value="letterportrait">Letter Portrait</option>
        <option value="letterlandscape">Letter Landscape</option>
      </select>
    </div>
    <div class="control-group">
      <label>Background</label>
      <input type="color" id="bgColor" value="#000000">
    </div>
    <div class="control-group">
      <label>Stroke Color</label>
      <input type="color" id="strokeColor" value="#ffffff">
    </div>
    <div class="control-group">
      <button id="randomizeAll">Randomize Colors</button>
    </div>

    <h3>Visualization Type</h3>
    <div class="control-group">
      <label for="viewType">View Type</label>
      <select id="viewType">
        <option value="starmap">Star Map</option>
        <option value="constellations">Constellations</option>
        <option value="solar-system">Solar System</option>
        <option value="moon-phases">Moon Phases</option>
        <option value="eclipse">Eclipse Diagram</option>
      </select>
    </div>

    <h3>Time & Location</h3>
    <div class="control-group">
      <label for="viewDate">Date</label>
      <input type="date" id="viewDate">
    </div>
    <div class="control-group">
      <label for="viewTime">Time</label>
      <input type="time" id="viewTime">
    </div>
    <div class="control-group">
      <label for="latitude">Latitude</label>
      <input type="range" id="latitude" min="-90" max="90" value="40">
      <div class="value-display" id="latitudeValue">40deg</div>
    </div>
    <div class="control-group">
      <label for="longitude">Longitude</label>
      <input type="range" id="longitude" min="-180" max="180" value="-74">
      <div class="value-display" id="longitudeValue">-74deg</div>
    </div>

    <h3>Display Options</h3>
    <div class="control-group">
      <label for="projection">Projection Type</label>
      <select id="projection">
        <option value="stereographic">Stereographic</option>
        <option value="orthographic">Orthographic</option>
        <option value="mercator">Mercator</option>
        <option value="azimuthal">Azimuthal</option>
      </select>
    </div>
    <div class="control-group">
      <label for="magnitude">Star Magnitude Limit</label>
      <input type="range" id="magnitude" min="1" max="6" step="0.5" value="4">
      <div class="value-display" id="magnitudeValue">4.0</div>
    </div>
    <div class="control-group">
      <label for="starSize">Star Size</label>
      <input type="range" id="starSize" min="0.5" max="5" step="0.5" value="2">
      <div class="value-display" id="starSizeValue">2.0</div>
    </div>
    <div class="control-group">
      <label for="showGrid">Show Grid</label>
      <input type="checkbox" id="showGrid" checked>
    </div>
    <div class="control-group">
      <label for="showLabels">Show Labels</label>
      <input type="checkbox" id="showLabels" checked>
    </div>
    <div class="control-group">
      <label for="showConstellationLines">Show Constellation Lines</label>
      <input type="checkbox" id="showConstellationLines" checked>
    </div>
    <div class="control-group">
      <label for="showPlanets">Show Planets</label>
      <input type="checkbox" id="showPlanets" checked>
    </div>

    <div class="control-group">
      <label>Seed: <span id="seed-display">-</span></label>
      <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
    </div>

    <div class="button-group">
      <button onclick="generateView()">Generate</button>
      <button onclick="clearCanvas()">Clear</button>
    </div>

    <h3>Animation</h3>
    <div class="control-group">
      <label for="animationSpeed">Animation Speed</label>
      <input type="range" id="animationSpeed" min="1" max="100" value="10">
      <div class="value-display" id="animationSpeedValue">10</div>
    </div>
    <button onclick="animateView()">Animate</button>

    <div class="info-display" id="infoDisplay">
      Click on objects for information
    </div>

    <h3>Export Options</h3>
    <div class="export-buttons">
      <button onclick="exportSVG()">SVG</button>
      <button onclick="exportPNG()">PNG</button>
      <button onclick="exportGIF()">GIF</button>
    </div>
    <button onclick="copyShareUrl()">📋 Copy Share URL</button>
    <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>

    <div class="preset-container">
      <!-- Preset controls can be added here -->
    </div>
  </div>
    
    <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
    <script src="../../shared/export-utils.js"></script>
    <script src="../../shared/url-state.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="../../shared/panel-controller.js"></script>
    <script src="../../shared/stats-display.js"></script>
    <script>
        const params = {
            paperSize: 'square800',
            bgColor: '#000000',
            strokeColor: '#ffffff',
            seed: Math.floor(Math.random() * 1000000),
            viewType: 'starmap',
            latitude: 40,
            longitude: -74,
            projection: 'stereographic',
            magnitude: 4,
            starSize: 2,
            showGrid: true,
            showLabels: true,
            showConstellationLines: true,
            showPlanets: true,
            animationSpeed: 10
        };

        // URL State Management
        const urlState = new TSUrlState({
            algorithmId: 'astronomy',
            schema: [
                { key: 'seed', type: 'int', bytes: 4 },
                { key: 'paperSize', type: 'enum', options: ['square800', 'landscape800x600', 'a4portrait', 'a4landscape', 'a3portrait', 'a3landscape', 'letterportrait', 'letterlandscape'] },
                { key: 'bgColor', type: 'color' },
                { key: 'strokeColor', type: 'color' },
                { key: 'viewType', type: 'enum', options: ['starmap', 'constellations', 'solar-system', 'moon-phases', 'eclipse'] },
                { key: 'latitude', type: 'int', bytes: 1, min: -90, max: 90 },
                { key: 'longitude', type: 'int', bytes: 2, min: -180, max: 180 },
                { key: 'projection', type: 'enum', options: ['stereographic', 'orthographic', 'mercator', 'azimuthal'] },
                { key: 'magnitude', type: 'float', bytes: 1, min: 1, max: 6 },
                { key: 'starSize', type: 'float', bytes: 1, min: 0.5, max: 5 },
                { key: 'showGrid', type: 'bool' },
                { key: 'showLabels', type: 'bool' },
                { key: 'showConstellationLines', type: 'bool' },
                { key: 'showPlanets', type: 'bool' },
                { key: 'animationSpeed', type: 'int', bytes: 1, min: 1, max: 100 }
            ]
        });

        // Load from URL if present
        const urlParams = urlState.fromUrl();
        if (window.location.search.includes('s=')) {
            Object.assign(params, urlParams);
            // Apply initial URL params to inputs
            if (urlParams.viewType) document.getElementById('viewType').value = urlParams.viewType;
            if (urlParams.latitude !== undefined) document.getElementById('latitude').value = urlParams.latitude;
            if (urlParams.longitude !== undefined) document.getElementById('longitude').value = urlParams.longitude;
            if (urlParams.projection) document.getElementById('projection').value = urlParams.projection;
            if (urlParams.magnitude !== undefined) document.getElementById('magnitude').value = urlParams.magnitude;
            if (urlParams.starSize !== undefined) document.getElementById('starSize').value = urlParams.starSize;
            if (urlParams.showGrid !== undefined) document.getElementById('showGrid').checked = urlParams.showGrid;
            if (urlParams.showLabels !== undefined) document.getElementById('showLabels').checked = urlParams.showLabels;
            if (urlParams.showConstellationLines !== undefined) document.getElementById('showConstellationLines').checked = urlParams.showConstellationLines;
            if (urlParams.showPlanets !== undefined) document.getElementById('showPlanets').checked = urlParams.showPlanets;
            if (urlParams.animationSpeed !== undefined) document.getElementById('animationSpeed').value = urlParams.animationSpeed;
        }

        // Canvas controls for unified color handling
        const canvasControls = new TSCanvasControls();
        canvasControls.bind(params);
        canvasControls.setupRandomizeButton();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentView = null;
        let animationFrames = [];
        let animationId = null;

        function initCanvasSize() {
            const size = CanvasLayout.getSize(params.paperSize);
            canvas.width = size.width;
            canvas.height = size.height;
        }
        initCanvasSize();

        // Initialize panel controller and stats display
        window.panelController = new TSPanelController().attach();
        window.statsDisplay = new TSStatsDisplay().attach();

        // Canvas settings event handlers
        document.getElementById('paperSize').addEventListener('change', (e) => {
            params.paperSize = e.target.value;
            initCanvasSize();
            clearCanvas();
        });
        document.getElementById('bgColor').addEventListener('input', (e) => {
            params.bgColor = e.target.value;
            clearCanvas();
        });
        document.getElementById('strokeColor').addEventListener('input', (e) => {
            params.strokeColor = e.target.value;
        });

        document.getElementById('seed').addEventListener('change', (e) => {
            params.seed = parseInt(e.target.value);
            generateView();
        });

        // Set current date/time
        const now = new Date();
        document.getElementById('viewDate').value = now.toISOString().split('T')[0];
        document.getElementById('viewTime').value = now.toTimeString().slice(0, 5);
        
        // Update value displays
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', (e) => {
                const valueDisplay = document.getElementById(e.target.id + 'Value');
                if (valueDisplay) {
                    let value = e.target.value;
                    if (e.target.id === 'latitude' || e.target.id === 'longitude') {
                        value += '°';
                    } else if (e.target.id === 'magnitude') {
                        value = parseFloat(value).toFixed(1);
                    }
                    valueDisplay.textContent = value;
                }
            });
        });
        
        // Simplified star catalog (normally would load from external source)
        const starCatalog = [
            // Bright stars with constellation info
            {name: 'Sirius', ra: 101.287, dec: -16.716, mag: -1.46, constellation: 'CMa'},
            {name: 'Vega', ra: 279.234, dec: 38.784, mag: 0.03, constellation: 'Lyr'},
            {name: 'Arcturus', ra: 213.915, dec: 19.182, mag: -0.05, constellation: 'Boo'},
            {name: 'Rigel', ra: 78.634, dec: -8.202, mag: 0.13, constellation: 'Ori'},
            {name: 'Betelgeuse', ra: 88.793, dec: 7.407, mag: 0.42, constellation: 'Ori'},
            {name: 'Altair', ra: 297.696, dec: 8.868, mag: 0.77, constellation: 'Aql'},
            {name: 'Polaris', ra: 37.954, dec: 89.264, mag: 1.98, constellation: 'UMi'},
            // Add more stars...
        ];
        
        // Constellation lines (simplified)
        const constellations = {
            'Ori': [ // Orion
                ['Betelgeuse', 'Bellatrix'],
                ['Betelgeuse', 'Alnitak'],
                ['Rigel', 'Saiph'],
                ['Rigel', 'Alnitak'],
                // Add more connections...
            ],
            'UMa': [ // Ursa Major (Big Dipper)
                ['Dubhe', 'Merak'],
                ['Merak', 'Phecda'],
                ['Phecda', 'Megrez'],
                // Add more connections...
            ]
        };
        
        class AstronomyView {
            constructor(type) {
                this.type = type;
                this.objects = [];
                this.time = this.getDateTime();
            }
            
            getDateTime() {
                const date = document.getElementById('viewDate').value;
                const time = document.getElementById('viewTime').value;
                return new Date(`${date}T${time}`);
            }
            
            generateStarMap() {
                // Initialize seeded random
                let _s = params.seed;
                const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

                const magnitude = parseFloat(document.getElementById('magnitude').value);
                const lat = parseFloat(document.getElementById('latitude').value);
                const lon = parseFloat(document.getElementById('longitude').value);
                const projection = document.getElementById('projection').value;

                this.objects = [];

                // Calculate local sidereal time
                const lst = this.calculateLST(this.time, lon);

                // Generate random stars for demonstration
                for (let i = 0; i < 1000; i++) {
                    const ra = seededRandom() * 360;
                    const dec = (seededRandom() - 0.5) * 180;
                    const mag = seededRandom() * 6;
                    
                    if (mag <= magnitude) {
                        const coords = this.projectCoordinates(ra, dec, lat, lst, projection);
                        if (coords && coords.visible) {
                            this.objects.push({
                                type: 'star',
                                x: coords.x,
                                y: coords.y,
                                mag: mag,
                                ra: ra,
                                dec: dec
                            });
                        }
                    }
                }
                
                // Add catalog stars
                starCatalog.forEach(star => {
                    if (star.mag <= magnitude) {
                        const coords = this.projectCoordinates(star.ra, star.dec, lat, lst, projection);
                        if (coords && coords.visible) {
                            this.objects.push({
                                type: 'catalogStar',
                                x: coords.x,
                                y: coords.y,
                                mag: star.mag,
                                name: star.name,
                                constellation: star.constellation,
                                ra: star.ra,
                                dec: star.dec
                            });
                        }
                    }
                });
            }
            
            generateSolarSystem() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const scale = 50;
                
                this.objects = [];
                
                // Sun
                this.objects.push({
                    type: 'sun',
                    x: centerX,
                    y: centerY,
                    radius: 20
                });
                
                // Planets (simplified orbits)
                const planets = [
                    {name: 'Mercury', distance: 0.39, radius: 3, period: 88, color: '#8C7853'},
                    {name: 'Venus', distance: 0.72, radius: 5, period: 225, color: '#FFC649'},
                    {name: 'Earth', distance: 1.0, radius: 5, period: 365, color: '#4169E1'},
                    {name: 'Mars', distance: 1.52, radius: 4, period: 687, color: '#CD5C5C'},
                    {name: 'Jupiter', distance: 5.20, radius: 12, period: 4333, color: '#DAA520'},
                    {name: 'Saturn', distance: 9.58, radius: 10, period: 10759, color: '#F4A460'},
                    {name: 'Uranus', distance: 19.22, radius: 7, period: 30687, color: '#4FD0E0'},
                    {name: 'Neptune', distance: 30.05, radius: 7, period: 60190, color: '#4169E1'}
                ];
                
                const dayOfYear = Math.floor((this.time - new Date(this.time.getFullYear(), 0, 0)) / 86400000);
                
                planets.forEach(planet => {
                    const angle = (dayOfYear / planet.period) * Math.PI * 2;
                    const orbitRadius = planet.distance * scale;
                    
                    this.objects.push({
                        type: 'planet',
                        name: planet.name,
                        x: centerX + Math.cos(angle) * orbitRadius,
                        y: centerY + Math.sin(angle) * orbitRadius,
                        radius: planet.radius,
                        color: planet.color,
                        orbitRadius: orbitRadius,
                        orbitCenter: {x: centerX, y: centerY}
                    });
                });
            }
            
            generateMoonPhases() {
                const phases = 30;
                const radius = 50;
                const spacing = 150;
                const startX = 100;
                const startY = 100;
                
                this.objects = [];
                
                for (let i = 0; i < phases; i++) {
                    const phase = i / phases;
                    const row = Math.floor(i / 5);
                    const col = i % 5;
                    
                    this.objects.push({
                        type: 'moonPhase',
                        x: startX + col * spacing,
                        y: startY + row * spacing,
                        radius: radius,
                        phase: phase,
                        day: i
                    });
                }
            }
            
            calculateLST(date, longitude) {
                // Simplified LST calculation
                const J2000 = new Date('2000-01-01T12:00:00Z');
                const daysSinceJ2000 = (date - J2000) / 86400000;
                const lst = (280.16 + 360.9856235 * daysSinceJ2000 + longitude) % 360;
                return lst;
            }
            
            projectCoordinates(ra, dec, lat, lst, projection) {
                // Convert to local coordinates
                const ha = (lst - ra + 360) % 360;
                const alt = Math.asin(
                    Math.sin(dec * Math.PI / 180) * Math.sin(lat * Math.PI / 180) +
                    Math.cos(dec * Math.PI / 180) * Math.cos(lat * Math.PI / 180) * 
                    Math.cos(ha * Math.PI / 180)
                );
                const az = Math.atan2(
                    -Math.cos(dec * Math.PI / 180) * Math.sin(ha * Math.PI / 180),
                    Math.sin(dec * Math.PI / 180) * Math.cos(lat * Math.PI / 180) -
                    Math.cos(dec * Math.PI / 180) * Math.cos(ha * Math.PI / 180) * 
                    Math.sin(lat * Math.PI / 180)
                );
                
                if (alt < 0) return {visible: false};
                
                let x, y;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const radius = canvas.width / 2 - 50;
                
                switch (projection) {
                    case 'stereographic':
                        const r = radius * Math.tan((Math.PI / 2 - alt) / 2);
                        x = centerX + r * Math.sin(az);
                        y = centerY - r * Math.cos(az);
                        break;
                    case 'orthographic':
                        x = centerX + radius * Math.cos(alt) * Math.sin(az);
                        y = centerY - radius * Math.cos(alt) * Math.cos(az);
                        break;
                    default:
                        x = centerX + (az * 180 / Math.PI) * radius / 180;
                        y = centerY - (alt * 180 / Math.PI) * radius / 90;
                }
                
                return {x, y, visible: true};
            }
            
            draw(ctx) {
                ctx.fillStyle = params.bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const viewType = document.getElementById('viewType').value;
                
                switch (viewType) {
                    case 'starmap':
                    case 'constellations':
                        this.drawStarMap(ctx);
                        break;
                    case 'solar-system':
                        this.drawSolarSystem(ctx);
                        break;
                    case 'moon-phases':
                        this.drawMoonPhases(ctx);
                        break;
                    case 'eclipse':
                        this.drawEclipse(ctx);
                        break;
                }
            }
            
            drawStarMap(ctx) {
                const showGrid = document.getElementById('showGrid').checked;
                const showLabels = document.getElementById('showLabels').checked;
                const showConstellationLines = document.getElementById('showConstellationLines').checked;
                const starSize = parseFloat(document.getElementById('starSize').value);
                
                // Draw grid
                if (showGrid) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 0.5;
                    
                    // Altitude circles
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    for (let alt = 0; alt <= 90; alt += 15) {
                        const r = (canvas.width / 2 - 50) * (1 - alt / 90);
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    
                    // Azimuth lines
                    for (let az = 0; az < 360; az += 30) {
                        const angle = az * Math.PI / 180;
                        ctx.beginPath();
                        ctx.moveTo(centerX, centerY);
                        ctx.lineTo(
                            centerX + Math.sin(angle) * (canvas.width / 2 - 50),
                            centerY - Math.cos(angle) * (canvas.width / 2 - 50)
                        );
                        ctx.stroke();
                    }
                }
                
                // Draw stars
                this.objects.forEach(obj => {
                    if (obj.type === 'star' || obj.type === 'catalogStar') {
                        const size = starSize * (1 + (6 - obj.mag) / 6);
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, size, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Draw star rays for bright stars
                        if (obj.mag < 2) {
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                            ctx.lineWidth = 0.5;
                            const rayLength = size * 3;
                            for (let i = 0; i < 4; i++) {
                                const angle = i * Math.PI / 2;
                                ctx.beginPath();
                                ctx.moveTo(
                                    obj.x + Math.cos(angle) * size,
                                    obj.y + Math.sin(angle) * size
                                );
                                ctx.lineTo(
                                    obj.x + Math.cos(angle) * rayLength,
                                    obj.y + Math.sin(angle) * rayLength
                                );
                                ctx.stroke();
                            }
                        }
                        
                        // Labels for named stars
                        if (showLabels && obj.name) {
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                            ctx.font = '10px Monaco';
                            ctx.fillText(obj.name, obj.x + size + 5, obj.y + 3);
                        }
                    }
                });
                
                // Draw constellation lines
                if (showConstellationLines) {
                    ctx.strokeStyle = 'rgba(100, 150, 255, 0.5)';
                    ctx.lineWidth = 1;
                    
                    // This would connect stars based on constellation data
                    // Simplified for demonstration
                }
                
                // Draw compass
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '14px Monaco';
                ctx.fillText('N', canvas.width / 2 - 5, 30);
                ctx.fillText('S', canvas.width / 2 - 5, canvas.height - 20);
                ctx.fillText('E', canvas.width - 30, canvas.height / 2 + 5);
                ctx.fillText('W', 20, canvas.height / 2 + 5);
            }
            
            drawSolarSystem(ctx) {
                const showLabels = document.getElementById('showLabels').checked;
                
                this.objects.forEach(obj => {
                    if (obj.type === 'sun') {
                        // Draw sun
                        const gradient = ctx.createRadialGradient(obj.x, obj.y, 0, obj.x, obj.y, obj.radius);
                        gradient.addColorStop(0, '#FFFF00');
                        gradient.addColorStop(0.7, '#FFA500');
                        gradient.addColorStop(1, '#FF6347');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (obj.type === 'planet') {
                        // Draw orbit
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.arc(obj.orbitCenter.x, obj.orbitCenter.y, obj.orbitRadius, 0, Math.PI * 2);
                        ctx.stroke();
                        
                        // Draw planet
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Draw rings for Saturn
                        if (obj.name === 'Saturn') {
                            ctx.strokeStyle = obj.color;
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.ellipse(obj.x, obj.y, obj.radius * 1.8, obj.radius * 0.5, 0, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                        
                        // Labels
                        if (showLabels) {
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                            ctx.font = '12px Monaco';
                            ctx.fillText(obj.name, obj.x + obj.radius + 5, obj.y + 3);
                        }
                    }
                });
            }
            
            drawMoonPhases(ctx) {
                this.objects.forEach(obj => {
                    if (obj.type === 'moonPhase') {
                        // Draw moon circle
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                        ctx.stroke();
                        
                        // Draw phase
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.fill();
                        
                        // Create phase shadow
                        ctx.fillStyle = '#000000';
                        ctx.beginPath();
                        
                        if (obj.phase < 0.5) {
                            // Waxing
                            const width = obj.radius * 2 * (0.5 - obj.phase) * 2;
                            ctx.ellipse(obj.x - obj.radius + width / 2, obj.y, width / 2, obj.radius, 0, -Math.PI / 2, Math.PI / 2);
                        } else {
                            // Waning
                            const width = obj.radius * 2 * (obj.phase - 0.5) * 2;
                            ctx.ellipse(obj.x + obj.radius - width / 2, obj.y, width / 2, obj.radius, 0, Math.PI / 2, -Math.PI / 2);
                        }
                        
                        ctx.closePath();
                        ctx.fill();
                        
                        // Label
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                        ctx.font = '10px Monaco';
                        ctx.fillText(`Day ${obj.day}`, obj.x - 15, obj.y + obj.radius + 20);
                    }
                });
            }
            
            drawEclipse(ctx) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                // Draw sun
                ctx.fillStyle = '#FFFF00';
                ctx.beginPath();
                ctx.arc(centerX - 50, centerY, 60, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw moon shadow
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(centerX + 30, centerY, 55, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw corona
                ctx.strokeStyle = '#FFA500';
                ctx.lineWidth = 3;
                for (let i = 0; i < 20; i++) {
                    const angle = (i / 20) * Math.PI * 2;
                    const innerR = 60;
                    const outerR = 80 + Math.random() * 20;
                    
                    ctx.beginPath();
                    ctx.moveTo(
                        centerX - 50 + Math.cos(angle) * innerR,
                        centerY + Math.sin(angle) * innerR
                    );
                    ctx.lineTo(
                        centerX - 50 + Math.cos(angle) * outerR,
                        centerY + Math.sin(angle) * outerR
                    );
                    ctx.stroke();
                }
                
                // Labels
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = '14px Monaco';
                ctx.fillText('Total Solar Eclipse', centerX - 70, centerY + 120);
            }
        }
        
        function generateView() {
            const viewType = document.getElementById('viewType').value;
            currentView = new AstronomyView(viewType);

            switch (viewType) {
                case 'starmap':
                case 'constellations':
                    currentView.generateStarMap();
                    break;
                case 'solar-system':
                    currentView.generateSolarSystem();
                    break;
                case 'moon-phases':
                    currentView.generateMoonPhases();
                    break;
            }

            currentView.draw(ctx);

            // Update seed display
            document.getElementById('seed-display').textContent = params.seed;
            document.getElementById('seed').value = params.seed;

            // Update params from UI
            params.viewType = document.getElementById('viewType').value;
            params.latitude = parseFloat(document.getElementById('latitude').value);
            params.longitude = parseFloat(document.getElementById('longitude').value);
            params.projection = document.getElementById('projection').value;
            params.magnitude = parseFloat(document.getElementById('magnitude').value);
            params.starSize = parseFloat(document.getElementById('starSize').value);
            params.showGrid = document.getElementById('showGrid').checked;
            params.showLabels = document.getElementById('showLabels').checked;
            params.showConstellationLines = document.getElementById('showConstellationLines').checked;
            params.showPlanets = document.getElementById('showPlanets').checked;
            params.animationSpeed = parseInt(document.getElementById('animationSpeed').value);

            // Update URL
            urlState.replaceState(params);

            // Update stats display
            if (window.statsDisplay) {
                const stats = {};

                switch (viewType) {
                    case 'starmap':
                    case 'constellations':
                        const starCount = currentView.objects.filter(o => o.type === 'star').length;
                        const catalogStarCount = currentView.objects.filter(o => o.type === 'catalogStar').length;
                        stats['Stars'] = starCount;
                        stats['Named Stars'] = catalogStarCount;
                        stats['Magnitude Limit'] = parseFloat(document.getElementById('magnitude').value).toFixed(1);
                        stats['Projection'] = document.getElementById('projection').value;
                        stats['Latitude'] = document.getElementById('latitude').value + '°';
                        stats['Longitude'] = document.getElementById('longitude').value + '°';
                        break;
                    case 'solar-system':
                        const planetCount = currentView.objects.filter(o => o.type === 'planet').length;
                        stats['Planets'] = planetCount;
                        stats['Bodies'] = currentView.objects.length;
                        stats['Date'] = document.getElementById('viewDate').value;
                        break;
                    case 'moon-phases':
                        stats['Phases'] = currentView.objects.length;
                        stats['Days'] = currentView.objects.length;
                        break;
                    case 'eclipse':
                        stats['Type'] = 'Solar Eclipse';
                        break;
                }

                window.statsDisplay.update(stats);
            }
        }
        
        function animateView() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                return;
            }
            
            animationFrames = [];
            const viewType = document.getElementById('viewType').value;
            const speed = parseInt(document.getElementById('animationSpeed').value);
            
            let frame = 0;
            const animate = () => {
                if (viewType === 'solar-system') {
                    // Animate planet positions
                    const date = new Date(currentView.time);
                    date.setDate(date.getDate() + frame * speed);
                    document.getElementById('viewDate').value = date.toISOString().split('T')[0];
                    
                    generateView();
                    
                    // Capture frame
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    animationFrames.push(imageData);
                    
                    frame++;
                    if (frame < 365 / speed) {
                        animationId = requestAnimationFrame(animate);
                    } else {
                        animationId = null;
                    }
                } else if (viewType === 'starmap') {
                    // Animate star positions through the night
                    const date = new Date(currentView.time);
                    date.setHours(date.getHours() + frame * speed / 60);
                    document.getElementById('viewTime').value = date.toTimeString().slice(0, 5);
                    
                    generateView();
                    
                    // Capture frame
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    animationFrames.push(imageData);
                    
                    frame++;
                    if (frame < 24 * 60 / speed) {
                        animationId = requestAnimationFrame(animate);
                    } else {
                        animationId = null;
                    }
                }
            };
            
            animate();
        }
        
        function clearCanvas() {
            ctx.fillStyle = params.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            currentView = null;
            animationFrames = [];
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        function exportSVG() {
            if (!currentView) return;
            
            let svg = `<svg width="${canvas.width}" height="${canvas.height}" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<rect width="${canvas.width}" height="${canvas.height}" fill="#000000"/>`;
            
            const starSize = parseFloat(document.getElementById('starSize').value);
            
            currentView.objects.forEach(obj => {
                if (obj.type === 'star' || obj.type === 'catalogStar') {
                    const size = starSize * (1 + (6 - obj.mag) / 6);
                    svg += `<circle cx="${obj.x}" cy="${obj.y}" r="${size}" fill="white"/>`;
                    
                    if (obj.name) {
                        svg += `<text x="${obj.x + size + 5}" y="${obj.y + 3}" fill="white" `;
                        svg += `font-family="Monaco" font-size="10" opacity="0.7">${obj.name}</text>`;
                    }
                } else if (obj.type === 'planet') {
                    svg += `<circle cx="${obj.orbitCenter.x}" cy="${obj.orbitCenter.y}" `;
                    svg += `r="${obj.orbitRadius}" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>`;
                    svg += `<circle cx="${obj.x}" cy="${obj.y}" r="${obj.radius}" fill="${obj.color}"/>`;
                    
                    if (obj.name) {
                        svg += `<text x="${obj.x + obj.radius + 5}" y="${obj.y + 3}" fill="white" `;
                        svg += `font-family="Monaco" font-size="12" opacity="0.8">${obj.name}</text>`;
                    }
                }
            });
            
            svg += '</svg>';
            
            const blob = new Blob([svg], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'astronomy.svg';
            a.click();
        }
        
        function exportPNG() {
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'astronomy.png';
                a.click();
            });
        }
        
        function exportGIF() {
            if (animationFrames.length === 0) {
                alert('Please animate the view first!');
                return;
            }
            
            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: canvas.width,
                height: canvas.height
            });
            
            animationFrames.forEach(frame => {
                gif.addFrame(frame, {delay: 100});
            });
            
            gif.on('finished', blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'astronomy.gif';
                a.click();
            });
            
            gif.render();
        }
        
        // Click interaction
        canvas.addEventListener('click', (e) => {
            if (!currentView) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Find clicked object
            let clicked = null;
            let minDist = Infinity;
            
            currentView.objects.forEach(obj => {
                const dist = Math.sqrt((obj.x - x) ** 2 + (obj.y - y) ** 2);
                const threshold = obj.radius || 5;
                
                if (dist < threshold && dist < minDist) {
                    minDist = dist;
                    clicked = obj;
                }
            });
            
            if (clicked) {
                let info = '';
                if (clicked.name) {
                    info = `${clicked.name}`;
                    if (clicked.constellation) info += ` (${clicked.constellation})`;
                    if (clicked.mag !== undefined) info += `\nMagnitude: ${clicked.mag.toFixed(2)}`;
                    if (clicked.ra !== undefined) info += `\nRA: ${clicked.ra.toFixed(2)}°`;
                    if (clicked.dec !== undefined) info += `\nDec: ${clicked.dec.toFixed(2)}°`;
                }
                
                document.getElementById('infoDisplay').textContent = info || 'Object selected';
            }
        });
        
        // Copy Share URL
        function copyShareUrl() {
            const shareUrl = urlState.getShareUrl(params);
            const statusEl = document.getElementById('share-status');
            navigator.clipboard.writeText(shareUrl).then(() => {
                statusEl.textContent = '✓ Copied!';
                setTimeout(() => statusEl.textContent = '', 2000);
            }).catch(() => {
                statusEl.textContent = 'Copy failed';
            });
        }

        // Initial generation
        generateView();
    </script>
