<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Natural Factory - Pen Plotter Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
    <script src="../../shared/export-utils.js"></script>
    <link rel="stylesheet" href="../../shared/algorithm.css">
    <style>
        :root {
            --ts-bg-deep: #0a0a0f;
            --ts-bg-base: #12121a;
            --ts-bg-panel: #1a1a24;
            --ts-bg-elevated: #24242f;
            --ts-border-subtle: #2a2a3a;
            --ts-border-default: #3a3a4a;
            --ts-text-primary: #e8e8ed;
            --ts-text-secondary: #a0a0b0;
            --ts-text-muted: #606070;
            --ts-text-inverse: #0a0a0f;
            --ts-accent-primary: #6366f1;
            --ts-accent-hover: #818cf8;
            --ts-accent-muted: rgba(99, 102, 241, 0.15);
            --ts-accent-danger: #ef4444;
            --ts-accent-success: #22c55e;
            --ts-accent-warning: #f59e0b;
        }
        body {
            margin: 0;
            display: flex;
            background: var(--ts-bg-deep);
            color: var(--ts-text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            height: 100vh;
            background: var(--ts-bg-base);
        }
        #controls {
            width: 380px;
            padding: 20px;
            background: var(--ts-bg-panel);
            height: 100vh;
            overflow-y: auto;
            box-sizing: border-box;
            border-left: 1px solid var(--ts-border-subtle);
        }
        canvas {
            border: 1px solid var(--ts-border-subtle);
        }
        h2 {
            margin: 0 0 20px 0;
            color: var(--ts-accent-primary);
            font-size: 1.1rem;
            font-weight: 600;
        }
        h3 {
            font-size: 0.8rem;
            margin: 24px 0 12px 0;
            color: var(--ts-text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            border-bottom: 1px solid var(--ts-border-subtle);
            padding-bottom: 6px;
        }
        .control-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--ts-text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="range"] {
            width: 100%;
            margin-bottom: 4px;
            accent-color: var(--ts-accent-primary);
        }
        input[type="number"], select, input[type="color"] {
            width: 100%;
            background: var(--ts-bg-elevated);
            border: 1px solid var(--ts-border-subtle);
            color: var(--ts-text-primary);
            padding: 6px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            box-sizing: border-box;
        }
        input[type="color"] {
            padding: 2px;
            height: 32px;
            cursor: pointer;
        }
        .value-display {
            font-size: 11px;
            color: var(--ts-accent-primary);
            text-align: right;
            display: block;
            margin-top: 2px;
        }
        .button-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        button {
            flex: 1;
            background: var(--ts-accent-primary);
            color: var(--ts-text-inverse);
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover {
            background: var(--ts-accent-hover);
        }
        button.secondary {
            background: var(--ts-bg-elevated);
            color: var(--ts-text-primary);
            border: 1px solid var(--ts-border-default);
        }
        button.secondary:hover {
            background: var(--ts-border-subtle);
        }
        button.danger {
            background: var(--ts-accent-danger);
        }
        button.danger:hover {
            background: #ff5252;
        }
        .preset-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .preset-row input[type="text"] {
            flex: 1;
        }
        .preset-row button {
            flex: 0 0 auto;
            padding: 6px 10px;
        }
        #seed-display {
            font-family: 'JetBrains Mono', monospace;
            background: var(--ts-bg-deep);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--ts-accent-primary);
            display: inline-block;
            margin-left: 6px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .checkbox-group input[type="checkbox"] {
            accent-color: var(--ts-accent-primary);
        }
        .checkbox-group label {
            margin: 0;
            text-transform: none;
            font-size: 12px;
            cursor: pointer;
        }
        .info-badge {
            display: inline-block;
            background: var(--ts-accent-muted);
            color: var(--ts-accent-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="canvas-wrapper"></div>
    </div>

    <div id="controls">
        <h2>Natural Factory</h2>
        <div class="info-badge">Astronomy-based | 8 natural systems</div>

        <h3>Factory Mode</h3>
        <div class="control-group">
            <label for="mode">Algorithm</label>
            <select id="mode">
                <option value="astronomy">Astronomy (Star Map)</option>
                <option value="coral">Coral Growth (Branching)</option>
                <option value="crystal">Crystal Growth (Facets)</option>
                <option value="dla">DLA Growth (Aggregation)</option>
                <option value="differential">Differential Growth (Voronoi)</option>
                <option value="lightning">Lightning (Recursive)</option>
                <option value="phyllotaxis">Phyllotaxis (Spiral)</option>
                <option value="space">Space Colonization (Branching)</option>
            </select>
        </div>

        <h3>Canvas</h3>
        <div class="control-group">
            <label for="paperSize">Paper Size</label>
            <select id="paperSize">
                <option value="A4_landscape">A4 Landscape</option>
                <option value="A4_portrait">A4 Portrait</option>
                <option value="A3_landscape">A3 Landscape</option>
                <option value="A3_portrait">A3 Portrait</option>
                <option value="square_medium">Square Medium</option>
                <option value="square_large">Square Large</option>
                <option value="letter_landscape">Letter Landscape</option>
                <option value="letter_portrait">Letter Portrait</option>
            </select>
        </div>
        <div class="control-group">
            <label for="bgColor">Background</label>
            <input type="color" id="bgColor" value="#000000">
        </div>
        <div class="control-group">
            <label for="strokeColor">Stroke Color</label>
            <input type="color" id="strokeColor" value="#ffffff">
        </div>
        <div class="control-group">
            <label for="accentColor">Accent Color</label>
            <input type="color" id="accentColor" value="#6366f1">
        </div>

        <h3>Core Parameters</h3>
        <div class="control-group">
            <label for="density">Density <span class="value-display" id="density-val">500</span></label>
            <input type="range" id="density" min="50" max="2000" step="50" value="500">
        </div>
        <div class="control-group">
            <label for="scale">Scale Factor <span class="value-display" id="scale-val">1.0</span></label>
            <input type="range" id="scale" min="0.3" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label for="chaos">Chaos / Randomness <span class="value-display" id="chaos-val">0.5</span></label>
            <input type="range" id="chaos" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="control-group">
            <label for="branchAngle">Branch Angle <span class="value-display" id="branchAngle-val">25</span></label>
            <input type="range" id="branchAngle" min="5" max="90" step="1" value="25">
        </div>
        <div class="control-group">
            <label for="iterations">Iterations / Depth <span class="value-display" id="iterations-val">6</span></label>
            <input type="range" id="iterations" min="1" max="12" step="1" value="6">
        </div>

        <h3>Natural Blend</h3>
        <div class="control-group">
            <label for="organic">Organic Factor <span class="value-display" id="organic-val">0.3</span></label>
            <input type="range" id="organic" min="0" max="1" step="0.05" value="0.3">
        </div>
        <div class="control-group">
            <label for="symmetry">Symmetry <span class="value-display" id="symmetry-val">0</span></label>
            <input type="range" id="symmetry" min="0" max="8" step="1" value="0">
        </div>
        <div class="control-group">
            <label for="noise">Noise Influence <span class="value-display" id="noise-val">0.2</span></label>
            <input type="range" id="noise" min="0" max="1" step="0.05" value="0.2">
        </div>

        <h3>Render</h3>
        <div class="checkbox-group">
            <input type="checkbox" id="showGrid" checked>
            <label for="showGrid">Show Grid</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="showConnections" checked>
            <label for="showConnections">Show Connections</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="plotterOptimized" checked>
            <label for="plotterOptimized">Plotter Optimized</label>
        </div>

        <h3>Seed</h3>
        <div class="control-group">
            <label>Seed: <span id="seed-display">-</span></label>
            <input type="number" id="seed" min="1" max="999999" style="width:100%;">
        </div>

        <h3>Actions</h3>
        <div class="button-row">
            <button id="regenerate">Regenerate</button>
            <button id="randomize" class="secondary">Randomize</button>
        </div>

        <h3>Export</h3>
        <div class="button-row">
            <button id="exportSVG" class="secondary">SVG</button>
            <button id="exportPNG" class="secondary">PNG</button>
        </div>
        <div class="button-row">
            <button id="exportPreset" class="secondary">Copy Preset</button>
        </div>

        <h3>Presets</h3>
        <div class="preset-row">
            <input type="text" id="preset-name" placeholder="preset name">
            <button id="save-preset">Save</button>
        </div>
        <div class="control-group">
            <select id="preset-select">
                <option value="">-- Select Preset --</option>
            </select>
        </div>
        <div class="button-row">
            <button id="load-preset" class="secondary">Load</button>
            <button id="delete-preset" class="danger">Delete</button>
        </div>
    </div>

    <script>
        // ==========================================
        // NATURAL FACTORY - Core Parameter Space
        // ==========================================

        let params = {
            mode: 'astronomy',
            paperSize: 'A4_landscape',
            bgColor: '#000000',
            strokeColor: '#ffffff',
            accentColor: '#6366f1',
            density: 500,
            scale: 1.0,
            chaos: 0.5,
            branchAngle: 25,
            iterations: 6,
            organic: 0.3,
            symmetry: 0,
            noise: 0.2,
            showGrid: true,
            showConnections: true,
            plotterOptimized: true,
            seed: Math.floor(Math.random() * 1000000)
        };

        const paperSizes = {
            'A4_landscape': { width: 842, height: 595 },
            'A4_portrait': { width: 595, height: 842 },
            'A3_landscape': { width: 1191, height: 842 },
            'A3_portrait': { width: 842, height: 1191 },
            'square_medium': { width: 600, height: 600 },
            'square_large': { width: 800, height: 800 },
            'letter_landscape': { width: 792, height: 612 },
            'letter_portrait': { width: 612, height: 792 }
        };

        let canvasWidth, canvasHeight;
        let seedRandom;
        let paths = []; // For plotter optimization
        let points = []; // For connection rendering

        // ==========================================
        // Seeded Random
        // ==========================================
        function setSeed(s) {
            params.seed = s;
            document.getElementById('seed-display').textContent = s;
            document.getElementById('seed').value = s;
            let _s = s;
            seedRandom = () => {
                _s |= 0;
                _s = _s + 0x6D2B79F5 | 0;
                let t = Math.imul(_s ^ _s >>> 15, 1 | _s);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        // ==========================================
        // p5.js Setup & Draw
        // ==========================================
        function setup() {
            updateCanvasSize();
            const c = createCanvas(canvasWidth, canvasHeight);
            c.parent('canvas-wrapper');
            noLoop();
            setSeed(params.seed);
            setupControls();
            loadPresets();
            regenerate();
        }

        function updateCanvasSize() {
            const size = paperSizes[params.paperSize];
            const maxW = window.innerWidth - 400;
            const maxH = window.innerHeight - 40;
            const scale = Math.min(maxW / size.width, maxH / size.height, 1);
            canvasWidth = Math.floor(size.width * scale);
            canvasHeight = Math.floor(size.height * scale);
        }

        function windowResized() {
            updateCanvasSize();
            resizeCanvas(canvasWidth, canvasHeight);
            regenerate();
        }

        function draw() {
            background(params.bgColor);
            paths = [];
            points = [];

            switch (params.mode) {
                case 'astronomy': drawAstronomy(); break;
                case 'coral': drawCoral(); break;
                case 'crystal': drawCrystal(); break;
                case 'dla': drawDLA(); break;
                case 'differential': drawDifferential(); break;
                case 'lightning': drawLightning(); break;
                case 'phyllotaxis': drawPhyllotaxis(); break;
                case 'space': drawSpaceColonization(); break;
            }

            if (params.plotterOptimized && paths.length > 0) {
                drawPathsOptimized();
            }

            if (params.showConnections && points.length > 0) {
                drawConnections();
            }

            if (params.showGrid) {
                drawGrid();
            }
        }

        // ==========================================
        // Grid Overlay
        // ==========================================
        function drawGrid() {
            push();
            stroke(red(params.strokeColor), green(params.strokeColor), blue(params.strokeColor), 30);
            strokeWeight(0.5);
            const step = 40 * params.scale;
            for (let x = 0; x < width; x += step) {
                line(x, 0, x, height);
            }
            for (let y = 0; y < height; y += step) {
                line(0, y, width, y);
            }
            pop();
        }

        // ==========================================
        // Astronomy: Star Map
        // ==========================================
        function drawAstronomy() {
            const cx = width / 2;
            const cy = height / 2;
            const radius = Math.min(width, height) * 0.45 * params.scale;

            // Generate stars
            const starCount = params.density;
            for (let i = 0; i < starCount; i++) {
                const angle = seedRandom() * TWO_PI;
                const dist = Math.sqrt(seedRandom()) * radius;
                const x = cx + Math.cos(angle) * dist;
                const y = cy + Math.sin(angle) * dist;
                const mag = seedRandom() * 6;
                const size = (1 + (6 - mag) / 6) * params.scale;

                // Add organic displacement
                const orgX = x + (noise(x * 0.01, y * 0.01) - 0.5) * params.organic * 50;
                const orgY = y + (noise(x * 0.01 + 100, y * 0.01) - 0.5) * params.organic * 50;

                points.push({ x: orgX, y: orgY, size: size, mag: mag });

                if (!params.plotterOptimized) {
                    fill(params.strokeColor);
                    noStroke();
                    ellipse(orgX, orgY, size, size);

                    // Bright stars get rays
                    if (mag < 2) {
                        stroke(red(params.strokeColor), green(params.strokeColor), blue(params.strokeColor), 80);
                        strokeWeight(0.5);
                        const ray = size * 3;
                        for (let r = 0; r < 4; r++) {
                            const a = r * PI / 2;
                            line(orgX + Math.cos(a) * size, orgY + Math.sin(a) * size,
                                 orgX + Math.cos(a) * ray, orgY + Math.sin(a) * ray);
                        }
                    }
                } else {
                    // Plotter: circles as small paths
                    const path = [];
                    const segments = Math.max(8, Math.floor(size * 4));
                    for (let s = 0; s <= segments; s++) {
                        const a = (s / segments) * TWO_PI;
                        path.push({
                            x: orgX + Math.cos(a) * size / 2,
                            y: orgY + Math.sin(a) * size / 2
                        });
                    }
                    paths.push(path);
                }
            }

            // Constellation connections
            if (params.showConnections && points.length > 0) {
                const connectDist = 60 * params.scale;
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < connectDist && points[i].mag < 3 && points[j].mag < 3) {
                            if (seedRandom() < 0.3) {
                                stroke(params.accentColor);
                                strokeWeight(0.5);
                                line(points[i].x, points[i].y, points[j].x, points[j].y);
                            }
                        }
                    }
                }
            }

            // Altitude circles
            if (!params.plotterOptimized) {
                noFill();
                stroke(red(params.strokeColor), green(params.strokeColor), blue(params.strokeColor), 20);
                strokeWeight(0.5);
                for (let alt = 0; alt <= 90; alt += 15) {
                    const r = radius * (1 - alt / 90);
                    ellipse(cx, cy, r * 2, r * 2);
                }
            }
        }

        // ==========================================
        // Coral Growth: Branching
        // ==========================================
        function drawCoral() {
            const startX = width / 2;
            const startY = height * 0.9;
            const branchLen = 60 * params.scale;

            function branch(x, y, angle, depth, len) {
                if (depth > params.iterations) return;

                const endX = x + Math.cos(angle) * len;
                const endY = y + Math.sin(angle) * len;

                const path = [{ x, y }, { x: endX, y: endY }];
                paths.push(path);

                const n = noise(x * 0.01, depth * 0.1);
                const numBranches = Math.floor(2 + n * 2 * params.chaos);
                const angleSpread = radians(params.branchAngle);

                for (let i = 0; i < numBranches; i++) {
                    const newAngle = angle + (i - (numBranches - 1) / 2) * angleSpread + (seedRandom() - 0.5) * params.organic;
                    const newLen = len * (0.6 + seedRandom() * 0.3);
                    branch(endX, endY, newAngle, depth + 1, newLen);
                }
            }

            branch(startX, startY, -PI / 2, 0, branchLen);

            // Apply symmetry
            if (params.symmetry > 0) {
                applySymmetry(paths);
            }
        }

        // ==========================================
        // Crystal Growth: Faceted
        // ==========================================
        function drawCrystal() {
            const cx = width / 2;
            const cy = height / 2;
            const baseRadius = Math.min(width, height) * 0.3 * params.scale;

            const numCrystals = Math.floor(params.density / 50);
            for (let i = 0; i < numCrystals; i++) {
                const angle = (i / numCrystals) * TWO_PI;
                const dist = baseRadius * (0.3 + seedRandom() * 0.7);
                const x = cx + Math.cos(angle) * dist;
                const y = cy + Math.sin(angle) * dist;
                const size = 20 + seedRandom() * 60 * params.scale;
                const sides = 4 + Math.floor(seedRandom() * 5);

                const path = [];
                for (let s = 0; s <= sides; s++) {
                    const a = angle + (s / sides) * TWO_PI + seedRandom() * params.chaos * 0.5;
                    const r = size * (0.7 + seedRandom() * 0.3);
                    path.push({ x: x + Math.cos(a) * r, y: y + Math.sin(a) * r });
                }
                paths.push(path);

                // Inner facets
                if (seedRandom() < 0.5) {
                    const innerPath = [];
                    for (let s = 0; s <= sides; s++) {
                        const a = angle + (s / sides) * TWO_PI;
                        const r = size * 0.4;
                        innerPath.push({ x: x + Math.cos(a) * r, y: y + Math.sin(a) * r });
                    }
                    paths.push(innerPath);
                }
            }

            if (params.symmetry > 0) {
                applySymmetry(paths);
            }
        }

        // ==========================================
        // DLA: Diffusion Limited Aggregation
        // ==========================================
        function drawDLA() {
            const cx = width / 2;
            const cy = height / 2;
            const maxRadius = Math.min(width, height) * 0.45 * params.scale;
            let cluster = [{ x: cx, y: cy }];
            let walkers = [];

            // Spawn walkers
            const walkerCount = params.density;
            for (let i = 0; i < walkerCount; i++) {
                const angle = seedRandom() * TWO_PI;
                const r = maxRadius * (0.5 + seedRandom() * 0.5);
                walkers.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r,
                    stuck: false
                });
            }

            // Simple aggregation
            const stepSize = 3 * params.scale;
            const stickDist = 5 * params.scale;
            const maxSteps = 100;

            for (let step = 0; step < maxSteps; step++) {
                walkers.forEach(w => {
                    if (w.stuck) return;
                    w.x += (seedRandom() - 0.5) * stepSize * 2;
                    w.y += (seedRandom() - 0.5) * stepSize * 2;

                    // Check stick
                    for (let c of cluster) {
                        const dx = w.x - c.x;
                        const dy = w.y - c.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < stickDist) {
                            w.stuck = true;
                            cluster.push({ x: w.x, y: w.y });
                            break;
                        }
                    }

                    // Keep in bounds
                    const dcx = w.x - cx;
                    const dcy = w.y - cy;
                    if (Math.sqrt(dcx * dcx + dcy * dcy) > maxRadius) {
                        const angle = Math.atan2(dcy, dcx);
                        w.x = cx + Math.cos(angle) * maxRadius * 0.9;
                        w.y = cy + Math.sin(angle) * maxRadius * 0.9;
                    }
                });
            }

            // Draw cluster
            cluster.forEach((p, i) => {
                if (i === 0) return;
                const nearest = cluster.slice(0, i).reduce((best, c) => {
                    const d = Math.sqrt((p.x - c.x) ** 2 + (p.y - c.y) ** 2);
                    return d < best.dist ? { dist: d, point: c } : best;
                }, { dist: Infinity });

                if (nearest.dist < stickDist * 3) {
                    paths.push([{ x: p.x, y: p.y }, { x: nearest.point.x, y: nearest.point.y }]);
                }
            });

            if (params.symmetry > 0) {
                applySymmetry(paths);
            }
        }

        // ==========================================
        // Differential Growth: Edge expansion
        // ==========================================
        function drawDifferential() {
            const cx = width / 2;
            const cy = height / 2;
            const radius = Math.min(width, height) * 0.25 * params.scale;
            let vertices = [];
            const numPoints = params.density;

            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * TWO_PI;
                const r = radius + (noise(Math.cos(angle) * 2, Math.sin(angle) * 2) - 0.5) * radius * params.chaos;
                vertices.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r
                });
            }

            // Growth iterations
            for (let iter = 0; iter < params.iterations; iter++) {
                const newVertices = [];
                for (let i = 0; i < vertices.length; i++) {
                    const v = vertices[i];
                    const prev = vertices[(i - 1 + vertices.length) % vertices.length];
                    const next = vertices[(i + 1) % vertices.length];

                    // Edge repulsion
                    const dx = next.x - prev.x;
                    const dy = next.y - prev.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);

                    const push = (noise(v.x * 0.02, v.y * 0.02 + iter) - 0.5) * params.organic * 10;
                    newVertices.push({
                        x: v.x + Math.cos(angle + PI / 2) * push,
                        y: v.y + Math.sin(angle + PI / 2) * push
                    });
                }
                vertices = newVertices;
            }

            // Draw as connected path
            const path = vertices.map(v => ({ x: v.x, y: v.y }));
            path.push({ x: vertices[0].x, y: vertices[0].y }); // Close
            paths.push(path);

            if (params.symmetry > 0) {
                applySymmetry(paths);
            }
        }

        // ==========================================
        // Lightning: Recursive branching
        // ==========================================
        function drawLightning() {
            const startX = width / 2;
            const startY = height * 0.1;

            function bolt(x, y, angle, depth, len) {
                if (depth > params.iterations) return;

                const segments = 4 + Math.floor(seedRandom() * 4);
                let cx = x, cy = y;
                const path = [{ x: cx, y: cy }];

                for (let i = 0; i < segments; i++) {
                    const segLen = len / segments;
                    const deviation = (seedRandom() - 0.5) * segLen * 2 * params.chaos;
                    cx += Math.cos(angle) * segLen + deviation;
                    cy += Math.sin(angle) * segLen + (seedRandom() - 0.5) * segLen * 0.5;
                    path.push({ x: cx, y: cy });
                }
                paths.push(path);

                // Branch
                if (depth < params.iterations && seedRandom() < 0.7) {
                    const branchAngle = angle + (seedRandom() - 0.5) * radians(params.branchAngle) * 2;
                    bolt(cx, cy, branchAngle, depth + 1, len * 0.7);
                }
                if (depth < params.iterations && seedRandom() < 0.4) {
                    const branchAngle = angle + (seedRandom() - 0.5) * radians(params.branchAngle) * 2;
                    bolt(cx, cy, branchAngle, depth + 1, len * 0.6);
                }
            }

            bolt(startX, startY, PI / 2, 0, height * 0.7 * params.scale);

            if (params.symmetry > 0) {
                applySymmetry(paths);
            }
        }

        // ==========================================
        // Phyllotaxis: Golden angle spiral
        // ==========================================
        function drawPhyllotaxis() {
            const cx = width / 2;
            const cy = height / 2;
            const goldenAngle = 137.5077640500378546463487;
            const angleRad = radians(goldenAngle + params.branchAngle - 25);
            const scale = params.scale * 8;
            const count = params.density;

            const path = [];
            for (let i = 0; i < count; i++) {
                const r = scale * Math.sqrt(i);
                const theta = i * angleRad;
                const x = cx + Math.cos(theta) * r;
                const y = cy + Math.sin(theta) * r;
                const size = params.scale * (2 + Math.sqrt(i) * 0.05);

                if (params.plotterOptimized) {
                    const circlePath = [];
                    const segs = Math.max(6, Math.floor(size * 3));
                    for (let s = 0; s <= segs; s++) {
                        const a = (s / segs) * TWO_PI;
                        circlePath.push({ x: x + Math.cos(a) * size, y: y + Math.sin(a) * size });
                    }
                    paths.push(circlePath);
                } else {
                    fill(params.strokeColor);
                    noStroke();
                    ellipse(x, y, size * 2, size * 2);
                }

                points.push({ x, y, size });
            }

            if (params.showConnections && !params.plotterOptimized) {
                stroke(params.accentColor);
                strokeWeight(0.3);
                for (let i = 1; i < points.length; i++) {
                    if (seedRandom() < 0.05) {
                        const j = Math.floor(seedRandom() * i);
                        line(points[i].x, points[i].y, points[j].x, points[j].y);
                    }
                }
            }

            if (params.symmetry > 0) {
                applySymmetry(paths);
            }
        }

        // ==========================================
        // Space Colonization: Branching to attractors
        // ==========================================
        function drawSpaceColonization() {
            const cx = width / 2;
            const cy = height / 2;
            const radius = Math.min(width, height) * 0.4 * params.scale;

            // Generate attractors
            const attractors = [];
            const numAttractors = params.density;
            for (let i = 0; i < numAttractors; i++) {
                const angle = seedRandom() * TWO_PI;
                const r = Math.sqrt(seedRandom()) * radius;
                attractors.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r,
                    reached: false
                });
            }

            // Tree nodes
            let nodes = [{
                x: cx,
                y: height * 0.9,
                parent: null,
                dir: { x: 0, y: -1 }
            }];

            const growthDist = 15 * params.scale;
            const attractDist = 80 * params.scale;
            const maxIter = params.iterations * 10;

            for (let iter = 0; iter < maxIter && nodes.length < numAttractors * 2; iter++) {
                // Map attractors to nearest nodes
                attractors.forEach(a => {
                    if (a.reached) return;
                    let nearest = null;
                    let minDist = Infinity;
                    nodes.forEach(n => {
                        const dx = a.x - n.x;
                        const dy = a.y - n.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < minDist && d < attractDist) {
                            minDist = d;
                            nearest = n;
                        }
                    });

                    if (nearest) {
                        const dx = a.x - nearest.x;
                        const dy = a.y - nearest.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        nearest.dir.x += dx / dist;
                        nearest.dir.y += dy / dist;
                    }
                });

                // Grow nodes
                const newNodes = [];
                nodes.forEach(n => {
                    const dirLen = Math.sqrt(n.dir.x * n.dir.x + n.dir.y * n.dir.y);
                    if (dirLen > 0.1) {
                        const nx = n.x + (n.dir.x / dirLen) * growthDist;
                        const ny = n.y + (n.dir.y / dirLen) * growthDist;
                        newNodes.push({
                            x: nx,
                            y: ny,
                            parent: n,
                            dir: { x: n.dir.x * 0.3, y: n.dir.y * 0.3 }
                        });
                    }
                    n.dir.x = 0;
                    n.dir.y = 0;
                });

                nodes = nodes.concat(newNodes);

                // Check reached
                attractors.forEach(a => {
                    if (a.reached) return;
                    nodes.forEach(n => {
                        const d = Math.sqrt((a.x - n.x) ** 2 + (a.y - n.y) ** 2);
                        if (d < growthDist) a.reached = true;
                    });
                });
            }

            // Draw paths
            nodes.forEach(n => {
                if (n.parent) {
                    paths.push([{ x: n.x, y: n.y }, { x: n.parent.x, y: n.parent.y }]);
                }
            });

            if (params.symmetry > 0) {
                applySymmetry(paths);
            }
        }

        // ==========================================
        // Symmetry helper
        // ==========================================
        function applySymmetry(pathList) {
            const cx = width / 2;
            const cy = height / 2;
            const n = params.symmetry;
            const originalPaths = [...pathList];

            for (let i = 1; i < n; i++) {
                const angle = (i / n) * TWO_PI;
                const cosA = Math.cos(angle);
                const sinA = Math.sin(angle);

                originalPaths.forEach(path => {
                    const newPath = path.map(p => {
                        const dx = p.x - cx;
                        const dy = p.y - cy;
                        return {
                            x: cx + dx * cosA - dy * sinA,
                            y: cy + dx * sinA + dy * cosA
                        };
                    });
                    pathList.push(newPath);
                });
            }
        }

        // ==========================================
        // Plotter Optimized Path Drawing
        // ==========================================
        function drawPathsOptimized() {
            stroke(params.strokeColor);
            strokeWeight(1);
            noFill();

            paths.forEach(path => {
                if (path.length < 2) return;
                beginShape();
                path.forEach(p => vertex(p.x, p.y));
                endShape();
            });
        }

        // ==========================================
        // Connections
        // ==========================================
        function drawConnections() {
            if (points.length < 2) return;
            stroke(params.accentColor);
            strokeWeight(0.5);
            const connectDist = 50 * params.scale;

            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const dx = points[i].x - points[j].x;
                    const dy = points[i].y - points[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectDist && seedRandom() < 0.1) {
                        line(points[i].x, points[i].y, points[j].x, points[j].y);
                    }
                }
            }
        }

        // ==========================================
        // Controls
        // ==========================================
        function setupControls() {
            const inputs = ['density', 'scale', 'chaos', 'branchAngle', 'iterations', 'organic', 'symmetry', 'noise'];
            inputs.forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.addEventListener('input', (e) => {
                        params[key] = parseFloat(e.target.value);
                        document.getElementById(key + '-val').textContent = params[key];
                        regenerate();
                    });
                }
            });

            const selects = ['mode', 'paperSize'];
            selects.forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.addEventListener('change', (e) => {
                        params[key] = e.target.value;
                        if (key === 'paperSize') {
                            updateCanvasSize();
                            resizeCanvas(canvasWidth, canvasHeight);
                        }
                        regenerate();
                    });
                }
            });

            const colors = ['bgColor', 'strokeColor', 'accentColor'];
            colors.forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.addEventListener('input', (e) => {
                        params[key] = e.target.value;
                        regenerate();
                    });
                }
            });

            const checkboxes = ['showGrid', 'showConnections', 'plotterOptimized'];
            checkboxes.forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.addEventListener('change', (e) => {
                        params[key] = e.target.checked;
                        regenerate();
                    });
                }
            });

            document.getElementById('regenerate').addEventListener('click', regenerate);
            document.getElementById('randomize').addEventListener('click', () => {
                setSeed(Math.floor(Math.random() * 1000000));
                params.density = 100 + Math.floor(seedRandom() * 1900);
                params.scale = 0.3 + seedRandom() * 2.7;
                params.chaos = seedRandom();
                params.branchAngle = 5 + Math.floor(seedRandom() * 85);
                params.iterations = 1 + Math.floor(seedRandom() * 11);
                params.organic = seedRandom();
                params.symmetry = Math.floor(seedRandom() * 8);
                params.noise = seedRandom();
                updateUI();
                regenerate();
            });

            document.getElementById('seed').addEventListener('change', (e) => {
                setSeed(parseInt(e.target.value) || Math.floor(Math.random() * 1000000));
                regenerate();
            });

            document.getElementById('exportSVG').addEventListener('click', exportSVG);
            document.getElementById('exportPNG').addEventListener('click', exportPNG);
            document.getElementById('exportPreset').addEventListener('click', exportPreset);
        }

        function updateUI() {
            const inputs = ['density', 'scale', 'chaos', 'branchAngle', 'iterations', 'organic', 'symmetry', 'noise'];
            inputs.forEach(key => {
                const el = document.getElementById(key);
                const val = document.getElementById(key + '-val');
                if (el) el.value = params[key];
                if (val) val.textContent = params[key];
            });
            document.getElementById('mode').value = params.mode;
            document.getElementById('paperSize').value = params.paperSize;
            document.getElementById('bgColor').value = params.bgColor;
            document.getElementById('strokeColor').value = params.strokeColor;
            document.getElementById('accentColor').value = params.accentColor;
            document.getElementById('showGrid').checked = params.showGrid;
            document.getElementById('showConnections').checked = params.showConnections;
            document.getElementById('plotterOptimized').checked = params.plotterOptimized;
        }

        function regenerate() {
            setSeed(params.seed);
            paths = [];
            points = [];
            redraw();
        }

        // ==========================================
        // Export
        // ==========================================
        function exportSVG() {
            const svg = generateSVG();
            TSExport.downloadSVG(svg, `natural-factory-${params.mode}`);
        }

        function exportPNG() {
            TSExport.downloadPNG(canvas, `natural-factory-${params.mode}`);
        }

        function generateSVG() {
            const size = paperSizes[params.paperSize];
            let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size.width} ${size.height}" width="${size.width}" height="${size.height}">\n`;
            svg += `<rect width="${size.width}" height="${size.height}" fill="${params.bgColor}"/>\n`;

            const sx = size.width / width;
            const sy = size.height / height;

            paths.forEach(path => {
                if (path.length < 2) return;
                const pts = path.map(p => `${p.x * sx},${p.y * sy}`).join(' ');
                svg += `<polyline points="${pts}" fill="none" stroke="${params.strokeColor}" stroke-width="1"/>\n`;
            });

            svg += '</svg>';
            return svg;
        }

        function exportPreset() {
            const preset = JSON.stringify(params, null, 2);
            navigator.clipboard.writeText(preset).then(() => {
                alert('Preset copied to clipboard');
            });
        }

        // ==========================================
        // Presets
        // ==========================================
        const storageKey = 'natural_factory_presets';
        let presets = {};

        function loadPresets() {
            try {
                const stored = localStorage.getItem(storageKey);
                presets = stored ? JSON.parse(stored) : {};
            } catch (e) {
                console.error('Failed to load presets:', e);
                presets = {};
            }
            updatePresetList();
        }

        function savePresets() {
            localStorage.setItem(storageKey, JSON.stringify(presets));
        }

        function updatePresetList() {
            const select = document.getElementById('preset-select');
            select.innerHTML = '<option value="">-- Select Preset --</option>';
            Object.keys(presets).sort().forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });
        }

        document.getElementById('save-preset').addEventListener('click', () => {
            const name = document.getElementById('preset-name').value.trim();
            if (name) {
                presets[name] = { ...params, timestamp: Date.now() };
                savePresets();
                updatePresetList();
                document.getElementById('preset-name').value = '';
            }
        });

        document.getElementById('load-preset').addEventListener('click', () => {
            const select = document.getElementById('preset-select');
            if (select.value && presets[select.value]) {
                Object.assign(params, presets[select.value]);
                updateUI();
                if (params.paperSize) {
                    updateCanvasSize();
                    resizeCanvas(canvasWidth, canvasHeight);
                }
                regenerate();
            }
        });

        document.getElementById('delete-preset').addEventListener('click', () => {
            const select = document.getElementById('preset-select');
            if (select.value && confirm(`Delete preset "${select.value}"?`)) {
                delete presets[select.value];
                savePresets();
                updatePresetList();
            }
        });
    </script>
</body>
