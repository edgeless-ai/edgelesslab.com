<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Lorenz Attractor - Pen Plotter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>

  <link rel="stylesheet" href="../../shared/algorithm.css">
</head>
<body>
  <div id="canvas-container"></div>

  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>
    <h3>Lorenz Attractor</h3>

    <div class="control-group">
      <label>Attractor Type:
        <select id="attractorType">
          <option value="lorenz">Lorenz</option>
          <option value="rossler">Rossler</option>
          <option value="thomas">Thomas</option>
          <option value="aizawa">Aizawa</option>
          <option value="halvorsen">Halvorsen</option>
        </select>
      </label>
      <p class="info-text" id="attractor-info">Classic butterfly chaos (1963)</p>
    </div>

    <div class="control-group">
      <label>Iterations: <span id="iterations-val">8000</span></label>
      <input type="range" id="iterations" min="1000" max="30000" value="8000" step="500">
    </div>

    <div class="control-group">
      <label>Time Step (dt): <span id="dt-val">0.005</span></label>
      <input type="range" id="dt" min="0.001" max="0.02" value="0.005" step="0.001">
    </div>

    <div class="control-group">
      <label>Scale: <span id="scale-val">10</span></label>
      <input type="range" id="scale" min="3" max="25" value="10" step="0.5">
    </div>

    <div class="control-group">
      <label>Rotation X: <span id="rotX-val">15</span> deg</label>
      <input type="range" id="rotX" min="-90" max="90" value="15">
    </div>

    <div class="control-group">
      <label>Rotation Z: <span id="rotZ-val">0</span> deg</label>
      <input type="range" id="rotZ" min="-180" max="180" value="0">
    </div>

    <div class="control-group">
      <label>Stroke Weight: <span id="strokeWeight-val">0.5</span></label>
      <input type="range" id="strokeWeight" min="0.2" max="2" value="0.5" step="0.1">
    </div>

    <div class="control-group">
      <label>
        <input type="checkbox" id="showAxes"> Show Axes
      </label>
    </div>

    <div class="control-group">
      <label>
        <input type="checkbox" id="multiPath" checked> Multi-Path Start
      </label>
    </div>

    <div class="control">
      <label>Seed: <span id="seed-display">-</span></label>
      <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
    </div>

    <div class="btn-row">
      <button class="primary" id="regenerateBtn">Regenerate</button>
    </div>

    <div class="btn-row">
      <button class="secondary" id="exportSVG">Export SVG</button>
      <button class="secondary" id="exportPNG">Export PNG</button>
    </div>

    <div class="btn-row">
      <button class="secondary" onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
    </div>

    <hr style="border-color: var(--ts-border-default); margin: 12px 0;">

    <div class="control-group">
      <label>Paper Size:
        <select id="paperSize">
          <option value="custom">Custom (800x800)</option>
          <option value="A5">A5 Portrait</option>
          <option value="A5L">A5 Landscape</option>
          <option value="A4">A4 Portrait</option>
          <option value="A4L">A4 Landscape</option>
          <option value="A3">A3 Portrait</option>
          <option value="A3L">A3 Landscape</option>
          <option value="letter">Letter Portrait</option>
          <option value="letterL">Letter Landscape</option>
          <option value="square">Square (800x800)</option>
        </select>
      </label>
    </div>

    <div class="control-group">
      <label>Background:
        <input type="color" id="bgColor" value="#ffffff">
      </label>
    </div>

    <div class="control-group">
      <label>Stroke Color:
        <input type="color" id="strokeColor" value="#000000">
      </label>
    </div>
    <div class="control">
      <button id="randomizeAll" class="ts-btn">Randomize Colors</button>
    </div>
  </div>

  <script src="../../shared/export-utils.js"></script>
  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
  <script src="../../shared/panel-controller.js"></script>
  <script src="../../shared/stats-display.js"></script>
  <script src="../../shared/url-state.js"></script>
  <script>
    const params = {
      attractorType: 'lorenz',
      iterations: 8000,
      dt: 0.005,
      scale: 12,
      rotX: 15,
      rotZ: 0,
      strokeWeight: 0.5,
      showAxes: false,
      multiPath: true,
      paperSize: 'custom',
      bgColor: '#ffffff',
      strokeColor: '#000000',
      seed: Math.floor(Math.random() * 1000000)
    };

    // URL state management
    const urlState = new TSUrlState({
      algorithmId: 'lorenz-attractor',
      schema: [
        { key: 'attractorType', type: 'enum', options: ['lorenz', 'rossler', 'thomas', 'aizawa', 'halvorsen'] },
        { key: 'iterations', type: 'int', bytes: 4 },
        { key: 'dt', type: 'float', bytes: 2, min: 0.001, max: 0.02 },
        { key: 'scale', type: 'float', bytes: 2, min: 3, max: 25 },
        { key: 'rotX', type: 'int', bytes: 2, min: -90, max: 90 },
        { key: 'rotZ', type: 'int', bytes: 2, min: -180, max: 180 },
        { key: 'strokeWeight', type: 'float', bytes: 2, min: 0.2, max: 2 },
        { key: 'showAxes', type: 'bool' },
        { key: 'multiPath', type: 'bool' },
        { key: 'bgColor', type: 'color' },
        { key: 'strokeColor', type: 'color' },
        { key: 'seed', type: 'int', bytes: 4 }
      ]
    });

    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
    }

    // Canvas controls for unified color handling
    const canvasControls = new TSCanvasControls();
    canvasControls.bind(params);

    const attractorInfo = {
      lorenz: 'Classic butterfly chaos (1963)',
      rossler: 'Spiral chaos, simpler dynamics',
      thomas: 'Cyclically symmetric attractor',
      aizawa: 'Torus-like strange attractor',
      halvorsen: 'Symmetric chaotic flow'
    };

    // Attractor parameters
    const attractorParams = {
      lorenz: { sigma: 10, rho: 28, beta: 8/3 },
      rossler: { a: 0.2, b: 0.2, c: 5.7 },
      thomas: { b: 0.208186 },
      aizawa: { a: 0.95, b: 0.7, c: 0.6, d: 3.5, e: 0.25, f: 0.1 },
      halvorsen: { a: 1.89 }
    };

    let canvas;
    let paths = [];
    let SIZE = 800;

    function setup() {
      canvas = createCanvas(SIZE, SIZE);
      canvas.parent('canvas-container');

      // Initialize UX components
      window.panelController = new TSPanelController().attach();
      window.statsDisplay = new TSStatsDisplay().attach();

      setupControls();
      canvasControls.setupRandomizeButton();
      generateAttractor();
    }

    function setupControls() {
      const rangeControls = ['iterations', 'dt', 'scale', 'rotX', 'rotZ', 'strokeWeight'];
      rangeControls.forEach(id => {
        const el = document.getElementById(id);
        const display = document.getElementById(`${id}-val`);
        el.addEventListener('input', () => {
          params[id] = parseFloat(el.value);
          display.textContent = el.value;
          generateAttractor();
        });
      });

      document.getElementById('attractorType').addEventListener('change', (e) => {
        params.attractorType = e.target.value;
        document.getElementById('attractor-info').textContent = attractorInfo[params.attractorType];
        generateAttractor();
      });

      document.getElementById('showAxes').addEventListener('change', (e) => {
        params.showAxes = e.target.checked;
        drawAttractor();
      });

      document.getElementById('multiPath').addEventListener('change', (e) => {
        params.multiPath = e.target.checked;
        generateAttractor();
      });

      document.getElementById('regenerateBtn').addEventListener('click', () => {
        // Randomize rotation and seed for visible change
        params.seed = Math.floor(Math.random() * 1000000);
        document.getElementById('seed-display').textContent = params.seed;
        document.getElementById('seed').value = params.seed;
        params.rotZ = Math.floor(Math.random() * 360) - 180;
        document.getElementById('rotZ').value = params.rotZ;
        document.getElementById('rotZ-val').textContent = params.rotZ;
        generateAttractor();
      });

      document.getElementById('exportSVG').addEventListener('click', () => {
        const svg = generateSVG();
        TSExport.downloadSVG(svg, `${params.attractorType}-attractor`);
      });

      document.getElementById('exportPNG').addEventListener('click', () => {
        TSExport.downloadPNG(canvas.canvas, `${params.attractorType}-attractor`);
      });

      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        const size = CanvasLayout.getSize(params.paperSize);
        SIZE = Math.max(size.width, size.height);
        resizeCanvas(size.width, size.height);
        generateAttractor();
      });

      document.getElementById('bgColor').addEventListener('change', (e) => {
        params.bgColor = e.target.value;
        drawAttractor();
      });

      document.getElementById('strokeColor').addEventListener('change', (e) => {
        params.strokeColor = e.target.value;
        drawAttractor();
      });

      // Seed control
      document.getElementById('seed-display').textContent = params.seed;
      document.getElementById('seed').value = params.seed;
      document.getElementById('seed').addEventListener('change', (e) => {
        params.seed = parseInt(e.target.value);
        document.getElementById('seed-display').textContent = params.seed;
        generateAttractor();
      });
    }

    function generateAttractor() {
      paths = [];

      // Initialize seed for reproducible randomness
      let _s = params.seed;
      const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

      // Add small random offset to starting points for visible regeneration
      const offset = () => (seededRandom() - 0.5) * 0.01;
      const startPoints = params.multiPath ? [
        { x: 0.1 + offset(), y: offset(), z: offset() },
        { x: 0.1 + offset(), y: 0.1 + offset(), z: offset() },
        { x: -0.1 + offset(), y: offset(), z: offset() }
      ] : [{ x: 0.1 + offset(), y: offset(), z: offset() }];

      for (const start of startPoints) {
        const path = computePath(start.x, start.y, start.z);
        paths.push(path);
      }

      // Update stats display
      const totalPoints = paths.reduce((sum, path) => sum + path.length, 0);
      const p = attractorParams[params.attractorType];

      if (window.statsDisplay) {
        window.statsDisplay.clear();
        window.statsDisplay.add('Attractor', params.attractorType);
        window.statsDisplay.add('Paths', startPoints.length);
        window.statsDisplay.add('Points', totalPoints);
        window.statsDisplay.add('Iterations', params.iterations);
        window.statsDisplay.add('Time Step', params.dt);

        // Add attractor-specific parameters
        if (params.attractorType === 'lorenz') {
          window.statsDisplay.add('σ (sigma)', p.sigma);
          window.statsDisplay.add('ρ (rho)', p.rho);
          window.statsDisplay.add('β (beta)', p.beta.toFixed(3));
        } else if (params.attractorType === 'rossler') {
          window.statsDisplay.add('a', p.a);
          window.statsDisplay.add('b', p.b);
          window.statsDisplay.add('c', p.c);
        } else if (params.attractorType === 'thomas') {
          window.statsDisplay.add('b', p.b);
        } else if (params.attractorType === 'aizawa') {
          window.statsDisplay.add('a', p.a);
          window.statsDisplay.add('b', p.b);
          window.statsDisplay.add('c', p.c);
          window.statsDisplay.add('d', p.d);
        } else if (params.attractorType === 'halvorsen') {
          window.statsDisplay.add('a', p.a);
        }

        window.statsDisplay.add('Rotation X', `${params.rotX}°`);
        window.statsDisplay.add('Rotation Z', `${params.rotZ}°`);
        window.statsDisplay.add('Scale', params.scale);
      }

      drawAttractor();
      urlState.replaceState(params);
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => { statusEl.textContent = 'Copy failed'; });
    }

    function computePath(x0, y0, z0) {
      const points = [];
      let x = x0, y = y0, z = z0;
      const dt = params.dt;
      const p = attractorParams[params.attractorType];

      for (let i = 0; i < params.iterations; i++) {
        let dx, dy, dz;

        switch (params.attractorType) {
          case 'lorenz':
            dx = p.sigma * (y - x);
            dy = x * (p.rho - z) - y;
            dz = x * y - p.beta * z;
            break;

          case 'rossler':
            dx = -y - z;
            dy = x + p.a * y;
            dz = p.b + z * (x - p.c);
            break;

          case 'thomas':
            dx = Math.sin(y) - p.b * x;
            dy = Math.sin(z) - p.b * y;
            dz = Math.sin(x) - p.b * z;
            break;

          case 'aizawa':
            dx = (z - p.b) * x - p.d * y;
            dy = p.d * x + (z - p.b) * y;
            dz = p.c + p.a * z - (z * z * z) / 3 - (x * x + y * y) * (1 + p.e * z) + p.f * z * x * x * x;
            break;

          case 'halvorsen':
            dx = -p.a * x - 4 * y - 4 * z - y * y;
            dy = -p.a * y - 4 * z - 4 * x - z * z;
            dz = -p.a * z - 4 * x - 4 * y - x * x;
            break;
        }

        x += dx * dt;
        y += dy * dt;
        z += dz * dt;

        points.push({ x, y, z });
      }

      return points;
    }

    function project3D(x, y, z) {
      // Apply rotations
      const radX = params.rotX * Math.PI / 180;
      const radZ = params.rotZ * Math.PI / 180;

      // Rotate around X axis
      let y1 = y * Math.cos(radX) - z * Math.sin(radX);
      let z1 = y * Math.sin(radX) + z * Math.cos(radX);

      // Rotate around Z axis
      let x2 = x * Math.cos(radZ) - y1 * Math.sin(radZ);
      let y2 = x * Math.sin(radZ) + y1 * Math.cos(radZ);

      // Scale and center (use canvas dimensions for non-square support)
      const scale = params.scale;
      return {
        x: width / 2 + x2 * scale,
        y: height / 2 - y2 * scale // Flip Y for screen coords
      };
    }

    function drawAttractor() {
      background(params.bgColor);
      stroke(params.strokeColor);
      strokeWeight(params.strokeWeight);
      noFill();

      // Draw axes if enabled
      if (params.showAxes) {
        strokeWeight(0.3);
        stroke(200, 0, 0);
        drawAxis(30, 0, 0);
        stroke(0, 200, 0);
        drawAxis(0, 30, 0);
        stroke(0, 0, 200);
        drawAxis(0, 0, 30);
        stroke(params.strokeColor);
        strokeWeight(params.strokeWeight);
      }

      // Draw attractor paths
      for (const path of paths) {
        beginShape();
        for (const p of path) {
          const proj = project3D(p.x, p.y, p.z);
          vertex(proj.x, proj.y);
        }
        endShape();
      }
    }

    function drawAxis(x, y, z) {
      const origin = project3D(0, 0, 0);
      const end = project3D(x, y, z);
      line(origin.x, origin.y, end.x, end.y);
    }

    function generateSVG() {
      const svgPaths = [];

      // Axes
      if (params.showAxes) {
        const colors = ['#CC0000', '#00CC00', '#0000CC'];
        const axes = [[30, 0, 0], [0, 30, 0], [0, 0, 30]];
        axes.forEach((axis, i) => {
          const origin = project3D(0, 0, 0);
          const end = project3D(axis[0], axis[1], axis[2]);
          svgPaths.push({
            d: `M ${origin.x} ${origin.y} L ${end.x} ${end.y}`,
            stroke: colors[i],
            strokeWidth: 0.3
          });
        });
      }

      // Attractor paths
      for (const path of paths) {
        const points = path.map(p => project3D(p.x, p.y, p.z));
        svgPaths.push({
          d: TSExport.pointsToPath(points, false),
          stroke: params.strokeColor
        });
      }

      const canvasSize = CanvasLayout.getSize(params.paperSize);
      return TSExport.createSVG(svgPaths, canvasSize.width, canvasSize.height, {
        backgroundColor: params.bgColor,
        strokeWidth: params.strokeWeight
      });
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js">
  // Auto-injected by harmonize.py
  function windowResized() {
    // Preserve canvas aspect ratio on window resize
    if (typeof resizeCanvas === 'function') {
      const container = document.querySelector('canvas')?.parentElement;
      if (container) {
        const w = container.clientWidth;
        resizeCanvas(w, w); // Square canvas default
      }
    }
  }

</script>
</body>
</html>
