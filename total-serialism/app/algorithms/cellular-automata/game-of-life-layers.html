<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Game of Life - Multi-Layer Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="../../shared/url-state.js"></script>

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    .value {
      font-weight: 600;
      color: var(--ts-accent-primary);
    }

    .control-group {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--ts-border-subtle);
    }

    .control-group:last-child {
      border-bottom: none;
    }

    .control-group h3 {
      margin: 0 0 12px 0;
      color: var(--ts-accent-primary);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control {
      margin-bottom: 12px;
    }

    .secondary {
      background: var(--ts-bg-active) !important;
    }

    .secondary:hover {
      background: var(--ts-bg-hover) !important;
    }

    .preset-btn {
      background: var(--ts-accent-secondary) !important;
    }

    .preset-btn:hover {
      background: color-mix(in srgb, var(--ts-accent-secondary) 85%, white) !important;
    }

    .export-btn {
      background: var(--ts-accent-tertiary) !important;
    }

    .export-btn:hover {
      background: color-mix(in srgb, var(--ts-accent-tertiary) 85%, white) !important;
    }

    #generation {
      text-align: center;
      font-size: 18px;
      color: var(--ts-accent-primary);
      margin: 10px 0;
      padding: 10px;
      background: var(--ts-bg-deep);
      border-radius: var(--ts-radius-md);
    }

    .layer-control {
      background: var(--ts-bg-deep);
      padding: 10px;
      margin: 5px 0;
      border-radius: var(--ts-radius-md);
    }

    .layer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .layer-name {
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .color-box {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      border: 1px solid var(--ts-border-default);
      display: inline-block;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-container label {
      margin-bottom: 0;
    }

    .checkbox-container input[type="checkbox"] {
      width: auto;
    }

    input[type="color"] {
      width: 50px;
      height: 30px;
      border: none;
      cursor: pointer;
    }

    .rule-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .rule-input {
      display: flex;
      align-items: center;
      font-size: 12px;
    }

    .rule-input input {
      width: 50px;
      margin-left: 5px;
      padding: 2px;
      background: var(--ts-bg-control);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-sm);
    }

    #layer-preview {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: var(--ts-radius-md);
    }

    .preview-item {
      display: flex;
      align-items: center;
      margin: 5px 0;
      font-size: 12px;
    }

    #gif-status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ts-text-muted);
    }

    .drawing-instructions {
      font-size: 12px;
      color: var(--ts-text-muted);
      margin-top: 10px;
      padding: 10px;
      background: var(--ts-bg-deep);
      border-radius: var(--ts-radius-md);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="layer-preview"></div>
  </div>
  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Gallery</a>
    <h2>Multi-Layer Life</h2>

    <div id="generation">Generation: 0</div>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="A4_landscape">A4 Landscape</option>
          <option value="A4_portrait">A4 Portrait</option>
          <option value="A3_landscape">A3 Landscape</option>
          <option value="A3_portrait">A3 Portrait</option>
          <option value="letter_landscape">US Letter Landscape</option>
          <option value="letter_portrait">US Letter Portrait</option>
          <option value="square_medium">Square Medium</option>
          <option value="square_large">Square Large</option>
          <option value="custom" selected>Custom (800x600px)</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Simulation</h3>
      <button id="play-pause">Play</button>
      <button id="step" class="secondary">Step Forward</button>
      <button id="reset" class="secondary">Reset</button>
      <button id="clear" class="secondary">Clear All Layers</button>
    </div>

    <div class="control-group">
      <h3>Drawing</h3>
      <div class="control">
        <label>Draw on Layer:</label>
        <select id="draw-layer-select">
          <!-- Options will be populated dynamically -->
        </select>
      </div>
      <div class="drawing-instructions">
        Left click: Draw cells<br>
        Right click: Erase cells<br>
        Number keys 1-4: Quick layer select
      </div>
    </div>

    <div class="control-group">
      <h3>Grid Settings</h3>
      <div class="control">
        <label>Grid Size: <span class="value" id="gridSize-val">50</span></label>
        <input type="range" id="gridSize" min="20" max="150" value="50">
      </div>
      <div class="control">
        <label>Cell Size: <span class="value" id="cellSize-val">10</span>px</label>
        <input type="range" id="cellSize" min="3" max="20" value="10">
      </div>
      <div class="control">
        <label>Speed: <span class="value" id="speed-val">5</span> fps</label>
        <input type="range" id="speed" min="1" max="30" value="5">
      </div>
    </div>

    <div class="control-group">
      <h3>Layers</h3>
      <div id="layers-container"></div>
      <button onclick="addLayer()" class="secondary">+ Add Layer</button>
    </div>

    <div class="control-group">
      <h3>Presets</h3>
      <button class="preset-btn" onclick="loadPreset('twoSpecies')">Two Species Competition</button>
      <button class="preset-btn" onclick="loadPreset('threeLayer')">Three Layer Ecosystem</button>
      <button class="preset-btn" onclick="loadPreset('rainbow')">Rainbow Cascade</button>
      <button class="preset-btn" onclick="loadPreset('lifeWar')">Life War (4 Teams)</button>
      <div class="control">
        <label>Seed: <span id="seed-display" class="value">-</span></label>
        <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
      </div>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
    </div>

    <div class="control-group">
      <h3>Export Options</h3>
      <button class="export-btn" onclick="exportAllLayers()">Export All Layers (ZIP)</button>
      <button class="export-btn" onclick="exportCombined()">Export Combined SVG</button>
      <button class="export-btn" onclick="exportLayersSeparately()">Export Each Layer</button>
      <button class="export-btn" onclick="exportGIF()">Export as GIF</button>
      <div class="control checkbox-container">
        <input type="checkbox" id="includeRegistration" checked>
        <label for="includeRegistration">Include Registration Marks</label>
      </div>
      <div id="gif-status"></div>
    </div>
  </div>

  <script>
    // Multi-layer Game of Life
    let layers = [];
    let generation = 0;
    let isPlaying = false;
    let lastUpdate = 0;
    let gridSize = 50;
    let cellSize = 10;
    let speed = 5;
    let currentDrawLayer = 0; // Layer ID to draw on
    let seed = Math.floor(Math.random() * 1000000);

    // URL state management
    const urlState = new TSUrlState({
      algorithmId: 'game-of-life-layers',
      schema: [
        { key: 'seed', type: 'int', bytes: 4 },
        { key: 'gridSize', type: 'int', bytes: 1 },
        { key: 'cellSize', type: 'int', bytes: 1 },
        { key: 'speed', type: 'int', bytes: 1 }
      ]
    });

    // Load from URL if present
    if (window.location.search.includes('s=')) {
      const urlParams = urlState.fromUrl();
      if (urlParams.seed !== undefined) seed = urlParams.seed;
      if (urlParams.gridSize !== undefined) gridSize = urlParams.gridSize;
      if (urlParams.cellSize !== undefined) cellSize = urlParams.cellSize;
      if (urlParams.speed !== undefined) speed = urlParams.speed;
      // Update UI elements with loaded values
      document.getElementById('gridSize').value = gridSize;
      document.getElementById('gridSize-val').textContent = gridSize;
      document.getElementById('cellSize').value = cellSize;
      document.getElementById('cellSize-val').textContent = cellSize;
      document.getElementById('speed').value = speed;
      document.getElementById('speed-val').textContent = speed;
    }

    // Layer class
    class Layer {
      constructor(id, name, color, birthRules, survivalRules) {
        this.id = id;
        this.name = name;
        this.color = color;
        this.birthRules = birthRules;
        this.survivalRules = survivalRules;
        this.grid = [];
        this.nextGrid = [];
        this.visible = true;
        this.opacity = 1.0;
        this.interaction = 'independent'; // 'independent', 'competitive', 'cooperative'
        this.initializeGrid();
      }

      initializeGrid() {
        this.grid = [];
        this.nextGrid = [];
        for (let i = 0; i < gridSize; i++) {
          this.grid[i] = [];
          this.nextGrid[i] = [];
          for (let j = 0; j < gridSize; j++) {
            this.grid[i][j] = 0;
            this.nextGrid[i][j] = 0;
          }
        }
      }

      countNeighbors(x, y, includeOtherLayers = false) {
        let count = 0;
        for (let i = -1; i <= 1; i++) {
          for (let j = -1; j <= 1; j++) {
            if (i === 0 && j === 0) continue;

            let nx = (x + i + gridSize) % gridSize;
            let ny = (y + j + gridSize) % gridSize;

            count += this.grid[nx][ny];

            // Count cells from other layers if interaction enabled
            if (includeOtherLayers && this.interaction !== 'independent') {
              layers.forEach(layer => {
                if (layer.id !== this.id && layer.visible) {
                  if (this.interaction === 'competitive' && layer.grid[nx][ny]) {
                    count -= 0.5; // Other species inhibit growth
                  } else if (this.interaction === 'cooperative' && layer.grid[nx][ny]) {
                    count += 0.5; // Other species promote growth
                  }
                }
              });
            }
          }
        }
        return Math.floor(count);
      }

      step() {
        for (let i = 0; i < gridSize; i++) {
          for (let j = 0; j < gridSize; j++) {
            const neighbors = this.countNeighbors(i, j, true);

            if (this.grid[i][j] === 1) {
              // Check survival
              this.nextGrid[i][j] = this.survivalRules.includes(neighbors) ? 1 : 0;
            } else {
              // Check birth
              this.nextGrid[i][j] = this.birthRules.includes(neighbors) ? 1 : 0;

              // Prevent birth if another layer occupies the cell (competitive)
              if (this.interaction === 'competitive' && this.nextGrid[i][j] === 1) {
                for (let layer of layers) {
                  if (layer.id !== this.id && layer.grid[i][j] === 1) {
                    this.nextGrid[i][j] = 0;
                    break;
                  }
                }
              }
            }
          }
        }

        // Swap grids
        let temp = this.grid;
        this.grid = this.nextGrid;
        this.nextGrid = temp;
      }
    }

    function setup() {
      let canvas = createCanvas(800, 600);
      canvas.parent('canvas-container');

      setupControls();

      // Initialize with two default layers
      layers.push(new Layer(0, 'Species A', '#4CAF50', [3], [2, 3]));
      layers.push(new Layer(1, 'Species B', '#2196F3', [3], [2, 3]));

      updateLayerControls();
      updateLayerPreview();
      updateDrawLayerSelect();

      // Load first preset
      loadPreset('twoSpecies');
    }

    function setupControls() {
      // Play/Pause
      document.getElementById('play-pause').addEventListener('click', () => {
        isPlaying = !isPlaying;
        document.getElementById('play-pause').textContent = isPlaying ? 'Pause' : 'Play';
      });

      // Step
      document.getElementById('step').addEventListener('click', () => {
        stepSimulation();
      });

      // Reset
      document.getElementById('reset').addEventListener('click', () => {
        generation = 0;
        updateGenerationDisplay();
        layers.forEach(layer => layer.initializeGrid());
      });

      // Clear
      document.getElementById('clear').addEventListener('click', () => {
        layers.forEach(layer => layer.initializeGrid());
        generation = 0;
        updateGenerationDisplay();
      });

      // Grid controls
      document.getElementById('gridSize').addEventListener('input', (e) => {
        gridSize = parseInt(e.target.value);
        document.getElementById('gridSize-val').textContent = gridSize;
        layers.forEach(layer => layer.initializeGrid());
      });

      document.getElementById('cellSize').addEventListener('input', (e) => {
        cellSize = parseInt(e.target.value);
        document.getElementById('cellSize-val').textContent = cellSize;
      });

      document.getElementById('speed').addEventListener('input', (e) => {
        speed = parseInt(e.target.value);
        document.getElementById('speed-val').textContent = speed;
      });

      // Draw layer select
      document.getElementById('draw-layer-select').addEventListener('change', (e) => {
        currentDrawLayer = parseInt(e.target.value);
      });

      // Seed control
      document.getElementById('seed').addEventListener('change', (e) => {
        seed = parseInt(e.target.value);
        loadPreset('twoSpecies');
      });
    }

    function draw() {
      background(30);

      // Update simulation
      if (isPlaying && millis() - lastUpdate > 1000 / speed) {
        stepSimulation();
        lastUpdate = millis();
      }

      // Calculate drawing parameters
      const offsetX = (width - gridSize * cellSize) / 2;
      const offsetY = (height - gridSize * cellSize) / 2;

      // Draw grid
      stroke(50);
      strokeWeight(0.5);
      for (let i = 0; i <= gridSize; i++) {
        line(offsetX + i * cellSize, offsetY,
             offsetX + i * cellSize, offsetY + gridSize * cellSize);
        line(offsetX, offsetY + i * cellSize,
             offsetX + gridSize * cellSize, offsetY + i * cellSize);
      }

      // Draw layers
      layers.forEach(layer => {
        if (!layer.visible) return;

        const c = color(layer.color);
        c.setAlpha(layer.opacity * 255);
        fill(c);
        noStroke();

        for (let i = 0; i < gridSize; i++) {
          for (let j = 0; j < gridSize; j++) {
            if (layer.grid[i][j] === 1) {
              const x = offsetX + i * cellSize;
              const y = offsetY + j * cellSize;
              rect(x, y, cellSize, cellSize);
            }
          }
        }
      });

      // Draw layer indicator
      drawLayerIndicator(offsetX, offsetY);
    }

    function stepSimulation() {
      layers.forEach(layer => layer.step());
      generation++;
      updateGenerationDisplay();
    }

    // Mouse interaction functions
    function mousePressed() {
      drawCell();
    }

    function mouseDragged() {
      drawCell();
    }

    function drawCell() {
      const offsetX = (width - gridSize * cellSize) / 2;
      const offsetY = (height - gridSize * cellSize) / 2;
      const gridX = Math.floor((mouseX - offsetX) / cellSize);
      const gridY = Math.floor((mouseY - offsetY) / cellSize);

      if (gridX >= 0 && gridX < gridSize && gridY >= 0 && gridY < gridSize) {
        const layer = layers.find(l => l.id === currentDrawLayer);
        if (layer) {
          layer.grid[gridX][gridY] = mouseButton === LEFT ? 1 : 0;
        }
      }
    }

    function keyPressed() {
      // Number keys 1-4 for quick layer selection
      if (key >= '1' && key <= '4') {
        const layerIndex = parseInt(key) - 1;
        if (layerIndex < layers.length) {
          currentDrawLayer = layers[layerIndex].id;
          updateDrawLayerSelect();
        }
      }
    }

    function drawLayerIndicator(offsetX, offsetY) {
      const layer = layers.find(l => l.id === currentDrawLayer);
      if (!layer) return;

      // Draw border around grid to show active layer
      push();
      stroke(layer.color);
      strokeWeight(3);
      noFill();
      rect(offsetX - 2, offsetY - 2, gridSize * cellSize + 4, gridSize * cellSize + 4);

      // Draw layer info
      fill(layer.color);
      noStroke();
      textAlign(LEFT, TOP);
      textSize(14);
      text(`Drawing on: ${layer.name}`, offsetX, offsetY - 20);
      pop();
    }

    function updateDrawLayerSelect() {
      const select = document.getElementById('draw-layer-select');
      select.innerHTML = '';

      layers.forEach(layer => {
        const option = document.createElement('option');
        option.value = layer.id;
        option.textContent = layer.name;
        option.style.color = layer.color;
        if (layer.id === currentDrawLayer) {
          option.selected = true;
        }
        select.appendChild(option);
      });
    }

    function updateGenerationDisplay() {
      document.getElementById('generation').textContent = `Generation: ${generation}`;
    }

    function addLayer() {
      const id = layers.length;
      const colors = ['#FF6B6B', '#FFE66D', '#8E7CC3', '#FF8C94', '#98D8C8'];
      const layerColor = colors[id % colors.length];
      const layer = new Layer(id, `Layer ${id + 1}`, layerColor, [3], [2, 3]);
      layers.push(layer);
      updateLayerControls();
      updateLayerPreview();
      updateDrawLayerSelect();
    }

    function removeLayer(id) {
      layers = layers.filter(l => l.id !== id);
      // If we removed the current draw layer, select the first available
      if (!layers.find(l => l.id === currentDrawLayer) && layers.length > 0) {
        currentDrawLayer = layers[0].id;
      }
      updateLayerControls();
      updateLayerPreview();
      updateDrawLayerSelect();
    }

    function updateLayerControls() {
      const container = document.getElementById('layers-container');
      container.innerHTML = '';

      layers.forEach(layer => {
        const div = document.createElement('div');
        div.className = 'layer-control';
        div.innerHTML = `
          <div class="layer-header">
            <div class="layer-name">
              <span class="color-box" style="background: ${layer.color}"></span>
              <input type="text" value="${layer.name}" onchange="updateLayerName(${layer.id}, this.value)" style="background: var(--ts-bg-control); color: var(--ts-text-primary); border: 1px solid var(--ts-border-default); padding: 2px; border-radius: var(--ts-radius-sm);">
            </div>
            <div>
              <input type="checkbox" ${layer.visible ? 'checked' : ''} onchange="toggleLayerVisibility(${layer.id})">
              <input type="color" value="${layer.color}" onchange="updateLayerColor(${layer.id}, this.value)">
              <button onclick="removeLayer(${layer.id})" style="width: auto; padding: 5px 10px; margin: 0;">x</button>
            </div>
          </div>
          <div class="rule-inputs">
            <div class="rule-input">
              Birth: <input type="text" value="${layer.birthRules.join(',')}" onchange="updateBirthRules(${layer.id}, this.value)">
            </div>
            <div class="rule-input">
              Survive: <input type="text" value="${layer.survivalRules.join(',')}" onchange="updateSurvivalRules(${layer.id}, this.value)">
            </div>
          </div>
          <div style="margin-top: 10px;">
            <label style="font-size: 12px;">Interaction:</label>
            <select onchange="updateLayerInteraction(${layer.id}, this.value)" style="font-size: 12px; background: var(--ts-bg-control); color: var(--ts-text-primary); border: 1px solid var(--ts-border-default); border-radius: var(--ts-radius-sm);">
              <option value="independent" ${layer.interaction === 'independent' ? 'selected' : ''}>Independent</option>
              <option value="competitive" ${layer.interaction === 'competitive' ? 'selected' : ''}>Competitive</option>
              <option value="cooperative" ${layer.interaction === 'cooperative' ? 'selected' : ''}>Cooperative</option>
            </select>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function updateLayerPreview() {
      const preview = document.getElementById('layer-preview');
      preview.innerHTML = '<h4 style="margin: 0 0 10px 0; font-size: 14px; color: var(--ts-text-secondary);">Active Layers</h4>';

      layers.filter(l => l.visible).forEach(layer => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `
          <span class="color-box" style="background: ${layer.color}; width: 15px; height: 15px;"></span>
          <span>${layer.name}</span>
        `;
        preview.appendChild(div);
      });
    }

    // Layer update functions
    function updateLayerName(id, name) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.name = name;
      updateLayerPreview();
    }

    function updateLayerColor(id, newColor) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.color = newColor;
      updateLayerControls();
      updateLayerPreview();
    }

    function toggleLayerVisibility(id) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.visible = !layer.visible;
      updateLayerPreview();
    }

    function updateBirthRules(id, rulesStr) {
      const layer = layers.find(l => l.id === id);
      if (layer) {
        layer.birthRules = rulesStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
      }
    }

    function updateSurvivalRules(id, rulesStr) {
      const layer = layers.find(l => l.id === id);
      if (layer) {
        layer.survivalRules = rulesStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
      }
    }

    function updateLayerInteraction(id, interaction) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.interaction = interaction;
    }

    // Presets
    function loadPreset(name) {
      generation = 0;
      updateGenerationDisplay();

      // Initialize seed
      randomSeed(seed);
      noiseSeed(seed);

      switch (name) {
        case 'twoSpecies':
          layers = [
            new Layer(0, 'Predator', '#FF6B6B', [3], [2, 3]),
            new Layer(1, 'Prey', '#4CAF50', [3], [2, 3])
          ];
          layers[0].interaction = 'competitive';
          layers[1].interaction = 'competitive';

          // Random initial state
          for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
              if (random() < 0.2) layers[0].grid[i][j] = 1;
              else if (random() < 0.3) layers[1].grid[i][j] = 1;
            }
          }
          break;

        case 'threeLayer':
          layers = [
            new Layer(0, 'Red Colony', '#FF6B6B', [3], [2, 3]),
            new Layer(1, 'Green Colony', '#4CAF50', [3], [2, 3]),
            new Layer(2, 'Blue Colony', '#2196F3', [3], [2, 3])
          ];
          layers.forEach(l => l.interaction = 'competitive');

          // Three starting colonies
          const centers = [[15, 15], [35, 15], [25, 35]];
          centers.forEach((center, idx) => {
            for (let i = -3; i <= 3; i++) {
              for (let j = -3; j <= 3; j++) {
                if (random() < 0.5) {
                  const x = center[0] + i;
                  const y = center[1] + j;
                  if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) {
                    layers[idx].grid[x][y] = 1;
                  }
                }
              }
            }
          });
          break;

        case 'rainbow':
          layers = [];
          const rainbowColors = ['#FF0000', '#FF8800', '#FFFF00', '#00FF00', '#0088FF', '#8800FF'];
          rainbowColors.forEach((clr, idx) => {
            const layer = new Layer(idx, `Wave ${idx + 1}`, clr, [3], [2, 3]);
            layer.interaction = 'cooperative';
            layers.push(layer);
          });

          // Cascading start
          layers.forEach((layer, idx) => {
            const y = Math.floor(gridSize / 2);
            for (let x = idx * 8; x < idx * 8 + 5 && x < gridSize; x++) {
              layer.grid[x][y] = 1;
              if (y > 0) layer.grid[x][y-1] = 1;
              if (y < gridSize-1) layer.grid[x][y+1] = 1;
            }
          });
          break;

        case 'lifeWar':
          layers = [
            new Layer(0, 'North', '#FF6B6B', [3], [2, 3]),
            new Layer(1, 'South', '#4CAF50', [3], [2, 3]),
            new Layer(2, 'East', '#2196F3', [3], [2, 3]),
            new Layer(3, 'West', '#FFE66D', [3], [2, 3])
          ];
          layers.forEach(l => l.interaction = 'competitive');

          // Four corners start
          const corners = [
            [0, 0], [gridSize-10, gridSize-10],
            [gridSize-10, 0], [0, gridSize-10]
          ];
          corners.forEach((corner, idx) => {
            for (let i = 0; i < 10; i++) {
              for (let j = 0; j < 10; j++) {
                if (random() < 0.5) {
                  const x = corner[0] + i;
                  const y = corner[1] + j;
                  if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) {
                    layers[idx].grid[x][y] = 1;
                  }
                }
              }
            }
          });
          break;
      }

      // Set current draw layer to first layer
      if (layers.length > 0) {
        currentDrawLayer = layers[0].id;
      }

      // Update seed display
      document.getElementById('seed-display').textContent = seed;
      document.getElementById('seed').value = seed;

      // Update URL state
      urlState.replaceState({ seed, gridSize, cellSize, speed });

      updateLayerControls();
      updateLayerPreview();
      updateDrawLayerSelect();
    }

    // Export functions - using manual SVG generation for compatibility
    function buildSVGString(w, h, content) {
      return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <rect width="100%" height="100%" fill="white"/>
${content}
</svg>`;
    }

    function buildRegistrationMarks(w, h) {
      const marks = [];
      const size = 10;
      // Corner marks
      [[0, 0], [w - size, 0], [0, h - size], [w - size, h - size]].forEach(([x, y]) => {
        marks.push(`  <rect x="${x}" y="${y}" width="${size}" height="${size}" fill="none" stroke="black" stroke-width="0.5"/>`);
        marks.push(`  <line x1="${x}" y1="${y}" x2="${x + size}" y2="${y + size}" stroke="black" stroke-width="0.5"/>`);
        marks.push(`  <line x1="${x + size}" y1="${y}" x2="${x}" y2="${y + size}" stroke="black" stroke-width="0.5"/>`);
      });
      return marks.join('\n');
    }

    function downloadSVG(svgString, filename) {
      const blob = new Blob([svgString], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportLayersSeparately() {
      const w = gridSize * 10 + 40;
      const h = gridSize * 10 + 40;
      const includeReg = document.getElementById('includeRegistration').checked;

      layers.forEach(layer => {
        if (!layer.visible) return;

        const rects = [];

        // Draw cells
        for (let i = 0; i < gridSize; i++) {
          for (let j = 0; j < gridSize; j++) {
            if (layer.grid[i][j] === 1) {
              rects.push(`  <rect x="${20 + i * 10}" y="${20 + j * 10}" width="10" height="10" fill="black"/>`);
            }
          }
        }

        let content = '';
        if (includeReg) {
          content += buildRegistrationMarks(w, h) + '\n';
        }
        content += rects.join('\n');

        // Add metadata text
        content += `\n  <text x="20" y="${h - 5}" font-size="8" fill="black">Layer: ${layer.name}</text>`;
        content += `\n  <text x="100" y="${h - 5}" font-size="8" fill="black">Color: ${layer.color}</text>`;
        content += `\n  <text x="200" y="${h - 5}" font-size="8" fill="black">Gen: ${generation}</text>`;

        const svgString = buildSVGString(w, h, content);
        downloadSVG(svgString, `game-of-life-${layer.name.replace(/\s+/g, '-')}-gen${generation}.svg`);
      });
    }

    function exportCombined() {
      const w = gridSize * 10 + 40;
      const h = gridSize * 10 + 40;
      const includeReg = document.getElementById('includeRegistration').checked;

      let content = '';
      if (includeReg) {
        content += buildRegistrationMarks(w, h) + '\n';
      }

      // Draw each layer with its color
      layers.forEach(layer => {
        if (!layer.visible) return;

        for (let i = 0; i < gridSize; i++) {
          for (let j = 0; j < gridSize; j++) {
            if (layer.grid[i][j] === 1) {
              content += `  <rect x="${20 + i * 10}" y="${20 + j * 10}" width="10" height="10" fill="${layer.color}"/>\n`;
            }
          }
        }
      });

      const svgString = buildSVGString(w, h, content);
      downloadSVG(svgString, `game-of-life-combined-gen${generation}.svg`);
    }

    async function exportAllLayers() {
      const zip = new JSZip();
      const w = gridSize * 10 + 40;
      const h = gridSize * 10 + 40;
      const includeReg = document.getElementById('includeRegistration').checked;

      // Create manifest data
      const manifest = {
        timestamp: new Date().toISOString(),
        generation: generation,
        gridSize: gridSize,
        cellSize: cellSize,
        seed: seed,
        includeRegistrationMarks: includeReg,
        layers: []
      };

      // Export each visible layer as SVG
      layers.forEach((layer, index) => {
        if (!layer.visible) return;

        const rects = [];

        // Draw cells
        for (let i = 0; i < gridSize; i++) {
          for (let j = 0; j < gridSize; j++) {
            if (layer.grid[i][j] === 1) {
              rects.push(`  <rect x="${20 + i * 10}" y="${20 + j * 10}" width="10" height="10" fill="black"/>`);
            }
          }
        }

        let content = '';
        if (includeReg) {
          content += buildRegistrationMarks(w, h) + '\n';
        }
        content += rects.join('\n');

        // Add metadata text
        content += `\n  <text x="20" y="${h - 5}" font-size="8" fill="black">Layer: ${layer.name}</text>`;
        content += `\n  <text x="100" y="${h - 5}" font-size="8" fill="black">Color: ${layer.color}</text>`;
        content += `\n  <text x="200" y="${h - 5}" font-size="8" fill="black">Gen: ${generation}</text>`;

        const svgString = buildSVGString(w, h, content);

        // Add to ZIP with sanitized filename
        const sanitizedName = layer.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
        const filename = `layer-${index + 1}-${sanitizedName}.svg`;
        zip.file(filename, svgString);

        // Add layer metadata to manifest
        manifest.layers.push({
          index: index + 1,
          id: layer.id,
          name: layer.name,
          color: layer.color,
          birthRules: layer.birthRules,
          survivalRules: layer.survivalRules,
          interaction: layer.interaction,
          filename: filename
        });
      });

      // Add manifest.json to ZIP
      zip.file('manifest.json', JSON.stringify(manifest, null, 2));

      // Also include a combined SVG for reference
      let combinedContent = '';
      if (includeReg) {
        combinedContent += buildRegistrationMarks(w, h) + '\n';
      }

      layers.forEach(layer => {
        if (!layer.visible) return;

        for (let i = 0; i < gridSize; i++) {
          for (let j = 0; j < gridSize; j++) {
            if (layer.grid[i][j] === 1) {
              combinedContent += `  <rect x="${20 + i * 10}" y="${20 + j * 10}" width="10" height="10" fill="${layer.color}"/>\n`;
            }
          }
        }
      });

      const combinedSVG = buildSVGString(w, h, combinedContent);
      zip.file('combined-preview.svg', combinedSVG);

      // Generate and download ZIP
      try {
        const blob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `game-of-life-layers-gen${generation}.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (error) {
        console.error('Error generating ZIP:', error);
        alert('Failed to generate ZIP file. Please try again.');
      }
    }

    function drawRegistrationMarks(svg) {
      svg.stroke(0);
      svg.strokeWeight(1);
      svg.noFill();

      // Corner marks
      const marks = [
        [10, 10],
        [svg.width - 10, 10],
        [10, svg.height - 10],
        [svg.width - 10, svg.height - 10]
      ];

      marks.forEach(([x, y]) => {
        svg.line(x - 5, y, x + 5, y);
        svg.line(x, y - 5, x, y + 5);
        svg.circle(x, y, 8);
      });
    }

    function exportGIF() {
      const statusEl = document.getElementById('gif-status');
      statusEl.textContent = 'Preparing GIF export...';

      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: width,
        height: height,
        workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
      });

      // Store original state
      const originalPlaying = isPlaying;
      const originalGeneration = generation;
      const originalLayers = layers.map(layer => ({
        id: layer.id,
        name: layer.name,
        color: layer.color,
        birthRules: [...layer.birthRules],
        survivalRules: [...layer.survivalRules],
        visible: layer.visible,
        opacity: layer.opacity,
        interaction: layer.interaction,
        grid: layer.grid.map(row => [...row])
      }));

      isPlaying = false;

      // Reset all layers for animation
      loadPreset('twoSpecies');
      generation = 0;

      // Generate frames
      const totalFrames = 50;
      for (let frame = 0; frame < totalFrames; frame++) {
        statusEl.textContent = `Rendering frame ${frame + 1}/${totalFrames}...`;

        // Create offscreen canvas
        const offscreenCanvas = document.createElement('canvas');
        offscreenCanvas.width = width;
        offscreenCanvas.height = height;
        const ctx = offscreenCanvas.getContext('2d');

        // Calculate drawing parameters
        const offsetX = (width - gridSize * cellSize) / 2;
        const offsetY = (height - gridSize * cellSize) / 2;

        // Draw background
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(0, 0, width, height);

        // Draw grid
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= gridSize; i++) {
          ctx.beginPath();
          ctx.moveTo(offsetX + i * cellSize, offsetY);
          ctx.lineTo(offsetX + i * cellSize, offsetY + gridSize * cellSize);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(offsetX, offsetY + i * cellSize);
          ctx.lineTo(offsetX + gridSize * cellSize, offsetY + i * cellSize);
          ctx.stroke();
        }

        // Draw all visible layers
        layers.forEach(layer => {
          if (layer.visible) {
            ctx.fillStyle = layer.color;

            for (let i = 0; i < gridSize; i++) {
              for (let j = 0; j < gridSize; j++) {
                if (layer.grid[i][j] === 1) {
                  ctx.fillRect(offsetX + i * cellSize, offsetY + j * cellSize, cellSize, cellSize);
                }
              }
            }
          }
        });

        // Add frame
        gif.addFrame(ctx, {copy: true, delay: 100});

        // Update all layers for next frame
        if (frame < totalFrames - 1) {
          stepSimulation();
        }
      }

      // Restore original state
      layers = originalLayers.map(data => {
        const layer = new Layer(data.id, data.name, data.color, data.birthRules, data.survivalRules);
        layer.visible = data.visible;
        layer.opacity = data.opacity;
        layer.interaction = data.interaction;
        layer.grid = data.grid;
        return layer;
      });
      generation = originalGeneration;
      isPlaying = originalPlaying;
      updateGenerationDisplay();
      updateLayerControls();
      updateLayerPreview();
      updateDrawLayerSelect();

      statusEl.textContent = 'Encoding GIF...';

      gif.on('finished', function(blob) {
        statusEl.textContent = 'GIF export complete!';
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `game-of-life-layers.gif`;
        link.click();

        setTimeout(() => {
          statusEl.textContent = '';
        }, 3000);
      });

      gif.render();
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl({ seed, gridSize, cellSize, speed });
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => {
        statusEl.textContent = 'Copy failed';
      });
    }
  </script>
