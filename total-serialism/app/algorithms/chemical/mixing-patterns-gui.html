<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Mixing Patterns - Chemical Engineering Art</title>

    <!-- Total Serialism Design System -->
    <link rel="stylesheet" href="../../shared/algorithm.css">
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <div id="controls">
        <a href="../../index.html" class="back-link">&larr; Back to Index</a>
        <h2 style="margin: 0 0 var(--ts-space-lg) 0; color: var(--ts-accent-primary);">Mixing Patterns</h2>

        <h3>Canvas Settings</h3>
        <label>Paper Size:
            <select id="paperSize">
                <option value="square800">Square (800x800)</option>
                <option value="landscape800x600">Landscape (800x600)</option>
                <option value="a4portrait">A4 Portrait</option>
                <option value="a4landscape">A4 Landscape</option>
                <option value="a3portrait">A3 Portrait</option>
                <option value="a3landscape">A3 Landscape</option>
                <option value="letterportrait">Letter Portrait</option>
                <option value="letterlandscape">Letter Landscape</option>
            </select>
        </label>
        <label>Background: <input type="color" id="bgColor" value="#ffffff"></label>
        <label>Stroke Color: <input type="color" id="strokeColor" value="#000000"></label>
        <button id="randomizeAll" class="ts-btn">Randomize Colors</button>

        <h3>Mixer Type</h3>
        <select id="mixerType">
            <option value="single">Single Blade</option>
            <option value="double">Double Blade</option>
            <option value="rushton">Rushton Turbine</option>
            <option value="anchor">Anchor Mixer</option>
            <option value="helical">Helical Ribbon</option>
        </select>

        <h3>Fluid Properties</h3>
        <label>Viscosity Ratio: <span id="viscosityValue">2.0</span></label>
        <input type="range" id="viscosityRatio" min="0.1" max="10" step="0.1" value="2.0">

        <label>Reynolds Number: <span id="reynoldsValue">100</span></label>
        <input type="range" id="reynolds" min="1" max="1000" step="1" value="100">

        <label>Schmidt Number: <span id="schmidtValue">1000</span></label>
        <input type="range" id="schmidt" min="100" max="10000" step="100" value="1000">

        <h3>Mixing Parameters</h3>
        <label>Rotation Speed (RPM): <span id="speedValue">60</span></label>
        <input type="range" id="rotationSpeed" min="10" max="300" step="10" value="60">

        <label>Time Steps: <span id="stepsValue">1000</span></label>
        <input type="range" id="timeSteps" min="100" max="5000" step="100" value="1000">

        <label>Tracer Particles: <span id="particlesValue">500</span></label>
        <input type="range" id="particleCount" min="100" max="2000" step="50" value="500">

        <h3>Visualization</h3>
        <label>
            <input type="checkbox" id="showStreamlines" checked> Show Streamlines
        </label>
        <label>
            <input type="checkbox" id="showVorticity"> Show Vorticity
        </label>
        <label>
            <input type="checkbox" id="showMixingIndex"> Show Mixing Index
        </label>
        <label>
            <input type="checkbox" id="colorByAge" checked> Color by Residence Time
        </label>

        <div class="control">
          <label>Seed: <span id="seed-display">-</span></label>
          <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
        </div>

        <h3>Actions</h3>
        <button id="generateBtn">Generate Pattern</button>
        <button id="animateBtn">Animate Mixing</button>
        <button id="exportSVG">Export SVG</button>
        <button id="exportPNG">Export PNG</button>
        <button id="exportGIF">Export Animation GIF</button>
        <button onclick="copyShareUrl()">📋 Copy Share URL</button>
        <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
        <progress id="animationProgress" value="0" max="100" style="display: none; width: 100%; margin-top: 10px;"></progress>
        <div class="status" id="status" style="font-size: 12px; color: var(--ts-text-muted); margin-top: 10px;"></div>

        <!-- Preset Container at bottom -->
        <div id="preset-container" style="margin-top: var(--ts-space-lg);"></div>
    </div>

    <script src="../../shared/canvas-layout.js"></script>
    <script src="../../shared/canvas-controls.js"></script>
    <script src="../../shared/export-utils.js"></script>
    <script src="../../shared/panel-controller.js"></script>
    <script src="../../shared/stats-display.js"></script>
    <script src="../../shared/url-state.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script>
        const params = {
            paperSize: 'square800',
            bgColor: '#ffffff',
            strokeColor: '#000000',
            seed: Math.floor(Math.random() * 1000000)
        };

        // URL state configuration
        const urlState = new TSUrlState({
            algorithmId: 'mixing-patterns',
            schema: [
                { key: 'seed', type: 'int', bytes: 4 },
                { key: 'bgColor', type: 'color' },
                { key: 'strokeColor', type: 'color' },
                { key: 'mixerType', type: 'enum', options: ['single', 'double', 'rushton', 'anchor', 'helical'] },
                { key: 'viscosityRatio', type: 'float', bytes: 2, min: 0.1, max: 10 },
                { key: 'reynolds', type: 'int', bytes: 2 },
                { key: 'schmidt', type: 'int', bytes: 2 },
                { key: 'rotationSpeed', type: 'int', bytes: 2 },
                { key: 'timeSteps', type: 'int', bytes: 2 },
                { key: 'particleCount', type: 'int', bytes: 2 },
                { key: 'showStreamlines', type: 'bool' },
                { key: 'showVorticity', type: 'bool' },
                { key: 'showMixingIndex', type: 'bool' },
                { key: 'colorByAge', type: 'bool' }
            ]
        });

        // Load URL params if present
        const urlParams = urlState.fromUrl();
        if (window.location.search.includes('s=')) {
            Object.assign(params, urlParams);
            // Apply URL params to UI controls
            if (urlParams.mixerType) document.getElementById('mixerType').value = urlParams.mixerType;
            if (urlParams.viscosityRatio) document.getElementById('viscosityRatio').value = urlParams.viscosityRatio;
            if (urlParams.reynolds) document.getElementById('reynolds').value = urlParams.reynolds;
            if (urlParams.schmidt) document.getElementById('schmidt').value = urlParams.schmidt;
            if (urlParams.rotationSpeed) document.getElementById('rotationSpeed').value = urlParams.rotationSpeed;
            if (urlParams.timeSteps) document.getElementById('timeSteps').value = urlParams.timeSteps;
            if (urlParams.particleCount) document.getElementById('particleCount').value = urlParams.particleCount;
            if (urlParams.showStreamlines !== undefined) document.getElementById('showStreamlines').checked = urlParams.showStreamlines;
            if (urlParams.showVorticity !== undefined) document.getElementById('showVorticity').checked = urlParams.showVorticity;
            if (urlParams.showMixingIndex !== undefined) document.getElementById('showMixingIndex').checked = urlParams.showMixingIndex;
            if (urlParams.colorByAge !== undefined) document.getElementById('colorByAge').checked = urlParams.colorByAge;
        }

        // Canvas controls for unified color handling
        const canvasControls = new TSCanvasControls();
        canvasControls.bind(params);
        canvasControls.setupRandomizeButton();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function initCanvasSize() {
            const size = CanvasLayout.getSize(params.paperSize);
            canvas.width = size.width;
            canvas.height = size.height;
            width = canvas.width;
            height = canvas.height;
        }
        initCanvasSize();

        // Initialize UX components
        window.panelController = new TSPanelController().attach();
        window.statsDisplay = new TSStatsDisplay().attach();

        let particles = [];
        let isAnimating = false;
        let animationId = null;
        let currentTime = 0;
        let gif = null;

        // UI Elements
        const mixerType = document.getElementById('mixerType');
        const viscosityRatio = document.getElementById('viscosityRatio');
        const reynolds = document.getElementById('reynolds');
        const schmidt = document.getElementById('schmidt');
        const rotationSpeed = document.getElementById('rotationSpeed');
        const timeSteps = document.getElementById('timeSteps');
        const particleCount = document.getElementById('particleCount');
        const showStreamlines = document.getElementById('showStreamlines');
        const showVorticity = document.getElementById('showVorticity');
        const showMixingIndex = document.getElementById('showMixingIndex');
        const colorByAge = document.getElementById('colorByAge');
        const generateBtn = document.getElementById('generateBtn');
        const animateBtn = document.getElementById('animateBtn');
        const exportSVGBtn = document.getElementById('exportSVG');
        const exportPNGBtn = document.getElementById('exportPNG');
        const exportGIFBtn = document.getElementById('exportGIF');
        const status = document.getElementById('status');
        const animationProgress = document.getElementById('animationProgress');

        // Update value displays
        viscosityRatio.oninput = () => document.getElementById('viscosityValue').textContent = viscosityRatio.value;
        reynolds.oninput = () => document.getElementById('reynoldsValue').textContent = reynolds.value;
        schmidt.oninput = () => document.getElementById('schmidtValue').textContent = schmidt.value;
        rotationSpeed.oninput = () => document.getElementById('speedValue').textContent = rotationSpeed.value;
        timeSteps.oninput = () => document.getElementById('stepsValue').textContent = timeSteps.value;
        particleCount.oninput = () => document.getElementById('particlesValue').textContent = particleCount.value;

        // Canvas settings event handlers
        document.getElementById('paperSize').addEventListener('change', (e) => {
            params.paperSize = e.target.value;
            initCanvasSize();
            initializeParticles();
            drawPattern();
        });
        document.getElementById('bgColor').addEventListener('input', (e) => {
            params.bgColor = e.target.value;
            drawPattern();
        });
        document.getElementById('strokeColor').addEventListener('input', (e) => {
            params.strokeColor = e.target.value;
            drawPattern();
        });

        document.getElementById('seed').addEventListener('change', (e) => {
            params.seed = parseInt(e.target.value);
            currentTime = 0;
            initializeParticles();
            drawPattern();
        });

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.initialX = x;
                this.initialY = y;
                this.path = [{x, y}];
                this.age = 0;
                this.stretchingHistory = [];
            }

            update(vx, vy, dt) {
                this.x += vx * dt;
                this.y += vy * dt;
                this.age += dt;
                this.path.push({x: this.x, y: this.y});

                // Keep path length reasonable
                if (this.path.length > 100) {
                    this.path.shift();
                }
            }

            getStretchingFactor() {
                if (this.path.length < 2) return 1;
                const dx = this.x - this.initialX;
                const dy = this.y - this.initialY;
                return Math.sqrt(dx * dx + dy * dy) / Math.sqrt(width * width + height * height);
            }
        }

        function getVelocityField(x, y, time) {
            // Initialize PRNG for velocity field
            let _s = params.seed;
            const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

            const centerX = width / 2;
            const centerY = height / 2;
            const omega = (rotationSpeed.value / 60) * 2 * Math.PI; // Convert RPM to rad/s
            const Re = parseFloat(reynolds.value);
            const mu = parseFloat(viscosityRatio.value);

            // Normalize coordinates
            const r = Math.sqrt((x - centerX) ** 2 + (y - centerY) ** 2);
            const theta = Math.atan2(y - centerY, x - centerX);

            let vx = 0, vy = 0;

            switch (mixerType.value) {
                case 'single':
                    // Single blade impeller flow
                    vx = -omega * (y - centerY) * Math.exp(-r / (width * 0.3));
                    vy = omega * (x - centerX) * Math.exp(-r / (width * 0.3));
                    break;

                case 'double':
                    // Double blade with phase offset
                    const phase1 = omega * time;
                    const phase2 = omega * time + Math.PI;
                    vx = -omega * (y - centerY) * (Math.cos(theta - phase1) + 0.5 * Math.cos(theta - phase2));
                    vy = omega * (x - centerX) * (Math.sin(theta - phase1) + 0.5 * Math.sin(theta - phase2));
                    break;

                case 'rushton':
                    // Rushton turbine - radial flow pattern
                    const blades = 6;
                    const bladeAngle = (2 * Math.PI) / blades;
                    let bladeEffect = 0;
                    for (let i = 0; i < blades; i++) {
                        const bladeTheta = i * bladeAngle + omega * time;
                        bladeEffect += Math.exp(-Math.abs(theta - bladeTheta) / 0.2);
                    }
                    vx = omega * r * Math.cos(theta) * bladeEffect * 0.1;
                    vy = omega * r * Math.sin(theta) * bladeEffect * 0.1;
                    break;

                case 'anchor':
                    // Anchor mixer - wall-following flow
                    const wallDistance = Math.min(
                        Math.abs(x - width * 0.1),
                        Math.abs(x - width * 0.9),
                        Math.abs(y - height * 0.1),
                        Math.abs(y - height * 0.9)
                    );
                    const wallEffect = Math.exp(-wallDistance / 50);
                    vx = -omega * (y - centerY) * wallEffect;
                    vy = omega * (x - centerX) * wallEffect;
                    break;

                case 'helical':
                    // Helical ribbon - axial and tangential flow
                    const helixPitch = 0.1;
                    const axialVelocity = omega * helixPitch * r / width;
                    vx = -omega * (y - centerY) + axialVelocity * Math.sin(theta);
                    vy = omega * (x - centerX) + axialVelocity * Math.cos(theta);
                    break;
            }

            // Add turbulent fluctuations based on Reynolds number
            if (Re > 100) {
                const turbulence = (Re / 1000) * 0.1;
                vx += (seededRandom() - 0.5) * turbulence * Math.abs(vx);
                vy += (seededRandom() - 0.5) * turbulence * Math.abs(vy);
            }

            // Apply viscosity effects
            vx /= mu;
            vy /= mu;

            return {vx, vy};
        }

        function initializeParticles() {
            // Initialize PRNG for particle initialization
            let _s = params.seed;
            const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

            particles = [];
            const count = parseInt(particleCount.value);

            // Initialize particles in different regions
            for (let i = 0; i < count; i++) {
                let x, y;

                if (i < count / 2) {
                    // Half in the left region
                    x = width * 0.25 + (seededRandom() - 0.5) * width * 0.2;
                    y = height * 0.5 + (seededRandom() - 0.5) * height * 0.6;
                } else {
                    // Half in the right region
                    x = width * 0.75 + (seededRandom() - 0.5) * width * 0.2;
                    y = height * 0.5 + (seededRandom() - 0.5) * height * 0.6;
                }

                particles.push(new Particle(x, y));
            }
        }

        function calculateMixingIndex() {
            // Calculate variance-based mixing index
            let sumX = 0, sumY = 0;
            particles.forEach(p => {
                sumX += p.x;
                sumY += p.y;
            });

            const meanX = sumX / particles.length;
            const meanY = sumY / particles.length;

            let variance = 0;
            particles.forEach(p => {
                variance += (p.x - meanX) ** 2 + (p.y - meanY) ** 2;
            });

            variance /= particles.length;
            const initialVariance = (width * 0.2) ** 2 + (height * 0.3) ** 2;

            return 1 - Math.min(variance / initialVariance, 1);
        }

        function drawPattern() {
            ctx.fillStyle = params.bgColor;
            ctx.fillRect(0, 0, width, height);

            // Update stats display
            if (window.statsDisplay) {
                statsDisplay.setCustomStat('Particles', particles.length);
                statsDisplay.setCustomStat('Mixer', mixerType.value);
                statsDisplay.setCustomStat('Re', reynolds.value);
                statsDisplay.setCustomStat('Time', currentTime.toFixed(2) + 's');
                const mixingIndex = calculateMixingIndex();
                statsDisplay.setCustomStat('Mix Index', mixingIndex.toFixed(3));
            }

            // Draw mixing vessel outline
            ctx.strokeStyle = params.strokeColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(width * 0.1, height * 0.1, width * 0.8, height * 0.8);

            // Draw impeller
            const centerX = width / 2;
            const centerY = height / 2;
            const impellerRadius = width * 0.15;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(currentTime * (rotationSpeed.value / 60) * 2 * Math.PI);

            ctx.strokeStyle = '#666666';
            ctx.lineWidth = 3;

            switch (mixerType.value) {
                case 'single':
                case 'double':
                    // Draw blade(s)
                    ctx.beginPath();
                    ctx.moveTo(-impellerRadius, 0);
                    ctx.lineTo(impellerRadius, 0);
                    ctx.stroke();

                    if (mixerType.value === 'double') {
                        ctx.beginPath();
                        ctx.moveTo(0, -impellerRadius);
                        ctx.lineTo(0, impellerRadius);
                        ctx.stroke();
                    }
                    break;

                case 'rushton':
                    // Draw 6-blade turbine
                    for (let i = 0; i < 6; i++) {
                        ctx.save();
                        ctx.rotate(i * Math.PI / 3);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(impellerRadius, 0);
                        ctx.stroke();
                        ctx.restore();
                    }
                    break;
            }

            ctx.restore();

            // Draw particles and paths
            particles.forEach(particle => {
                // Draw path
                if (showStreamlines.checked && particle.path.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(particle.path[0].x, particle.path[0].y);

                    for (let i = 1; i < particle.path.length; i++) {
                        ctx.lineTo(particle.path[i].x, particle.path[i].y);
                    }

                    if (colorByAge.checked) {
                        const hue = (particle.age * 60) % 360;
                        ctx.strokeStyle = `hsla(${hue}, 70%, 50%, 0.5)`;
                    } else {
                        ctx.strokeStyle = 'rgba(0, 100, 255, 0.3)';
                    }
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Draw particle
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, 2, 0, Math.PI * 2);

                if (colorByAge.checked) {
                    const hue = (particle.age * 60) % 360;
                    ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                } else {
                    const intensity = particle.getStretchingFactor();
                    ctx.fillStyle = `rgb(${255 * intensity}, ${100 * (1 - intensity)}, ${255 * (1 - intensity)})`;
                }
                ctx.fill();
            });

            // Draw mixing index
            if (showMixingIndex.checked) {
                const mixingIndex = calculateMixingIndex();
                ctx.fillStyle = '#000000';
                ctx.font = '16px monospace';
                ctx.fillText(`Mixing Index: ${mixingIndex.toFixed(3)}`, 20, 30);
            }

            // Draw vorticity field
            if (showVorticity.checked) {
                const gridSize = 40;
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.lineWidth = 1;

                for (let x = gridSize; x < width; x += gridSize) {
                    for (let y = gridSize; y < height; y += gridSize) {
                        const v1 = getVelocityField(x - 5, y, currentTime);
                        const v2 = getVelocityField(x + 5, y, currentTime);
                        const v3 = getVelocityField(x, y - 5, currentTime);
                        const v4 = getVelocityField(x, y + 5, currentTime);

                        const vorticity = (v2.vy - v1.vy) / 10 - (v4.vx - v3.vx) / 10;

                        if (Math.abs(vorticity) > 0.01) {
                            ctx.beginPath();
                            ctx.arc(x, y, Math.abs(vorticity) * 100, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        function animate() {
            if (!isAnimating) return;

            const dt = 0.01;
            currentTime += dt;

            // Update particles
            particles.forEach(particle => {
                const vel = getVelocityField(particle.x, particle.y, currentTime);
                particle.update(vel.vx, vel.vy, dt);

                // Keep particles in bounds
                if (particle.x < 0 || particle.x > width || particle.y < 0 || particle.y > height) {
                    particle.x = Math.max(0, Math.min(width, particle.x));
                    particle.y = Math.max(0, Math.min(height, particle.y));
                }
            });

            drawPattern();

            if (currentTime < parseInt(timeSteps.value) / 100) {
                animationId = requestAnimationFrame(animate);
            } else {
                isAnimating = false;
                animateBtn.textContent = 'Animate Mixing';
                status.textContent = 'Animation complete';
            }
        }

        generateBtn.addEventListener('click', () => {
            params.seed = Math.floor(Math.random() * 1000000);
            currentTime = 0;
            initializeParticles();
            drawPattern();

            // Update seed display
            document.getElementById('seed-display').textContent = params.seed;
            document.getElementById('seed').value = params.seed;

            // Update URL with current state
            urlState.replaceState({
                seed: params.seed,
                bgColor: params.bgColor,
                strokeColor: params.strokeColor,
                mixerType: mixerType.value,
                viscosityRatio: parseFloat(viscosityRatio.value),
                reynolds: parseInt(reynolds.value),
                schmidt: parseInt(schmidt.value),
                rotationSpeed: parseInt(rotationSpeed.value),
                timeSteps: parseInt(timeSteps.value),
                particleCount: parseInt(particleCount.value),
                showStreamlines: showStreamlines.checked,
                showVorticity: showVorticity.checked,
                showMixingIndex: showMixingIndex.checked,
                colorByAge: colorByAge.checked
            });

            status.textContent = 'Pattern generated';
        });

        animateBtn.addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                cancelAnimationFrame(animationId);
                animateBtn.textContent = 'Animate Mixing';
                status.textContent = 'Animation paused';
            } else {
                if (particles.length === 0) {
                    initializeParticles();
                }
                isAnimating = true;
                animateBtn.textContent = 'Pause Animation';
                status.textContent = 'Animating...';
                animate();
            }
        });

        exportSVGBtn.addEventListener('click', () => {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

            // White background
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('width', width);
            bg.setAttribute('height', height);
            bg.setAttribute('fill', 'white');
            svg.appendChild(bg);

            // Add particle paths
            particles.forEach(particle => {
                if (particle.path.length > 1) {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const d = particle.path.map((p, i) =>
                        `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`
                    ).join(' ');

                    path.setAttribute('d', d);
                    path.setAttribute('fill', 'none');

                    if (colorByAge.checked) {
                        const hue = (particle.age * 60) % 360;
                        path.setAttribute('stroke', `hsl(${hue}, 70%, 50%)`);
                    } else {
                        path.setAttribute('stroke', 'rgba(0, 100, 255, 0.5)');
                    }
                    path.setAttribute('stroke-width', '1');
                    svg.appendChild(path);
                }
            });

            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mixing-pattern.svg';
            a.click();
            URL.revokeObjectURL(url);
            status.textContent = 'SVG exported';
        });

        exportPNGBtn.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'mixing-pattern.png';
            a.click();
            status.textContent = 'PNG exported';
        });

        exportGIFBtn.addEventListener('click', () => {
            if (particles.length === 0) {
                status.textContent = 'Generate pattern first';
                return;
            }

            status.textContent = 'Creating GIF...';
            animationProgress.style.display = 'block';
            animationProgress.value = 0;

            gif = new GIF({
                workers: 2,
                quality: 10,
                width: width,
                height: height
            });

            // Reset and animate for GIF
            currentTime = 0;
            initializeParticles();

            const frames = 60;
            const dt = parseInt(timeSteps.value) / 100 / frames;

            for (let frame = 0; frame < frames; frame++) {
                // Update particles
                particles.forEach(particle => {
                    const vel = getVelocityField(particle.x, particle.y, currentTime);
                    particle.update(vel.vx, vel.vy, dt);

                    if (particle.x < 0 || particle.x > width || particle.y < 0 || particle.y > height) {
                        particle.x = Math.max(0, Math.min(width, particle.x));
                        particle.y = Math.max(0, Math.min(height, particle.y));
                    }
                });

                currentTime += dt;
                drawPattern();

                gif.addFrame(ctx, {copy: true, delay: 50});
                animationProgress.value = (frame / frames) * 100;
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mixing-animation.gif';
                a.click();
                URL.revokeObjectURL(url);
                status.textContent = 'GIF exported';
                animationProgress.style.display = 'none';
            });

            gif.render();
        });

        // Initialize
        initializeParticles();
        drawPattern();

        // Initialize seed display
        document.getElementById('seed-display').textContent = params.seed;
        document.getElementById('seed').value = params.seed;

        // Copy share URL function
        function copyShareUrl() {
            const shareUrl = urlState.getShareUrl({
                seed: params.seed,
                bgColor: params.bgColor,
                strokeColor: params.strokeColor,
                mixerType: mixerType.value,
                viscosityRatio: parseFloat(viscosityRatio.value),
                reynolds: parseInt(reynolds.value),
                schmidt: parseInt(schmidt.value),
                rotationSpeed: parseInt(rotationSpeed.value),
                timeSteps: parseInt(timeSteps.value),
                particleCount: parseInt(particleCount.value),
                showStreamlines: showStreamlines.checked,
                showVorticity: showVorticity.checked,
                showMixingIndex: showMixingIndex.checked,
                colorByAge: colorByAge.checked
            });
            const statusEl = document.getElementById('share-status');
            navigator.clipboard.writeText(shareUrl).then(() => {
                statusEl.textContent = '✓ Copied!';
                setTimeout(() => statusEl.textContent = '', 2000);
            }).catch(() => {
                statusEl.textContent = 'Copy failed';
            });
        }
    </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
