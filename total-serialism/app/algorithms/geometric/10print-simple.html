<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>10PRINT Pattern Generator - Total Serialism</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="../../shared/url-state.js"></script>

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    .paper-size-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 212, 170, 0.2);
      color: var(--ts-accent-primary);
      padding: 5px 10px;
      border-radius: var(--ts-radius-sm);
      font-size: 12px;
      border: 1px solid var(--ts-accent-primary);
      font-family: var(--ts-font-mono);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="paper-size-badge" id="size-badge">800x600px</div>
  </div>
  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>
    <h2>10PRINT Pattern</h2>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="custom" selected>Custom (800x600)</option>
          <option value="a5">A5 (148x210mm)</option>
          <option value="a4">A4 (210x297mm)</option>
          <option value="a3">A3 (297x420mm)</option>
          <option value="letter">US Letter</option>
          <option value="square">Square (800x800)</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Pattern Settings</h3>
      <div class="control">
        <label>Cell Size: <span class="value" id="cellSize-val">20</span>px</label>
        <input type="range" id="cellSize" min="5" max="50" value="20" step="1">
      </div>
      <div class="control">
        <label>Probability: <span class="value" id="probability-val">0.5</span></label>
        <input type="range" id="probability" min="0" max="1" value="0.5" step="0.01">
      </div>
      <div class="control">
        <label>Line Type:</label>
        <select id="lineType">
          <option value="diagonal">Diagonal (Classic)</option>
          <option value="straight">Straight (+ pattern)</option>
          <option value="curved">Curved</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Style</h3>
      <div class="control">
        <label>Stroke Weight: <span class="value" id="strokeWeight-val">2</span></label>
        <input type="range" id="strokeWeight" min="0.5" max="5" value="2" step="0.5">
      </div>
    </div>

    <div class="control-group">
      <h3>Seed</h3>
      <div class="control">
        <label>Seed: <span id="seed-display">-</span></label>
        <input type="number" id="seed" min="1" max="999999" value="12345" style="width: 100%; padding: 6px; background: #0a0a1a; border: 1px solid #2a2a4a; border-radius: 4px; color: #e0e0e0; font-family: monospace;">
      </div>
    </div>

    <div class="control-group">
      <h3>Actions</h3>
      <button onclick="regenerate()">Regenerate Pattern</button>
      <button onclick="exportCanvas()">Export as PNG</button>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
    </div>

    <!-- Preset Container at bottom -->
    <div id="preset-container"></div>
  </div>

  <script>
    // Paper size definitions
    const PAPER_SIZES = {
      custom: { width: 800, height: 600 },
      a5: { width: 559, height: 794 },
      a4: { width: 794, height: 1123 },
      a3: { width: 1123, height: 1587 },
      letter: { width: 816, height: 1056 },
      square: { width: 800, height: 800 }
    };

    let params = {
      cellSize: 20,
      probability: 0.5,
      lineType: 'diagonal',
      strokeWeight: 2,
      paperSize: 'custom',
      seed: Math.floor(Math.random() * 1000000)
    };

    // URL state management
    const urlState = new TSUrlState({
      algorithmId: '10print-simple',
      schema: [
        { key: 'seed', type: 'int', bytes: 4 },
        { key: 'cellSize', type: 'int', bytes: 1 },
        { key: 'probability', type: 'float', bytes: 2, min: 0, max: 1 },
        { key: 'lineType', type: 'enum', options: ['diagonal', 'straight', 'curved'] },
        { key: 'strokeWeight', type: 'float', bytes: 2, min: 0.5, max: 5 }
      ]
    });

    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
    }

    let canvas;

    function setup() {
      console.log('Setting up canvas...');
      const size = PAPER_SIZES[params.paperSize];
      canvas = createCanvas(size.width, size.height);
      canvas.parent('canvas-container');

      // Set up controls
      setupControls();

      // Initial draw
      drawPattern();
    }

    function setupControls() {
      // Paper size
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        const size = PAPER_SIZES[params.paperSize];
        resizeCanvas(size.width, size.height);
        document.getElementById('size-badge').textContent = `${size.width}x${size.height}px`;
        drawPattern();
      });

      // Cell size
      document.getElementById('cellSize').addEventListener('input', (e) => {
        params.cellSize = parseInt(e.target.value);
        document.getElementById('cellSize-val').textContent = params.cellSize;
        drawPattern();
      });

      // Probability
      document.getElementById('probability').addEventListener('input', (e) => {
        params.probability = parseFloat(e.target.value);
        document.getElementById('probability-val').textContent = params.probability;
        drawPattern();
      });

      // Line type
      document.getElementById('lineType').addEventListener('change', (e) => {
        params.lineType = e.target.value;
        drawPattern();
      });

      // Stroke weight
      document.getElementById('strokeWeight').addEventListener('input', (e) => {
        params.strokeWeight = parseFloat(e.target.value);
        document.getElementById('strokeWeight-val').textContent = params.strokeWeight;
        drawPattern();
      });

      // Seed control
      document.getElementById('seed').addEventListener('change', (e) => {
        params.seed = parseInt(e.target.value);
        drawPattern();
      });
    }

    function drawPattern() {
      // Initialize random seed for reproducibility
      randomSeed(params.seed);

      background(255);
      stroke(0);
      strokeWeight(params.strokeWeight);

      // Update seed display
      document.getElementById('seed-display').textContent = params.seed;
      document.getElementById('seed').value = params.seed;

      // Update URL state
      urlState.replaceState(params);

      for (let x = 0; x < width; x += params.cellSize) {
        for (let y = 0; y < height; y += params.cellSize) {
          if (params.lineType === 'diagonal') {
            if (random() < params.probability) {
              line(x, y, x + params.cellSize, y + params.cellSize);
            } else {
              line(x + params.cellSize, y, x, y + params.cellSize);
            }
          } else if (params.lineType === 'straight') {
            if (random() < params.probability) {
              line(x + params.cellSize/2, y, x + params.cellSize/2, y + params.cellSize);
            } else {
              line(x, y + params.cellSize/2, x + params.cellSize, y + params.cellSize/2);
            }
          } else if (params.lineType === 'curved') {
            noFill();
            if (random() < params.probability) {
              arc(x, y, params.cellSize*2, params.cellSize*2, 0, HALF_PI);
            } else {
              arc(x + params.cellSize, y, params.cellSize*2, params.cellSize*2, HALF_PI, PI);
            }
          }
        }
      }
    }

    function regenerate() {
      params.seed = Math.floor(Math.random() * 1000000);
      drawPattern();
    }

    function exportCanvas() {
      saveCanvas('10print-pattern', 'png');
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => { statusEl.textContent = 'Copy failed'; });
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js">
  // Auto-injected by harmonize.py
  function windowResized() {
    // Preserve canvas aspect ratio on window resize
    if (typeof resizeCanvas === 'function') {
      const container = document.querySelector('canvas')?.parentElement;
      if (container) {
        const w = container.clientWidth;
        resizeCanvas(w, w); // Square canvas default
      }
    }
  }

</script>
</body>
</html>
