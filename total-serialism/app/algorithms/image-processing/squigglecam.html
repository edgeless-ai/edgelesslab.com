<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>SquiggleCam - Image to Squiggly Lines</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
  <script src="../../shared/export-utils.js"></script>
  <script src="../../upload-helper.js"></script>
  <script src="../../preset-manager.js"></script>
  <script src="../../shared/url-state.js"></script>
  <link rel="stylesheet" href="../../preset-manager.css">

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    .upload-area {
      border: 2px dashed var(--ts-border-default, #333);
      padding: 20px;
      border-radius: var(--ts-radius-md, 6px);
      text-align: center;
      cursor: pointer;
      background: var(--ts-bg-control, #1a1a24);
      color: var(--ts-text-secondary, #9898a8);
      transition: all var(--ts-transition-fast, 120ms ease-out);
    }
    .upload-area:hover, .upload-area:focus {
      border-color: var(--ts-accent-primary, #00d4aa);
      outline: none;
    }
    .upload-area.dragover {
      background: var(--ts-bg-hover, #22222e);
      border-color: var(--ts-accent-primary, #00d4aa);
    }
    .upload-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .control-group {
      margin-bottom: var(--ts-space-xl, 24px);
      padding-bottom: var(--ts-space-lg, 16px);
      border-bottom: 1px solid var(--ts-border-subtle, rgba(255,255,255,0.06));
    }
    .control-group:last-child {
      border-bottom: none;
    }
    .control {
      margin-bottom: var(--ts-space-md, 12px);
    }
    .value {
      font-weight: 600;
      color: var(--ts-accent-primary, #00d4aa);
      float: right;
    }
    .stats {
      background: var(--ts-bg-control, #1a1a24);
      padding: 15px;
      border-radius: var(--ts-radius-md, 6px);
      font-size: 12px;
      border: 1px solid var(--ts-border-subtle, rgba(255,255,255,0.06));
    }
    .stats div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .stats .value {
      float: none;
    }
    .info-box {
      background: var(--ts-bg-control, #1a1a24);
      padding: 12px;
      border-radius: var(--ts-radius-md, 6px);
      font-size: 11px;
      line-height: 1.6;
      color: var(--ts-text-secondary, #9898a8);
      border: 1px solid var(--ts-border-subtle, rgba(255,255,255,0.06));
    }
    h2 {
      margin: 0 0 10px 0;
      color: var(--ts-text-primary, #e8e8ec);
      font-size: 24px;
    }
    .subtitle {
      font-size: 12px;
      color: var(--ts-text-muted, #5a5a6e);
      margin-bottom: 20px;
    }
    input[type="file"] {
      display: none;
    }
    #processing-status {
      padding: 10px;
      margin-top: 10px;
      border-radius: var(--ts-radius-md, 6px);
      font-size: 12px;
      text-align: center;
      display: none;
    }
    #processing-status.success {
      background: rgba(0, 212, 170, 0.2);
      color: var(--ts-accent-primary, #00d4aa);
      border: 1px solid var(--ts-accent-primary, #00d4aa);
    }
    #processing-status.error {
      background: rgba(255, 71, 87, 0.2);
      color: var(--ts-accent-danger, #ff4757);
      border: 1px solid var(--ts-accent-danger, #ff4757);
    }
    #processing-status.processing {
      background: rgba(255, 149, 0, 0.2);
      color: var(--ts-accent-secondary, #ff9500);
      border: 1px solid var(--ts-accent-secondary, #ff9500);
    }
    .preview-options {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
    }
    .preview-options label {
      display: flex;
      align-items: center;
      font-size: 13px;
      cursor: pointer;
      color: var(--ts-text-secondary, #9898a8);
    }
    .preview-options input[type="checkbox"] {
      margin-right: 6px;
    }
    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .button-group button {
      flex: 1;
      min-width: 100px;
    }
    label.checkbox {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    label.checkbox input {
      display: inline-block;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>

    <h2>SquiggleCam</h2>
    <div class="subtitle">Convert images to squiggly line art for pen plotting</div>

    <div class="control-group">
      <h3>Image Input</h3>
      <div id="image-upload-area" class="upload-area" tabindex="0">
        <div class="upload-icon">+</div>
        <div>Drop image here or click to browse</div>
      </div>
      <input type="file" id="imageUpload" accept="image/*">
      <div id="processing-status"></div>
    </div>

    <div class="control-group">
      <h3>Squiggle Parameters</h3>
      <div class="control">
        <label>Line Count: <span class="value" id="lineCount-value">50</span></label>
        <input type="range" id="lineCount" min="10" max="200" step="5" value="50">
      </div>
      <div class="control">
        <label>Amplitude: <span class="value" id="amplitude-value">20</span></label>
        <input type="range" id="amplitude" min="1" max="100" step="1" value="20">
      </div>
      <div class="control">
        <label>Frequency: <span class="value" id="frequency-value">0.1</span></label>
        <input type="range" id="frequency" min="0.01" max="0.5" step="0.01" value="0.1">
      </div>
      <div class="control">
        <label>Sample Spacing: <span class="value" id="spacing-value">3</span>px</label>
        <input type="range" id="spacing" min="1" max="10" step="1" value="3">
      </div>
      <div class="control">
        <label>Brightness Threshold: <span class="value" id="threshold-value">128</span></label>
        <input type="range" id="threshold" min="0" max="255" step="1" value="128">
      </div>
    </div>

    <div class="control-group">
      <h3>Display Options</h3>
      <div class="preview-options">
        <label>
          <input type="checkbox" id="showOriginal" checked> Show Original
        </label>
        <label>
          <input type="checkbox" id="showPreview" checked> Show Squiggles
        </label>
      </div>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="square800" selected>Square (800x800)</option>
          <option value="landscape800x600">Landscape (800x600)</option>
          <option value="a5portrait">A5 Portrait</option>
          <option value="a5landscape">A5 Landscape</option>
          <option value="a4portrait">A4 Portrait</option>
          <option value="a4landscape">A4 Landscape</option>
          <option value="a3portrait">A3 Portrait</option>
          <option value="a3landscape">A3 Landscape</option>
          <option value="letterportrait">Letter Portrait</option>
          <option value="letterlandscape">Letter Landscape</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Path Optimization</h3>
      <div class="preview-options">
        <label>
          <input type="checkbox" id="optimizePaths" checked> Optimize Paths
        </label>
        <label>
          <input type="checkbox" id="joinPaths"> Join Nearby Paths
        </label>
      </div>
      <div class="control">
        <label>Join Threshold: <span class="value" id="joinThreshold-value">5</span>px</label>
        <input type="range" id="joinThreshold" min="1" max="20" step="1" value="5">
      </div>
    </div>

    <div class="control-group">
      <h3>Statistics</h3>
      <div id="stats" class="stats" style="display: none;">
        <div><span>Lines:</span> <span class="value" id="lineCountStat">0</span></div>
        <div><span>Points:</span> <span class="value" id="pointCountStat">0</span></div>
        <div><span>Path Length:</span> <span class="value" id="pathLengthStat">0</span>mm</div>
      </div>
    </div>

    <div class="control-group">
      <h3>Export</h3>
      <div class="control">
        <label>Seed: <span id="seed-display">-</span></label>
        <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
      </div>
      <button onclick="generateSquiggles()">Generate Squiggles</button>
      <div class="button-group" style="margin-top: 10px;">
        <button onclick="exportSVG()" id="exportBtn" disabled>Export SVG</button>
        <button onclick="exportPNG()" id="exportPNGBtn" disabled>Export PNG</button>
      </div>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
    </div>

    <!-- Preset Manager -->
    <div id="preset-container"></div>
  </div>

  <script>
    // Global variables
    let img = null;
    let canvas;
    let squiggleLines = [];
    let processing = false;
    let uploadHelper;
    let presetManager;

    let params = {
      paperSize: 'square800',
      lineCount: 50,
      amplitude: 20,
      frequency: 0.1,
      spacing: 3,
      threshold: 128,
      seed: Math.floor(Math.random() * 1000000)
    };

    // URL state management
    const urlState = new TSUrlState({
      algorithmId: 'squigglecam',
      schema: [
        { key: 'seed', type: 'int', bytes: 4 },
        { key: 'lineCount', type: 'int', bytes: 1 },
        { key: 'amplitude', type: 'int', bytes: 1 },
        { key: 'frequency', type: 'float', bytes: 2, min: 0.01, max: 0.5 },
        { key: 'spacing', type: 'int', bytes: 1 },
        { key: 'threshold', type: 'int', bytes: 1 }
      ]
    });

    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
    }

    // P5.js setup
    function setup() {
      const size = CanvasLayout.getSize(params.paperSize);
      canvas = createCanvas(size.width, size.height);
      canvas.parent('canvas-container');

      // Setup upload helper
      setupUploadHelper();

      // Setup event listeners
      setupEventListeners();

      // Initialize preset manager
      presetManager = new PresetManager({
        algorithmId: 'squigglecam',
        container: '#preset-container',
        onSave: () => params,
        onLoad: (preset) => {
          Object.assign(params, preset.data);
          updateUIFromParams();
          if (img) generateSquiggles();
        },
        onRandomize: () => {
          params.lineCount = Math.floor(Math.random() * 150) + 20;
          params.amplitude = Math.floor(Math.random() * 80) + 5;
          params.frequency = Math.random() * 0.4 + 0.02;
          params.spacing = Math.floor(Math.random() * 8) + 1;
          params.seed = Math.floor(Math.random() * 1000000);
          updateUIFromParams();
          if (img) generateSquiggles();
        }
      });

      background(255);
      strokeWeight(1);
      noFill();
    }

    function setupUploadHelper() {
      uploadHelper = new UploadHelper({
        dropArea: '#image-upload-area',
        input: '#imageUpload',
        onFile: (file) => {
          loadImageFile(file);
        }
      });
    }

    function setupEventListeners() {
      // Paper size
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        const size = CanvasLayout.getSize(params.paperSize);
        resizeCanvas(size.width, size.height);
        if (img) redraw();
      });

      // Update value displays
      document.querySelectorAll('input[type="range"]').forEach(input => {
        input.addEventListener('input', (e) => {
          const valueSpan = document.getElementById(e.target.id + '-value');
          if (valueSpan) {
            valueSpan.textContent = e.target.value;
          }
          if (params.hasOwnProperty(e.target.id)) {
            params[e.target.id] = parseFloat(e.target.value);
          }
        });
      });

      // Checkbox handlers
      document.getElementById('showOriginal').addEventListener('change', () => redraw());
      document.getElementById('showPreview').addEventListener('change', () => redraw());

      // Seed
      document.getElementById('seed').addEventListener('change', (e) => {
        params.seed = parseInt(e.target.value);
        if (img) generateSquiggles();
      });
      document.getElementById('seed').value = params.seed;
      document.getElementById('seed-display').textContent = params.seed;
    }

    function draw() {
      background(255);

      if (img && document.getElementById('showOriginal').checked) {
        // Draw original image faded
        push();
        tint(255, 100);
        image(img, 0, 0, width, height);
        pop();
      }

      if (squiggleLines.length > 0 && document.getElementById('showPreview').checked) {
        // Draw squiggle lines
        stroke(0);
        strokeWeight(1);
        noFill();

        squiggleLines.forEach(line => {
          beginShape();
          line.forEach(point => {
            vertex(point.x, point.y);
          });
          endShape();
        });
      }
    }

    function loadImageFile(file) {
      if (!file.type.match('image.*')) {
        showStatus('Please upload an image file', 'error');
        return;
      }

      showStatus('Loading image...', 'processing');

      const reader = new FileReader();
      reader.onload = (e) => {
        loadImage(e.target.result, (loadedImg) => {
          img = loadedImg;
          squiggleLines = [];
          showStatus('Image loaded successfully', 'success');
          document.getElementById('exportBtn').disabled = true;
          document.getElementById('exportPNGBtn').disabled = true;
          redraw();
        }, () => {
          showStatus('Could not read that image', 'error');
        });
      };
      reader.onerror = () => showStatus('Could not read that image', 'error');
      reader.readAsDataURL(file);
    }

    function generateSquiggles() {
      if (!img) {
        showStatus('Please upload an image first', 'error');
        return;
      }

      if (processing) {
        showStatus('Already processing...', 'error');
        return;
      }

      processing = true;
      showStatus('Generating squiggles...', 'processing');

      // Initialize seeded RNG
      let _s = params.seed;
      const seededRandom = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0; let t = Math.imul(_s ^ _s >>> 15, 1 | _s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };

      // Clear previous lines
      squiggleLines = [];

      // Get parameters
      const lineCount = parseInt(document.getElementById('lineCount').value);
      const amplitude = parseInt(document.getElementById('amplitude').value);
      const frequency = parseFloat(document.getElementById('frequency').value);
      const spacing = parseInt(document.getElementById('spacing').value);
      const threshold = parseInt(document.getElementById('threshold').value);

      // Process image
      img.loadPixels();

      // Generate squiggle lines
      for (let i = 0; i < lineCount; i++) {
        const y = map(i, 0, lineCount - 1, 0, height);
        const line = [];
        let angle = 0;

        for (let x = 0; x < width; x += spacing) {
          // Sample brightness at this point
          const imgX = Math.floor(map(x, 0, width, 0, img.width));
          const imgY = Math.floor(map(y, 0, height, 0, img.height));
          const pixelIndex = (imgY * img.width + imgX) * 4;

          // Get brightness (0-255)
          const r = img.pixels[pixelIndex];
          const g = img.pixels[pixelIndex + 1];
          const b = img.pixels[pixelIndex + 2];
          const brightness = (r + g + b) / 3;

          // Calculate squiggle amplitude based on darkness
          const darkness = 255 - brightness;
          const squiggleAmp = darkness > threshold ?
            map(darkness, 0, 255, 0, amplitude) : 0;

          // Update angle based on frequency
          angle += frequency;

          // Calculate squiggly Y position
          const squigglyY = y + sin(angle) * squiggleAmp;

          line.push({ x: x, y: squigglyY });
        }

        // Add line to collection
        if (line.length > 1) {
          squiggleLines.push(line);
        }
      }

      // Apply path optimization if enabled
      if (document.getElementById('optimizePaths').checked) {
        optimizeSquiggles();
      }

      // Update stats
      updateStats();

      processing = false;
      showStatus('Squiggles generated successfully!', 'success');
      document.getElementById('exportBtn').disabled = false;
      document.getElementById('exportPNGBtn').disabled = false;

      // Update seed display
      document.getElementById('seed-display').textContent = params.seed;

      // Update URL state
      urlState.replaceState(params);

      redraw();
    }

    function optimizeSquiggles() {
      // Simple nearest-neighbor optimization
      if (squiggleLines.length < 2) return;

      const optimized = [squiggleLines[0]];
      const remaining = squiggleLines.slice(1);

      while (remaining.length > 0) {
        const lastLine = optimized[optimized.length - 1];
        const lastPoint = lastLine[lastLine.length - 1];
        let nearestIdx = 0;
        let nearestDist = Infinity;

        for (let i = 0; i < remaining.length; i++) {
          if (remaining[i].length > 0) {
            const firstPoint = remaining[i][0];
            const d = dist(lastPoint.x, lastPoint.y, firstPoint.x, firstPoint.y);
            if (d < nearestDist) {
              nearestDist = d;
              nearestIdx = i;
            }
          }
        }

        optimized.push(remaining.splice(nearestIdx, 1)[0]);
      }

      squiggleLines = optimized;
    }

    function exportSVG() {
      if (squiggleLines.length === 0) {
        showStatus('No squiggles to export', 'error');
        return;
      }

      const svg = TSExport.createSVG(
        squiggleLines.map(line => ({
          d: TSExport.pointsToPath(line),
          stroke: '#000000',
          strokeWidth: 1,
          fill: 'none'
        })),
        width,
        height,
        {
          backgroundColor: '#ffffff',
          strokeColor: '#000000',
          strokeWidth: 1
        }
      );

      TSExport.downloadSVG(svg, 'squigglecam-output');
      showStatus('SVG exported successfully!', 'success');
    }

    function exportPNG() {
      if (squiggleLines.length === 0) {
        showStatus('No squiggles to export', 'error');
        return;
      }

      // Save current canvas as PNG
      save(canvas, 'squigglecam-output.png');
      showStatus('PNG exported successfully!', 'success');
    }

    function updateStats() {
      let totalPoints = 0;
      let totalLength = 0;

      squiggleLines.forEach(line => {
        totalPoints += line.length;

        // Calculate path length
        for (let i = 1; i < line.length; i++) {
          const dx = line[i].x - line[i-1].x;
          const dy = line[i].y - line[i-1].y;
          totalLength += Math.sqrt(dx * dx + dy * dy);
        }
      });

      // Convert pixels to mm (assuming 96 DPI)
      const lengthMM = (totalLength * 25.4 / 96).toFixed(1);

      document.getElementById('lineCountStat').textContent = squiggleLines.length;
      document.getElementById('pointCountStat').textContent = totalPoints;
      document.getElementById('pathLengthStat').textContent = lengthMM;
      document.getElementById('stats').style.display = 'block';
    }

    function updateUIFromParams() {
      document.getElementById('paperSize').value = params.paperSize;
      document.getElementById('lineCount').value = params.lineCount;
      document.getElementById('lineCount-value').textContent = params.lineCount;
      document.getElementById('amplitude').value = params.amplitude;
      document.getElementById('amplitude-value').textContent = params.amplitude;
      document.getElementById('frequency').value = params.frequency;
      document.getElementById('frequency-value').textContent = params.frequency;
      document.getElementById('spacing').value = params.spacing;
      document.getElementById('spacing-value').textContent = params.spacing;
      document.getElementById('threshold').value = params.threshold;
      document.getElementById('threshold-value').textContent = params.threshold;
    }

    function showStatus(message, type) {
      const status = document.getElementById('processing-status');
      status.textContent = message;
      status.className = type;
      status.style.display = 'block';

      if (type !== 'processing') {
        setTimeout(() => {
          status.style.display = 'none';
        }, 3000);
      }
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => { statusEl.textContent = 'Copy failed'; });
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js">
  // Auto-injected by harmonize.py
  function windowResized() {
    // Preserve canvas aspect ratio on window resize
    if (typeof resizeCanvas === 'function') {
      const container = document.querySelector('canvas')?.parentElement;
      if (container) {
        const w = container.clientWidth;
        resizeCanvas(w, w); // Square canvas default
      }
    }
  }

</script>
</body>
</html>
