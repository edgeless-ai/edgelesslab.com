<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Differential Growth - Pen Plotter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--ts-font-mono);
      display: flex;
      background: var(--ts-bg-deep);
      color: var(--ts-text-primary);
      min-height: 100vh;
    }

    #canvas-container {
      flex: 1;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ts-bg-base);
      padding: 20px;
    }

    #canvas-container canvas {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 0 0 1px var(--ts-border-subtle), 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #controls {
      width: 380px;
      padding: 20px;
      background: var(--ts-bg-panel);
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
      border-left: 1px solid var(--ts-border-subtle);
    }

    #controls::-webkit-scrollbar {
      width: 6px;
    }

    #controls::-webkit-scrollbar-track {
      background: transparent;
    }

    #controls::-webkit-scrollbar-thumb {
      background: var(--ts-bg-active);
      border-radius: var(--ts-radius-full);
    }

    h2 {
      margin: 0 0 20px 0;
      color: var(--ts-accent-primary);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--ts-border-subtle);
    }

    .control-group:last-child {
      border-bottom: none;
    }

    .control-group h3 {
      margin: 0 0 12px 0;
      color: var(--ts-accent-primary);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--ts-text-secondary);
      margin-bottom: 8px;
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      background: var(--ts-bg-deep);
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      border: 1px solid var(--ts-border-default);
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--ts-accent-primary);
      border-radius: 50%;
      cursor: pointer;
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--ts-accent-primary);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      background: var(--ts-bg-control);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
      font-family: var(--ts-font-mono);
      font-size: 12px;
      cursor: pointer;
    }

    select:hover {
      border-color: var(--ts-accent-primary);
    }

    select:focus {
      outline: none;
      border-color: var(--ts-accent-primary);
    }

    input[type="color"] {
      width: 100%;
      height: 35px;
      padding: 2px;
      background: var(--ts-bg-control);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
      cursor: pointer;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    input[type="color"]::-webkit-color-swatch {
      border-radius: 2px;
      border: none;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--ts-accent-primary);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: var(--ts-radius-md);
      cursor: pointer;
      font-family: var(--ts-font-mono);
      font-size: 12px;
      transition: all 0.2s ease;
    }

    button.primary {
      background: var(--ts-accent-primary);
      color: var(--ts-text-inverse);
    }

    button.primary:hover {
      background: #00e8bb;
      box-shadow: 0 0 20px var(--ts-glow-primary);
    }

    button.secondary {
      background: var(--ts-bg-control);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
    }

    button.secondary:hover {
      background: var(--ts-bg-hover);
      border-color: var(--ts-border-strong);
    }

    button.danger {
      background: var(--ts-accent-danger);
      color: var(--ts-text-primary);
    }

    button.danger:hover {
      filter: brightness(1.1);
    }

    button:hover {
      filter: brightness(1.1);
    }

    .control {
      margin-bottom: 12px;
    }

    .info-text {
      font-size: 11px;
      color: var(--ts-text-muted);
      margin-top: 4px;
    }

    .stats {
      font-size: 11px;
      color: var(--ts-text-secondary);
      padding: 10px;
      background: var(--ts-bg-control);
      border-radius: var(--ts-radius-md);
      border: 1px solid var(--ts-border-subtle);
      margin-bottom: 12px;
    }

    .value {
      font-weight: 600;
      color: var(--ts-accent-primary);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      color: var(--ts-text-muted);
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--ts-accent-primary);
    }

    /* Preset Manager Styles */
    #preset-container {
      margin-top: 20px;
      background: var(--ts-bg-control);
      padding: 15px;
      border-radius: var(--ts-radius-lg);
      border: 1px solid var(--ts-border-subtle);
    }

    #preset-container h3 {
      color: var(--ts-accent-primary);
      margin: 0 0 15px 0;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #preset-container select {
      margin-bottom: 10px;
    }

    #preset-container input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: var(--ts-bg-deep);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
      font-family: var(--ts-font-mono);
      font-size: 12px;
      margin-bottom: 10px;
    }

    #preset-container input[type="text"]:focus {
      outline: none;
      border-color: var(--ts-accent-primary);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>
    <h2>Differential Growth</h2>

    <div class="control-group">
      <h3>Starting Shape</h3>
      <div class="control">
        <select id="startShape">
          <option value="circle">Circle</option>
          <option value="line">Line</option>
          <option value="square">Square</option>
          <option value="star">Star</option>
          <option value="random">Random Points</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="square800">Square (800x800)</option>
          <option value="landscape800x600">Landscape (800x600)</option>
          <option value="a4portrait">A4 Portrait</option>
          <option value="a4landscape">A4 Landscape</option>
          <option value="a3portrait">A3 Portrait</option>
          <option value="a3landscape">A3 Landscape</option>
          <option value="letterportrait">Letter Portrait</option>
          <option value="letterlandscape">Letter Landscape</option>
        </select>
      </div>
      <div class="control">
        <label>Background:</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="control">
        <label>Stroke Color:</label>
        <input type="color" id="strokeColor" value="#000000">
      </div>
      <div class="control">
        <button id="randomizeAll" class="secondary">Randomize Colors</button>
      </div>
    </div>

    <div class="control-group">
      <h3>Growth Parameters</h3>
      <div class="control">
        <label>Starting Points: <span class="value" id="startPoints-val">32</span></label>
        <input type="range" id="startPoints" min="8" max="128" value="32">
      </div>
      <div class="control">
        <label>Repulsion Force: <span class="value" id="repulsion-val">1.5</span></label>
        <input type="range" id="repulsion" min="0.5" max="5" value="1.5" step="0.1">
      </div>
      <div class="control">
        <label>Attraction Force: <span class="value" id="attraction-val">0.3</span></label>
        <input type="range" id="attraction" min="0.1" max="2" value="0.3" step="0.1">
      </div>
      <div class="control">
        <label>Max Distance: <span class="value" id="maxDist-val">15</span></label>
        <input type="range" id="maxDist" min="5" max="40" value="15">
      </div>
      <div class="control">
        <label>Split Distance: <span class="value" id="splitDist-val">8</span></label>
        <input type="range" id="splitDist" min="3" max="25" value="8">
      </div>
    </div>

    <div class="control-group">
      <h3>Style</h3>
      <div class="control">
        <label>Stroke Weight: <span class="value" id="strokeWeight-val">1.2</span></label>
        <input type="range" id="strokeWeight" min="0.3" max="3" value="1.2" step="0.1">
      </div>
      <div class="control">
        <label>
          <input type="checkbox" id="closedLoop" checked> Closed Loop
        </label>
      </div>
      <div class="control">
        <label>
          <input type="checkbox" id="showPoints" checked> Show Points
        </label>
      </div>
    </div>

    <div class="control-group">
      <h3>Controls</h3>
      <div class="stats" id="stats">
        Points: 32 | Iterations: 0
      </div>
      <div class="btn-row">
        <button class="primary" id="toggleGrowth">Start Growing</button>
      </div>
      <div class="btn-row">
        <button class="secondary" id="stepGrowth">Step</button>
        <button class="danger" id="reset">Reset</button>
      </div>
    </div>

    <div class="control-group">
      <h3>Export</h3>
      <div class="btn-row">
        <button class="secondary" id="exportSVG">Export SVG</button>
        <button class="secondary" id="exportPNG">Export PNG</button>
      </div>
    </div>

    <div id="preset-container">
      <h3>Presets</h3>
      <!-- Preset controls can be added here -->
    </div>
  </div>

  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
  <script src="../../shared/export-utils.js"></script>
  <script src="../../shared/panel-controller.js"></script>
  <script src="../../shared/stats-display.js"></script>
  <script>
    // Parameters
    const params = {
      paperSize: 'square800',
      bgColor: '#ffffff',
      strokeColor: '#000000',
      startShape: 'circle',
      startPoints: 32,
      repulsion: 1.5,
      attraction: 0.3,
      maxDist: 15,
      splitDist: 8,
      strokeWeight: 1.2,
      closedLoop: true,
      showPoints: true
    };

    // Canvas controls for unified color handling
    const canvasControls = new TSCanvasControls();
    canvasControls.bind(params);

    let canvas;
    let nodes = [];
    let growing = false;
    let iterations = 0;
    const MAX_NODES = 5000;

    function setup() {
      const size = CanvasLayout.getSize(params.paperSize);
      canvas = createCanvas(size.width, size.height);
      canvas.parent('canvas-container');

      // Initialize panel controller and stats display
      window.panelController = new TSPanelController().attach();
      window.statsDisplay = new TSStatsDisplay().attach();

      // Canvas settings handlers
      document.getElementById('paperSize').addEventListener('change', (e) => {
        params.paperSize = e.target.value;
        resizeCanvasForPaperSize();
      });

      document.getElementById('bgColor').addEventListener('input', (e) => {
        params.bgColor = e.target.value;
        drawCurve();
      });

      document.getElementById('strokeColor').addEventListener('input', (e) => {
        params.strokeColor = e.target.value;
        drawCurve();
      });

      setupControls();
      canvasControls.setupRandomizeButton();
      initializeNodes();
      drawCurve();
    }

    function resizeCanvasForPaperSize() {
      const size = CanvasLayout.getSize(params.paperSize);
      resizeCanvas(size.width, size.height);
      initializeNodes();
      drawCurve();
    }

    function setupControls() {
      const rangeControls = ['startPoints', 'repulsion', 'attraction', 'maxDist', 'splitDist', 'strokeWeight'];
      rangeControls.forEach(id => {
        const el = document.getElementById(id);
        const display = document.getElementById(`${id}-val`);
        el.addEventListener('input', () => {
          params[id] = parseFloat(el.value);
          display.textContent = el.value;
          if (id === 'startPoints') {
            growing = false;
            document.getElementById('toggleGrowth').textContent = 'Start Growing';
            initializeNodes();
          }
          drawCurve();
        });
      });

      document.getElementById('startShape').addEventListener('change', (e) => {
        params.startShape = e.target.value;
        if (!growing) {
          initializeNodes();
          drawCurve();
        }
      });

      document.getElementById('closedLoop').addEventListener('change', (e) => {
        params.closedLoop = e.target.checked;
        drawCurve();
      });

      document.getElementById('showPoints').addEventListener('change', (e) => {
        params.showPoints = e.target.checked;
        drawCurve();
      });

      document.getElementById('toggleGrowth').addEventListener('click', () => {
        growing = !growing;
        document.getElementById('toggleGrowth').textContent = growing ? 'Stop' : 'Start Growing';
        if (growing) loop();
        else noLoop();
      });

      document.getElementById('stepGrowth').addEventListener('click', () => {
        growStep();
        drawCurve();
      });

      document.getElementById('reset').addEventListener('click', () => {
        growing = false;
        document.getElementById('toggleGrowth').textContent = 'Start Growing';
        noLoop();
        initializeNodes();
        drawCurve();
      });

      document.getElementById('exportSVG').addEventListener('click', () => {
        const svg = generateSVG();
        TSExport.downloadSVG(svg, 'differential-growth');
      });

      document.getElementById('exportPNG').addEventListener('click', () => {
        TSExport.downloadPNG(canvas.canvas, 'differential-growth');
      });

      noLoop();
    }

    function initializeNodes() {
      nodes = [];
      iterations = 0;
      const cx = width / 2;
      const cy = height / 2;
      const n = params.startPoints;

      switch (params.startShape) {
        case 'circle':
          const radius = 300;
          for (let i = 0; i < n; i++) {
            const angle = (i / n) * TWO_PI;
            nodes.push({
              x: cx + cos(angle) * radius,
              y: cy + sin(angle) * radius,
              vx: 0,
              vy: 0
            });
          }
          break;

        case 'line':
          const lineLen = 300;
          for (let i = 0; i < n; i++) {
            const t = i / (n - 1);
            nodes.push({
              x: cx - lineLen / 2 + t * lineLen,
              y: cy,
              vx: 0,
              vy: 0
            });
          }
          break;

        case 'square':
          const side = 200;
          const perSide = Math.ceil(n / 4);
          for (let i = 0; i < n; i++) {
            const sideIdx = Math.floor(i / perSide);
            const t = (i % perSide) / perSide;
            let x, y;
            switch (sideIdx) {
              case 0: x = cx - side/2 + t * side; y = cy - side/2; break;
              case 1: x = cx + side/2; y = cy - side/2 + t * side; break;
              case 2: x = cx + side/2 - t * side; y = cy + side/2; break;
              default: x = cx - side/2; y = cy + side/2 - t * side; break;
            }
            nodes.push({ x, y, vx: 0, vy: 0 });
          }
          break;

        case 'star':
          const outerR = 150;
          const innerR = 60;
          const points = 5;
          for (let i = 0; i < n; i++) {
            const angle = (i / n) * TWO_PI - HALF_PI;
            const r = (Math.floor(i * points / n) % 2 === 0) ? outerR : innerR;
            const t = (i * points / n) % 1;
            const nextR = (Math.floor(i * points / n) % 2 === 0) ? innerR : outerR;
            const actualR = lerp(r, nextR, t);
            nodes.push({
              x: cx + cos(angle) * actualR,
              y: cy + sin(angle) * actualR,
              vx: 0,
              vy: 0
            });
          }
          break;

        case 'random':
          for (let i = 0; i < n; i++) {
            const angle = random(TWO_PI);
            const r = random(50, 150);
            nodes.push({
              x: cx + cos(angle) * r,
              y: cy + sin(angle) * r,
              vx: 0,
              vy: 0
            });
          }
          // Sort by angle for continuous path
          nodes.sort((a, b) => {
            return atan2(a.y - cy, a.x - cx) - atan2(b.y - cy, b.x - cx);
          });
          break;
      }

      updateStats();
    }

    function draw() {
      if (growing && nodes.length < MAX_NODES) {
        growStep();
        drawCurve();
      }
    }

    function growStep() {
      if (nodes.length === 0) return;

      iterations++;

      // Reset velocities
      for (const node of nodes) {
        node.vx = 0;
        node.vy = 0;
      }

      // Apply repulsion between all nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[j].x - nodes[i].x;
          const dy = nodes[j].y - nodes[i].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < params.maxDist && dist > 0.1) {
            const force = params.repulsion / (dist * dist);
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;

            nodes[i].vx -= fx;
            nodes[i].vy -= fy;
            nodes[j].vx += fx;
            nodes[j].vy += fy;
          }
        }
      }

      // Apply attraction to neighbors
      const len = nodes.length;
      for (let i = 0; i < len; i++) {
        const prev = params.closedLoop ? nodes[(i - 1 + len) % len] : (i > 0 ? nodes[i - 1] : null);
        const next = params.closedLoop ? nodes[(i + 1) % len] : (i < len - 1 ? nodes[i + 1] : null);

        if (prev) {
          const dx = prev.x - nodes[i].x;
          const dy = prev.y - nodes[i].y;
          nodes[i].vx += dx * params.attraction * 0.5;
          nodes[i].vy += dy * params.attraction * 0.5;
        }

        if (next) {
          const dx = next.x - nodes[i].x;
          const dy = next.y - nodes[i].y;
          nodes[i].vx += dx * params.attraction * 0.5;
          nodes[i].vy += dy * params.attraction * 0.5;
        }
      }

      // Apply velocities with damping
      const damping = 0.5;
      for (const node of nodes) {
        node.x += node.vx * damping;
        node.y += node.vy * damping;

        // Constrain to canvas
        node.x = constrain(node.x, 20, width - 20);
        node.y = constrain(node.y, 20, height - 20);
      }

      // Split edges that are too long
      if (nodes.length < MAX_NODES) {
        const newNodes = [];
        for (let i = 0; i < nodes.length; i++) {
          newNodes.push(nodes[i]);

          const nextIdx = params.closedLoop ? (i + 1) % nodes.length : i + 1;
          if (nextIdx < nodes.length || params.closedLoop) {
            const next = nodes[nextIdx];
            const dx = next.x - nodes[i].x;
            const dy = next.y - nodes[i].y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > params.splitDist) {
              // Add midpoint
              newNodes.push({
                x: (nodes[i].x + next.x) / 2 + random(-1, 1),
                y: (nodes[i].y + next.y) / 2 + random(-1, 1),
                vx: 0,
                vy: 0
              });
            }
          }
        }
        nodes = newNodes;
      }

      updateStats();
    }

    function updateStats() {
      document.getElementById('stats').textContent =
        `Points: ${nodes.length} | Iterations: ${iterations}`;

      // Update TSStatsDisplay
      if (window.statsDisplay) {
        const growthRate = nodes.length > params.startPoints ?
          ((nodes.length - params.startPoints) / iterations).toFixed(2) : '0.00';

        window.statsDisplay.update({
          'Nodes': nodes.length,
          'Iterations': iterations,
          'Growth Rate': growthRate,
          'Max Nodes': MAX_NODES,
          'Start Points': params.startPoints,
          'Status': growing ? 'Growing' : 'Paused',
          'Shape': params.startShape,
          'Repulsion': params.repulsion.toFixed(2),
          'Attraction': params.attraction.toFixed(2)
        });
      }
    }

    function drawCurve() {
      background(params.bgColor);
      stroke(params.strokeColor);
      strokeWeight(params.strokeWeight);
      noFill();

      if (nodes.length < 2) return;

      beginShape();
      for (const node of nodes) {
        vertex(node.x, node.y);
      }
      if (params.closedLoop) {
        endShape(CLOSE);
      } else {
        endShape();
      }

      if (params.showPoints) {
        fill(200, 50, 50);
        noStroke();
        for (const node of nodes) {
          ellipse(node.x, node.y, 4, 4);
        }
      }
    }

    function generateSVG() {
      if (nodes.length < 2) return '';

      const paths = [];
      const points = nodes.map(n => ({ x: n.x, y: n.y }));

      paths.push({
        d: TSExport.pointsToPath(points, params.closedLoop),
        stroke: params.strokeColor
      });

      if (params.showPoints) {
        for (const node of nodes) {
          paths.push({
            d: `M ${node.x - 2} ${node.y} a 2 2 0 1 0 4 0 a 2 2 0 1 0 -4 0`,
            fill: '#C83232',
            stroke: 'none'
          });
        }
      }

      return TSExport.createSVG(paths, width, height, {
        backgroundColor: params.bgColor,
        strokeWidth: params.strokeWeight,
        strokeColor: params.strokeColor
      });
    }

    function windowResized() {
      const size = CanvasLayout.getSize(params.paperSize);
      resizeCanvas(size.width, size.height);
      drawCurve();
    }
  </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
</html>
