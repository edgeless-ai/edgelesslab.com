<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Canvas Runner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
  <script src="../../canvas-layout.js"></script>
  <script src="../../preset-manager.js"></script>
  <link rel="stylesheet" href="../../preset-manager.css">

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    textarea {
      width: 100%;
      height: 240px;
      background: var(--ts-bg-deep);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
      padding: var(--ts-space-md);
      font-family: var(--ts-font-mono);
      font-size: 12px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--ts-accent-primary);
      box-shadow: 0 0 0 3px var(--ts-glow-primary);
    }
    .control-group {
      margin-bottom: var(--ts-space-lg);
      padding-bottom: var(--ts-space-lg);
      border-bottom: 1px solid var(--ts-border-subtle);
    }
    .control-group:last-child {
      border-bottom: none;
    }
    .control {
      margin-bottom: var(--ts-space-md);
    }
    .control label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--ts-text-secondary);
      margin-bottom: var(--ts-space-sm);
    }
    .value {
      color: var(--ts-accent-primary);
      font-family: var(--ts-font-display);
    }
    input[type="number"] {
      width: 100%;
      min-height: var(--ts-control-height);
      padding: 0 var(--ts-space-md);
      font-family: var(--ts-font-mono);
      font-size: 0.85rem;
      color: var(--ts-text-primary);
      background: var(--ts-bg-deep);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
    }
    input[type="number"]:focus {
      outline: none;
      border-color: var(--ts-accent-primary);
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: var(--ts-space-sm);
    }
    .checkbox-container input {
      width: auto;
    }
    button.secondary {
      background: var(--ts-bg-control);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
    }
    button.secondary:hover {
      background: var(--ts-bg-hover);
      border-color: var(--ts-border-strong);
    }
    .status {
      margin-top: var(--ts-space-md);
      font-size: 12px;
      color: var(--ts-accent-primary);
      padding: var(--ts-space-sm) var(--ts-space-md);
      background: var(--ts-bg-deep);
      border-radius: var(--ts-radius-sm);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>
    <h2>Canvas Runner</h2>
    <p style="font-size: 11px; color: var(--ts-text-muted); margin: 0 0 20px 0;">
      Paste p5.js code (instance mode) and export PNG/SVG.
    </p>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="square_medium" selected>Square Medium</option>
          <option value="square_large">Square Large</option>
          <option value="A4_landscape">A4 Landscape</option>
          <option value="A4_portrait">A4 Portrait</option>
          <option value="A3_landscape">A3 Landscape</option>
          <option value="A3_portrait">A3 Portrait</option>
        </select>
      </div>
      <div class="control">
        <label>Width: <span class="value" id="widthDisplay">800</span>px</label>
        <input type="number" id="widthInput" value="800" min="100" max="4000">
      </div>
      <div class="control">
        <label>Height: <span class="value" id="heightDisplay">600</span>px</label>
        <input type="number" id="heightInput" value="600" min="100" max="4000">
      </div>
      <div class="control">
        <label>Renderer:</label>
        <select id="rendererSelect">
          <option value="P2D">Canvas (PNG)</option>
          <option value="SVG">SVG (vector)</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>View Options</h3>
      <div class="control checkbox-container">
        <input type="checkbox" id="fitToggle" checked>
        <label for="fitToggle" style="margin: 0;">Fit to viewport</label>
      </div>
      <div class="control">
        <label>Zoom: <span class="value" id="zoomLabel">1.00x</span></label>
        <input type="range" id="zoomInput" min="0.25" max="2.5" step="0.05" value="1">
      </div>
    </div>

    <div class="control-group">
      <h3>Code Editor</h3>
      <textarea id="codeInput"></textarea>
    </div>

    <div class="control-group">
      <h3>Actions</h3>
      <button id="runBtn">Run Code</button>
      <button id="exportPngBtn" class="secondary">Export PNG</button>
      <button id="exportSvgBtn" class="secondary">Export SVG</button>
      <div class="status" id="status">Ready.</div>
    </div>

    <!-- Preset Manager -->
    <div id="preset-container"></div>
  </div>

  <script>
    let currentSketch = null;
    let fitZoomCtl = null;

    const defaultCode = `// p5 instance mode; use p as your sketch
// createCanvas is already called for you with selected size/renderer

p.setup = () => {
  p.noLoop();
};

p.draw = () => {
  p.background(255);
  p.stroke(0);
  p.noFill();
  for (let i = 0; i < 200; i++) {
    p.circle(p.random(p.width), p.random(p.height), p.random(5, 40));
  }
};`;

    const codeInput = document.getElementById('codeInput');
    codeInput.value = defaultCode;

    function setStatus(msg, color = 'var(--ts-accent-primary)') {
      const el = document.getElementById('status');
      if (el) { el.textContent = msg; el.style.color = color; }
    }

    function buildSketch(userCode, w, h, renderer) {
      return (p) => {
        p.setup = () => {
          const r = renderer === 'SVG' ? p.SVG : p.P2D;
          p.createCanvas(w, h, r);
          p.background(255);
          try {
            new Function('p', userCode)(p);
          } catch (err) {
            console.error(err);
            setStatus('Error in user code: ' + err.message, 'var(--ts-accent-danger)');
          }
        };
      };
    }

    function runSketch() {
      const w = parseInt(document.getElementById('widthInput').value) || 800;
      const h = parseInt(document.getElementById('heightInput').value) || 600;
      const renderer = document.getElementById('rendererSelect').value;
      const userCode = codeInput.value;

      if (currentSketch && currentSketch.remove) currentSketch.remove();

      const container = document.getElementById('canvas-container');
      container.innerHTML = '';
      const sketch = buildSketch(userCode, w, h, renderer);
      currentSketch = new p5((p) => {
        sketch(p);
        p.setup = (function(origSetup) {
          return function() {
            if (origSetup) origSetup.call(p);
          };
        })(p.setup);
        p.draw = p.draw || (() => {});
      }, container);

      // Wait a tick for canvas to mount
      setTimeout(() => {
        const canvasEl = container.querySelector('canvas');
        const zoomInput = document.getElementById('zoomInput');
        if (canvasEl && window.CanvasLayout) {
          if (fitZoomCtl && fitZoomCtl.destroy) fitZoomCtl.destroy();
          fitZoomCtl = CanvasLayout.attachFitZoom({
            container,
            canvasEl,
            fitToggle: document.getElementById('fitToggle'),
            zoomInput
          });
        }
      }, 50);

      setStatus(`Running (${renderer})`);
    }

    document.getElementById('runBtn').addEventListener('click', runSketch);

    document.getElementById('zoomInput').addEventListener('input', (e) => {
      document.getElementById('zoomLabel').textContent = `${parseFloat(e.target.value).toFixed(2)}x`;
    });

    document.getElementById('widthInput').addEventListener('input', (e) => {
      document.getElementById('widthDisplay').textContent = e.target.value;
    });

    document.getElementById('heightInput').addEventListener('input', (e) => {
      document.getElementById('heightDisplay').textContent = e.target.value;
    });

    document.getElementById('exportPngBtn').addEventListener('click', () => {
      if (!currentSketch) return;
      if (currentSketch.saveCanvas) currentSketch.saveCanvas('canvas-runner', 'png');
    });

    document.getElementById('exportSvgBtn').addEventListener('click', () => {
      if (!currentSketch) return;
      // For SVG renderer, p5 saves as .svg automatically
      if (currentSketch.save) currentSketch.save('canvas-runner.svg');
      else if (currentSketch.saveCanvas) currentSketch.saveCanvas('canvas-runner', 'svg');
    });

    // Paper size presets
    const paperSizes = {
      'square_medium': { width: 600, height: 600 },
      'square_large': { width: 800, height: 800 },
      'A4_landscape': { width: 842, height: 595 },
      'A4_portrait': { width: 595, height: 842 },
      'A3_landscape': { width: 1191, height: 842 },
      'A3_portrait': { width: 842, height: 1191 }
    };

    document.getElementById('paperSize').addEventListener('change', (e) => {
      const size = paperSizes[e.target.value];
      if (size) {
        document.getElementById('widthInput').value = size.width;
        document.getElementById('heightInput').value = size.height;
        document.getElementById('widthDisplay').textContent = size.width;
        document.getElementById('heightDisplay').textContent = size.height;
      }
    });

    runSketch();
  </script>
  <script src="../../shared/algorithm-page-chrome.js"></script>
</body>
</html>
