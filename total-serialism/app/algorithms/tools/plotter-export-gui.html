<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Plotter Export Tool</title>
  <script src="../../preset-manager.js"></script>
  <link rel="stylesheet" href="../../preset-manager.css">

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    .control-group {
      margin-bottom: var(--ts-space-lg);
      padding-bottom: var(--ts-space-lg);
      border-bottom: 1px solid var(--ts-border-subtle);
    }
    .control-group:last-child {
      border-bottom: none;
    }
    .control {
      margin-bottom: var(--ts-space-md);
    }
    .control label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--ts-text-secondary);
      margin-bottom: var(--ts-space-sm);
    }
    .value {
      color: var(--ts-accent-primary);
      font-family: var(--ts-font-display);
    }
    input[type="number"],
    input[type="text"] {
      width: 100%;
      min-height: var(--ts-control-height);
      padding: 0 var(--ts-space-md);
      font-family: var(--ts-font-mono);
      font-size: 0.85rem;
      color: var(--ts-text-primary);
      background: var(--ts-bg-deep);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
    }
    input[type="number"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--ts-accent-primary);
    }
    textarea {
      width: 100%;
      padding: var(--ts-space-md);
      font-family: var(--ts-font-mono);
      font-size: 0.8rem;
      color: var(--ts-text-primary);
      background: var(--ts-bg-deep);
      border: 1px solid var(--ts-border-default);
      border-radius: var(--ts-radius-md);
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--ts-accent-primary);
    }
    .canvas-wrapper {
      background: white;
      border-radius: var(--ts-radius-md);
      box-shadow: 0 0 0 1px var(--ts-border-subtle), 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    #canvas {
      display: block;
      border-radius: var(--ts-radius-md);
    }
    .tab-buttons {
      display: flex;
      gap: var(--ts-space-xs);
      margin-bottom: var(--ts-space-md);
    }
    .tab-button {
      flex: 1;
      padding: var(--ts-space-sm);
      background: var(--ts-bg-control);
      color: var(--ts-text-secondary);
      border: 1px solid var(--ts-border-default);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all var(--ts-transition-fast);
    }
    .tab-button:hover {
      background: var(--ts-bg-hover);
    }
    .tab-button.active {
      background: var(--ts-accent-primary);
      color: var(--ts-text-inverse);
      border-color: var(--ts-accent-primary);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: var(--ts-space-sm);
    }
    .checkbox-container input {
      width: auto;
    }
    .checkbox-container label {
      margin: 0;
      justify-content: flex-start;
    }
    .file-input-wrapper {
      position: relative;
      width: 100%;
    }
    .file-input-wrapper input[type=file] {
      position: absolute;
      left: -9999px;
    }
    .file-input-wrapper button {
      width: 100%;
      background: var(--ts-bg-control);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
    }
    .file-input-wrapper button:hover {
      background: var(--ts-bg-hover);
    }
    .stats {
      font-size: 0.75rem;
      color: var(--ts-text-secondary);
      padding: var(--ts-space-md);
      background: var(--ts-bg-deep);
      border-radius: var(--ts-radius-md);
      border: 1px solid var(--ts-border-subtle);
    }
    .stats div {
      margin: var(--ts-space-xs) 0;
      display: flex;
      justify-content: space-between;
    }
    .stats strong {
      color: var(--ts-accent-primary);
    }
    .preview-controls {
      display: flex;
      gap: var(--ts-space-sm);
      margin-bottom: var(--ts-space-md);
      flex-wrap: wrap;
      align-items: center;
    }
    .preview-controls button {
      padding: var(--ts-space-sm) var(--ts-space-md);
      font-size: 0.75rem;
    }
    .speed-control {
      display: flex;
      align-items: center;
      gap: var(--ts-space-sm);
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--ts-text-secondary);
    }
    .speed-control input[type="range"] {
      width: 80px;
    }
    .progress-bar {
      height: 8px;
      background: var(--ts-bg-deep);
      border-radius: var(--ts-radius-full);
      overflow: hidden;
      margin-top: var(--ts-space-md);
      border: 1px solid var(--ts-border-subtle);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--ts-accent-primary), var(--ts-accent-tertiary));
      transition: width 0.3s;
      width: 0%;
    }
    .export-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--ts-space-sm);
      margin-top: var(--ts-space-md);
    }
    .export-btn {
      background: var(--ts-accent-primary);
      text-align: center;
      padding: var(--ts-space-md);
      cursor: pointer;
      font-size: 0.75rem;
      transition: all var(--ts-transition-fast);
    }
    .export-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }
    #output {
      background: var(--ts-bg-deep);
      border: 1px solid var(--ts-border-subtle);
      border-radius: var(--ts-radius-md);
      padding: var(--ts-space-md);
      margin-top: var(--ts-space-md);
      font-family: var(--ts-font-mono);
      font-size: 0.7rem;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: var(--ts-text-secondary);
      display: none;
    }
    button.secondary {
      background: var(--ts-bg-control);
      color: var(--ts-text-primary);
      border: 1px solid var(--ts-border-default);
    }
    button.secondary:hover {
      background: var(--ts-bg-hover);
      border-color: var(--ts-border-strong);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="preview-controls">
      <button id="playBtn">Play</button>
      <button id="pauseBtn" class="secondary" disabled>Pause</button>
      <button id="stopBtn" class="secondary" disabled>Stop</button>
      <div class="speed-control">
        <label>Speed:</label>
        <input type="range" id="speedControl" min="1" max="50" value="10">
        <span id="speedValue">10x</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="canvas" width="800" height="600"></canvas>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressBar"></div>
    </div>

    <div class="stats" id="stats" style="margin-top: var(--ts-space-md);">
      <div>Paths: <strong id="pathCount">0</strong></div>
      <div>Total Distance: <strong id="totalDistance">0</strong> mm</div>
      <div>Draw Time: <strong id="drawTime">0:00</strong></div>
      <div>Move Time: <strong id="moveTime">0:00</strong></div>
      <div>Total Time: <strong id="totalTime">0:00</strong></div>
    </div>

    <div id="output"></div>
  </div>

  <div id="controls">
    <a href="../../index.html" class="back-link">&larr; Back to Index</a>
    <h2>Plotter Export Tool</h2>
    <p style="font-size: 11px; color: var(--ts-text-muted); margin: 0 0 20px 0;">
      Configure and export your generative art for pen plotters
    </p>

    <div class="control-group">
      <h3>Input</h3>
      <div class="control">
        <div class="file-input-wrapper">
          <button onclick="document.getElementById('fileInput').click()">Load SVG File</button>
          <input type="file" id="fileInput" accept=".svg">
        </div>
      </div>
      <div class="control">
        <label>Or paste SVG path data:</label>
        <textarea id="svgInput" rows="3"></textarea>
      </div>
    </div>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSizeSelect">
          <option value="square_medium" selected>Square Medium</option>
          <option value="square_large">Square Large</option>
          <option value="A4_landscape">A4 Landscape</option>
          <option value="A4_portrait">A4 Portrait</option>
          <option value="A3_landscape">A3 Landscape</option>
          <option value="A3_portrait">A3 Portrait</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Export Format</h3>
      <div class="tab-buttons">
        <button class="tab-button active" data-tab="svg">SVG</button>
        <button class="tab-button" data-tab="gcode">G-code</button>
        <button class="tab-button" data-tab="hpgl">HPGL</button>
      </div>

      <div id="svg-tab" class="tab-content active">
        <div class="checkbox-container">
          <input type="checkbox" id="svgOptimize" checked>
          <label for="svgOptimize">Optimize paths</label>
        </div>
      </div>

      <div id="gcode-tab" class="tab-content">
        <div class="control">
          <label>Plotter Type:</label>
          <select id="plotterType">
            <option value="generic">Generic CNC</option>
            <option value="axidraw">AxiDraw</option>
            <option value="grbl">GRBL</option>
          </select>
        </div>
        <div class="control">
          <label>Draw Speed: <span class="value" id="drawSpeedVal">1500</span> mm/min</label>
          <input type="number" id="drawSpeed" value="1500" min="100" max="5000">
        </div>
        <div class="control">
          <label>Move Speed: <span class="value" id="moveSpeedVal">3000</span> mm/min</label>
          <input type="number" id="moveSpeed" value="3000" min="100" max="10000">
        </div>
        <div class="control">
          <label>Pen Up Height: <span class="value" id="penUpVal">5</span> mm</label>
          <input type="number" id="penUpHeight" value="5" min="0" max="20" step="0.5">
        </div>
        <div class="control">
          <label>Pen Down Height: <span class="value" id="penDownVal">0</span> mm</label>
          <input type="number" id="penDownHeight" value="0" min="-5" max="5" step="0.5">
        </div>
      </div>

      <div id="hpgl-tab" class="tab-content">
        <div class="control">
          <label>Paper Size:</label>
          <select id="paperSize">
            <option value="letter">Letter (8.5" x 11")</option>
            <option value="a4">A4 (210mm x 297mm)</option>
            <option value="a3">A3 (297mm x 420mm)</option>
          </select>
        </div>
        <div class="control">
          <label>Pen Number: <span class="value" id="penNumVal">1</span></label>
          <input type="number" id="penNumber" value="1" min="1" max="8">
        </div>
        <div class="control">
          <label>Pen Speed: <span class="value" id="penSpeedValue">50</span>%</label>
          <input type="range" id="penSpeed" value="50" min="1" max="100">
        </div>
      </div>
    </div>

    <div class="control-group">
      <h3>Plotter Settings</h3>
      <div class="control">
        <label>Work Area Width: <span class="value" id="workWidthVal">210</span> mm</label>
        <input type="number" id="workWidth" value="210" min="10" max="1000">
      </div>
      <div class="control">
        <label>Work Area Height: <span class="value" id="workHeightVal">297</span> mm</label>
        <input type="number" id="workHeight" value="297" min="10" max="1000">
      </div>
      <div class="control">
        <label>Scale Factor: <span class="value" id="scaleVal">1</span></label>
        <input type="number" id="scaleFactor" value="1" min="0.1" max="10" step="0.1">
      </div>
    </div>

    <div class="control-group">
      <h3>Export</h3>
      <div class="export-options">
        <button class="export-btn" id="exportSVG">SVG</button>
        <button class="export-btn" id="exportGCode">G-code</button>
        <button class="export-btn" id="exportHPGL">HPGL</button>
      </div>
    </div>

    <!-- Preset Manager -->
    <div id="preset-container"></div>
  </div>

  <script src="../../shared/path-optimizer.js"></script>
  <script src="../../shared/plotter-export.js"></script>
  <script>
    // Initialize the GUI
    const canvas = document.getElementById('canvas');
    const preview = new PlotPreview(canvas, {
      showStats: false // We show stats separately
    });

    let currentPaths = [];
    let gcodeExporter = new GCodeExporter();
    let hpglExporter = new HPGLExporter();
    let optimizer = typeof PathOptimizer !== 'undefined' ? new PathOptimizer() : null;

    // Tab switching
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        const tab = button.dataset.tab;

        // Update buttons
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        button.classList.add('active');

        // Update content
        document.querySelectorAll('.tab-content').forEach(content => {
          content.classList.remove('active');
        });
        document.getElementById(`${tab}-tab`).classList.add('active');
      });
    });

    // File input
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          loadSVG(e.target.result);
        };
        reader.readAsText(file);
      }
    });

    // SVG input
    document.getElementById('svgInput').addEventListener('input', (e) => {
      if (e.target.value) {
        loadSVGPath(e.target.value);
      }
    });

    // Load SVG
    function loadSVG(svgContent) {
      const paths = typeof hpglExporter.parseSVGContent === 'function'
        ? hpglExporter.parseSVGContent(svgContent)
        : [];
      loadPaths(paths);
    }

    // Load SVG path data
    function loadSVGPath(pathData) {
      const paths = hpglExporter.parseSVGPath(pathData);
      loadPaths(paths);
    }

    // Load paths into preview
    function loadPaths(paths) {
      currentPaths = paths;

      // Optimize if needed using simple nearest-neighbor
      const optimizeCheckbox = document.getElementById('svgOptimize');
      if (optimizeCheckbox && optimizeCheckbox.checked && currentPaths.length > 1) {
        currentPaths = optimizer
          ? optimizer.optimize(currentPaths, { merge: false, sort: true, simplify: false })
          : optimizePathOrder(currentPaths);
      }

      // Update preview
      preview.loadPaths(currentPaths);
      updateStats();
    }

    // Simple nearest-neighbor path optimization
    function optimizePathOrder(paths) {
      if (paths.length <= 1) return paths;

      const optimized = [];
      const remaining = [...paths];
      optimized.push(remaining.shift());

      while (remaining.length > 0) {
        const lastPath = optimized[optimized.length - 1];
        const lastPoint = lastPath.points[lastPath.points.length - 1];

        let nearestIndex = 0;
        let nearestDistance = Infinity;

        remaining.forEach((path, index) => {
          if (path.points && path.points.length > 0) {
            const dist = distance(lastPoint, path.points[0]);
            if (dist < nearestDistance) {
              nearestDistance = dist;
              nearestIndex = index;
            }
          }
        });

        optimized.push(remaining.splice(nearestIndex, 1)[0]);
      }

      return optimized;
    }

    function distance(p1, p2) {
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    // Update statistics
    function updateStats() {
      const gconfig = getGCodeConfig();
      gcodeExporter.config = { ...gcodeExporter.config, ...gconfig };
      const estimate = gcodeExporter.estimateTime(currentPaths);

      document.getElementById('pathCount').textContent = estimate.pathCount;
      document.getElementById('totalDistance').textContent = estimate.totalDistance.toFixed(1);
      document.getElementById('drawTime').textContent = formatTime(estimate.drawTime);
      document.getElementById('moveTime').textContent = formatTime(estimate.moveTime);
      document.getElementById('totalTime').textContent = formatTime(estimate.totalTime);
    }

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${minutes}:${secs.toString().padStart(2, '0')}`;
    }

    // Preview controls
    document.getElementById('playBtn').addEventListener('click', () => {
      preview.play();
      document.getElementById('playBtn').disabled = true;
      document.getElementById('pauseBtn').disabled = false;
      document.getElementById('stopBtn').disabled = false;
    });

    document.getElementById('pauseBtn').addEventListener('click', () => {
      preview.pause();
      document.getElementById('playBtn').disabled = false;
      document.getElementById('pauseBtn').disabled = true;
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      preview.stop();
      document.getElementById('playBtn').disabled = false;
      document.getElementById('pauseBtn').disabled = true;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('progressBar').style.width = '0%';
    });

    // Speed control
    document.getElementById('speedControl').addEventListener('input', (e) => {
      const speed = parseInt(e.target.value);
      document.getElementById('speedValue').textContent = `${speed}x`;
      preview.setSpeed(speed);
    });

    // Progress callback
    preview.onProgress = (progress, estimate) => {
      document.getElementById('progressBar').style.width = `${progress * 100}%`;
    };

    preview.onComplete = () => {
      document.getElementById('playBtn').disabled = false;
      document.getElementById('pauseBtn').disabled = true;
      document.getElementById('stopBtn').disabled = true;
    };

    // Get configurations
    function getGCodeConfig() {
      return {
        plotterType: document.getElementById('plotterType').value,
        drawSpeed: parseInt(document.getElementById('drawSpeed').value),
        moveSpeed: parseInt(document.getElementById('moveSpeed').value),
        penUpHeight: parseFloat(document.getElementById('penUpHeight').value),
        penDownHeight: parseFloat(document.getElementById('penDownHeight').value),
        width: parseFloat(document.getElementById('workWidth').value),
        height: parseFloat(document.getElementById('workHeight').value)
      };
    }

    function getHPGLConfig() {
      const paperSize = document.getElementById('paperSize').value;
      let paperWidth, paperHeight;

      switch (paperSize) {
        case 'letter':
          paperWidth = 8.5;
          paperHeight = 11;
          break;
        case 'a4':
          paperWidth = 210 / 25.4; // mm to inches
          paperHeight = 297 / 25.4;
          break;
        case 'a3':
          paperWidth = 297 / 25.4;
          paperHeight = 420 / 25.4;
          break;
      }

      return {
        paperWidth,
        paperHeight,
        penNumber: parseInt(document.getElementById('penNumber').value),
        penSpeed: parseInt(document.getElementById('penSpeed').value)
      };
    }

    // Range input updates
    document.getElementById('penSpeed').addEventListener('input', (e) => {
      document.getElementById('penSpeedValue').textContent = e.target.value;
    });

    // Number input updates
    ['drawSpeed', 'moveSpeed', 'penUpHeight', 'penDownHeight', 'workWidth', 'workHeight', 'scaleFactor', 'penNumber'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', (e) => {
          const valId = {
            'drawSpeed': 'drawSpeedVal',
            'moveSpeed': 'moveSpeedVal',
            'penUpHeight': 'penUpVal',
            'penDownHeight': 'penDownVal',
            'workWidth': 'workWidthVal',
            'workHeight': 'workHeightVal',
            'scaleFactor': 'scaleVal',
            'penNumber': 'penNumVal'
          }[id];
          if (valId) {
            document.getElementById(valId).textContent = e.target.value;
          }
        });
      }
    });

    // Export functions
    document.getElementById('exportSVG').addEventListener('click', () => {
      if (currentPaths.length === 0) {
        alert('No paths to export');
        return;
      }

      // Generate SVG
      const svg = generateSVG(currentPaths);
      downloadFile('artwork.svg', svg, 'image/svg+xml');
    });

    document.getElementById('exportGCode').addEventListener('click', () => {
      if (currentPaths.length === 0) {
        alert('No paths to export');
        return;
      }

      const config = getGCodeConfig();
      gcodeExporter.config = { ...gcodeExporter.config, ...config };
      const gcode = gcodeExporter.export(currentPaths);

      showOutput(gcode);
      downloadFile('artwork.gcode', gcode, 'text/plain');
    });

    document.getElementById('exportHPGL').addEventListener('click', () => {
      if (currentPaths.length === 0) {
        alert('No paths to export');
        return;
      }

      const config = getHPGLConfig();
      hpglExporter.config = { ...hpglExporter.config, ...config };
      const hpgl = hpglExporter.export(currentPaths);

      showOutput(hpgl);
      downloadFile('artwork.hpgl', hpgl, 'text/plain');
    });

    // Generate SVG from paths
    function generateSVG(paths) {
      const width = document.getElementById('workWidth').value;
      const height = document.getElementById('workHeight').value;

      let svg = `<?xml version="1.0" encoding="UTF-8"?>\n`;
      svg += `<svg width="${width}mm" height="${height}mm" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">\n`;

      paths.forEach((path, index) => {
        let d = `M ${path.points[0].x} ${path.points[0].y}`;
        for (let i = 1; i < path.points.length; i++) {
          d += ` L ${path.points[i].x} ${path.points[i].y}`;
        }
        svg += `  <path d="${d}" fill="none" stroke="black" stroke-width="0.5" />\n`;
      });

      svg += `</svg>`;
      return svg;
    }

    // Show output
    function showOutput(content) {
      const output = document.getElementById('output');
      output.textContent = content;
      output.style.display = 'block';
    }

    // Download file
    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Update config when inputs change
    document.querySelectorAll('input, select').forEach(input => {
      input.addEventListener('change', () => {
        if (currentPaths.length > 0) {
          updateStats();
        }
      });
    });

    // Sample paths for testing
    const samplePaths = [
      {
        points: [
          { x: 100, y: 100 },
          { x: 200, y: 100 },
          { x: 200, y: 200 },
          { x: 100, y: 200 },
          { x: 100, y: 100 }
        ]
      },
      {
        points: [
          { x: 250, y: 150 },
          { x: 350, y: 150 },
          { x: 300, y: 250 }
        ]
      },
      {
        points: Array.from({ length: 36 }, (_, i) => {
          const angle = (i / 36) * Math.PI * 2;
          return {
            x: 500 + Math.cos(angle) * 80,
            y: 200 + Math.sin(angle) * 80
          };
        })
      }
    ];

    // Load sample paths on start
    loadPaths(samplePaths);
  </script>
