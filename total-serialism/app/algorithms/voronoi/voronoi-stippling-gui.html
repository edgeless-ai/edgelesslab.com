<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Voronoi Stippling - Pen Plotter Art</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
  <script src="../../preset-manager.js"></script>
  <script src="../../shared/canvas-layout.js"></script>
  <script src="../../shared/canvas-controls.js"></script>
  <script src="../../shared/export-utils.js"></script>
  <script src="../../upload-helper.js"></script>
  <script src="../../shared/panel-controller.js"></script>
  <script src="../../shared/stats-display.js"></script>
  <script src="../../shared/url-state.js"></script>
  <link rel="stylesheet" href="../../preset-manager.css">

  <!-- Total Serialism Design System -->
  <link rel="stylesheet" href="../../shared/algorithm.css">
  <style>
    /* Algorithm-specific overrides */
    .upload-area {
      border: 2px dashed var(--ts-accent-primary, #00d4aa);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: var(--ts-bg-elevated, #1a1a2e);
      color: var(--ts-text-secondary, #9898a8);
      font-size: 13px;
      transition: all 0.2s ease;
    }
    .upload-area:hover, .upload-area:focus {
      border-color: var(--ts-accent-secondary, #ff9500);
      background: var(--ts-bg-control, #22222e);
      outline: none;
    }
    #imageStatus {
      font-size: 12px;
      padding: 10px;
      background: var(--ts-bg-elevated, #1a1a2e);
      border: 1px solid var(--ts-accent-primary, #00d4aa);
      border-radius: 6px;
      margin-top: 10px;
      color: var(--ts-accent-primary, #00d4aa);
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .checkbox-container input {
      width: auto;
    }
    button.upload-btn {
      background: var(--ts-accent-secondary, #ff9500);
    }
    button.upload-btn:hover {
      background: #ffaa33;
    }
    button.export-btn {
      background: var(--ts-accent-danger, #ff4757);
    }
    button.export-btn:hover {
      background: #ff6b79;
    }
    button.plotter-btn {
      background: var(--ts-accent-primary, #00d4aa);
      color: var(--ts-bg-deep, #06060a);
    }
    button.plotter-btn:hover {
      background: #00e8bc;
    }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-link">&larr; Back to Index</a>

  <div id="canvas-container"></div>

  <div id="controls">
    <h2>Voronoi Stippling</h2>
    <p style="font-size: 11px; color: var(--ts-text-muted); margin: 0 0 20px 0;">
      Weighted point distribution for pen plotting
    </p>

    <div class="control-group">
      <h3>Canvas Settings</h3>
      <div class="control">
        <label>Paper Size:</label>
        <select id="paperSize">
          <option value="square_medium" selected>Square Medium</option>
          <option value="square_large">Square Large</option>
          <option value="A4_landscape">A4 Landscape</option>
          <option value="A4_portrait">A4 Portrait</option>
          <option value="A3_landscape">A3 Landscape</option>
          <option value="A3_portrait">A3 Portrait</option>
        </select>
      </div>
      <div class="control">
        <label>Background Color:</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="control">
        <label>Stroke Color:</label>
        <input type="color" id="strokeColor" value="#000000">
      </div>
      <div class="control">
        <button id="randomizeAll" class="ts-btn">Randomize Colors</button>
      </div>
    </div>

    <div class="control-group">
      <h3>Image Input</h3>
      <div id="uploadArea" class="upload-area" tabindex="0">Drop image or click to browse</div>
      <input type="file" id="imageInput" accept="image/*" style="display:none;">
      <button class="upload-btn" onclick="document.getElementById('imageInput').click()">Upload Image</button>
      <div id="imageStatus" style="display:none;"></div>
    </div>

    <div class="control-group">
      <h3>Stipple Settings</h3>
      <div class="control">
        <label>Point Count: <span class="value" id="pointCount-val">2000</span></label>
        <input type="range" id="pointCount" min="100" max="10000" value="2000" step="100">
      </div>
      <div class="control">
        <label>Point Size: <span class="value" id="pointSize-val">2</span>px</label>
        <input type="range" id="pointSize" min="0.5" max="10" value="2" step="0.5">
      </div>
      <div class="control">
        <label>Iterations: <span class="value" id="iterations-val">50</span></label>
        <input type="range" id="iterations" min="1" max="200" value="50" step="1">
      </div>
    </div>

    <div class="control-group">
      <h3>Distribution</h3>
      <div class="control">
        <label>Mode:</label>
        <select id="mode">
          <option value="weighted">Weighted (Image-based)</option>
          <option value="uniform">Uniform Distribution</option>
          <option value="random">Random</option>
          <option value="grid">Grid-based</option>
        </select>
      </div>
      <div class="control">
        <label>Density Bias: <span class="value" id="densityBias-val">2</span></label>
        <input type="range" id="densityBias" min="0.1" max="5" value="2" step="0.1">
      </div>
      <div class="control checkbox-container">
        <input type="checkbox" id="invertImage">
        <label for="invertImage">Invert Image</label>
      </div>
    </div>

    <div class="control-group">
      <h3>View & Updates</h3>
      <div class="control checkbox-container">
        <input type="checkbox" id="autoRegenerate">
        <label for="autoRegenerate">Auto regenerate on change (heavy)</label>
      </div>
      <button id="fitViewBtn" style="width:100%; margin-top:8px;">Toggle Fit / Manual</button>
      <div class="control">
        <label>Zoom: <span id="zoom-val">1.0x</span></label>
        <input type="range" id="zoom" min="0.25" max="2.5" value="1" step="0.05">
      </div>
    </div>

    <div class="control-group">
      <h3>Display</h3>
      <div class="control checkbox-container">
        <input type="checkbox" id="showVoronoi">
        <label for="showVoronoi">Show Voronoi Cells</label>
      </div>
      <div class="control checkbox-container">
        <input type="checkbox" id="showDelaunay">
        <label for="showDelaunay">Show Delaunay Triangulation</label>
      </div>
      <div class="control checkbox-container">
        <input type="checkbox" id="showImage" checked>
        <label for="showImage">Show Source Image</label>
      </div>
    </div>

    <div class="control-group">
      <h3>Generation</h3>
      <button onclick="generate()">Generate</button>
      <button onclick="step()">Step Once</button>
      <button onclick="autoRelax()">Auto Relax</button>
      <div class="control">
        <label>Seed: <span id="seed-display" class="value">-</span></label>
        <input type="number" id="seed" min="1" max="999999" style="width:100%;padding:6px;background:var(--ts-bg-deep,#0a0a1a);border:1px solid var(--ts-border-default,#2a2a4a);border-radius:4px;color:var(--ts-text-primary,#e0e0e0);font-family:monospace;">
      </div>
      <button onclick="copyShareUrl()">📋 Copy Share URL</button>
      <span id="share-status" style="margin-left:8px;color:#4a9;font-size:12px;"></span>
    </div>

    <div class="control-group">
      <h3>Export</h3>
      <button class="export-btn" onclick="exportSVG()">Export SVG (Screen)</button>
      <button class="plotter-btn" onclick="exportPlotterSVG()">Export SVG (Plotter)</button>
      <button class="export-btn" onclick="exportPNG()">Export PNG</button>
    </div>

    <!-- Preset Manager -->
    <div id="preset-container"></div>
  </div>

  <script>
    let params = {
      paperSize: 'square_medium',
      bgColor: '#ffffff',
      strokeColor: '#000000',
      pointCount: 2000,
      pointSize: 2,
      iterations: 50,
      mode: 'weighted',
      densityBias: 2,
      invertImage: false,
      showVoronoi: false,
      showDelaunay: false,
      showImage: true,
      seed: Math.floor(Math.random() * 1000000)
    };

    // Canvas controls for color randomization with WCAG AA contrast
    const canvasControls = new TSCanvasControls({
      bgColor: params.bgColor || '#ffffff',
      strokeColor: params.strokeColor || '#000000'
    });
    canvasControls.bind(params);
    canvasControls.setupRandomizeButton();

    // URL State Management
    const urlState = new TSUrlState({
      algorithmId: 'voronoi-stippling',
      schema: [
        { key: 'seed', type: 'int', bytes: 4 },
        { key: 'pointCount', type: 'int', bytes: 2 },
        { key: 'pointSize', type: 'float', bytes: 2, min: 0.5, max: 10 },
        { key: 'iterations', type: 'int', bytes: 1 },
        { key: 'densityBias', type: 'float', bytes: 2, min: 0.1, max: 5 },
        { key: 'bgColor', type: 'color' },
        { key: 'strokeColor', type: 'color' },
        { key: 'mode', type: 'enum', options: ['weighted', 'uniform', 'random', 'grid'] },
        { key: 'invertImage', type: 'bool' },
        { key: 'showVoronoi', type: 'bool' },
        { key: 'showDelaunay', type: 'bool' },
        { key: 'showImage', type: 'bool' }
      ]
    });

    // Load from URL if present
    const urlParams = urlState.fromUrl();
    if (window.location.search.includes('s=')) {
      Object.assign(params, urlParams);
      // Update UI elements from URL params
      document.getElementById('pointCount').value = params.pointCount;
      document.getElementById('pointCount-val').textContent = params.pointCount;
      document.getElementById('pointSize').value = params.pointSize;
      document.getElementById('pointSize-val').textContent = params.pointSize;
      document.getElementById('iterations').value = params.iterations;
      document.getElementById('iterations-val').textContent = params.iterations;
      document.getElementById('densityBias').value = params.densityBias;
      document.getElementById('densityBias-val').textContent = params.densityBias;
      document.getElementById('bgColor').value = params.bgColor;
      document.getElementById('strokeColor').value = params.strokeColor;
      document.getElementById('mode').value = params.mode;
      document.getElementById('invertImage').checked = params.invertImage;
      document.getElementById('showVoronoi').checked = params.showVoronoi;
      document.getElementById('showDelaunay').checked = params.showDelaunay;
      document.getElementById('showImage').checked = params.showImage;
    }

    let points = [];
    let sourceImage = null;
    let imagePixels = [];
    let currentIteration = 0;
    let isRelaxing = false;
    let autoRegenerate = false; // Default to OFF for heavy operations
    let regenTimer;
    const REGEN_DEBOUNCE = 500;

    // Total Serialism UI components
    let panelController;
    let statsDisplay;

    function setup() {
      const size = CanvasLayout.getSize(params.paperSize);
      const scale = Math.min(windowWidth * 0.6 / size.width, windowHeight * 0.9 / size.height);
      const canvas = createCanvas(size.width * scale, size.height * scale);
      canvas.parent('canvas-container');
      background(params.bgColor);

      // Initialize Total Serialism components
      if (typeof TSPanelController !== 'undefined') {
        panelController = new TSPanelController('controls', {
          onToggle: (isVisible) => {
            console.log('Panel visibility:', isVisible);
          }
        });
      }

      if (typeof TSStatsDisplay !== 'undefined') {
        statsDisplay = new TSStatsDisplay('controls');
      }

      // Setup UI event listeners
      setupUIListeners();
      setupUploadHelper();
      setupCanvasLayout();

      // Generate initial pattern
      initializePoints();
      drawStipples();
    }

    function resizeCanvasForPaperSize() {
      const size = CanvasLayout.getSize(params.paperSize);
      const scale = Math.min(windowWidth * 0.6 / size.width, windowHeight * 0.9 / size.height);
      resizeCanvas(size.width * scale, size.height * scale);
      generate();
    }

    function draw() {
      if (isRelaxing && currentIteration < params.iterations) {
        relaxStep();
        currentIteration++;
        drawStipples();

        // Update stats display during auto-relax
        if (statsDisplay && currentIteration % 5 === 0) {
          statsDisplay.update({
            'Points': params.pointCount,
            'Point Size': params.pointSize + 'px',
            'Iterations': `${currentIteration}/${params.iterations}`,
            'Mode': params.mode,
            'Density Bias': params.densityBias.toFixed(1),
            'Image': sourceImage ? `${sourceImage.width}x${sourceImage.height}` : 'None'
          });
        }

        if (currentIteration >= params.iterations) {
          isRelaxing = false;
        }
      }
    }

    function queueRegenerate() {
      if (!autoRegenerate) return;
      clearTimeout(regenTimer);
      regenTimer = setTimeout(() => {
        generate();
      }, REGEN_DEBOUNCE);
    }

    function setupUIListeners() {
      // Auto-regenerate toggle
      const autoToggle = document.getElementById('autoRegenerate');
      if (autoToggle) {
        autoToggle.checked = autoRegenerate;
        autoToggle.addEventListener('change', (e) => {
          autoRegenerate = e.target.checked;
          if (autoRegenerate) queueRegenerate();
        });
      }

      // Point count
      document.getElementById('pointCount').addEventListener('input', (e) => {
        params.pointCount = parseInt(e.target.value);
        document.getElementById('pointCount-val').textContent = params.pointCount;
        queueRegenerate();
      });

      // Point size
      document.getElementById('pointSize').addEventListener('input', (e) => {
        params.pointSize = parseFloat(e.target.value);
        document.getElementById('pointSize-val').textContent = params.pointSize;
        drawStipples();
      });

      // Iterations
      document.getElementById('iterations').addEventListener('input', (e) => {
        params.iterations = parseInt(e.target.value);
        document.getElementById('iterations-val').textContent = params.iterations;
      });

      // Mode
      document.getElementById('mode').addEventListener('change', (e) => {
        params.mode = e.target.value;
      });

      // Density bias
      document.getElementById('densityBias').addEventListener('input', (e) => {
        params.densityBias = parseFloat(e.target.value);
        document.getElementById('densityBias-val').textContent = params.densityBias;
      });

      // Checkboxes
      document.getElementById('invertImage').addEventListener('change', (e) => {
        params.invertImage = e.target.checked;
        if (sourceImage) {
          processImage();
          drawStipples();
        }
      });

      document.getElementById('showVoronoi').addEventListener('change', (e) => {
        params.showVoronoi = e.target.checked;
        drawStipples();
      });

      document.getElementById('showDelaunay').addEventListener('change', (e) => {
        params.showDelaunay = e.target.checked;
        drawStipples();
      });

      document.getElementById('showImage').addEventListener('change', (e) => {
        params.showImage = e.target.checked;
        drawStipples();
      });

      // Seed control
      document.getElementById('seed').addEventListener('change', (e) => {
        params.seed = parseInt(e.target.value);
        generate();
      });

      // Image upload
      document.getElementById('imageInput').addEventListener('change', handleImageUpload);

      // Paper size
      const paperSizeSelect = document.getElementById('paperSize');
      if (paperSizeSelect) {
        paperSizeSelect.addEventListener('change', (e) => {
          params.paperSize = e.target.value;
          resizeCanvasForPaperSize();
        });
      }

      // Background color
      const bgColorSelect = document.getElementById('bgColor');
      if (bgColorSelect) {
        bgColorSelect.addEventListener('change', (e) => {
          params.bgColor = e.target.value;
          drawStipples();
        });
      }

      // Stroke color
      const strokeColorSelect = document.getElementById('strokeColor');
      if (strokeColorSelect) {
        strokeColorSelect.addEventListener('change', (e) => {
          params.strokeColor = e.target.value;
          drawStipples();
        });
      }
    }

    function setupUploadHelper() {
      if (typeof UploadHelper !== 'undefined') {
        const uploadHelper = new UploadHelper(
          document.getElementById('canvas-container'),
          {
            accept: 'image/*',
            onFile: (file) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                loadImage(e.target.result, (img) => {
                  sourceImage = img;
                  processImage();
                  initializePoints();
                  drawStipples();
                });
              };
              reader.readAsDataURL(file);
            },
            onError: (error) => console.error('Upload error:', error)
          }
        );
      }
    }

    function setupCanvasLayout() {
      if (typeof CanvasLayout !== 'undefined') {
        const container = document.getElementById('canvas-container');
        const canvas = document.querySelector('#canvas-container canvas');
        if (container && canvas) {
          CanvasLayout.attachFitZoom(container, canvas);
        }
      }
    }

    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          loadImage(e.target.result, (img) => {
            sourceImage = img;
            processImage();
            document.getElementById('imageStatus').style.display = 'block';
            document.getElementById('imageStatus').textContent = `Loaded: ${img.width}x${img.height}`;
            generate();
          });
        };
        reader.readAsDataURL(file);
      }
    }

    function processImage() {
      if (!sourceImage) return;

      sourceImage.loadPixels();
      imagePixels = [];

      for (let y = 0; y < sourceImage.height; y++) {
        for (let x = 0; x < sourceImage.width; x++) {
          const index = (x + y * sourceImage.width) * 4;
          const r = sourceImage.pixels[index];
          const g = sourceImage.pixels[index + 1];
          const b = sourceImage.pixels[index + 2];

          // Convert to grayscale
          let brightness = (r + g + b) / 3 / 255;

          if (params.invertImage) {
            brightness = 1 - brightness;
          }

          imagePixels.push(brightness);
        }
      }
    }

    function initializePoints() {
      points = [];

      // Initialize seed
      randomSeed(params.seed);
      noiseSeed(params.seed);

      for (let i = 0; i < params.pointCount; i++) {
        let x, y;

        switch (params.mode) {
          case 'weighted':
            if (sourceImage && imagePixels.length > 0) {
              ({ x, y } = getWeightedPoint());
            } else {
              x = random(width);
              y = random(height);
            }
            break;

          case 'uniform':
            x = random(width);
            y = random(height);
            break;

          case 'random':
            x = random(width);
            y = random(height);
            break;

          case 'grid':
            const cols = Math.floor(sqrt(params.pointCount));
            const rows = Math.ceil(params.pointCount / cols);
            const col = i % cols;
            const row = Math.floor(i / cols);
            x = (col + 0.5 + random(-0.3, 0.3)) * (width / cols);
            y = (row + 0.5 + random(-0.3, 0.3)) * (height / rows);
            break;
        }

        points.push({ x, y });
      }

      currentIteration = 0;
    }

    function getWeightedPoint() {
      // Rejection sampling based on image brightness
      let x, y, brightness;
      let attempts = 0;
      const maxAttempts = 100;

      do {
        x = Math.floor(random(sourceImage.width));
        y = Math.floor(random(sourceImage.height));
        const index = x + y * sourceImage.width;
        brightness = imagePixels[index] || 0;
        attempts++;
      } while (random() > Math.pow(1 - brightness, params.densityBias) && attempts < maxAttempts);

      // Scale to canvas
      return {
        x: map(x, 0, sourceImage.width, 0, width),
        y: map(y, 0, sourceImage.height, 0, height)
      };
    }

    function relaxStep() {
      // Lloyd's relaxation: move points to centroids of their Voronoi cells
      const newPoints = [];

      for (let i = 0; i < points.length; i++) {
        const cell = getVoronoiCell(i);
        const centroid = getCellCentroid(cell);
        newPoints.push(centroid);
      }

      points = newPoints;
    }

    function getVoronoiCell(index) {
      // Simplified Voronoi cell calculation
      // Returns the region closest to this point
      const cell = [];
      const p = points[index];

      // Sample points in a grid to approximate the cell
      const samples = 20;
      const range = width / sqrt(params.pointCount) * 2;

      for (let dy = -range; dy <= range; dy += range / samples) {
        for (let dx = -range; dx <= range; dx += range / samples) {
          const testX = p.x + dx;
          const testY = p.y + dy;

          if (testX < 0 || testX >= width || testY < 0 || testY >= height) continue;

          // Check if this point is closest to our point
          let closest = true;
          const distToP = dist(testX, testY, p.x, p.y);

          for (let j = 0; j < points.length; j++) {
            if (j === index) continue;
            const distToOther = dist(testX, testY, points[j].x, points[j].y);
            if (distToOther < distToP) {
              closest = false;
              break;
            }
          }

          if (closest) {
            cell.push({ x: testX, y: testY });
          }
        }
      }

      return cell;
    }

    function getCellCentroid(cell) {
      if (cell.length === 0) return { x: random(width), y: random(height) };

      let sumX = 0, sumY = 0, totalWeight = 0;

      for (const p of cell) {
        let weight = 1;

        // Weight by image if available
        if (sourceImage && imagePixels.length > 0) {
          const imgX = Math.floor(map(p.x, 0, width, 0, sourceImage.width));
          const imgY = Math.floor(map(p.y, 0, height, 0, sourceImage.height));
          const index = imgX + imgY * sourceImage.width;
          const brightness = imagePixels[index] || 0;
          weight = Math.pow(1 - brightness, params.densityBias) + 0.1;
        }

        sumX += p.x * weight;
        sumY += p.y * weight;
        totalWeight += weight;
      }

      return {
        x: sumX / totalWeight,
        y: sumY / totalWeight
      };
    }

    function drawStipples() {
      background(params.bgColor);

      // Draw source image
      if (params.showImage && sourceImage) {
        push();
        tint(255, 100);
        image(sourceImage, 0, 0, width, height);
        pop();
      }

      // Draw Voronoi cells
      if (params.showVoronoi) {
        stroke(200);
        strokeWeight(0.5);
        noFill();
        // Simplified Voronoi visualization
        for (let i = 0; i < points.length; i++) {
          const cell = getVoronoiCell(i);
          if (cell.length > 2) {
            beginShape();
            for (const p of cell) {
              vertex(p.x, p.y);
            }
            endShape(CLOSE);
          }
        }
      }

      // Draw Delaunay triangulation
      if (params.showDelaunay) {
        stroke(150, 150, 255, 100);
        strokeWeight(0.5);
        noFill();
        // Simple nearest-neighbor connections
        for (let i = 0; i < points.length; i++) {
          const neighbors = findNearestNeighbors(i, 3);
          for (const j of neighbors) {
            line(points[i].x, points[i].y, points[j].x, points[j].y);
          }
        }
      }

      // Draw stipples
      fill(params.strokeColor);
      noStroke();
      for (const p of points) {
        circle(p.x, p.y, params.pointSize);
      }
    }

    function findNearestNeighbors(index, count) {
      const distances = points.map((p, i) => ({
        index: i,
        dist: dist(points[index].x, points[index].y, p.x, p.y)
      }));

      distances.sort((a, b) => a.dist - b.dist);
      return distances.slice(1, count + 1).map(d => d.index);
    }

    function generate() {
      initializePoints();
      currentIteration = 0;
      drawStipples();

      // Update seed display
      document.getElementById('seed-display').textContent = params.seed;
      document.getElementById('seed').value = params.seed;

      // Update stats display
      if (statsDisplay) {
        statsDisplay.update({
          'Points': params.pointCount,
          'Point Size': params.pointSize + 'px',
          'Iterations': `${currentIteration}/${params.iterations}`,
          'Mode': params.mode,
          'Density Bias': params.densityBias.toFixed(1),
          'Image': sourceImage ? `${sourceImage.width}x${sourceImage.height}` : 'None'
        });
      }

      // Update URL state
      urlState.replaceState(params);
    }

    function step() {
      if (currentIteration < params.iterations) {
        relaxStep();
        currentIteration++;
        drawStipples();

        // Update stats display
        if (statsDisplay) {
          statsDisplay.update({
            'Points': params.pointCount,
            'Point Size': params.pointSize + 'px',
            'Iterations': `${currentIteration}/${params.iterations}`,
            'Mode': params.mode,
            'Density Bias': params.densityBias.toFixed(1),
            'Image': sourceImage ? `${sourceImage.width}x${sourceImage.height}` : 'None'
          });
        }
      }
    }

    function autoRelax() {
      currentIteration = 0;
      isRelaxing = true;
    }

    function exportSVG() {
      // Generate manual SVG with circles
      let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
<rect width="100%" height="100%" fill="#ffffff"/>
`;

      // Draw stipples as circles
      for (const p of points) {
        svg += `<circle cx="${p.x}" cy="${p.y}" r="${params.pointSize / 2}" fill="${params.strokeColor}" stroke="none"/>
`;
      }

      svg += '</svg>';

      TSExport.downloadSVG(svg, `voronoi-stippling-${Date.now()}`);
    }

    // Plotter-ready SVG export (stroke-only, no fills)
    function exportPlotterSVG() {
      // Generate manual SVG optimized for pen plotting
      // NO background - transparent for plotter
      // NO fills - only strokes
      let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
`;

      // Draw stipples as stroke circles (no fill)
      for (const p of points) {
        svg += `<circle cx="${p.x}" cy="${p.y}" r="${params.pointSize / 2}" stroke="#000000" stroke-width="0.5" fill="none"/>
`;
      }

      svg += '</svg>';

      TSExport.downloadSVG(svg, `voronoi-stippling-plotter-${Date.now()}`);
    }

    function exportPNG() {
      save(`voronoi-stippling-${Date.now()}.png`);
    }

    function copyShareUrl() {
      const shareUrl = urlState.getShareUrl(params);
      const statusEl = document.getElementById('share-status');
      navigator.clipboard.writeText(shareUrl).then(() => {
        statusEl.textContent = '✓ Copied!';
        setTimeout(() => statusEl.textContent = '', 2000);
      }).catch(() => {
        statusEl.textContent = 'Copy failed';
      });
    }

    // Initialize Preset Manager
    const presetManager = new PresetManager({
      algorithmId: 'voronoi-stippling',
      container: '#preset-container',

      onSave: () => {
        return { ...params };
      },

      onLoad: (preset) => {
        const data = preset.data;
        params = { ...data };

        // Update UI
        Object.keys(params).forEach(key => {
          const element = document.getElementById(key);
          if (element) {
            if (element.type === 'checkbox') {
              element.checked = params[key];
            } else if (element.type === 'select-one') {
              element.value = params[key];
            } else {
              element.value = params[key];
            }

            const display = document.getElementById(key + '-val');
            if (display) {
              display.textContent = params[key];
            }
          }
        });

        generate();
      },

      onRandomize: () => {
        params.pointCount = Math.floor(random(500, 5000));
        params.pointSize = random(0.5, 5);
        params.iterations = Math.floor(random(10, 100));
        params.densityBias = random(0.5, 4);
        params.seed = Math.floor(Math.random() * 1000000);

        // Update UI
        Object.keys(params).forEach(key => {
          const element = document.getElementById(key);
          if (element && element.type === 'range') {
            element.value = params[key];
            const display = document.getElementById(key + '-val');
            if (display) {
              display.textContent = params[key];
            }
          }
        });

        generate();
      }
    });
  </script>
  <script src="../../shared/algorithm-page-chrome.js">
  // Auto-injected by harmonize.py
  function windowResized() {
    // Preserve canvas aspect ratio on window resize
    if (typeof resizeCanvas === 'function') {
      const container = document.querySelector('canvas')?.parentElement;
      if (container) {
        const w = container.clientWidth;
        resizeCanvas(w, w); // Square canvas default
      }
    }
  }

</script>
